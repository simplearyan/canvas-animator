<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Studio Pro - macOS Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Preload all requested Fonts and their full weight spectrums -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Carrois+Gothic&family=Caveat:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&family=Montserrat:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior: none; 
            background-color: #000;
            background-image: radial-gradient(circle at 50% 0%, #18181b 0%, #000 100%);
        }
        
        /* macOS Depth & Glassmorphism Utilities */
        .mac-panel {
            background: rgba(24, 24, 27, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .mac-header {
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .mac-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
            color: #f4f4f5;
            transition: all 0.2s;
        }
        .mac-input:focus {
            border-color: #10b981;
            outline: none;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.3), 0 0 0 2px rgba(16,185,129,0.2);
        }

        /* Custom macOS Dropdown Select */
        .mac-select {
            appearance: none;
            -webkit-appearance: none;
            background-color: rgba(0, 0, 0, 0.3);
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9L12 15L18 9' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
            color: #f4f4f5;
            padding-right: 28px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .mac-select:focus {
            border-color: #10b981;
            outline: none;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.3), 0 0 0 2px rgba(16,185,129,0.2);
        }
        /* Style dropdown options */
        .mac-select option {
            background-color: #18181b; /* Dark bg for popup */
            color: #f4f4f5;
            padding: 8px;
        }

        .mac-btn {
            background: linear-gradient(180deg, rgba(63, 63, 70, 0.8) 0%, rgba(39, 39, 42, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.15s ease;
        }
        .mac-btn:hover { background: linear-gradient(180deg, rgba(82, 82, 91, 0.8) 0%, rgba(63, 63, 70, 0.8) 100%); }
        .mac-btn:active { background: rgba(39, 39, 42, 0.9); box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }

        /* Custom macOS Timeline Scrubber */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #10b981;
            margin-top: -5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        /* Color Picker */
        input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type=color]::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.2); }
        
        /* Enable and style the number input spinners for macOS feel */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button {
            opacity: 1;
            cursor: pointer;
        }
    </style>
</head>
<body class="text-zinc-100 h-screen flex flex-col overflow-hidden selection:bg-emerald-500/30">

    <!-- Header -->
    <header class="mac-header h-14 flex justify-between items-center px-6 shrink-0 z-30">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-b from-emerald-400 to-emerald-600 rounded-lg flex items-center justify-center text-zinc-950 shadow-[0_2px_8px_rgba(16,185,129,0.4)] border border-emerald-300/30">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
            </div>
            <h1 class="text-lg font-bold tracking-tight text-white drop-shadow-sm">MotionStudio <span class="font-normal text-zinc-500 text-sm">Pro</span></h1>
        </div>
        <div class="flex items-center gap-4">
            
            <div class="hidden xl:flex items-center text-xs font-medium text-zinc-400 bg-black/30 px-3 py-1.5 rounded-full border border-white/5 shadow-inner">
                Length: <span id="durationDisplay" class="text-zinc-100 font-mono ml-1">5.0</span>s
            </div>

            <!-- Export Settings Group -->
            <div class="flex items-center bg-black/40 rounded-full border border-white/5 shadow-inner px-2 py-1 gap-2">
                <select id="exportQuality" class="mac-select bg-transparent border-none text-[11px] font-semibold text-zinc-300 py-1 pl-2 pr-6 outline-none cursor-pointer">
                    <option value="854x480">480p</option>
                    <option value="1280x720" selected>720p HD</option>
                    <option value="1920x1080">1080p FHD</option>
                    <option value="2560x1440">2K QHD</option>
                    <option value="3840x2160">4K UHD</option>
                </select>
                <div class="w-px h-4 bg-white/10"></div>
                <label class="flex items-center gap-1.5 cursor-pointer text-[10px] font-bold text-zinc-400 uppercase tracking-widest pr-2 hover:text-zinc-200 transition-colors" title="Export with transparent background">
                    <input type="checkbox" id="snapTransparent" class="accent-emerald-500 w-3 h-3 cursor-pointer">
                    Transp. BG
                </label>
            </div>

            <button id="snapshotBtn" class="mac-btn px-4 py-1.5 rounded-full font-bold text-[11px] shadow-sm border border-white/10 transition-all flex items-center gap-1.5 text-zinc-200 hover:text-white">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Snap
            </button>

            <button id="exportBtn" class="bg-gradient-to-b from-emerald-400 to-emerald-600 hover:from-emerald-300 hover:to-emerald-500 text-zinc-950 px-5 py-1.5 rounded-full font-bold text-[13px] shadow-[0_4px_15px_rgba(16,185,129,0.3)] border border-emerald-300/30 transition-all flex items-center gap-2 active:scale-95">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Export
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden relative z-10">
        
        <!-- LEFT SIDEBAR: Slides & Add Elements -->
        <aside class="w-64 mac-panel border-r-0 flex flex-col shrink-0 z-20 m-4 rounded-2xl overflow-hidden mr-0">
            <!-- Left Tabs -->
            <div class="flex border-b border-white/5 bg-black/20">
                <button id="tabSlides" class="flex-1 py-3 text-xs font-semibold border-b-2 border-emerald-500 text-emerald-400 transition-colors uppercase tracking-wider">Slides</button>
                <button id="tabAdd" class="flex-1 py-3 text-xs font-semibold border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-wider">Add</button>
                <button id="tabAudio" class="flex-1 py-3 text-xs font-semibold border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-wider">Audio</button>
            </div>

            <!-- Slides View -->
            <div id="viewSlides" class="flex-1 flex flex-col overflow-y-auto p-4 gap-3">
                <button onclick="addSlide()" class="mac-btn w-full py-2.5 rounded-lg text-zinc-300 hover:text-white text-xs font-semibold flex justify-center items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> New Slide
                </button>
                <div class="h-px bg-white/5 my-2"></div>
                <div id="slideList" class="space-y-2">
                    <!-- Slides rendered here -->
                </div>
            </div>

            <!-- Add Elements View -->
            <div id="viewAdd" class="hidden flex-1 flex flex-col p-4 gap-3">
                <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 ml-1">Typography</h3>
                <button onclick="addElement('text')" class="mac-btn w-full p-3 rounded-xl flex items-center gap-3 text-sm font-medium text-zinc-300 hover:text-white">
                    <div class="w-7 h-7 rounded-md bg-black/40 flex items-center justify-center font-serif text-sm font-bold text-emerald-400 border border-white/5 shadow-inner">T</div>
                    Add Text Layer
                </button>
                
                <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-4 mb-1 ml-1">Shapes</h3>
                <button onclick="addElement('rect')" class="mac-btn w-full p-3 rounded-xl flex items-center gap-3 text-sm font-medium text-zinc-300 hover:text-white">
                    <div class="w-7 h-7 rounded-md bg-black/40 flex items-center justify-center border border-white/5 shadow-inner">
                        <div class="w-3.5 h-3.5 border-2 border-blue-400 rounded-[2px]"></div>
                    </div>
                    Rectangle
                </button>
                <button onclick="addElement('circle')" class="mac-btn w-full p-3 rounded-xl flex items-center gap-3 text-sm font-medium text-zinc-300 hover:text-white">
                    <div class="w-7 h-7 rounded-md bg-black/40 flex items-center justify-center border border-white/5 shadow-inner">
                        <div class="w-3.5 h-3.5 border-2 border-rose-400 rounded-full"></div>
                    </div>
                    Circle
                </button>
            </div>

            <!-- Audio View -->
            <div id="viewAudio" class="hidden flex-1 flex flex-col p-4 gap-4 overflow-y-auto">
                <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Global Audio Track</h3>
                
                <label class="mac-btn w-full p-4 rounded-xl flex flex-col items-center justify-center gap-2 cursor-pointer border border-dashed border-zinc-600 hover:border-emerald-500 group transition-all">
                    <div class="w-8 h-8 rounded-full bg-black/40 flex items-center justify-center text-zinc-400 group-hover:text-emerald-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                    </div>
                    <span class="text-xs font-semibold text-zinc-300 group-hover:text-white text-center">Upload Audio / Video<br><span class="text-[9px] font-normal text-zinc-500">MP3, WAV, MP4</span></span>
                    <input type="file" id="audioUpload" accept="audio/*,video/*" class="hidden">
                </label>

                <div id="audioControls" class="hidden space-y-4">
                    <div class="bg-black/30 rounded-xl p-3 border border-white/5 shadow-inner">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-bold text-zinc-400 uppercase">Waveform</span>
                            <span id="audioFileLabel" class="text-[10px] text-emerald-400 truncate max-w-[120px]">track.mp3</span>
                        </div>
                        <div class="relative w-full h-12 bg-black/50 rounded-lg overflow-hidden border border-white/5">
                            <canvas id="waveformCanvas" class="absolute inset-0 w-full h-full"></canvas>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 block">Trim In (s)</label>
                            <input type="number" id="audioTrimIn" value="0" min="0" step="0.1" class="w-full mac-input rounded-lg p-2 text-xs pl-2">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 block">Trim Out (s)</label>
                            <input type="number" id="audioTrimOut" value="0" min="0" step="0.1" class="w-full mac-input rounded-lg p-2 text-xs pl-2">
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Volume</label>
                            <span id="audioVolumeLabel" class="text-[10px] text-emerald-400 font-mono">100%</span>
                        </div>
                        <input type="range" id="audioVolume" min="0" max="1" step="0.05" value="1" class="w-full">
                    </div>
                </div>
            </div>
        </aside>

        <!-- CENTER: Canvas & Timeline -->
        <section class="flex-1 flex flex-col relative min-w-0">
            <!-- Canvas Container -->
            <div class="flex-1 p-6 flex items-center justify-center relative overflow-hidden" id="canvasContainer">
                <div class="relative w-full max-w-4xl aspect-video bg-black rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden ring-1 ring-white/10 group" style="background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px;">
                    <canvas id="canvas" class="absolute inset-0 w-full h-full cursor-pointer"></canvas>
                    <div id="recIndicator" class="absolute top-4 right-4 flex items-center gap-2 hidden z-10 bg-black/80 px-3 py-1.5 rounded-full backdrop-blur-md border border-white/10 shadow-lg">
                        <div class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                        <span class="text-xs font-bold tracking-widest text-red-500">REC</span>
                    </div>
                </div>
            </div>

            <!-- Global Timeline Controls -->
            <div class="h-20 mac-panel mx-6 mb-6 rounded-2xl flex items-center gap-6 px-6 shrink-0 z-10">
                <button id="playPauseBtn" class="text-zinc-200 flex items-center justify-center shrink-0">
                    <svg id="playIcon" class="w-10 h-10 drop-shadow-md" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd"></path></svg>
                    <svg id="pauseIcon" class="w-10 h-10 hidden drop-shadow-md" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 01.75-.75H9a.75.75 0 01.75.75v13.5a.75.75 0 01-.75.75H7.5a.75.75 0 01-.75-.75V5.25zm7.5 0A.75.75 0 0115 4.5h1.5a.75.75 0 01.75.75v13.5a.75.75 0 01-.75.75H15a.75.75 0 01-.75-.75V5.25z" clip-rule="evenodd"></path></svg>
                </button>
                <div class="font-mono text-sm font-bold text-emerald-400 w-12 shrink-0 bg-black/40 px-2 py-1 rounded border border-white/5 text-center shadow-inner" id="timeDisplay">0.0s</div>
                <input type="range" id="globalTimeline" min="0" max="5" step="0.01" value="0" class="flex-1 cursor-pointer">
                <button id="muteBtn" class="text-zinc-400 hover:text-zinc-200 transition-colors shrink-0" title="Mute/Unmute">
                    <svg id="speakerOnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10c-1.1 0-2 .9-2 2v4c0 1.1.9 2 2 2h2l5 5V3l-5 5H5z"></path></svg>
                    <svg id="speakerOffIcon" class="w-5 h-5 hidden text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
                </button>
            </div>
        </section>

        <!-- RIGHT SIDEBAR: Layers & Properties -->
        <aside class="w-[350px] mac-panel border-l-0 flex flex-col shrink-0 z-20 m-4 rounded-2xl overflow-hidden ml-0">
            
            <div class="flex border-b border-white/5 bg-black/20">
                <button id="tabLayers" class="flex-1 py-3 text-xs font-semibold border-b-2 border-emerald-500 text-emerald-400 transition-colors uppercase tracking-wider">Layers</button>
                <button id="tabProps" class="flex-1 py-3 text-xs font-semibold border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-wider">Properties</button>
            </div>

            <!-- Layers View -->
            <div id="viewLayers" class="flex-1 overflow-y-auto p-4 space-y-2">
                <div id="layerList" class="space-y-2"></div>
            </div>

            <!-- Properties View -->
            <div id="viewProps" class="hidden flex-1 overflow-y-auto p-5 relative">
                
                <!-- Slide Properties (Shown when no element selected) -->
                <div id="slidePropEditor" class="space-y-6">
                    <div class="flex items-center gap-3 pb-4 border-b border-white/10">
                        <div class="w-8 h-8 rounded-lg bg-emerald-500/20 text-emerald-400 flex items-center justify-center border border-emerald-500/30">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <div>
                            <h2 class="text-sm font-bold text-white leading-tight">Slide Settings</h2>
                            <p class="text-[10px] text-zinc-400">Configure global slide visuals</p>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex items-center justify-between bg-black/20 p-3 rounded-xl border border-white/5 shadow-inner">
                            <span class="text-xs font-semibold text-zinc-300">Background Color</span>
                            <input type="color" id="propSlideBg" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0">
                        </div>

                        <div class="bg-black/20 p-3 rounded-xl border border-white/5 shadow-inner space-y-3">
                            <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Transition (Out)</h3>
                            <div>
                                <label class="text-[10px] text-zinc-400 block mb-1">Effect Type</label>
                                <select id="propSlideTrans" class="w-full mac-select rounded-lg p-2 text-xs">
                                    <option value="none">None (Cut)</option>
                                    <option value="fade">Crossfade</option>
                                    <option value="slideLeft">Slide Left</option>
                                    <option value="slideUp">Slide Up</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] text-zinc-400 block mb-1 flex justify-between">
                                    <span>Duration</span> <span id="valSlideTransDur" class="text-emerald-400">0.5s</span>
                                </label>
                                <input type="range" id="propSlideTransDur" min="0.1" max="2.0" step="0.1" value="0.5" class="w-full">
                            </div>
                        </div>
                    </div>
                </div>

    </main>

    <script>
        /**
         * EASING MATHEMATICS
         */
        const Easing = {
            linear: t => t,
            easeIn: t => t * t * t,
            easeOut: t => 1 - Math.pow(1 - t, 3),
            easeInOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
            bounce: t => {
                const n1 = 7.5625, d1 = 2.75;
                if (t < 1 / d1) { return n1 * t * t; } 
                else if (t < 2 / d1) { return n1 * (t -= 1.5 / d1) * t + 0.75; } 
                else if (t < 2.5 / d1) { return n1 * (t -= 2.25 / d1) * t + 0.9375; } 
                else { return n1 * (t -= 2.625 / d1) * t + 0.984375; }
            }
        };

        function applyEase(t, type) {
            if (Easing[type]) return Easing[type](t);
            return Easing.easeOut(t); // Default safe fallback
        }

        /**
         * STATE MANAGEMENT
         */
        let slides = [];
        let activeSlideIndex = 0;
        let activeElementId = null;
        
        const SLIDE_DURATION = 5.0; // Seconds per slide
        
        let isPlaying = false;
        let globalTime = 0;
        let lastTimestamp = performance.now();
        let animationFrameId;

        const canvas = document.getElementById('canvas');
        const mainCtx = canvas.getContext('2d');
        
        // Mouse/Drag State
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // Export State
        let offCanvasExport = null;
        let offCtxExport = null;
        let mediaRecorder;
        let recordedChunks = [];
        let isExporting = false;

        // Audio State
        let audioCtx = null;
        let currentAudioBuffer = null;
        let currentAudioSource = null;
        let exportAudioDest = null;
        let globalGainNode = null;
        let audioTrimIn = 0;
        let audioTrimOut = 0;
        let audioVolume = 1;
        let isMuted = false;

        /**
         * INITIALIZATION
         */
        function init() {
            // Grab initial canvas width/height safely to center initial elements
            const rect = canvas.parentElement.getBoundingClientRect();
            const cx = (rect.width || canvas.clientWidth || 896) / 2;
            const cy = (rect.height || canvas.clientHeight || 504) / 2;

            // Add initial slide
            slides.push({
                id: generateId(),
                bg: '#18181b', // Default zinc-900
                transition: 'slideLeft',
                transDuration: 0.6,
                elements: [
                    {
                        id: generateId(), type: 'circle',
                        x: cx - 100, y: cy, size: 220, rotation: 0,
                        fill: '#10b981', stroke: '#000000', strokeWidth: 0,
                        shadowColor: '#000000', shadowBlur: 30, shadowOffsetX: 0, shadowOffsetY: 10,
                        animIn: 'fadeScale', animInEase: 'easeOut', inDur: 0.6,
                        animLoop: 'float', loopSpeed: 1.0, 
                        animOut: 'fadeScale', animOutEase: 'easeIn', outDur: 0.4,
                        start: 0.2, end: 5
                    },
                    {
                        id: generateId(), type: 'text',
                        text: 'STUDIO', font: "'Space Grotesk'", fontWeight: '700', letterSpacing: 0, size: 120,
                        x: cx, y: cy, rotation: 0,
                        fill: '#ffffff', stroke: '#000000', strokeWidth: 0,
                        shadowColor: '#000000', shadowBlur: 20, shadowOffsetX: 0, shadowOffsetY: 10,
                        animIn: 'typewriterPlus', animInEase: 'linear', inDur: 1.0,
                        animLoop: 'none', loopSpeed: 1.0, 
                        animOut: 'slideDown', animOutEase: 'easeIn', outDur: 0.4,
                        start: 0.5, end: 5 
                    }
                ]
            });

            // Second slide to show off transition & new fonts
            slides.push({
                id: generateId(),
                bg: '#0f172a', // slate-900
                transition: 'fade',
                transDuration: 0.5,
                elements: [
                    {
                        id: generateId(), type: 'text',
                        text: 'PRO', font: "'Plus Jakarta Sans'", fontWeight: '800', letterSpacing: 10, size: 160,
                        x: cx, y: cy, rotation: 0,
                        fill: '#60a5fa', stroke: '#000000', strokeWidth: 0,
                        shadowColor: '#000000', shadowBlur: 0, shadowOffsetX: 0, shadowOffsetY: 0, 
                        animIn: 'bounceInWord', animInEase: 'bounce', inDur: 1.0,
                        animLoop: 'pulse', loopSpeed: 0.5, 
                        animOut: 'blur', animOutEase: 'easeOut', outDur: 0.5,
                        start: 0, end: 4.8
                    }
                ]
            });
            
            // Wait for fonts
            document.fonts.ready.then(() => {
                resizeCanvas();
                updateGlobalDuration();
                updateUI();
                requestRender();
            });
            
            window.addEventListener('resize', resizeCanvas);
            setupCanvasInteraction();
            setupPropertyListeners();
        }

        function generateId() { return Math.random().toString(36).substr(2, 9); }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;
            canvas.width = rect.width * 2; 
            canvas.height = rect.height * 2;
            mainCtx.setTransform(1, 0, 0, 1, 0, 0); // Reset before scaling
            mainCtx.scale(2, 2);
            requestRender();
        }

        function requestRender() {
            if (!canvas || !mainCtx) return;
            const rect = canvas.parentElement.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;
            renderFrame(mainCtx, globalTime, rect.width, rect.height, false, true);
        }

        /**
         * CANVAS ENGINE
         */
        function drawSlide(ctxToDraw, slide, localTime, width, height, offsetX = 0, opacity = 1, isTransitioningOut = false, transparentBg = false, drawUI = true) {
            ctxToDraw.save();
            ctxToDraw.translate(offsetX, 0);
            ctxToDraw.globalAlpha = opacity;

            // Draw Background
            if (!transparentBg && slide.bg !== 'transparent') {
                ctxToDraw.fillStyle = slide.bg;
                ctxToDraw.fillRect(0, 0, width, height);
            }

            // Draw Elements (Painter's algorithm - lower index is back)
            slide.elements.forEach(el => {
                // Extend visibility window slightly to prevent popping during transitions
                if (localTime < el.start || localTime > el.end + 0.5) return;

                ctxToDraw.save();
                
                // Track raw progress (0 to 1) for both in and out
                let progressIn = Math.min(1, Math.max(0, (localTime - el.start) / el.inDur));
                let progressOut = Math.min(1, Math.max(0, (localTime - (el.end - el.outDur)) / el.outDur));

                let elAlpha = 1, scale = 1, dx = 0, dy = 0, rot = (el.rotation || 0) * Math.PI / 180;
                let filter = 'none';

                // IN Animation
                if (localTime < el.start + el.inDur) {
                    let t = applyEase(progressIn, el.animInEase || 'easeOut');
                    
                    if (el.animIn === 'fadeScale') { elAlpha = t; scale *= t; }
                    else if (el.animIn === 'fade') { elAlpha = t; }
                    else if (el.animIn === 'slideUp' || el.animIn === 'riseUp') { elAlpha = t; dy = (1-t) * 100; }
                    else if (el.animIn === 'slideLeft') { elAlpha = t; dx = (1-t) * -200; }
                    else if (el.animIn === 'dropIn') { elAlpha = t; dy = (1-t) * -200; }
                    else if (el.animIn === 'rotateIn') { elAlpha = t; rot -= (1-t) * Math.PI; scale *= t; }
                    else if (el.animIn === 'blur') { elAlpha = t; filter = `blur(${(1-t)*20}px)`; }
                }
                
                // OUT Animation (Suppress if the element ends exactly when the slide ends and a transition is happening)
                const isEndingWithSlide = (el.end >= SLIDE_DURATION - 0.2);
                if (localTime > el.end - el.outDur) {
                    if (isTransitioningOut && isEndingWithSlide) {
                        // Skip element out-animation, let the slide transition handle it
                    } else {
                        let t = 1 - applyEase(progressOut, el.animOutEase || 'easeIn');
                        if (el.animOut === 'fadeScale') { elAlpha = t; scale *= t; }
                        else if (el.animOut === 'fade') { elAlpha = t; }
                        else if (el.animOut === 'slideDown') { elAlpha = t; dy = (1-t) * -100; }
                        else if (el.animOut === 'slideRight') { elAlpha = t; dx = (1-t) * 200; }
                        else if (el.animOut === 'blur') { elAlpha = t; filter = `blur(${(1-t)*20}px)`; }
                        else if (el.animOut === 'scale') { elAlpha = t; scale *= t; }
                    }
                }

                // LOOP Animation (Runs continuously while active)
                const activeTime = localTime - el.start;
                if (el.animLoop === 'float') dy += Math.sin(activeTime * 3 * el.loopSpeed) * 15;
                if (el.animLoop === 'pulse') scale *= 1 + (Math.sin(activeTime * 5 * el.loopSpeed) * 0.05);
                if (el.animLoop === 'wiggle') rot += Math.sin(activeTime * 10 * el.loopSpeed) * 0.1;
                if (el.animLoop === 'jitter') {
                    dx += (Math.random() - 0.5) * 6 * el.loopSpeed;
                    dy += (Math.random() - 0.5) * 6 * el.loopSpeed;
                }

                // Transform
                ctxToDraw.globalAlpha = Math.max(0, Math.min(1, elAlpha)) * opacity;
                ctxToDraw.translate(el.x + dx, el.y + dy);
                ctxToDraw.rotate(rot);
                ctxToDraw.scale(scale, scale);
                ctxToDraw.filter = filter;

                // Shadows (Fix applied to securely evaluate even if previously 'transparent' string)
                if (el.shadowOffsetX !== 0 || el.shadowOffsetY !== 0 || el.shadowBlur !== 0) {
                    ctxToDraw.shadowColor = (el.shadowColor && el.shadowColor !== 'transparent') ? el.shadowColor : '#000000';
                    ctxToDraw.shadowBlur = el.shadowBlur;
                    ctxToDraw.shadowOffsetX = el.shadowOffsetX;
                    ctxToDraw.shadowOffsetY = el.shadowOffsetY;
                }

                ctxToDraw.fillStyle = el.fill;
                ctxToDraw.strokeStyle = el.stroke;
                ctxToDraw.lineWidth = el.strokeWidth || 0;

                // Draw Shape/Text
                if (el.type === 'text') {
                    ctxToDraw.font = `${el.fontWeight || '700'} ${el.size}px ${el.font}`;
                    if (ctxToDraw.letterSpacing !== undefined) {
                        ctxToDraw.letterSpacing = `${el.letterSpacing || 0}px`;
                    }
                    ctxToDraw.textAlign = 'center';
                    ctxToDraw.textBaseline = 'middle';
                    
                    const isWordAnimIn = (localTime < el.start + el.inDur) && (el.animIn === 'fadeInWord' || el.animIn === 'bounceInWord');
                    
                    if (isWordAnimIn) {
                        // Word-by-word staggering animation logic
                        const words = el.text.split(' ');
                        let totalWidth = 0;
                        const wordWidths = words.map(w => {
                            const wd = ctxToDraw.measureText(w + ' ').width;
                            totalWidth += wd;
                            return wd;
                        });
                        
                        let currentX = -totalWidth / 2;
                        words.forEach((w, i) => {
                            const wStart = i / words.length;
                            const wEnd = (i + 1) / words.length;
                            let wProg = (progressIn - wStart) / (wEnd - wStart);
                            wProg = Math.max(0, Math.min(1, wProg));
                            
                            let wAlpha = 1;
                            let wScale = 1;
                            
                            if (el.animIn === 'fadeInWord') {
                                wAlpha = applyEase(wProg, el.animInEase || 'easeOut');
                            } else if (el.animIn === 'bounceInWord') {
                                wAlpha = Math.min(1, wProg * 2); // Fade in quickly, then bounce
                                wScale = applyEase(wProg, el.animInEase || 'bounce');
                            }
                            
                            ctxToDraw.save();
                            ctxToDraw.translate(currentX + wordWidths[i]/2, 0); // Center of this specific word
                            ctxToDraw.scale(wScale, wScale);
                            ctxToDraw.globalAlpha = ctxToDraw.globalAlpha * wAlpha;
                            ctxToDraw.fillText(w, 0, 0);
                            if (el.strokeWidth > 0) ctxToDraw.strokeText(w, 0, 0);
                            ctxToDraw.restore();
                            
                            currentX += wordWidths[i];
                        });
                    } else {
                        // Standard Rendering & Typewriter Effects
                        let displayText = el.text;
                        if (localTime < el.start + el.inDur && (el.animIn === 'typewriter' || el.animIn === 'typewriterPlus')) {
                            let chars = Math.floor(progressIn * el.text.length);
                            displayText = el.text.substring(0, chars);
                            if (el.animIn === 'typewriterPlus' && progressIn < 1) {
                                displayText += '|';
                            }
                        }
                        ctxToDraw.fillText(displayText, 0, 0);
                        if (el.strokeWidth > 0) ctxToDraw.strokeText(displayText, 0, 0);
                    }
                } 
                else if (el.type === 'rect') {
                    const w = el.size * 1.5; const h = el.size;
                    ctxToDraw.fillRect(-w/2, -h/2, w, h);
                    if (el.strokeWidth > 0) ctxToDraw.strokeRect(-w/2, -h/2, w, h);
                } 
                else if (el.type === 'circle') {
                    ctxToDraw.beginPath();
                    ctxToDraw.arc(0, 0, el.size/2, 0, Math.PI * 2);
                    ctxToDraw.fill();
                    if (el.strokeWidth > 0) ctxToDraw.stroke();
                }

                // Reset filter for bounding box
                ctxToDraw.filter = 'none';

                // Selection Bounding Box
                if (drawUI && !isPlaying && opacity === 1 && offsetX === 0 && activeElementId === el.id) {
                    drawBoundingBox(ctxToDraw, el);
                }
                
                ctxToDraw.restore(); // Restore element state
            });

            ctxToDraw.restore(); // Restore slide state
        }

        function renderFrame(ctxToDraw, time, width, height, transparentBg = false, drawUI = true) {
            if (transparentBg) {
                ctxToDraw.clearRect(0, 0, width, height);
            } else {
                ctxToDraw.fillStyle = '#000000';
                ctxToDraw.fillRect(0, 0, width, height);
            }

            const currentIdx = Math.floor(time / SLIDE_DURATION) % Math.max(1, slides.length);
            const localTime = time % SLIDE_DURATION;
            const slide = slides[currentIdx];

            if (!slide) return;

            const transDur = slide.transDuration || 0.5;
            const isTransitioningOut = (localTime > SLIDE_DURATION - transDur) && (currentIdx < slides.length - 1);

            if (isTransitioningOut && (isPlaying || isExporting)) {
                // Transition Math
                let t = (localTime - (SLIDE_DURATION - transDur)) / transDur;
                t = Math.max(0, Math.min(1, t)); // 0 to 1
                
                const nextSlide = slides[currentIdx + 1];
                
                // Freeze the next slide at a tiny fraction > 0 so it's ready, but doesn't cause a backwards time jump when it officially starts
                const nextLocalTime = 0.01; 

                if (slide.transition === 'slideLeft') {
                    drawSlide(ctxToDraw, slide, localTime, width, height, -width * t, 1, true, transparentBg, drawUI);
                    drawSlide(ctxToDraw, nextSlide, nextLocalTime, width, height, width * (1-t), 1, false, transparentBg, drawUI);
                } 
                else if (slide.transition === 'slideUp') {
                    drawSlide(ctxToDraw, slide, localTime, width, height, 0, 1 - t, true, transparentBg, drawUI); // fade current while up
                    ctxToDraw.save(); ctxToDraw.translate(0, height * (1-t));
                    drawSlide(ctxToDraw, nextSlide, nextLocalTime, width, height, 0, 1, false, transparentBg, drawUI);
                    ctxToDraw.restore();
                }
                else if (slide.transition === 'fade') {
                    drawSlide(ctxToDraw, slide, localTime, width, height, 0, 1 - t, true, transparentBg, drawUI);
                    drawSlide(ctxToDraw, nextSlide, nextLocalTime, width, height, 0, t, false, transparentBg, drawUI);
                }
                else {
                    // None (Cut)
                    drawSlide(ctxToDraw, slide, localTime, width, height, 0, 1, true, transparentBg, drawUI);
                }
            } else {
                // Normal Drawing
                drawSlide(ctxToDraw, slide, localTime, width, height, 0, 1, false, transparentBg, drawUI);
            }
        }

        function drawBoundingBox(ctxToDraw, el) {
            ctxToDraw.save();
            
            // Clear shadows for the bounding box itself
            ctxToDraw.shadowColor = 'transparent';
            ctxToDraw.shadowBlur = 0;
            ctxToDraw.shadowOffsetX = 0;
            ctxToDraw.shadowOffsetY = 0;
            
            let hw = 0, hh = 0;
            if (el.type === 'text') {
                ctxToDraw.font = `${el.fontWeight || '700'} ${el.size}px ${el.font}`;
                if (ctxToDraw.letterSpacing !== undefined) ctxToDraw.letterSpacing = `${el.letterSpacing || 0}px`;
                hw = (ctxToDraw.measureText(el.text).width / 2) + 10;
                hh = (el.size / 2) + 10;
            } else if (el.type === 'rect') {
                hw = (el.size * 1.5 / 2) + 10; hh = (el.size / 2) + 10;
            } else if (el.type === 'circle') {
                hw = (el.size / 2) + 10; hh = (el.size / 2) + 10;
            }

            ctxToDraw.strokeStyle = '#3b82f6'; // Blue
            ctxToDraw.lineWidth = 1.5;
            ctxToDraw.setLineDash([6, 6]);
            ctxToDraw.strokeRect(-hw, -hh, hw * 2, hh * 2);
            
            // Center dot
            ctxToDraw.fillStyle = '#ffffff';
            ctxToDraw.setLineDash([]);
            ctxToDraw.beginPath();
            ctxToDraw.arc(0, 0, 3, 0, Math.PI*2);
            ctxToDraw.fill();
            ctxToDraw.stroke();
            
            ctxToDraw.restore();
        }

        /**
         * INTERACTION (DRAGGING)
         */
        function setupCanvasInteraction() {
            canvas.addEventListener('mousedown', (e) => {
                if (isPlaying) return;
                
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / rect.width) / 2;
                const y = (e.clientY - rect.top) * (canvas.height / rect.height) / 2;

                const slide = slides[activeSlideIndex];
                let clickedEl = null;

                // Check top to bottom (reverse array)
                for(let i = slide.elements.length - 1; i >= 0; i--) {
                    const el = slide.elements[i];
                    let hw = 50, hh = 50;
                    
                    if (el.type === 'text') {
                        mainCtx.font = `${el.fontWeight || '700'} ${el.size}px ${el.font}`;
                        if (mainCtx.letterSpacing !== undefined) mainCtx.letterSpacing = `${el.letterSpacing || 0}px`;
                        hw = mainCtx.measureText(el.text).width / 2;
                        hh = el.size / 2;
                    } else if (el.type === 'rect') {
                        hw = el.size * 1.5 / 2; hh = el.size / 2;
                    } else if (el.type === 'circle') {
                        hw = el.size / 2; hh = el.size / 2;
                    }

                    // Handle Rotated Hit Detection
                    const angle = -(el.rotation || 0) * Math.PI / 180;
                    const dx = x - el.x;
                    const dy = y - el.y;
                    const rx = dx * Math.cos(angle) - dy * Math.sin(angle);
                    const ry = dx * Math.sin(angle) + dy * Math.cos(angle);

                    if (Math.abs(rx) <= hw && Math.abs(ry) <= hh) {
                        clickedEl = el;
                        break;
                    }
                }

                if (clickedEl) {
                    activeElementId = clickedEl.id;
                    isDragging = true;
                    dragOffsetX = x - clickedEl.x;
                    dragOffsetY = y - clickedEl.y;
                    switchRightTab('Props');
                } else {
                    // Clicked background -> Select Slide Props
                    activeElementId = null;
                    switchRightTab('Props');
                }
                
                updateRightPanel();
                renderLayerList();
                requestRender();
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging || !activeElementId || isPlaying) return;
                
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / rect.width) / 2;
                const y = (e.clientY - rect.top) * (canvas.height / rect.height) / 2;
                
                const el = getActiveElement();
                if(el) {
                    el.x = x - dragOffsetX;
                    el.y = y - dragOffsetY;
                    requestRender();
                }
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        /**
         * AUDIO ENGINE
         */
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function stopAudio() {
            if (currentAudioSource) {
                try { currentAudioSource.stop(); } catch(e){}
                currentAudioSource.disconnect();
                currentAudioSource = null;
            }
        }

        function playAudio(globalTimeOffset) {
            if (!currentAudioBuffer || !audioCtx) return;
            stopAudio();
            
            currentAudioSource = audioCtx.createBufferSource();
            currentAudioSource.buffer = currentAudioBuffer;
            
            globalGainNode = audioCtx.createGain();
            globalGainNode.gain.value = isMuted ? 0 : audioVolume;
            currentAudioSource.connect(globalGainNode);
            
            if (isExporting && exportAudioDest) {
                globalGainNode.connect(exportAudioDest);
            } else {
                globalGainNode.connect(audioCtx.destination);
            }

            const trackDur = audioTrimOut - audioTrimIn;
            if (trackDur <= 0) return;

            // Loop audio continuously relative to timeline time
            let playOffset = globalTimeOffset % trackDur;
            let startPos = audioTrimIn + playOffset;
            
            currentAudioSource.loop = true;
            currentAudioSource.loopStart = audioTrimIn;
            currentAudioSource.loopEnd = audioTrimOut;

            currentAudioSource.start(0, startPos);
        }

        function drawWaveform() {
            if (!currentAudioBuffer) return;
            const wCanvas = document.getElementById('waveformCanvas');
            const wCtx = wCanvas.getContext('2d');
            const rect = wCanvas.parentElement.getBoundingClientRect();
            wCanvas.width = rect.width;
            wCanvas.height = rect.height;

            const data = currentAudioBuffer.getChannelData(0);
            const step = Math.ceil(data.length / wCanvas.width);
            const amp = wCanvas.height / 2;

            wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);
            wCtx.fillStyle = '#10b981'; // Emerald

            for (let i = 0; i < wCanvas.width; i++) {
                let min = 1.0, max = -1.0;
                for (let j = 0; j < step; j++) {
                    const datum = data[(i * step) + j];
                    if (datum < min) min = datum;
                    if (datum > max) max = datum;
                }
                const y = (1 + min) * amp;
                const h = Math.max(1, (max - min) * amp);
                wCtx.fillRect(i, y, 1, h);
            }

            // Draw Trim Overlays
            const dur = currentAudioBuffer.duration;
            const startX = (audioTrimIn / dur) * wCanvas.width;
            const endX = (audioTrimOut / dur) * wCanvas.width;

            wCtx.fillStyle = 'rgba(0,0,0,0.6)';
            wCtx.fillRect(0, 0, startX, wCanvas.height); // Cut in
            wCtx.fillRect(endX, 0, wCanvas.width - endX, wCanvas.height); // Cut out
        }

        document.getElementById('audioUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            initAudio();
            document.getElementById('audioFileLabel').innerText = file.name;
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                audioCtx.decodeAudioData(evt.target.result, function(buffer) {
                    currentAudioBuffer = buffer;
                    audioTrimIn = 0;
                    audioTrimOut = buffer.duration;
                    
                    document.getElementById('audioControls').classList.remove('hidden');
                    document.getElementById('audioTrimIn').value = 0;
                    document.getElementById('audioTrimIn').max = buffer.duration;
                    document.getElementById('audioTrimOut').value = buffer.duration.toFixed(2);
                    document.getElementById('audioTrimOut').max = buffer.duration;
                    
                    drawWaveform();
                    showToast("Audio loaded successfully.");
                }, function(err) {
                    showToast("Error decoding audio/video file.");
                });
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('audioTrimIn').addEventListener('input', (e) => {
            audioTrimIn = Math.min(parseFloat(e.target.value) || 0, audioTrimOut);
            drawWaveform();
        });
        document.getElementById('audioTrimOut').addEventListener('input', (e) => {
            audioTrimOut = Math.max(parseFloat(e.target.value) || 0, audioTrimIn);
            drawWaveform();
        });
        document.getElementById('audioVolume').addEventListener('input', (e) => {
            audioVolume = parseFloat(e.target.value);
            document.getElementById('audioVolumeLabel').innerText = Math.round(audioVolume * 100) + '%';
            if (globalGainNode) {
                globalGainNode.gain.value = isMuted ? 0 : audioVolume;
            }
        });

        document.getElementById('muteBtn').addEventListener('click', () => {
            isMuted = !isMuted;
            document.getElementById('speakerOnIcon').classList.toggle('hidden', isMuted);
            document.getElementById('speakerOffIcon').classList.toggle('hidden', !isMuted);
            if (globalGainNode) {
                globalGainNode.gain.value = isMuted ? 0 : audioVolume;
            }
        });

        /**
         * PLAYBACK ENGINE
         */
        function gameLoop(timestamp) {
            if (!isPlaying) { lastTimestamp = timestamp; return; }
            const dt = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;
            
            globalTime += dt;
            const maxDuration = slides.length * SLIDE_DURATION;
            
            if (globalTime >= maxDuration) {
                if (isExporting) {
                    // Clamp to max duration during export to prevent loop artifacts at the end of the video
                    globalTime = maxDuration;
                } else {
                    // Normal playback loop
                    globalTime = 0;
                    if (isPlaying) playAudio(0); // Resync audio to presentation start
                }
            }
            
            // Auto switch active slide visually
            const newActiveIdx = Math.floor(globalTime / SLIDE_DURATION) % Math.max(1, slides.length);
            if (newActiveIdx !== activeSlideIndex && !isExporting) {
                activeSlideIndex = newActiveIdx || 0;
                activeElementId = null;
                updateUI();
            }

            document.getElementById('globalTimeline').value = globalTime;
            document.getElementById('timeDisplay').innerText = globalTime.toFixed(1) + 's';
            
            requestRender();

            // Also render to offscreen canvas if exporting
            if (isExporting && offCanvasExport && offCtxExport) {
                const rect = canvas.parentElement.getBoundingClientRect();
                const isTransparent = document.getElementById('snapTransparent').checked;
                offCtxExport.save();
                offCtxExport.setTransform(1, 0, 0, 1, 0, 0);
                offCtxExport.clearRect(0, 0, offCanvasExport.width, offCanvasExport.height);
                offCtxExport.scale(offCanvasExport.width / rect.width, offCanvasExport.height / rect.height);
                renderFrame(offCtxExport, globalTime, rect.width, rect.height, isTransparent, false);
                offCtxExport.restore();
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function togglePlay() {
            initAudio();
            isPlaying = !isPlaying;
            document.getElementById('playIcon').classList.toggle('hidden', isPlaying);
            document.getElementById('pauseIcon').classList.toggle('hidden', !isPlaying);
            
            if (isPlaying) {
                lastTimestamp = performance.now();
                activeElementId = null; 
                updateRightPanel();
                if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                playAudio(globalTime);
                animationFrameId = requestAnimationFrame(gameLoop);
            } else {
                cancelAnimationFrame(animationFrameId);
                stopAudio();
                // Snap to current slide visual
                const currIdx = Math.floor(globalTime / SLIDE_DURATION);
                if(currIdx !== activeSlideIndex) {
                    activeSlideIndex = currIdx;
                    updateUI();
                }
                requestRender();
            }
        }
        document.getElementById('playPauseBtn').addEventListener('click', togglePlay);

        document.getElementById('globalTimeline').addEventListener('input', (e) => {
            globalTime = parseFloat(e.target.value);
            document.getElementById('timeDisplay').innerText = globalTime.toFixed(1) + 's';
            
            const newActiveIdx = Math.floor(globalTime / SLIDE_DURATION) % Math.max(1, slides.length);
            if (newActiveIdx !== activeSlideIndex) {
                activeSlideIndex = newActiveIdx || 0;
                activeElementId = null;
                updateUI();
            }
            if(isPlaying) playAudio(globalTime);
            requestRender();
        });

        /**
         * CRUD & DATA MGMT
         */
        function getActiveElement() {
            if(!activeElementId) return null;
            return slides[activeSlideIndex].elements.find(e => e.id === activeElementId);
        }

        function addSlide() {
            slides.push({ 
                id: generateId(), 
                bg: '#18181b', 
                transition: 'slideLeft',
                transDuration: 0.5,
                elements: [] 
            });
            activeSlideIndex = slides.length - 1;
            activeElementId = null;
            updateGlobalDuration();
            updateUI();
            setGlobalTime(activeSlideIndex * SLIDE_DURATION);
        }

        function deleteSlide(idx) {
            if (slides.length <= 1) return showToast("Cannot delete the last slide.");
            slides.splice(idx, 1);
            activeSlideIndex = Math.min(activeSlideIndex, slides.length - 1);
            activeElementId = null;
            updateGlobalDuration();
            updateUI();
            setGlobalTime(activeSlideIndex * SLIDE_DURATION);
        }

        function setGlobalTime(t) {
            globalTime = t;
            document.getElementById('globalTimeline').value = globalTime;
            document.getElementById('timeDisplay').innerText = globalTime.toFixed(1) + 's';
            requestRender();
        }

        function updateGlobalDuration() {
            const max = slides.length * SLIDE_DURATION;
            document.getElementById('durationDisplay').innerText = max.toFixed(1);
            const tl = document.getElementById('globalTimeline');
            tl.max = max;
        }

        function addElement(type) {
            // Dynamically calculate canvas center relative to current window
            const rect = canvas.parentElement.getBoundingClientRect();
            const startX = (rect.width || canvas.clientWidth || 896) / 2;
            const startY = (rect.height || canvas.clientHeight || 504) / 2;

            const el = {
                id: generateId(), type: type,
                x: startX, y: startY, rotation: 0,
                fill: type==='text' ? '#ffffff' : '#3b82f6', 
                stroke: '#000000', strokeWidth: 0,
                shadowColor: '#000000', shadowBlur: 0, shadowOffsetX: 0, shadowOffsetY: 0,
                animIn: 'scale', animInEase: 'easeOut', inDur: 0.5,
                animLoop: 'none', loopSpeed: 1.0, 
                animOut: 'fade', animOutEase: 'easeIn', outDur: 0.5,
                start: 0, end: 5
            };
            
            if(type === 'text') {
                el.text = "NEW TEXT"; el.font = "'Inter'"; el.fontWeight = '700'; el.letterSpacing = 0; el.size = 80;
            } else {
                el.size = 150;
            }

            slides[activeSlideIndex].elements.push(el);
            activeElementId = el.id;
            
            updateUI();
            switchRightTab('Props');
            requestRender();
        }

        function deleteElement(id) {
            slides[activeSlideIndex].elements = slides[activeSlideIndex].elements.filter(e => e.id !== id);
            if (activeElementId === id) activeElementId = null;
            updateUI();
            requestRender();
        }

        /**
         * UI RENDERING
         */
        function updateUI() {
            renderSlideList();
            renderLayerList();
            updateRightPanel();
        }

        function renderSlideList() {
            const list = document.getElementById('slideList');
            list.innerHTML = '';
            slides.forEach((s, idx) => {
                const isActive = idx === activeSlideIndex;
                list.innerHTML += `
                    <div class="p-3 rounded-xl border transition-all ${isActive ? 'bg-black/40 border-emerald-500 shadow-inner' : 'bg-black/20 border-white/5 hover:border-white/20'} cursor-pointer group" onclick="selectSlide(${idx})">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold ${isActive ? 'text-emerald-400' : 'text-zinc-400'}">Slide ${idx + 1}</span>
                            <button onclick="event.stopPropagation(); deleteSlide(${idx})" class="text-zinc-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                        </div>
                        <div class="text-[10px] text-zinc-500 flex items-center gap-1.5">
                            <div class="w-3 h-3 rounded-full border border-white/20" style="background:${s.bg}"></div>
                            Trans: ${s.transition}
                        </div>
                    </div>
                `;
            });
        }

        function selectSlide(idx) {
            activeSlideIndex = idx;
            activeElementId = null;
            setGlobalTime(idx * SLIDE_DURATION);
            updateUI();
        }

        function renderLayerList() {
            const list = document.getElementById('layerList');
            list.innerHTML = '';
            const els = slides[activeSlideIndex]?.elements || [];
            
            if(els.length === 0) {
                list.innerHTML = '<div class="text-center text-zinc-600 text-xs mt-10">No layers on this slide.</div>';
                return;
            }

            [...els].reverse().forEach(el => {
                const isSelected = el.id === activeElementId;
                let title = el.type.toUpperCase();
                let icon = '';
                if (el.type === 'text') { title = `"${el.text.substring(0,12)}"`; icon = 'T'; }
                else if(el.type === 'rect') icon = '■';
                else if(el.type === 'circle') icon = '●';

                list.innerHTML += `
                    <div class="flex items-center justify-between p-2.5 rounded-xl border transition-all ${isSelected ? 'bg-black/40 border-emerald-500 shadow-inner' : 'bg-black/20 border-white/5 hover:border-white/20'} cursor-pointer" onclick="selectElement('${el.id}')">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-6 h-6 rounded bg-black/50 text-[10px] flex items-center justify-center font-bold text-zinc-500 border border-white/5">${icon}</div>
                            <div class="text-xs font-semibold ${isSelected ? 'text-emerald-400' : 'text-zinc-300'} truncate">${title}</div>
                        </div>
                        <button onclick="event.stopPropagation(); deleteElement('${el.id}')" class="text-zinc-600 hover:text-red-400 transition-colors p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>
                `;
            });
        }

        function selectElement(id) {
            activeElementId = id;
            updateUI();
            switchRightTab('Props');
            requestRender();
        }

        /**
         * PROPERTIES PANEL SYNC
         */
        function updateRightPanel() {
            const slideEditor = document.getElementById('slidePropEditor');
            const elEditor = document.getElementById('elementPropEditor');
            
            let slide = slides[activeSlideIndex];
            
            // Safety fallback if active index is temporarily out of bounds
            if (!slide) {
                activeSlideIndex = 0;
                slide = slides[0];
                if (!slide) return;
            }

            const el = getActiveElement();

            if (!el) {
                // Show Slide Properties
                elEditor.classList.add('hidden');
                slideEditor.classList.remove('hidden');

                document.getElementById('propSlideBg').value = slide.bg === 'transparent' ? '#000000' : slide.bg;
                document.getElementById('propSlideTrans').value = slide.transition;
                document.getElementById('propSlideTransDur').value = slide.transDuration;
                document.getElementById('valSlideTransDur').innerText = slide.transDuration + 's';
            } else {
                // Show Element Properties
                slideEditor.classList.add('hidden');
                elEditor.classList.remove('hidden');

                const txtCont = document.getElementById('propTextContainer');
                const typoControls = document.getElementById('propTypographyControls');
                
                if (el.type === 'text') {
                    txtCont.classList.remove('hidden');
                    typoControls.classList.remove('hidden');
                    document.getElementById('propText').value = el.text;
                    document.getElementById('propFont').value = el.font;
                    document.getElementById('propFontWeight').value = el.fontWeight || '700';
                    document.getElementById('propLetterSpacing').value = el.letterSpacing || 0;
                } else {
                    txtCont.classList.add('hidden');
                    typoControls.classList.add('hidden');
                }

                document.getElementById('propSize').value = el.size;
                document.getElementById('propRotation').value = el.rotation || 0;
                document.getElementById('propFill').value = el.fill;
                document.getElementById('fillHex').innerText = el.fill;
                document.getElementById('propStroke').value = el.stroke;
                document.getElementById('propStrokeWidth').value = el.strokeWidth;
                
                // Set correct color values from elements
                document.getElementById('propShadowColor').value = (el.shadowColor && el.shadowColor !== 'transparent') ? el.shadowColor : '#000000';
                
                document.getElementById('propShadowX').value = el.shadowOffsetX;
                document.getElementById('valShadowX').innerText = el.shadowOffsetX;
                document.getElementById('propShadowY').value = el.shadowOffsetY;
                document.getElementById('valShadowY').innerText = el.shadowOffsetY;
                document.getElementById('propShadowBlur').value = el.shadowBlur;
                document.getElementById('valShadowBlur').innerText = el.shadowBlur;

                // Animations
                document.getElementById('propAnimIn').value = el.animIn;
                document.getElementById('propAnimInDur').value = el.inDur;
                document.getElementById('propAnimInEase').value = el.animInEase || 'easeOut';
                
                document.getElementById('propAnimLoop').value = el.animLoop;
                document.getElementById('propAnimLoopSpeed').value = el.loopSpeed;
                
                document.getElementById('propAnimOut').value = el.animOut;
                document.getElementById('propAnimOutDur').value = el.outDur;
                document.getElementById('propAnimOutEase').value = el.animOutEase || 'easeIn';
            }
        }

        function setupPropertyListeners() {
            // Slide Props
            document.getElementById('propSlideBg').addEventListener('input', (e) => {
                slides[activeSlideIndex].bg = e.target.value;
                updateUI(); requestRender();
            });
            document.getElementById('propSlideTrans').addEventListener('change', (e) => {
                slides[activeSlideIndex].transition = e.target.value;
                updateUI();
            });
            document.getElementById('propSlideTransDur').addEventListener('input', (e) => {
                slides[activeSlideIndex].transDuration = parseFloat(e.target.value);
                document.getElementById('valSlideTransDur').innerText = e.target.value + 's';
            });

            // Element Props Helper
            const bind = (id, key, parser = a=>a, labelId = null) => {
                document.getElementById(id).addEventListener('input', (e) => {
                    const el = getActiveElement();
                    if(el) {
                        el[key] = parser(e.target.value);
                        if(id === 'propFill') document.getElementById('fillHex').innerText = el.fill;
                        if(labelId) document.getElementById(labelId).innerText = el[key];
                        requestRender();
                        if(id === 'propText') renderLayerList(); // update title
                    }
                });
            };

            bind('propText', 'text');
            bind('propFont', 'font');
            bind('propFontWeight', 'fontWeight');
            bind('propLetterSpacing', 'letterSpacing', parseFloat);
            
            bind('propSize', 'size', parseInt);
            bind('propRotation', 'rotation', parseFloat);
            bind('propFill', 'fill');
            bind('propStroke', 'stroke');
            bind('propStrokeWidth', 'strokeWidth', parseInt);
            
            bind('propShadowColor', 'shadowColor');
            bind('propShadowX', 'shadowOffsetX', parseInt, 'valShadowX');
            bind('propShadowY', 'shadowOffsetY', parseInt, 'valShadowY');
            bind('propShadowBlur', 'shadowBlur', parseInt, 'valShadowBlur');

            bind('propAnimIn', 'animIn');
            bind('propAnimInDur', 'inDur', parseFloat);
            bind('propAnimInEase', 'animInEase');
            
            bind('propAnimLoop', 'animLoop');
            bind('propAnimLoopSpeed', 'loopSpeed', parseFloat);
            
            bind('propAnimOut', 'animOut');
            bind('propAnimOutDur', 'outDur', parseFloat);
            bind('propAnimOutEase', 'animOutEase');
        }

        /**
         * TAB LOGIC
         */
        function switchLeftTab(tab) {
            document.getElementById('viewSlides').classList.toggle('hidden', tab !== 'Slides');
            document.getElementById('viewAdd').classList.toggle('hidden', tab !== 'Add');
            document.getElementById('viewAudio').classList.toggle('hidden', tab !== 'Audio');
            
            const activeClass = 'border-emerald-500 text-emerald-400';
            const inactiveClass = 'border-transparent text-zinc-500 hover:text-zinc-300';
            
            document.getElementById('tabSlides').className = `flex-1 py-3 text-xs font-semibold border-b-2 transition-colors uppercase tracking-wider ${tab === 'Slides' ? activeClass : inactiveClass}`;
            document.getElementById('tabAdd').className = `flex-1 py-3 text-xs font-semibold border-b-2 transition-colors uppercase tracking-wider ${tab === 'Add' ? activeClass : inactiveClass}`;
            document.getElementById('tabAudio').className = `flex-1 py-3 text-xs font-semibold border-b-2 transition-colors uppercase tracking-wider ${tab === 'Audio' ? activeClass : inactiveClass}`;
        }
        
        function switchRightTab(tab) {
            document.getElementById('viewLayers').classList.toggle('hidden', tab !== 'Layers');
            document.getElementById('viewProps').classList.toggle('hidden', tab !== 'Props');
            document.getElementById('tabLayers').className = `flex-1 py-3 text-xs font-semibold border-b-2 transition-colors uppercase tracking-wider ${tab === 'Layers' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`;
            document.getElementById('tabProps').className = `flex-1 py-3 text-xs font-semibold border-b-2 transition-colors uppercase tracking-wider ${tab === 'Props' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`;
        }

        document.getElementById('tabSlides').onclick = () => switchLeftTab('Slides');
        document.getElementById('tabAdd').onclick = () => switchLeftTab('Add');
        document.getElementById('tabAudio').onclick = () => switchLeftTab('Audio');
        document.getElementById('tabLayers').onclick = () => switchRightTab('Layers');
        document.getElementById('tabProps').onclick = () => switchRightTab('Props');

        /**
         * EXPORT & SNAPSHOT ENGINE
         */
        
        function takeSnapshot() {
            const quality = document.getElementById('exportQuality').value;
            const [w, h] = quality.split('x').map(Number);
            const isTransparent = document.getElementById('snapTransparent').checked;
            
            const snapCanvas = document.createElement('canvas');
            snapCanvas.width = w;
            snapCanvas.height = h;
            const snapCtx = snapCanvas.getContext('2d');
            
            // Map the layout from the logical current preview rect to the high-res snapshot dimensions
            const rect = canvas.parentElement.getBoundingClientRect();
            snapCtx.scale(w / rect.width, h / rect.height);
            
            renderFrame(snapCtx, globalTime, rect.width, rect.height, isTransparent, false);
            
            const dataUrl = snapCanvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = `snapshot-${quality}-${Date.now()}.png`;
            a.click();
            showToast(`Saved Snapshot at ${quality}`);
        }
        document.getElementById('snapshotBtn').addEventListener('click', takeSnapshot);

        async function exportVideo() {
            if (isExporting || (mediaRecorder && mediaRecorder.state === 'recording')) return;

            const btn = document.getElementById('exportBtn');
            const indicator = document.getElementById('recIndicator');
            isExporting = true;
            
            const quality = document.getElementById('exportQuality').value;
            const [w, h] = quality.split('x').map(Number);
            
            offCanvasExport = document.createElement('canvas');
            offCanvasExport.width = w;
            offCanvasExport.height = h;
            offCtxExport = offCanvasExport.getContext('2d');

            try {
                initAudio();
                if(audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
                
                // Capture offscreen canvas stream
                const stream = offCanvasExport.captureStream(30);
                const tracks = [...stream.getVideoTracks()];

                // Setup Audio Export Destination
                if (currentAudioBuffer) {
                    exportAudioDest = audioCtx.createMediaStreamDestination();
                    tracks.push(...exportAudioDest.stream.getAudioTracks());
                }

                const combinedStream = new MediaStream(tracks);

                let options = { mimeType: 'video/webm; codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: '' };
                }

                mediaRecorder = new MediaRecorder(combinedStream, options);
                recordedChunks = [];

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType || 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `motion-pro-${quality}-${Date.now()}.${options.mimeType.includes('webm') ? 'webm' : 'mp4'}`;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);

                    btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Export';
                    indicator.classList.add('hidden');
                    isExporting = false;
                    offCanvasExport = null;
                    offCtxExport = null;
                    exportAudioDest = null;
                };

                btn.innerHTML = 'Rendering...';
                indicator.classList.remove('hidden');

                // Start from beginning
                isPlaying = false;
                stopAudio();
                globalTime = 0;
                activeElementId = null; // deselect to hide bounding boxes
                updateUI();
                requestRender();

                mediaRecorder.start();
                togglePlay();

                const maxDuration = slides.length * SLIDE_DURATION;
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') {
                        togglePlay();
                        mediaRecorder.stop();
                        setGlobalTime(0);
                    }
                }, maxDuration * 1000 + 300);

            } catch (err) {
                console.error("Export failed:", err);
                showToast("Export failed on this device.");
                isExporting = false;
            }
        }
        document.getElementById('exportBtn').addEventListener('click', exportVideo);

        // Toast
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-6 right-6 bg-zinc-800 text-white px-6 py-3 rounded-xl shadow-2xl z-50 text-sm font-semibold border border-white/10 animate-bounce';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Run
        init();

    </script>
