<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sumi-e Studio Pro - v0.3 Ads Integration</title>
    
    <!-- Google AdSense -->
    <script
        async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7993314093599705"
        crossorigin="anonymous"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- p5.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

    <style>
        :root { color-scheme: dark; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; 
            color: #ececf1;
            overflow: hidden;
            touch-action: none;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        .checker-bg {
            background-color: #0f172a;
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 24px 24px;
            background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            padding: 0;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2); }

        .tool-btn { transition: all 0.2s ease; border: 1px solid transparent; }
        .tool-btn.active {
            background-color: rgba(225, 29, 72, 0.15); /* Rose-600 */
            border-color: rgba(225, 29, 72, 0.4);
            color: #fb7185; /* Rose-400 */
        }
        .tool-btn:hover:not(.active) { background-color: rgba(255, 255, 255, 0.05); }

        #scale-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0px; 
        }

        #p5-container canvas {
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 30px 60px -12px rgba(0,0,0,0.8);
            transform-origin: center center;
            will-change: transform;
            border-radius: 4px;
            cursor: crosshair;
        }
    </style>
</head>
<body class="flex flex-col h-screen text-sm">

    <!-- Header -->
    <header class="absolute top-0 w-full h-14 bg-zinc-900/80 backdrop-blur-2xl border-b border-white/5 flex items-center justify-between px-4 sm:px-6 z-40">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-rose-500 to-red-700 flex items-center justify-center shadow-inner shadow-white/20">
                <i data-lucide="feather" class="w-4 h-4 text-white"></i>
            </div>
            <h1 class="font-semibold tracking-tight whitespace-nowrap hidden sm:block text-zinc-100">Sumi-e Studio <span class="text-zinc-500 font-normal">Pro</span></h1>
        </div>

        <div class="flex items-center gap-2 bg-black/40 p-1 rounded-xl ring-1 ring-white/10 shrink-0">
            <button onclick="undoStroke()" class="px-3 py-1.5 rounded-lg text-zinc-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-2 text-xs font-medium" title="Undo Last Stroke">
                <i data-lucide="undo" class="w-3.5 h-3.5"></i> <span class="hidden md:inline">Undo</span>
            </button>
            <div class="w-px h-4 bg-white/10"></div>
            <button onclick="clearCanvas()" class="px-3 py-1.5 rounded-lg text-rose-400 hover:text-rose-300 hover:bg-rose-500/10 transition-colors flex items-center gap-2 text-xs font-medium" title="Clear All">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> <span class="hidden md:inline">Clear</span>
            </button>
        </div>

        <div class="flex items-center justify-end gap-3 shrink-0">
            <button onclick="togglePreview()" id="btn-play" class="flex items-center gap-2 px-3 py-1.5 bg-white/5 hover:bg-white/10 text-white rounded-lg font-medium transition-colors ring-1 ring-white/5 text-xs sm:text-sm shadow-sm">
                <i data-lucide="play" class="w-4 h-4" id="icon-play"></i>
                <span id="text-play" class="hidden sm:inline">Preview</span>
            </button>
            
            <div class="flex bg-rose-600 rounded-lg shadow-lg shadow-rose-600/20 ring-1 ring-inset ring-white/20 transition-all hover:bg-rose-500">
                <select id="export-res" class="bg-transparent text-white font-medium pl-2 pr-1 py-1.5 outline-none cursor-pointer appearance-none text-xs border-r border-rose-400/30 hidden sm:block">
                    <option value="1920" class="bg-zinc-800" selected>HD 1080p</option>
                    <option value="2560" class="bg-zinc-800">2K 1440p</option>
                    <option value="3840" class="bg-zinc-800">4K 2160p</option>
                </select>
                <button onclick="exportVideo()" id="btn-export" class="flex items-center gap-2 px-3 py-1.5 text-white font-medium transition-all rounded-r-lg text-xs sm:text-sm">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Export WebM</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex flex-1 pt-14 relative overflow-hidden flex-col md:flex-row">
        
        <!-- Left Sidebar -->
        <aside class="w-full md:w-80 flex-shrink-0 bg-zinc-900/60 backdrop-blur-3xl border-r border-white/5 z-30 h-[45%] md:h-full flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.5)] md:shadow-none order-2 md:order-1">
            
            <div class="p-5 overflow-y-auto space-y-6">
                
                <!-- Brush Engine -->
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-3 flex items-center gap-1.5">
                        <i data-lucide="brush" class="w-3 h-3"></i> Japanese Brushes
                    </label>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="tool-btn active py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5" data-tool="fude" onclick="setTool('fude')">
                            <i data-lucide="pen-tool" class="w-4 h-4"></i> <span class="hidden md:inline">Fude (Classic)</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5" data-tool="menso" onclick="setTool('menso')">
                            <i data-lucide="edit-2" class="w-4 h-4"></i> <span class="hidden md:inline">Menso (Detail)</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5" data-tool="shodo" onclick="setTool('shodo')">
                            <i data-lucide="edit-3" class="w-4 h-4"></i> <span class="hidden md:inline">Shodo (Calligraphy)</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5" data-tool="sokuhitsu" onclick="setTool('sokuhitsu')">
                            <i data-lucide="brush" class="w-4 h-4"></i> <span class="hidden md:inline">Sokuhitsu (Side)</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5" data-tool="kasure" onclick="setTool('kasure')">
                            <i data-lucide="wind" class="w-4 h-4"></i> <span class="hidden md:inline">Kasure (Dry)</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5" data-tool="nijimi" onclick="setTool('nijimi')">
                            <i data-lucide="droplets" class="w-4 h-4"></i> <span class="hidden md:inline">Nijimi (Wet)</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5" data-tool="hake" onclick="setTool('hake')">
                            <i data-lucide="align-justify" class="w-4 h-4"></i> <span class="hidden md:inline">Hake (Flat Wash)</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5" data-tool="bokashi" onclick="setTool('bokashi')">
                            <i data-lucide="cloud" class="w-4 h-4"></i> <span class="hidden md:inline">Bokashi (Soft)</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5" data-tool="shibuki" onclick="setTool('shibuki')">
                            <i data-lucide="sparkles" class="w-4 h-4"></i> <span class="hidden md:inline">Shibuki (Splatter)</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex flex-col justify-center items-center gap-1.5 text-rose-400" data-tool="eraser" onclick="setTool('eraser')">
                            <i data-lucide="eraser" class="w-4 h-4"></i> <span class="hidden md:inline">Eraser</span>
                        </button>
                    </div>
                </div>

                <div class="w-full h-px bg-white/5"></div>

                <!-- Properties -->
                <div class="space-y-5">
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-1">Stroke Dynamics</label>
                    
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-zinc-300 hidden md:inline">Ink Color</span>
                        <div class="flex-1 md:flex-none flex justify-between md:justify-end gap-2">
                            <!-- Traditional Sumi-e Colors -->
                            <button class="w-6 h-6 rounded-full bg-[#111111] border border-white/20" onclick="setColor('#111111')" title="Sumi Black"></button>
                            <button class="w-6 h-6 rounded-full bg-[#4a4a4a] border border-white/20" onclick="setColor('#4a4a4a')" title="Diluted Black"></button>
                            <button class="w-6 h-6 rounded-full bg-[#9b2c2c] border border-white/20" onclick="setColor('#9b2c2c')" title="Hanko Red"></button>
                            <button class="w-6 h-6 rounded-full bg-[#2c5282] border border-white/20" onclick="setColor('#2c5282')" title="Indigo Wash"></button>
                            
                            <div class="relative w-6 h-6 rounded-full border border-white/20 bg-[url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAnv37v3/n0QciwZkR+BThM8wUshwQxgAYeAU/6+E4wYAAAAASUVORK5CYII=')] overflow-hidden cursor-pointer" title="Custom Color">
                                <input type="color" class="absolute w-full h-full opacity-0 inset-0 cursor-pointer" value="#111111" id="prop-color" onchange="setColor(this.value)" oninput="setColor(this.value)">
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium">Brush Size</span>
                            <span id="size-val" class="text-xs text-zinc-400 font-mono">20px</span>
                        </div>
                        <input type="range" min="5" max="150" value="20" class="w-full accent-rose-500" oninput="appState.size = parseInt(this.value); document.getElementById('size-val').innerText = this.value + 'px';">
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium">Ink Density (Opacity)</span>
                            <span id="opacity-val" class="text-xs text-zinc-400 font-mono">80%</span>
                        </div>
                        <input type="range" min="5" max="100" value="80" class="w-full accent-rose-500" oninput="appState.opacity = parseInt(this.value); document.getElementById('opacity-val').innerText = this.value + '%';">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium" title="How much stroke size changes based on mouse speed">Speed Sensitivity</span>
                            <span id="sens-val" class="text-xs text-zinc-400 font-mono">60%</span>
                        </div>
                        <input type="range" min="0" max="100" value="60" class="w-full accent-rose-500" oninput="appState.sensitivity = parseInt(this.value); document.getElementById('sens-val').innerText = this.value + '%';">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium" title="Controls dry brush breaking and wet bleeding">Bleed & Scatter</span>
                            <span id="scatter-val" class="text-xs text-zinc-400 font-mono">40%</span>
                        </div>
                        <input type="range" min="0" max="100" value="40" class="w-full accent-rose-500" oninput="appState.bleed = parseInt(this.value); document.getElementById('scatter-val').innerText = this.value + '%';">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium" title="Brush runs out of ink during a long stroke">Ink Depletion Fade</span>
                            <span id="deplete-val" class="text-xs text-zinc-400 font-mono">87%</span>
                        </div>
                        <!-- NOTE: Default to 87% based on user's reference image -->
                        <input type="range" min="0" max="100" value="87" class="w-full accent-rose-500" oninput="appState.depletion = parseInt(this.value); document.getElementById('deplete-val').innerText = this.value + '%';">
                    </div>
                </div>

                <div class="w-full h-px bg-white/5"></div>

                <!-- Background -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block">Paper Type</label>
                        <label class="flex items-center gap-1.5 cursor-pointer text-[10px] text-zinc-400 hover:text-white transition-colors">
                            <input type="checkbox" id="bg-transparent-toggle" class="accent-rose-500 w-3 h-3" onchange="appState.bgTransparent = this.checked; updateBg();"> Transparent
                        </label>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex flex-1 gap-2">
                            <button class="w-8 h-8 rounded-md bg-[#fdfbf7] border border-zinc-200" onclick="setBgColor('#fdfbf7')" title="Washi (White)"></button>
                            <button class="w-8 h-8 rounded-md bg-[#f4ebd0] border border-zinc-300" onclick="setBgColor('#f4ebd0')" title="Aged Rice Paper"></button>
                            <button class="w-8 h-8 rounded-md bg-[#e5e5e5] border border-zinc-300" onclick="setBgColor('#e5e5e5')" title="Cool Gray"></button>
                            <button class="w-8 h-8 rounded-md bg-[#18181b] border border-zinc-700" onclick="setBgColor('#18181b')" title="Dark Slate"></button>
                        </div>
                    </div>
                </div>

            </div>
        </aside>

        <!-- Main Canvas Area -->
        <main class="flex-1 relative bg-zinc-950 pattern-grid overflow-hidden order-1 md:order-2 flex items-center justify-center">
            
            <div id="scale-wrapper" class="checker-bg">
                <div id="p5-container"></div>
            </div>
            
            <div id="status-indicator" class="absolute top-6 right-6 flex items-center gap-2 bg-rose-500/10 border border-rose-500/50 text-rose-400 px-4 py-2.5 rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none backdrop-blur-md z-50">
                <div class="w-2 h-2 rounded-full bg-rose-400 animate-pulse" id="status-dot"></div>
                <span class="text-xs font-bold tracking-wide uppercase" id="status-text">Playing Sequence</span>
            </div>
        </main>
    </div>

    <!-- Export Loading Overlay with Ads -->
    <div id="export-loader" class="fixed inset-0 z-50 bg-black/90 hidden flex flex-col items-center justify-center transition-opacity opacity-0 backdrop-blur-md">
        <div class="max-w-xl w-full flex flex-col items-center gap-8 px-6">
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-white/10 border-t-rose-500 rounded-full animate-spin mb-4"></div>
                <h2 class="text-xl font-bold text-white mb-1">Exporting Your Masterpiece</h2>
                <p class="text-sm text-zinc-400 font-mono font-medium" id="rec-time">Processing 0%</p>
            </div>

            <!-- Google AdSense Container -->
            <div id="ad-container" class="w-full bg-white/5 rounded-2xl p-4 border border-white/10 overflow-hidden min-h-[280px] flex items-center justify-center">
                <div class="text-center w-full">
                    <p class="text-[10px] text-zinc-500 uppercase tracking-widest mb-4">Advertisement</p>
                    <!-- Placeholder for AdSense - Replace slot ID with actual one -->
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-7993314093599705"
                         data-ad-slot="1234567890"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                    <script>
                         try {
                            (adsbygoogle = window.adsbygoogle || []).push({});
                         } catch (e) { console.error("AdSense error:", e); }
                    </script>
                </div>
            </div>
            
            <p class="text-[11px] text-zinc-500 text-center">Your video is being rendered locally. High-resolution exports may take a few moments.</p>
        </div>
    </div>

    <!-- Toasts -->
    <div id="toast-container" class="fixed top-20 right-6 z-[60] flex flex-col gap-2 pointer-events-none"></div>

    <script>
        lucide.createIcons();

        // --- Shared App State ---
        const appState = {
            tool: 'fude', 
            color: '#111111',
            size: 20,
            opacity: 80,
            sensitivity: 60,
            bleed: 40,
            depletion: 87,
            
            bgColor: '#fdfbf7', // Default Washi Paper
            bgTransparent: false,
            
            history: [], // [{ tool, color, size, opacity, sens, bleed, depl, startTime, duration, points: [{x,y,t, px, py}] }]
            
            isPlaying: false,
            isExporting: false
        };

        // --- UI Functions ---
        function setTool(toolName) {
            if(appState.isPlaying) return;
            appState.tool = toolName;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.tool === toolName) btn.classList.add('active');
            });
        }

        function setColor(hex) {
            appState.color = hex;
            document.getElementById('prop-color').value = hex;
        }

        function setBgColor(hex) {
            appState.bgColor = hex;
            appState.bgTransparent = false;
            document.getElementById('bg-transparent-toggle').checked = false;
            updateBg();
        }

        function updateBg() {
            if (window.p5inst && !appState.isPlaying) {
                window.p5inst.redrawHistory();
            }
        }

        function clearCanvas() {
            if (appState.isPlaying || appState.isExporting) return;
            if (confirm('Clear the entire canvas?')) {
                appState.history = [];
                window.p5inst.clearCanvas();
                showToast('Canvas cleared', 'success');
            }
        }

        function undoStroke() {
            if (appState.isPlaying || appState.isExporting) return;
            if (appState.history.length > 0) {
                appState.history.pop();
                window.p5inst.redrawHistory();
                showToast('Undo successful', 'info');
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `bg-zinc-800/95 backdrop-blur-md text-white px-4 py-3 rounded-xl shadow-2xl ring-1 ring-white/10 flex items-center gap-3 transform transition-all -translate-y-4 opacity-0 z-50`;
            let icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-triangle' : 'info');
            let color = type === 'success' ? 'text-green-400' : (type === 'error' ? 'text-red-400' : 'text-rose-400');
            toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 ${color}"></i> <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast); lucide.createIcons();
            requestAnimationFrame(() => toast.classList.remove('-translate-y-4', 'opacity-0'));
            setTimeout(() => { toast.classList.add('-translate-y-4', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // --- Global Controller ---
        function togglePreview() {
            if (window.p5inst) {
                if (appState.isPlaying) window.p5inst.stopPlayback();
                else window.p5inst.startPlayback();
            }
        }

        function exportVideo() {
            if (window.p5inst) window.p5inst.exportVideo();
        }

        // --- Viewport Scaling ---
        function updateLayoutScale() {
            const wrapper = document.getElementById('scale-wrapper');
            const padding = 0; 
            const availW = wrapper.clientWidth - padding;
            const availH = wrapper.clientHeight - padding;

            const logicalW = 1920;
            const logicalH = 1080;

            const scale = Math.min(availW / logicalW, availH / logicalH, 1.0);
            const container = document.getElementById('p5-container');
            if(container) container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', updateLayoutScale);

        // ==========================================
        // P5.JS ENGINE (Instance Mode)
        // ==========================================
        const sketch = (p) => {
            
            const LOGICAL_W = 1920;
            const LOGICAL_H = 1080;
            
            let mainCanvas;
            
            // Interaction State
            let isDrawing = false;
            let currentStroke = null;
            let logicalTime = 0;
            let lastEventTime = 0;
            let pX = 0, pY = 0;

            // Playback State
            let playStartTime = 0;
            let playStrokeIdx = 0;
            let playPointIdx = 0;

            p.setup = () => {
                mainCanvas = p.createCanvas(LOGICAL_W, LOGICAL_H);
                mainCanvas.parent('p5-container');
                p.pixelDensity(1); 
                
                const el = mainCanvas.elt;
                el.addEventListener('pointerdown', handlePointerDown);
                el.addEventListener('pointermove', handlePointerMove);
                window.addEventListener('pointerup', handlePointerUp); 
                
                updateLayoutScale();
                p.clearCanvas();
            };

            p.draw = () => {
                if (appState.isPlaying && !appState.isExporting) {
                    let elapsed = p.millis() - playStartTime;
                    stepPlayback(elapsed, p); 
                }
            };

            // --- Custom Interaction Handlers ---
            function getScaledPos(evt) {
                const rect = mainCanvas.elt.getBoundingClientRect();
                const scaleX = LOGICAL_W / rect.width;
                const scaleY = LOGICAL_H / rect.height;
                return {
                    x: (evt.clientX - rect.left) * scaleX,
                    y: (evt.clientY - rect.top) * scaleY
                };
            }

            function handlePointerDown(e) {
                if (appState.isPlaying || appState.isExporting) return;
                e.preventDefault();
                mainCanvas.elt.setPointerCapture(e.pointerId);
                
                isDrawing = true;
                const pos = getScaledPos(e);
                pX = pos.x; pY = pos.y;
                
                let now = p.millis();
                if (appState.history.length === 0) logicalTime = 0;
                else {
                    let diff = now - lastEventTime;
                    if (diff > 1000) diff = 1000;
                    logicalTime += diff;
                }
                lastEventTime = now;

                currentStroke = {
                    tool: appState.tool,
                    color: appState.color,
                    size: appState.size,
                    opacity: appState.opacity,
                    sensitivity: appState.sensitivity,
                    bleed: appState.bleed,
                    depletion: appState.depletion,
                    startTime: logicalTime,
                    duration: 0,
                    points: []
                };
            }

            function handlePointerMove(e) {
                if (!isDrawing || appState.isPlaying || appState.isExporting) return;
                e.preventDefault();
                
                const pos = getScaledPos(e);
                let now = p.millis();
                
                let timeDiff = now - lastEventTime;
                logicalTime += timeDiff;
                lastEventTime = now;

                let d = p.dist(pX, pY, pos.x, pos.y);
                if (d > 1) { 
                    let speedRaw = d / Math.max(1, timeDiff); 
                    let pt = { x: pos.x, y: pos.y, px: pX, py: pY, t: logicalTime, s: speedRaw };
                    currentStroke.points.push(pt);
                    currentStroke.duration = logicalTime - currentStroke.startTime;
                    
                    drawBrushSegment(p, pt, currentStroke, 1.0);
                    
                    pX = pos.x; pY = pos.y;
                }
            }

            function handlePointerUp(e) {
                if (!isDrawing) return;
                isDrawing = false;
                if(e.pointerId) mainCanvas.elt.releasePointerCapture(e.pointerId);
                
                if (currentStroke && currentStroke.points.length > 0) {
                    appState.history.push(currentStroke);
                }
                currentStroke = null;
            }

            // --- JAPENESE BRUSH PHYSICS ENGINE ---
            function drawBrushSegment(target, pt, strokeData, exportScale = 1.0) {
                let x = pt.x * exportScale;
                let y = pt.y * exportScale;
                let px = pt.px * exportScale;
                let py = pt.py * exportScale;
                
                let baseSize = strokeData.size * exportScale;
                let c = p.color(strokeData.color);
                let op = strokeData.opacity / 100;
                let bleed = strokeData.bleed / 100;
                let sens = strokeData.sensitivity / 100;
                let depl = strokeData.depletion / 100;
                
                let d = p.dist(x, y, px, py);
                if (d === 0) return;

                let speed = pt.s; 
                
                target.push();

                if (strokeData.tool === 'eraser') {
                    target.drawingContext.globalCompositeOperation = appState.bgTransparent ? 'destination-out' : 'source-over';
                    target.strokeWeight(baseSize);
                    target.strokeCap(p.ROUND);
                    target.strokeJoin(p.ROUND);
                    
                    if (appState.bgTransparent) {
                        c = p.color(0); c.setAlpha(255);
                    } else {
                        c = p.color(appState.bgColor);
                        c.setAlpha(255 * op);
                    }
                    target.stroke(c);
                    target.line(px, py, x, y);
                    target.pop();
                    return;
                }

                // Sumi-e inks sink into paper naturally using multiply
                target.drawingContext.globalCompositeOperation = 'multiply';
                target.noStroke();

                // 1. Calculate Dynamic Size based on speed & sensitivity
                let targetSize = baseSize;
                if (sens > 0) {
                    // Speed mapping: fast = thin, slow = thick
                    targetSize = p.map(speed, 0, 3, baseSize * (1 + sens), baseSize * (1 - sens * 0.8), true);
                }

                // 2. Calculate Ink Depletion
                let depletionMod = 1.0;
                if (depl > 0) {
                    let strokeAge = pt.t - strokeData.startTime;
                    // Fully depleted after ~3 seconds if slider is at 100%
                    let decayTime = p.map(depl, 0, 1, 10000, 1000); 
                    depletionMod = p.max(0.05, 1.0 - (strokeAge / decayTime));
                }

                let steps = Math.max(1, p.floor(d / (exportScale * 2))); 
                
                // Specific fast-path for Hake (Flat brush)
                if (strokeData.tool === 'hake') {
                    c.setAlpha(60 * op * depletionMod);
                    target.stroke(c);
                    target.strokeWeight(1.5 * exportScale);
                    
                    let angle = p.atan2(y - py, x - px);
                    let normalX = p.cos(angle - p.HALF_PI);
                    let normalY = p.sin(angle - p.HALF_PI);
                    
                    let hakeWidth = baseSize * 2.5; 
                    let bristles = p.max(10, p.floor(hakeWidth / (3 * exportScale)));
                    
                    for (let j = 0; j < bristles; j++) {
                        let offset = p.map(j, 0, bristles-1, -hakeWidth/2, hakeWidth/2);
                        
                        let px_b = px + normalX * offset;
                        let py_b = py + normalY * offset;
                        let x_b = x + normalX * offset;
                        let y_b = y + normalY * offset;
                        
                        // Organic bristle lifting
                        let bristleNoise = p.noise(j * 10, pt.t * 0.01);
                        if (bristleNoise > (speed * 0.02 + bleed * 0.2)) {
                            target.line(px_b, py_b, x_b, y_b);
                        }
                    }
                    target.pop();
                    return; 
                }

                // Interpolated step loop for other brushes
                for (let i = 0; i <= steps; i++) {
                    let interX = p.lerp(px, x, i / steps);
                    let interY = p.lerp(py, y, i / steps);

                    // Organic Edge Noise
                    let n = p.noise(interX * 0.01, interY * 0.01, pt.t * 0.001);
                    let currentSize = targetSize * (0.8 + 0.4 * n);

                    let angle = p.atan2(y - py, x - px);

                    // ---- BRUSH STYLES ----
                    if (strokeData.tool === 'fude') {
                        // Core body
                        c.setAlpha(200 * op * depletionMod);
                        target.fill(c);
                        target.push();
                        target.translate(interX, interY);
                        target.rotate(angle + p.PI / 4); // Fixed 45 degree tilt
                        target.ellipse(0, 0, currentSize, currentSize * 0.6);
                        target.pop();

                        // Kasure (Bristle breaking) on edges
                        if (speed > 1 || depletionMod < 0.5 || bleed > 0.4) {
                            let scatterAmount = currentSize * (0.5 + bleed);
                            let dropC = p.color(strokeData.color);
                            dropC.setAlpha(120 * op * depletionMod);
                            target.fill(dropC);
                            
                            let dots = p.floor(bleed * 8 + speed * 2);
                            for(let j=0; j<dots; j++) {
                                let rx = interX + p.random(-scatterAmount, scatterAmount);
                                let ry = interY + p.random(-scatterAmount, scatterAmount);
                                if (p.dist(interX, interY, rx, ry) < scatterAmount) {
                                    target.circle(rx, ry, p.random(1, 3) * exportScale);
                                }
                            }
                        }
                    }
                    else if (strokeData.tool === 'menso') {
                        // Fine detail brush: stiff, thin, high speed sensitivity
                        let mensoSize = baseSize * 0.3; // Much thinner
                        if (sens > 0) {
                            mensoSize = p.map(speed, 0, 5, baseSize * 0.4, baseSize * 0.05, true);
                        }
                        c.setAlpha(220 * op * depletionMod);
                        target.fill(c);
                        target.circle(interX, interY, mensoSize);
                    }
                    else if (strokeData.tool === 'kasure') {
                        // Kasure: Very little core body, mostly separated bristles
                        c.setAlpha(60 * op * depletionMod);
                        target.fill(c);
                        
                        let bristleCount = p.max(3, p.floor(currentSize / 2));
                        let normalX = p.cos(angle - p.HALF_PI);
                        let normalY = p.sin(angle - p.HALF_PI);
                        
                        for(let j=0; j<bristleCount; j++) {
                            // Seeded noise to keep bristles contiguous
                            let bNoise = p.noise(j * 10, interX * 0.005, interY * 0.005);
                            let spread = currentSize * (0.5 + bleed * 2);
                            let offset = p.map(bNoise, 0, 1, -spread, spread);
                            
                            // Chance to skip drawing a bristle (breaks it up)
                            if (p.random() > (0.8 * depletionMod - speed * 0.1)) continue;

                            let bx = interX + normalX * offset;
                            let by = interY + normalY * offset;
                            
                            let dotC = p.color(strokeData.color);
                            dotC.setAlpha(150 * op * depletionMod * p.random(0.5, 1));
                            target.fill(dotC);
                            target.circle(bx, by, p.random(1, 4) * exportScale);
                        }
                    }
                    else if (strokeData.tool === 'nijimi') {
                        // Nijimi: Soft, spreading, overlapping circles
                        let wetSize = currentSize + (p.max(0, 2 - speed) * baseSize * bleed * 2);
                        
                        c.setAlpha(10 * op * depletionMod); 
                        target.fill(c);
                        
                        let rings = p.max(3, p.floor(bleed * 10));
                        for(let j=0; j<rings; j++) {
                            let ringRad = wetSize * (j / rings) * (0.8 + 0.4 * p.noise(j, pt.t));
                            let ox = interX + (p.random()-0.5) * ringRad * 0.2;
                            let oy = interY + (p.random()-0.5) * ringRad * 0.2;
                            target.circle(ox, oy, ringRad);
                        }
                        
                        // Darker core
                        c.setAlpha(40 * op * depletionMod);
                        target.fill(c);
                        target.circle(interX, interY, currentSize * 0.5);
                    }
                    else if (strokeData.tool === 'bokashi') {
                        // Soft wash: huge, extremely soft edges, builds up slowly
                        target.drawingContext.globalCompositeOperation = 'multiply';
                        target.noStroke();
                        c.setAlpha(5 * op * depletionMod); // Extremely low alpha
                        target.fill(c);
                        
                        let washSize = currentSize * 3 * (1 + bleed);
                        let rings = p.floor(5 + bleed * 5);
                        for(let j=0; j<rings; j++) {
                            let r = washSize * Math.pow(j/rings, 1.5);
                            target.circle(interX, interY, r);
                        }
                    }
                    else if (strokeData.tool === 'sokuhitsu') {
                        // Side brush: wide perpendicular to stroke, highly textured
                        c.setAlpha(120 * op * depletionMod);
                        target.fill(c);
                        
                        let normalX = p.cos(angle - p.HALF_PI);
                        let normalY = p.sin(angle - p.HALF_PI);
                        let strokeWidth = currentSize * 2.5; // very wide
                        let bristleCount = p.max(3, p.floor(strokeWidth / (2 * exportScale)));

                        for (let j = 0; j < bristleCount; j++) {
                            let offset = p.map(j, 0, bristleCount-1, -strokeWidth/2, strokeWidth/2);
                            // Noise offset for jagged edge
                            let nOff = offset + p.map(p.noise(j*5, pt.t * 0.05), 0, 1, -currentSize*0.3, currentSize*0.3);
                            
                            let bx = interX + normalX * nOff;
                            let by = interY + normalY * nOff;

                            // More likely to draw if near the "leading" edge (simulate pressure)
                            let pressureProb = p.map(j, 0, bristleCount-1, 1.0, 0.2); 
                            
                            if (p.random() < pressureProb * depletionMod - speed*0.01) {
                                target.circle(bx, by, p.random(1, 3) * exportScale);
                            }
                        }
                    }
                    else if (strokeData.tool === 'shodo') {
                        // Shodo: Strict 45 deg angle, highly velocity sensitive, sharp edges
                        let calligSize = baseSize;
                        if (sens > 0) {
                            calligSize = p.map(speed, 0, 4, baseSize * (1 + sens * 1.5), baseSize * (1 - sens), true);
                        }

                        c.setAlpha(240 * op * depletionMod);
                        target.fill(c);
                        target.push();
                        target.translate(interX, interY);
                        target.rotate(-p.PI / 4); // Strict top-right to bottom-left bias
                        target.rectMode(p.CENTER);
                        target.rect(0, 0, calligSize * 1.2, calligSize * 0.15);
                        target.pop();
                    }
                    else if (strokeData.tool === 'shibuki') {
                        // Shibuki: Leaves trailing drops based on speed and bleed
                        c.setAlpha(180 * op * depletionMod);
                        target.fill(c);
                        
                        target.circle(interX + p.random(-2,2)*exportScale, interY + p.random(-2,2)*exportScale, currentSize * 0.2);

                        if (speed > 0.5 && p.random() < bleed + 0.1) {
                            let dropSize = p.random(1, currentSize * 0.4);
                            let throwDist = speed * p.random(5, 20) * exportScale * bleed * 2;
                            
                            let splatterAngle = angle + p.random(-0.5, 0.5);
                            let sx = interX + p.cos(splatterAngle) * throwDist;
                            let sy = interY + p.sin(splatterAngle) * throwDist;
                            
                            let dropC = p.color(strokeData.color);
                            dropC.setAlpha(p.random(100, 255) * op * depletionMod);
                            target.fill(dropC);
                            target.circle(sx, sy, dropSize);
                        }
                    }
                }

                target.pop();
            }

            // --- Control Methods exposed to Window ---
            p.clearCanvas = () => {
                p.drawingContext.globalCompositeOperation = 'source-over';
                if (appState.bgTransparent) {
                    p.clear();
                } else {
                    p.background(appState.bgColor);
                }
            };

            p.redrawHistory = () => {
                p.clearCanvas();
                for (let stroke of appState.history) {
                    for (let pt of stroke.points) {
                        drawBrushSegment(p, pt, stroke, 1.0);
                    }
                }
            };

            p.getTotalTime = () => {
                if (appState.history.length === 0) return 0;
                let last = appState.history[appState.history.length - 1];
                return last.startTime + last.duration;
            };

            function setPlayUI(playing, exporting = false) {
                const btnPlay = document.getElementById('btn-play');
                const iconPlay = document.getElementById('icon-play');
                const textPlay = document.getElementById('text-play');
                const ind = document.getElementById('status-indicator');
                const txt = document.getElementById('status-text');

                document.querySelectorAll('.tool-btn, input, select').forEach(b => b.disabled = playing);
                document.getElementById('btn-export').disabled = playing;

                if (playing) {
                    ind.classList.remove('opacity-0');
                    if (exporting) {
                        btnPlay.disabled = true;
                        ind.classList.replace('bg-rose-500/10', 'bg-blue-500/10');
                        ind.classList.replace('border-rose-500/50', 'border-blue-500/50');
                        ind.classList.replace('text-rose-400', 'text-blue-400');
                        document.getElementById('status-dot').classList.replace('bg-rose-400', 'bg-blue-400');
                        txt.innerText = 'Rendering Video...';
                    } else {
                        btnPlay.classList.add('bg-rose-500/20', 'text-rose-400', 'border-rose-500/50');
                        btnPlay.classList.remove('bg-white/5', 'text-white', 'border-white/5');
                        iconPlay.setAttribute('data-lucide', 'square');
                        textPlay.innerText = 'Stop';
                        txt.innerText = 'Playing Sequence';
                    }
                } else {
                    btnPlay.disabled = false;
                    btnPlay.classList.remove('bg-rose-500/20', 'text-rose-400', 'border-rose-500/50');
                    btnPlay.classList.add('bg-white/5', 'text-white', 'border-white/5');
                    iconPlay.setAttribute('data-lucide', 'play');
                    textPlay.innerText = 'Preview';
                    ind.classList.add('opacity-0');
                    
                    ind.classList.replace('bg-blue-500/10', 'bg-rose-500/10');
                    ind.classList.replace('border-blue-500/50', 'border-rose-500/50');
                    ind.classList.replace('text-blue-400', 'text-rose-400');
                    document.getElementById('status-dot').classList.replace('bg-blue-400', 'bg-rose-400');
                }
                lucide.createIcons();
            }

            p.startPlayback = () => {
                if (appState.history.length === 0) {
                    showToast('Draw something first!', 'error');
                    return;
                }
                appState.isPlaying = true;
                appState.isExporting = false;
                setPlayUI(true);
                
                p.clearCanvas();
                playStartTime = p.millis();
                playStrokeIdx = 0;
                playPointIdx = 0;
            };

            p.stopPlayback = () => {
                appState.isPlaying = false;
                setPlayUI(false);
                p.redrawHistory();
            };

            function stepPlayback(elapsedMs, targetBuffer, scale = 1.0) {
                while (playStrokeIdx < appState.history.length) {
                    let stroke = appState.history[playStrokeIdx];

                    if (playPointIdx >= stroke.points.length) {
                        playStrokeIdx++;
                        playPointIdx = 0;
                        continue;
                    }

                    let pt = stroke.points[playPointIdx];
                    if (pt.t <= elapsedMs) {
                        drawBrushSegment(targetBuffer, pt, stroke, scale);
                        playPointIdx++;
                    } else {
                        break; 
                    }
                }

                let totalTime = p.getTotalTime();
                
                if (appState.isExporting) {
                    let pct = Math.min(100, Math.round((elapsedMs / totalTime) * 100));
                    document.getElementById('rec-time').innerText = `Processing ${pct}%`;
                }

                if (elapsedMs >= totalTime + 1000) { 
                    if (appState.isExporting) {
                        document.getElementById('rec-time').innerText = `Finalizing File...`;
                        setTimeout(() => {
                            if (appState.mediaRecorder && appState.mediaRecorder.state !== 'inactive') {
                                appState.mediaRecorder.stop();
                            }
                        }, 500);
                        appState.isPlaying = false;
                    } else {
                        p.stopPlayback();
                    }
                }
            }

            p.exportVideo = () => {
                if (appState.history.length === 0) return showToast('Draw something first!', 'error');
                if (appState.isPlaying || appState.isExporting) return;

                const targetWidth = parseInt(document.getElementById('export-res').value);
                const aspect = LOGICAL_H / LOGICAL_W;
                const targetHeight = targetWidth * aspect;
                const exportScale = targetWidth / LOGICAL_W;

                const pg = p.createGraphics(targetWidth, targetHeight);
                pg.drawingContext.globalCompositeOperation = 'source-over';
                if (appState.bgTransparent) pg.clear();
                else pg.background(appState.bgColor);

                const stream = pg.elt.captureStream(60); 
                appState.recordedChunks = [];
                appState.mediaRecorder = new MediaRecorder(stream, { 
                    mimeType: 'video/webm; codecs=vp9',
                    videoBitsPerSecond: 20000000 
                });
                
                appState.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) appState.recordedChunks.push(e.data);
                };

                appState.mediaRecorder.onstop = () => {
                    const blob = new Blob(appState.recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `sumie-render-${targetWidth}w-${Date.now()}.webm`;
                    link.click();
                    URL.revokeObjectURL(url);
                    
                    appState.isExporting = false;
                    appState.isPlaying = false;
                    setPlayUI(false);
                    document.getElementById('export-loader').classList.add('opacity-0');
                    setTimeout(() => document.getElementById('export-loader').classList.add('hidden'), 300);
                    
                    pg.remove(); 
                    p.redrawHistory();
                    showToast('Video exported successfully!', 'success');
                };

                appState.mediaRecorder.start();
                appState.isPlaying = true;
                appState.isExporting = true;
                setPlayUI(true, true);
                
                const loader = document.getElementById('export-loader');
                loader.classList.remove('hidden');
                requestAnimationFrame(() => loader.classList.remove('opacity-0'));

                playStrokeIdx = 0;
                playPointIdx = 0;
                let exportStartTime = p.millis();
                
                function exportLoop() {
                    if (!appState.isExporting) return;
                    let elapsedMs = p.millis() - exportStartTime;
                    
                    stepPlayback(elapsedMs, pg, exportScale);
                    
                    p.clearCanvas();
                    p.image(pg, 0, 0, LOGICAL_W, LOGICAL_H);

                    requestAnimationFrame(exportLoop);
                }
                exportLoop();
            };

            window.p5inst = p;
        };

        new p5(sketch);

    </script>
</body>
</html>
