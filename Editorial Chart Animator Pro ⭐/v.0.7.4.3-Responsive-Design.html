            if (type === 'success') { icon = 'check-circle'; borderColor = 'border-green-500'; iconColor = 'text-green-500'; } 
            else if (type === 'error') { icon = 'warning'; borderColor = 'border-brand-red'; iconColor = 'text-brand-red'; }
            toast.classList.add(borderColor);
            toast.innerHTML = `<i class="ph-fill ph-${icon} text-xl ${iconColor}"></i> <span class="text-sm font-bold tracking-wide uppercase">${message}</span>`;
            container.appendChild(toast); 
            requestAnimationFrame(() => toast.classList.remove('-translate-y-4', 'opacity-0'));
            setTimeout(() => { toast.classList.add('-translate-y-4', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function isDarkColor(hexColor) {
            const hex = hexColor.replace('#', '');
            if(hex.length === 6) {
                const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
                return (r * 0.299 + g * 0.587 + b * 0.114) < 128;
            }
            return false;
        }

        // --- Data Parsing & Management ---
        function parseCSVtoState(csvString) {
            const lines = csvString.split('\n');
            state.data = []; state.seriesNames = []; state.maxVal = 0; state.minVal = 0; state.maxStackedVal = 0;
            let startIdx = 0;
            if (lines.length > 0) {
                const headerRow = lines[0].split(',').map(c => c.trim());
                if (headerRow.length >= 2 && isNaN(parseFloat(headerRow[1]))) {
                    startIdx = 1; state.seriesNames = headerRow.slice(1);
                    if (state.seriesNames.length > 0 && state.seriesNames[state.seriesNames.length - 1].toLowerCase() === 'color') state.seriesNames.pop();
                } else { state.seriesNames = ['Value']; }
            }

            for (let i = startIdx; i < lines.length; i++) {
                const row = lines[i].split(',').map(c => c.trim());
                if (row.length < 2) continue;
                const label = row[0]; let color = null; const values = [];
                for(let j = 1; j < row.length; j++) {
                    if (row[j].startsWith('#')) color = row[j]; else values.push(parseFloat(row[j]) || 0);
                }
                state.data.push({ label, values, color }); 
                let sum = 0;
                values.forEach(v => {
                    if (v > state.maxVal) state.maxVal = v;
                    if (v < state.minVal) state.minVal = v;
                    sum += v;
                });
                if (sum > state.maxStackedVal) state.maxStackedVal = sum;
            }

            if (state.maxVal > 0) {
                const mag = Math.pow(10, Math.floor(Math.log10(Math.max(0.1, state.maxVal))));
                let norm = state.maxVal / mag;
                if (norm <= 1.5) norm = 1.5; else if (norm <= 2) norm = 2; else if (norm <= 5) norm = 5; else norm = 10;
                state.maxVal = norm * mag;
            }
            if (state.maxStackedVal > 0) {
                const mag = Math.pow(10, Math.floor(Math.log10(Math.max(0.1, state.maxStackedVal))));
                let norm = state.maxStackedVal / mag;
                if (norm <= 1.5) norm = 1.5; else if (norm <= 2) norm = 2; else if (norm <= 5) norm = 5; else norm = 10;
                state.maxStackedVal = norm * mag;
            }
            if (state.minVal < 0) {
                 const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(state.minVal))));
                 state.minVal = Math.floor(state.minVal / mag) * mag;
            }
        }

        function generateCSVFromState() {
            return `Label,${state.seriesNames.join(',')},Color\n` + state.data.map(d => `${d.label},${d.values.join(',')},${d.color || ''}`).join('\n');
        }

        function buildGridFromState() {
            gridRowsContainer.innerHTML = '';
            state.data.forEach((item, index) => {
                const row = document.createElement('div'); row.className = 'flex items-center gap-1 sm:gap-2';
                const lblInput = document.createElement('input'); lblInput.type = 'text'; lblInput.value = item.label;
                lblInput.className = 'flex-[2] min-w-0 px-2 py-1.5 bg-white dark:bg-neutral-900 border border-blueprint-200 dark:border-neutral-700 text-xs text-slate-800 dark:text-neutral-200 focus:border-blueprint-900 dark:focus:border-neutral-500 outline-none rounded-md';
                lblInput.oninput = (e) => { state.data[index].label = e.target.value; syncFromGrid(); };

                const valInput = document.createElement('input'); valInput.type = 'text'; valInput.value = item.values.join(', ');
                valInput.className = 'flex-[2] min-w-0 px-2 py-1.5 bg-white dark:bg-neutral-900 border border-blueprint-200 dark:border-neutral-700 text-xs text-slate-800 dark:text-neutral-200 focus:border-blueprint-900 dark:focus:border-neutral-500 outline-none rounded-md';
                valInput.oninput = (e) => { state.data[index].values = e.target.value.split(',').map(v => parseFloat(v.trim()) || 0); syncFromGrid(); };

                const colWrapper = document.createElement('div');
                colWrapper.className = 'relative w-8 h-8 rounded-md overflow-hidden border border-blueprint-200 dark:border-neutral-700 shrink-0';
                const colInput = document.createElement('input'); colInput.type = 'color'; colInput.value = item.color || palettes[state.colorPalette][index % palettes[state.colorPalette].length];
                colInput.className = 'absolute -top-2 -left-2 w-12 h-12 cursor-pointer';
                colInput.oninput = (e) => { state.data[index].color = e.target.value; syncFromGrid(); };
                colWrapper.appendChild(colInput);

                const delBtn = document.createElement('button'); delBtn.className = 'w-6 h-8 flex items-center justify-center text-slate-400 hover:text-brand-red shrink-0';
                delBtn.innerHTML = '<i class="ph-bold ph-trash"></i>';
                delBtn.onclick = () => { state.data.splice(index, 1); buildGridFromState(); syncFromGrid(); };

                row.appendChild(lblInput); row.appendChild(valInput); row.appendChild(colWrapper); row.appendChild(delBtn);
                gridRowsContainer.appendChild(row);
            });
        }

        btnAddRow.addEventListener('click', () => {
            state.data.push({ label: 'New', values: Array(state.seriesNames.length).fill(10), color: null });
            buildGridFromState(); syncFromGrid(); gridRowsContainer.scrollTop = gridRowsContainer.scrollHeight;
        });

        function syncFromGrid() { dataInput.value = generateCSVFromState(); updateAndRender(false); }

        tabGrid.addEventListener('click', () => {
            currentDataMode = 'grid';
            tabGrid.classList.add('bg-blueprint-900', 'dark:bg-neutral-600', 'text-white', 'shadow-[1px_1px_0px_#000]', 'dark:shadow-[1px_1px_0px_#171717]');
            tabGrid.classList.remove('text-slate-500', 'dark:text-neutral-400');
            tabCsv.classList.remove('bg-blueprint-900', 'dark:bg-neutral-600', 'text-white', 'shadow-[1px_1px_0px_#000]', 'dark:shadow-[1px_1px_0px_#171717]');
            tabCsv.classList.add('text-slate-500', 'dark:text-neutral-400');
            viewGrid.classList.remove('hidden'); viewGrid.classList.add('flex');
            viewCsv.classList.add('hidden'); viewCsv.classList.remove('flex');
            buildGridFromState();
        });

        tabCsv.addEventListener('click', () => {
            currentDataMode = 'csv';
            tabCsv.classList.add('bg-blueprint-900', 'dark:bg-neutral-600', 'text-white', 'shadow-[1px_1px_0px_#000]', 'dark:shadow-[1px_1px_0px_#171717]');
            tabCsv.classList.remove('text-slate-500', 'dark:text-neutral-400');
            tabGrid.classList.remove('bg-blueprint-900', 'dark:bg-neutral-600', 'text-white', 'shadow-[1px_1px_0px_#000]', 'dark:shadow-[1px_1px_0px_#171717]');
            tabGrid.classList.add('text-slate-500', 'dark:text-neutral-400');
            viewCsv.classList.remove('hidden'); viewCsv.classList.add('flex');
            viewGrid.classList.add('hidden'); viewGrid.classList.remove('flex');
            dataInput.value = generateCSVFromState();
        });

        function updateStateFromUI(rebuildGrid = true) {
            state.title = uiTitle.value; state.subtitle = uiSubtitle.value; state.source = uiSource.value;
            state.showTitle = uiShowTitle.checked; state.showSubtitle = uiShowSubtitle.checked; state.showSource = uiShowSource.checked;
            state.titleSize = parseInt(uiTitleSize.value); state.subtitleSize = parseInt(uiSubtitleSize.value); state.sourceSize = parseInt(uiSourceSize.value);
            state.titleColor = uiTitleColor.value; state.textColor = uiTextColor.value; state.bgColor = uiBgColor.value;
            state.zoom = parseFloat(zoomSlider.value); state.panX = parseInt(panXSlider.value); state.panY = parseInt(panYSlider.value);
            state.fontFamily = fontSelect.value; state.colorPalette = paletteSelect.value; state.type = typeSelect.value; state.format = formatSelect.value;
            state.showLegend = legendCheck.checked; state.showGrid = showGridCheck.checked; state.showXAxis = uiShowXAxis.checked; state.showYAxis = uiShowYAxis.checked; state.showValues = uiShowValues.checked;
            
            const raw = dataInput.value.trim();
            if (raw) parseCSVtoState(raw);
            if (rebuildGrid && currentDataMode === 'grid') buildGridFromState();
        }

        function formatValue(val) {
            const rounded = Math.abs(state.maxVal - state.minVal) < 5 ? val.toFixed(2) : Math.round(val);
            if (state.format === 'currency') return '$' + Number(rounded).toLocaleString();
            if (state.format === 'percent') return Number(rounded).toLocaleString() + '%';
            return Number(rounded).toLocaleString();
        }

        function easeOutQuint(x) { return 1 - Math.pow(1 - x, 5); }

        function renderFrame(progress, targetCanvas = canvas, exportScale = 1.0, isTransparent = false) {
            const tCtx = targetCanvas.getContext('2d', { alpha: isTransparent });
            const easeP = easeOutQuint(progress);
            const isDarkBg = isDarkColor(state.bgColor);
            const gridColor = isDarkBg ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
            const fontBase = state.fontFamily;
            const activePalette = palettes[state.colorPalette];

            const W = 1920; const H = 1080;
            tCtx.save(); tCtx.scale(exportScale, exportScale);

            if (isTransparent) { tCtx.clearRect(0, 0, W, H); } 
            else { tCtx.fillStyle = state.bgColor; tCtx.fillRect(0, 0, W, H); }

            tCtx.translate(W / 2 + state.panX, H / 2 + state.panY);
            tCtx.scale(state.zoom, state.zoom);
            tCtx.translate(-W / 2, -H / 2);
            tCtx.textAlign = 'left';
            
            let currentY = 70;
            if (state.showTitle) {
                tCtx.textBaseline = 'top'; tCtx.font = `800 ${state.titleSize}px "${fontBase}"`;
                tCtx.fillStyle = state.titleColor; tCtx.fillText(state.title, 80, currentY); currentY += state.titleSize + 16;
            }
            if (state.showSubtitle) {
                tCtx.textBaseline = 'top'; tCtx.font = `400 ${state.subtitleSize}px "${fontBase}"`;
                tCtx.fillStyle = state.textColor; tCtx.fillText(state.subtitle, 80, currentY); currentY += state.subtitleSize + 16;
            }
            let bottomY = H - 40;
            if (state.showSource) {
                tCtx.textBaseline = 'bottom'; tCtx.font = `600 ${state.sourceSize}px "${fontBase}"`;
                tCtx.fillStyle = state.textColor; tCtx.fillText(state.source, 80, bottomY); bottomY -= (state.sourceSize + 20);
            }
            if (state.showLegend) {
                drawLegend(tCtx, W, bottomY - 20, state.textColor, activePalette, fontBase); bottomY -= 80;
            }
            if (state.data.length === 0) { tCtx.restore(); return; }

            const chartArea = { x: 120, y: currentY + 40, w: W - 240, h: Math.max(100, bottomY - (currentY + 40)) };

            if (state.type === 'vertical') drawVerticalChart(tCtx, chartArea, easeP, state.textColor, gridColor, activePalette, fontBase);
            else if (state.type === 'horizontal') drawHorizontalChart(tCtx, chartArea, easeP, state.textColor, gridColor, activePalette, fontBase);
            else if (state.type === 'pie') drawPieChart(tCtx, chartArea, easeP, state.textColor, activePalette, fontBase);
            else if (state.type === 'multiline') drawMultiLineChart(tCtx, chartArea, easeP, state.textColor, gridColor, activePalette, fontBase);
            else if (state.type === 'stacked') drawStackedChart(tCtx, chartArea, easeP, state.textColor, gridColor, activePalette, fontBase);

            tCtx.restore();
        }

        function drawLegend(tCtx, W, legendCenterY, textColor, palette, fontBase) {
            tCtx.textAlign = 'left'; tCtx.textBaseline = 'middle'; tCtx.font = `700 24px "${fontBase}"`;
            let totalWidth = 0; const itemPadding = 40; const boxSize = 20;
            const isMultiSeries = (state.type === 'multiline' || state.type === 'stacked') && state.seriesNames.length > 0;
            
            if (isMultiSeries) { state.seriesNames.forEach((name) => { totalWidth += boxSize + 10 + tCtx.measureText(name).width + itemPadding; }); } 
            else { state.data.forEach(item => { totalWidth += boxSize + 10 + tCtx.measureText(item.label).width + itemPadding; }); }
            totalWidth -= itemPadding; 
            let currentX = (W - totalWidth) / 2;

            if (isMultiSeries) {
                state.seriesNames.forEach((name, idx) => {
                    const color = palette[idx % palette.length];
                    tCtx.fillStyle = color; tCtx.beginPath(); tCtx.roundRect(currentX, legendCenterY - boxSize/2, boxSize, boxSize, 4); tCtx.fill();
                    tCtx.fillStyle = textColor; tCtx.fillText(name, currentX + boxSize + 10, legendCenterY + 2);
                    currentX += boxSize + 10 + tCtx.measureText(name).width + itemPadding;
                });
            } else {
                state.data.forEach((item, idx) => {
                    const color = item.color || palette[idx % palette.length];
                    tCtx.fillStyle = color; tCtx.beginPath(); tCtx.roundRect(currentX, legendCenterY - boxSize/2, boxSize, boxSize, 4); tCtx.fill();
                    tCtx.fillStyle = textColor; tCtx.fillText(item.label, currentX + boxSize + 10, legendCenterY + 2);
                    currentX += boxSize + 10 + tCtx.measureText(item.label).width + itemPadding;
                });
            }
        }

        function drawVerticalChart(tCtx, area, progress, textColor, gridColor, palette, fontBase) {
            const steps = 4; const valueRange = state.maxVal - state.minVal; const leftPad = state.showYAxis ? 100 : 20;
            tCtx.textAlign = 'right'; tCtx.textBaseline = 'middle'; tCtx.font = `600 20px "${fontBase}"`; tCtx.fillStyle = textColor;

            for (let i = 0; i <= steps; i++) {
                const val = state.minVal + (valueRange / steps) * i;
                const y = area.y + area.h - ((val - state.minVal) / valueRange) * area.h;
                if (state.showGrid) {
                    tCtx.beginPath(); tCtx.setLineDash([8, 8]); tCtx.moveTo(area.x + leftPad - 20, y); tCtx.lineTo(area.x + area.w, y);
                    tCtx.strokeStyle = gridColor; tCtx.lineWidth = 2; tCtx.stroke(); tCtx.setLineDash([]);
                }
                if (state.showYAxis) { tCtx.fillText(i > 0 || state.minVal < 0 ? formatValue(val) : "0", area.x + leftPad - 40, y); }
            }

            const zeroY = state.minVal < 0 ? area.y + area.h - ((0 - state.minVal) / valueRange) * area.h : area.y + area.h;
            if (state.showXAxis || state.showYAxis) {
                tCtx.beginPath(); tCtx.moveTo(area.x + leftPad - 20, zeroY); tCtx.lineTo(area.x + area.w, zeroY);
                tCtx.strokeStyle = gridColor; tCtx.lineWidth = 3; tCtx.stroke();
            }

            const numBars = state.data.length; const slotWidth = (area.w - leftPad) / numBars; const barWidth = slotWidth * 0.8;
            tCtx.textAlign = 'center';

            state.data.forEach((item, index) => {
                const x = area.x + leftPad + (index * slotWidth) + (slotWidth - barWidth)/2;
                const actualValue = item.values[0] || 0;
                const targetPixelHeight = (actualValue / valueRange) * area.h;
                const currentPixelHeight = targetPixelHeight * progress;
                const y = zeroY - currentPixelHeight;
                const color = item.color || palette[index % palette.length];

                tCtx.fillStyle = color; tCtx.fillRect(x, y, barWidth, currentPixelHeight);
                tCtx.textBaseline = 'top'; tCtx.font = `700 24px "${fontBase}"`; tCtx.fillStyle = textColor; tCtx.globalAlpha = Math.min(1, progress * 2); 
                
                if (state.showXAxis) { tCtx.fillText(item.label, x + barWidth/2, state.minVal < 0 ? area.y + area.h + 15 : zeroY + 15); }

                if (state.showValues && progress > 0.1) {
                    tCtx.textBaseline = actualValue >= 0 ? 'bottom' : 'top';
                    tCtx.font = `800 28px "${fontBase === 'Caveat' || fontBase === 'Playfair Display' ? fontBase : 'JetBrains Mono'}"`;
                    tCtx.fillText(formatValue(actualValue * progress), x + barWidth/2, y + (actualValue >= 0 ? -10 : 10));
                }
                tCtx.globalAlpha = 1.0;
            });
        }

        function drawHorizontalChart(tCtx, area, progress, textColor, gridColor, palette, fontBase) {
            const labelSpace = state.showYAxis ? 250 : 20; const rightPad = 40; const actualAreaW = area.w - labelSpace - rightPad;
            const valueRange = state.maxVal - state.minVal; const steps = 4;
            tCtx.textAlign = 'center'; tCtx.textBaseline = 'top'; tCtx.font = `600 20px "${fontBase}"`; tCtx.fillStyle = textColor;

            for (let i = 0; i <= steps; i++) {
                const val = state.minVal + (valueRange / steps) * i;
                const x = area.x + labelSpace + ((val - state.minVal) / valueRange) * actualAreaW;
                if (state.showGrid) {
                    tCtx.beginPath(); tCtx.setLineDash([8, 8]); tCtx.moveTo(x, area.y); tCtx.lineTo(x, area.y + area.h - (state.showXAxis ? 40 : 0));
                    tCtx.strokeStyle = gridColor; tCtx.lineWidth = 2; tCtx.stroke(); tCtx.setLineDash([]);
                }
                if (state.showXAxis) tCtx.fillText(formatValue(val), x, area.y + area.h - 25);
            }

            const zeroX = state.minVal < 0 ? area.x + labelSpace + ((0 - state.minVal) / valueRange) * actualAreaW : area.x + labelSpace;
            if (state.showXAxis || state.showYAxis) {
                tCtx.beginPath(); tCtx.moveTo(zeroX, area.y); tCtx.lineTo(zeroX, area.y + area.h - (state.showXAxis ? 40 : 0));
                tCtx.strokeStyle = gridColor; tCtx.lineWidth = 3; tCtx.stroke();
            }

            const numBars = state.data.length; const totalH = area.h - (state.showXAxis ? 40 : 0);
            const slotHeight = totalH / numBars; const barHeight = slotHeight * 0.75;
            tCtx.textBaseline = 'middle';

            state.data.forEach((item, index) => {
                const actualValue = item.values[0] || 0;
                const targetPixelWidth = (actualValue / valueRange) * actualAreaW;
                const currentPixelWidth = targetPixelWidth * progress;
                const y = area.y + (index * slotHeight) + (slotHeight - barHeight)/2;
                const color = item.color || palette[index % palette.length];

                tCtx.globalAlpha = Math.min(1, progress * 2);
                if (state.showYAxis) {
                    tCtx.textAlign = 'right'; tCtx.font = `800 24px "${fontBase}"`; tCtx.fillStyle = textColor;
                    tCtx.fillText(item.label, area.x + labelSpace - 20, y + barHeight/2);
                }

                tCtx.fillStyle = color; tCtx.globalAlpha = 1.0; tCtx.fillRect(zeroX, y, currentPixelWidth, barHeight);

                if (state.showValues && progress > 0.1) {
                    tCtx.textAlign = actualValue >= 0 ? 'left' : 'right';
                    tCtx.font = `800 28px "${fontBase === 'Caveat' || fontBase === 'Playfair Display' ? fontBase : 'JetBrains Mono'}"`;
                    tCtx.fillStyle = textColor;
                    tCtx.fillText(formatValue(actualValue * progress), zeroX + currentPixelWidth + (actualValue >= 0 ? 15 : -15), y + barHeight/2);
                }
            });
        }

        function drawPieChart(tCtx, area, progress, textColor, palette, fontBase) {
            const total = state.data.reduce((sum, item) => sum + (item.values[0] || 0), 0);
            if (total === 0) return;
            const centerX = area.x + area.w / 2; const centerY = area.y + area.h / 2; const radius = Math.min(area.w, area.h) * 0.45;
            const targetTotalRadian = Math.PI * 2 * progress; let currentRadian = -Math.PI / 2; 

            state.data.forEach((item, index) => {
                const sliceAngle = ((item.values[0] || 0) / total) * targetTotalRadian;
                tCtx.beginPath(); tCtx.moveTo(centerX, centerY); tCtx.arc(centerX, centerY, radius, currentRadian, currentRadian + sliceAngle); tCtx.closePath();
                tCtx.fillStyle = item.color || palette[index % palette.length]; tCtx.fill();
                tCtx.lineWidth = 3; tCtx.strokeStyle = state.bgColor; tCtx.stroke();
                currentRadian += sliceAngle;
            });
        }

        function drawMultiLineChart(tCtx, area, progress, textColor, gridColor, palette, fontBase) {
            const numPoints = state.data.length; if (numPoints < 2) return;
            const numSeries = state.seriesNames.length; const valueRange = state.maxVal - state.minVal;
            const leftPad = state.showYAxis ? 100 : 40; const rightPad = 40;
            const xStep = (area.w - leftPad - rightPad) / (numPoints - 1);
            const currentXProg = area.x + leftPad + progress * (area.w - leftPad - rightPad);
            
            tCtx.textAlign = 'right'; tCtx.textBaseline = 'middle'; tCtx.font = `600 20px "${fontBase}"`; tCtx.fillStyle = textColor;
            for (let i = 0; i <= 4; i++) {
                const val = state.minVal + (valueRange / 4) * i;
                const y = area.y + area.h - ((val - state.minVal) / valueRange) * area.h;
                if (state.showGrid) {
                    tCtx.beginPath(); tCtx.setLineDash([8, 8]); tCtx.moveTo(area.x + leftPad - 20, y); tCtx.lineTo(area.x + area.w, y);
                    tCtx.strokeStyle = gridColor; tCtx.lineWidth = 2; tCtx.stroke(); tCtx.setLineDash([]);
                }
                if (state.showYAxis) tCtx.fillText(formatValue(val), area.x + leftPad - 40, y);
            }
            
            const zeroY = state.minVal < 0 ? area.y + area.h - ((0 - state.minVal) / valueRange) * area.h : area.y + area.h;
            if (state.showXAxis || state.showYAxis) {
                tCtx.beginPath(); tCtx.moveTo(area.x + leftPad - 20, zeroY); tCtx.lineTo(area.x + area.w, zeroY);
                tCtx.strokeStyle = gridColor; tCtx.lineWidth = 3; tCtx.stroke();
            }

            tCtx.textAlign = 'center'; tCtx.textBaseline = 'top';
            state.data.forEach((item, idx) => {
                const x = area.x + leftPad + idx * xStep;
                if (state.showGrid) {
                    tCtx.beginPath(); tCtx.setLineDash([4, 4]); tCtx.moveTo(x, area.y); tCtx.lineTo(x, area.y + area.h);
                    tCtx.strokeStyle = gridColor; tCtx.lineWidth = 1; tCtx.stroke(); tCtx.setLineDash([]);
                }
                if (state.showXAxis) { tCtx.globalAlpha = Math.min(1, progress * 2); tCtx.fillText(item.label, x, area.y + area.h + 15); tCtx.globalAlpha = 1.0; }
            });

            for (let s = 0; s < numSeries; s++) {
                const color = palette[s % palette.length];
                tCtx.beginPath(); tCtx.strokeStyle = color; tCtx.lineWidth = 6; tCtx.lineJoin = 'round'; tCtx.lineCap = 'round';
                if (state.glow > 0) { tCtx.shadowColor = color; tCtx.shadowBlur = state.glow; }
                
                let lastX = 0, lastY = 0;
                for (let i = 0; i < numPoints; i++) {
                    const val = state.data[i].values[s] !== undefined ? state.data[i].values[s] : 0;
                    const x = area.x + leftPad + i * xStep; const y = area.y + area.h - ((val - state.minVal) / valueRange) * area.h;
                    if (i === 0) { tCtx.moveTo(x, y); lastX = x; lastY = y; } 
                    else {
                        if (x <= currentXProg) { tCtx.lineTo(x, y); lastX = x; lastY = y; } 
                        else if (lastX < currentXProg) {
                            const fraction = (currentXProg - lastX) / (x - lastX); const interpY = lastY + (y - lastY) * fraction;
                            tCtx.lineTo(currentXProg, interpY); lastX = currentXProg; lastY = interpY; break;
                        }
                    }
                }
                tCtx.stroke(); tCtx.shadowBlur = 0; 
                
                if (progress > 0) {
                    tCtx.beginPath(); tCtx.arc(lastX, lastY, 8, 0, Math.PI * 2); tCtx.fillStyle = color; tCtx.fill();
                    tCtx.strokeStyle = state.bgColor; tCtx.lineWidth = 3; tCtx.stroke();
                    if (state.showValues) {
                        tCtx.textAlign = 'left'; tCtx.textBaseline = 'middle';
                        tCtx.font = `800 24px "${fontBase === 'Caveat' || fontBase === 'Playfair Display' ? fontBase : 'JetBrains Mono'}"`;
                        tCtx.fillStyle = textColor;
                        tCtx.fillText(formatValue(state.minVal + ((area.y + area.h - lastY) / area.h) * valueRange), lastX + 15, lastY);
                    }
                }
            }
        }

        function drawStackedChart(tCtx, area, progress, textColor, gridColor, palette, fontBase) {
            const steps = 4; const valueRange = state.maxStackedVal > 0 ? state.maxStackedVal : 1; const leftPad = state.showYAxis ? 100 : 20;
            tCtx.textAlign = 'right'; tCtx.textBaseline = 'middle'; tCtx.font = `600 20px "${fontBase}"`; tCtx.fillStyle = textColor;

            for (let i = 0; i <= steps; i++) {
                const val = (valueRange / steps) * i; const y = area.y + area.h - (val / valueRange) * area.h;
                if (state.showGrid) {
                    tCtx.beginPath(); tCtx.setLineDash([8, 8]); tCtx.moveTo(area.x + leftPad - 20, y); tCtx.lineTo(area.x + area.w, y);
                    tCtx.strokeStyle = gridColor; tCtx.lineWidth = 2; tCtx.stroke(); tCtx.setLineDash([]);
                }
                if (state.showYAxis) tCtx.fillText(formatValue(val), area.x + leftPad - 40, y);
            }

            const zeroY = area.y + area.h;
            if (state.showXAxis || state.showYAxis) {
                tCtx.beginPath(); tCtx.moveTo(area.x + leftPad - 20, zeroY); tCtx.lineTo(area.x + area.w, zeroY);
                tCtx.strokeStyle = gridColor; tCtx.lineWidth = 3; tCtx.stroke();
            }

            const numBars = state.data.length; const slotWidth = (area.w - leftPad) / numBars; const barWidth = slotWidth * 0.7;
            const numSeries = state.seriesNames.length; tCtx.textAlign = 'center';

            state.data.forEach((item, index) => {
                const x = area.x + leftPad + (index * slotWidth) + (slotWidth - barWidth)/2;
                let currentY = zeroY;
                if (state.showXAxis) {
                    tCtx.textBaseline = 'top'; tCtx.font = `700 24px "${fontBase}"`; tCtx.fillStyle = textColor;
                    tCtx.globalAlpha = Math.min(1, progress * 2); tCtx.fillText(item.label, x + barWidth/2, zeroY + 15); tCtx.globalAlpha = 1.0;
                }
                
                let stackTotal = 0;
                for (let s = 0; s < numSeries; s++) {
                    const val = item.values[s] || 0; stackTotal += val;
                    const targetPixelHeight = (val / valueRange) * area.h; const currentPixelHeight = targetPixelHeight * progress;
                    const y = currentY - currentPixelHeight; const color = palette[s % palette.length];
                    tCtx.fillStyle = color; tCtx.fillRect(x, y, barWidth, currentPixelHeight);
                    
                    if (state.showValues && currentPixelHeight > 30 && progress > 0.5) {
                        tCtx.fillStyle = isDarkColor(color) ? '#ffffff' : '#1e293b';
                        tCtx.textBaseline = 'middle'; tCtx.font = `800 18px "${fontBase === 'Caveat' || fontBase === 'Playfair Display' ? fontBase : 'JetBrains Mono'}"`;
                        tCtx.fillText(formatValue(val * progress), x + barWidth/2, y + currentPixelHeight/2);
                    }
                    currentY = y;
                }
                
                if (state.showValues && progress > 0.1) {
                    tCtx.fillStyle = textColor; tCtx.textBaseline = 'bottom';
                    tCtx.font = `800 26px "${fontBase === 'Caveat' || fontBase === 'Playfair Display' ? fontBase : 'JetBrains Mono'}"`;
                    tCtx.fillText(formatValue(stackTotal * progress), x + barWidth/2, currentY - 10);
                }
            });
        }

        function updateAndRender(rebuildGrid = true) { updateStateFromUI(rebuildGrid); renderFrame(1.0, canvas, 1.0, false); }

        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', () => { if (templates[btn.getAttribute('data-template')]) applyTemplateData(templates[btn.getAttribute('data-template')]); });
        });

        function renderCustomPresets() {
            customPresetsList.innerHTML = '';
            const presets = loadSavedPresets(); const keys = Object.keys(presets);
            if (keys.length === 0) { customPresetsList.innerHTML = `<span class="text-[10px] text-slate-400 italic px-1 py-2">No presets.</span>`; return; }

            keys.forEach(key => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex items-center justify-between group py-1.5 px-2 bg-slate-50 dark:bg-neutral-800 border border-blueprint-100 dark:border-neutral-700 hover:border-blueprint-300 dark:hover:border-neutral-500 rounded-md transition-colors';
                
                const nameBtn = document.createElement('button');
                nameBtn.className = 'text-[11px] font-semibold text-blueprint-900 dark:text-neutral-200 truncate hover:text-brand-blue text-left flex-1';
                nameBtn.innerText = key; nameBtn.onclick = () => { applyTemplateData(presets[key]); showToast(`Loaded "${key}"`, 'success'); };

                const actionsDiv = document.createElement('div'); actionsDiv.className = 'flex items-center gap-1 opacity-0 group-hover:opacity-100 shrink-0';

                const copyBtn = document.createElement('button'); copyBtn.className = 'w-6 h-6 flex items-center justify-center text-slate-400 hover:text-blueprint-900 dark:hover:text-neutral-200 hover:bg-slate-100 dark:hover:bg-neutral-700 rounded'; copyBtn.title = 'Copy JSON'; copyBtn.innerHTML = '<i class="ph-bold ph-copy"></i>'; copyBtn.onclick = () => { navigator.clipboard.writeText(JSON.stringify(presets[key], null, 2)).then(() => showToast('Copied!', 'success')); };
                const downloadBtn = document.createElement('button'); downloadBtn.className = 'w-6 h-6 flex items-center justify-center text-slate-400 hover:text-blueprint-900 dark:hover:text-neutral-200 hover:bg-slate-100 dark:hover:bg-neutral-700 rounded'; downloadBtn.title = 'Download'; downloadBtn.innerHTML = '<i class="ph-bold ph-download-simple"></i>'; downloadBtn.onclick = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(presets[key], null, 2)], {type: 'application/json'})); a.download = `preset_${key.replace(/\s+/g, '_')}.json`; a.click(); showToast('Downloaded', 'info'); };
                const delBtn = document.createElement('button'); delBtn.className = 'w-6 h-6 flex items-center justify-center text-slate-400 hover:text-brand-red hover:bg-red-50 dark:hover:bg-red-900/30 rounded'; delBtn.title = 'Delete'; delBtn.innerHTML = '<i class="ph-bold ph-trash"></i>'; delBtn.onclick = () => deletePresetFromStorage(key);

                actionsDiv.appendChild(copyBtn); actionsDiv.appendChild(downloadBtn); actionsDiv.appendChild(delBtn);
                itemDiv.appendChild(nameBtn); itemDiv.appendChild(actionsDiv); customPresetsList.appendChild(itemDiv);
            });
        }

        btnSavePreset.addEventListener('click', () => {
            const name = newPresetName.value.trim(); if (!name) return showToast('Enter name.', 'error');
            savePresetToStorage(name, getCurrentStateAsPreset()); newPresetName.value = '';
        });
        btnImportPreset.addEventListener('click', () => fileImportPreset.click());
        fileImportPreset.addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const presetData = JSON.parse(ev.target.result); let name = file.name.replace('.json', '');
                    if (presetData.type && presetData.csv !== undefined) { savePresetToStorage(name, presetData); applyTemplateData(presetData); } 
                    else { showToast('Invalid JSON format', 'error'); }
                } catch (err) { showToast('Failed to parse JSON', 'error'); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        const inputs = [uiTitle, uiSubtitle, uiSource, uiBgColor, uiTitleColor, uiTextColor];
        inputs.forEach(el => el.addEventListener('input', () => updateAndRender(false)));
        dataInput.addEventListener('input', () => updateAndRender(true));
        [uiShowTitle, uiShowSubtitle, uiShowSource, legendCheck, showGridCheck, uiShowXAxis, uiShowYAxis, uiShowValues].forEach(el => el.addEventListener('change', () => updateAndRender(false)));
        [uiTitleSize, uiSubtitleSize, uiSourceSize].forEach(el => el.addEventListener('input', () => updateAndRender(false)));
        [typeSelect, fontSelect, paletteSelect, formatSelect].forEach(el => el.addEventListener('change', () => updateAndRender(true)));
        
        durationSlider.addEventListener('input', (e) => { state.duration = parseFloat(e.target.value) * 1000; document.getElementById('duration-val').textContent = e.target.value + 's'; });
        glowSlider.addEventListener('input', (e) => { state.glow = parseInt(e.target.value); document.getElementById('glow-val').textContent = state.glow === 0 ? 'None' : (state.glow > 20 ? 'High' : 'Med'); renderFrame(state.progress); });
        zoomSlider.addEventListener('input', (e) => { state.zoom = parseFloat(e.target.value); document.getElementById('zoom-val').textContent = state.zoom.toFixed(1) + 'x'; renderFrame(state.progress); });
        panXSlider.addEventListener('input', (e) => { state.panX = parseInt(e.target.value); document.getElementById('pan-x-val').textContent = state.panX; renderFrame(state.progress); });
        panYSlider.addEventListener('input', (e) => { state.panY = parseInt(e.target.value); document.getElementById('pan-y-val').textContent = state.panY; renderFrame(state.progress); });

        btnResetView.addEventListener('click', () => {
            zoomSlider.value = 1.0; panXSlider.value = 0; panYSlider.value = 0; state.zoom = 1.0; state.panX = 0; state.panY = 0;
            document.getElementById('zoom-val').textContent = '1.0x'; document.getElementById('pan-x-val').textContent = '0'; document.getElementById('pan-y-val').textContent = '0';
            renderFrame(state.progress);
        });

        renderCustomPresets(); updateAndRender(true);

        const btnPreview = document.getElementById('btn-header-preview'); const btnExport = document.getElementById('btn-header-export');
        const exportFmt = document.getElementById('export-fmt'); const exportRes = document.getElementById('export-res');
        const transparentToggle = document.getElementById('header-transparent'); const overlay = document.getElementById('recording-overlay');
        const recordingText = document.getElementById('recording-text'); const iconPlay = document.getElementById('icon-play'); const textPlay = document.getElementById('text-play');

        btnPreview.addEventListener('click', () => { if (state.isRecording) return; if (state.isAnimating) { state.isAnimating = false; } else { runAnimation(); } });
        btnExport.addEventListener('click', async () => {
            if (state.isAnimating || state.isRecording) return;
            const fmt = exportFmt.value; const targetWidth = parseInt(exportRes.value); const exportScale = targetWidth / 1920;
            const isTransparent = transparentToggle.checked && (fmt === 'png' || fmt === 'gif'); 
            if (fmt === 'png') exportSnapshot(targetWidth, exportScale, isTransparent);
            else if (fmt === 'gif') exportGIF(targetWidth, exportScale, isTransparent);
            else exportVideo(targetWidth, exportScale);
        });

        function runAnimation() {
            state.isAnimating = true;
            btnPreview.classList.add('bg-red-100', 'dark:bg-red-900/30', 'text-brand-red', 'border-brand-red'); btnPreview.classList.remove('bg-white', 'dark:bg-neutral-800', 'text-blueprint-900', 'dark:text-neutral-100', 'border-blueprint-900', 'dark:border-neutral-600');
            iconPlay.classList.replace('ph-play-circle', 'ph-stop-circle'); textPlay.innerText = 'Stop'; btnExport.disabled = true;
            updateStateFromUI(false); 
            const startTime = performance.now(); const durationMs = state.duration;

            function animLoop(currentTime) {
                if (!state.isAnimating) { resetPreviewBtn(); return; }
                const elapsed = Math.max(0, currentTime - startTime);
                let p = durationMs > 0 ? elapsed / durationMs : 1.0; p = Math.max(0, Math.min(1, p));
                state.progress = p; renderFrame(p, canvas, 1.0, false);
                if (p < 1.0) requestAnimationFrame(animLoop); else { state.isAnimating = false; resetPreviewBtn(); }
            }
            requestAnimationFrame(animLoop);
        }

        function resetPreviewBtn() {
            btnPreview.classList.remove('bg-red-100', 'dark:bg-red-900/30', 'text-brand-red', 'border-brand-red'); btnPreview.classList.add('bg-white', 'dark:bg-neutral-800', 'text-blueprint-900', 'dark:text-neutral-100', 'border-blueprint-900', 'dark:border-neutral-600');
            iconPlay.classList.replace('ph-stop-circle', 'ph-play-circle'); textPlay.innerText = 'Preview'; btnExport.disabled = false;
        }

        function exportSnapshot(targetWidth, exportScale, isTransparent) {
            const expCanvas = document.createElement('canvas'); expCanvas.width = targetWidth; expCanvas.height = targetWidth * (1080/1920);
            updateStateFromUI(false); renderFrame(1.0, expCanvas, exportScale, isTransparent);
            const a = document.createElement('a'); a.href = expCanvas.toDataURL("image/png"); a.download = `editorial-chart-${targetWidth}w-${Date.now()}.png`; a.click();
            showToast('Snapshot exported!', 'success');
        }

        function exportGIF(targetWidth, exportScale, isTransparent) {
            if (!gifWorkerUrl) return showToast('GIF encoder initializing. Try again.', 'info');
            const targetHeight = targetWidth * (1080/1920); const expCanvas = document.createElement('canvas'); expCanvas.width = targetWidth; expCanvas.height = targetHeight;
            const eCtx = expCanvas.getContext('2d', { willReadFrequently: true });

            const gif = new GIF({ workers: 2, quality: 10, width: targetWidth, height: targetHeight, workerScript: gifWorkerUrl, transparent: isTransparent ? 'rgba(0,0,0,0)' : null });
            state.isRecording = true; btnPreview.disabled = true; btnExport.disabled = true;
            overlay.classList.remove('-translate-y-24'); overlay.classList.add('translate-y-4'); recordingText.innerText = 'Preparing GIF...';
            updateStateFromUI(false);
            
            const fps = 15; const totalFrames = Math.ceil((state.duration / 1000) * fps); let currentFrame = 0;

            function renderNextFrame() {
                if (!state.isRecording) return;
                let p = Math.max(0, Math.min(1, currentFrame / totalFrames)); state.progress = p;
                renderFrame(p, expCanvas, exportScale, isTransparent);
                gif.addFrame(eCtx, {copy: true, delay: 1000 / fps, dispose: isTransparent ? 2 : -1});
                renderFrame(p, canvas, 1.0, false);
                recordingText.innerText = `Rendering Frames ${Math.round((currentFrame / totalFrames) * 50)}%`;
                currentFrame++;
                if (currentFrame <= totalFrames) requestAnimationFrame(renderNextFrame); else { recordingText.innerText = `Encoding GIF...`; gif.render(); }
            }

            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.style.display = 'none'; a.href = url; a.download = `anim-${Date.now()}.gif`; document.body.appendChild(a); a.click(); setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
                overlay.classList.remove('translate-y-4'); overlay.classList.add('-translate-y-24'); state.isRecording = false; state.progress = 1.0;
                renderFrame(1.0, canvas, 1.0, false); btnPreview.disabled = false; btnExport.disabled = false; recordingText.innerText = 'Recording...'; showToast('GIF exported!', 'success');
            });
            renderNextFrame();
        }

        async function exportVideo(targetWidth, exportScale) {
            const targetHeight = targetWidth * (1080/1920); const expCanvas = document.createElement('canvas'); expCanvas.width = targetWidth; expCanvas.height = targetHeight;
            const adOverlay = document.getElementById('video-export-ad-overlay'); const adPct = document.getElementById('video-export-pct'); const adBar = document.getElementById('video-export-progress-bar');
            let mediaRecorder; let recordedChunks = []; state.isRecording = true;
            
            try {
                const stream = expCanvas.captureStream(60);
                let options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/webm;codecs=vp8' }; if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' }; }
                options.videoBitsPerSecond = 20000000; mediaRecorder = new MediaRecorder(stream, options);
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] }); const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.style.display = 'none'; a.href = url; a.download = `anim-${Date.now()}.webm`; document.body.appendChild(a); a.click(); setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
                    adOverlay.classList.remove('opacity-100'); setTimeout(() => adOverlay.classList.add('hidden'), 300);
                    overlay.classList.remove('translate-y-4'); overlay.classList.add('-translate-y-24'); state.isRecording = false; state.progress = 1.0;
                    renderFrame(1.0, canvas, 1.0, false); btnPreview.disabled = false; btnExport.disabled = false; recordingText.innerText = 'Recording...'; showToast('Video exported!', 'success');
                };

                adOverlay.classList.remove('hidden'); setTimeout(() => { adOverlay.classList.add('opacity-100'); try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {} }, 100);
                overlay.classList.remove('-translate-y-24'); overlay.classList.add('translate-y-4'); recordingText.innerText = 'Rendering Video...';

                mediaRecorder.start(); btnPreview.disabled = true; btnExport.disabled = true; updateStateFromUI(false);
                const startTime = performance.now(); const durationMs = state.duration;

                function animLoop(currentTime) {
                    if (!state.isRecording) return;
                    const elapsed = Math.max(0, currentTime - startTime); let p = Math.max(0, Math.min(1, durationMs > 0 ? elapsed / durationMs : 1.0)); state.progress = p;
                    renderFrame(p, expCanvas, exportScale, false); renderFrame(p, canvas, 1.0, false);
                    adPct.innerText = `Rendering Masterpiece: ${Math.round(p * 100)}%`; adBar.style.width = `${p * 100}%`;
                    if (p < 1.0) requestAnimationFrame(animLoop); else { recordingText.innerText = 'Finalizing...'; setTimeout(() => { if(mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }, 500); }
                }
                requestAnimationFrame(animLoop);
            } catch (err) {
                showToast('Recording failed.', 'error');
                adOverlay.classList.remove('opacity-100'); setTimeout(() => adOverlay.classList.add('hidden'), 300);
                overlay.classList.remove('translate-y-4'); overlay.classList.add('-translate-y-24'); state.isRecording = false; btnPreview.disabled = false; btnExport.disabled = false; renderFrame(1.0, canvas, 1.0, false);
            }
        }
    </script>
</body>
