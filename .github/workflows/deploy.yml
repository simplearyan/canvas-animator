name: Build and Deploy Animator Studio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-studio"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package.json'

      - name: Install Dependencies 📦
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev
          npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: "false"

      - name: Generate Build 🔨
        run: npm run build
        env:
          CI: true

      - name: Copy static assets to dist 📁
        run: |
          cp _demos/gallery-data.json dist/_demos/gallery-data.json
          mkdir -p dist/_demos/previews
          cp -r _demos/previews/. dist/_demos/previews/
          mkdir -p dist/about
          cp -r about/. dist/about/

      - name: Upload Artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
