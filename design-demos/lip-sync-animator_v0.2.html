<!DOCTYPE html>
<html lang="en" class="dark">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LipSync Animator - Cartoon Mouths</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            500: '#f59e0b', // Amber
                            600: '#d97706',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #475569;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Canvas checkerboard pattern for transparent look */
        #canvas-wrapper {
            background-color: #e2e8f0;
            background-image: 
                linear-gradient(45deg, #cbd5e1 25%, transparent 25%), 
                linear-gradient(-45deg, #cbd5e1 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #cbd5e1 75%), 
                linear-gradient(-45deg, transparent 75%, #cbd5e1 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .dark #canvas-wrapper {
            background-color: #0f172a;
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 sm:px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-2">

        </div>

        </div>
    </header>

    <!-- MAIN APP AREA -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Recording Overlay -->
        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-500 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-lg z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            Recording Animation...
        </div>

        <!-- TOOLBAR / SIDEBAR -->
        <aside class="w-full md:w-[420px] bg-white dark:bg-gray-800 border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-700 p-4 md:p-5 flex flex-col gap-5 overflow-y-auto z-10 flex-shrink-0 h-[50vh] md:h-full">
            
            <!-- Script Editor -->
            <div class="flex flex-col gap-2 flex-shrink-0">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Dialogue Script</h2>
                    <button id="load-sample" class="text-xs font-medium text-brand-500 hover:text-brand-600 transition">Load Sample</button>
                </div>
                <textarea id="script-input" class="w-full h-32 p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-sm font-mono focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none resize-none" spellcheck="false">Hello world! Welcome to the automatic lip sync animator.</textarea>
                
                <!-- Spoken Word Preview -->
                <div class="mt-1 bg-gray-100 dark:bg-gray-700 rounded p-2 flex items-center gap-2 overflow-hidden">
                    <i class="ph-fill ph-speaker-high text-gray-400"></i>
                    <span id="current-word" class="text-sm font-mono text-gray-800 dark:text-gray-200 truncate">Ready to speak...</span>
                </div>
            </div>

            <!-- Appearance Settings -->
            <div class="flex flex-col gap-4 flex-shrink-0">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Appearance & Timing</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Skin Color</label>
                        <div class="relative w-full h-8 rounded overflow-hidden border border-gray-300 dark:border-gray-600">
                            <input type="color" id="skin-color" value="#fca5a5" class="absolute -top-2 -left-2 w-20 h-20 cursor-pointer">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Mouth Interior</label>
                        <div class="relative w-full h-8 rounded overflow-hidden border border-gray-300 dark:border-gray-600">
                            <input type="color" id="mouth-color" value="#450a0a" class="absolute -top-2 -left-2 w-20 h-20 cursor-pointer">
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Tongue Color</label>
                        <div class="relative w-full h-8 rounded overflow-hidden border border-gray-300 dark:border-gray-600">
                            <input type="color" id="tongue-color" value="#ef4444" class="absolute -top-2 -left-2 w-20 h-20 cursor-pointer">
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-[11px] font-medium text-gray-700 dark:text-gray-300">Speech Speed</label>
                            <span id="speed-val" class="text-[10px] text-gray-500 font-mono">100ms/char</span>
                        </div>
                        <input type="range" id="speech-speed" min="40" max="250" step="10" value="100" class="w-full mt-2">
                        
                        <label class="flex items-center gap-2 mt-4 cursor-pointer">
                            <input type="checkbox" id="audio-preview" checked class="w-4 h-4 text-brand-500 rounded border-gray-300 focus:ring-brand-500">
                            <span class="text-[11px] font-medium text-gray-700 dark:text-gray-300">Audio Preview (TTS)</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Viseme Reference Guide -->
            <div class="flex flex-col gap-2 flex-1 mt-2">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Viseme Reference</h2>
                <div class="grid grid-cols-4 gap-2 text-center text-xs font-mono text-gray-600 dark:text-gray-400 overflow-y-auto">
                    <div class="bg-gray-100 dark:bg-gray-700 rounded py-2"><b class="block text-gray-900 dark:text-white">A, I</b>Wide</div>
                    <div class="bg-gray-100 dark:bg-gray-700 rounded py-2"><b class="block text-gray-900 dark:text-white">E, Y</b>Teeth</div>
                    <div class="bg-gray-100 dark:bg-gray-700 rounded py-2"><b class="block text-gray-900 dark:text-white">O</b>Round</div>
                    <div class="bg-gray-100 dark:bg-gray-700 rounded py-2"><b class="block text-gray-900 dark:text-white">U, W, R</b>Pucker</div>
                    <div class="bg-gray-100 dark:bg-gray-700 rounded py-2"><b class="block text-gray-900 dark:text-white">M, B, P</b>Closed</div>
                    <div class="bg-gray-100 dark:bg-gray-700 rounded py-2"><b class="block text-gray-900 dark:text-white">F, V</b>Bite</div>
                    <div class="bg-gray-100 dark:bg-gray-700 rounded py-2"><b class="block text-gray-900 dark:text-white">L, N</b>Tongue</div>
                    <div class="bg-gray-100 dark:bg-gray-700 rounded py-2"><b class="block text-gray-900 dark:text-white">T, S, C</b>Slight</div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mt-auto pt-4 pb-6 md:pb-0">
                <button id="btn-animate" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-gray-200 text-gray-900 dark:bg-gray-700 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg font-bold transition disabled:opacity-50">
                    <i class="ph-fill ph-play-circle text-xl"></i> Play Animation
                </button>
                <button id="btn-record" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-brand-500 hover:bg-brand-600 text-white rounded-lg font-bold transition shadow-md disabled:opacity-50 group">
                    <i class="ph-fill ph-video-camera text-xl text-yellow-200 group-hover:text-white transition"></i> Record & Export Video
                </button>
            </div>
        </aside>

        <!-- CANVAS AREA -->
        <section id="canvas-wrapper" class="flex-1 relative overflow-hidden flex items-center justify-center p-4 sm:p-8">
            <!-- 1:1 Canvas (Perfect for character faces) -->
            <canvas id="export-canvas" class="w-full max-w-[600px] aspect-square shadow-2xl rounded-2xl bg-white"></canvas>
            
            <!-- Manual Viseme Tester (Overlay at bottom) -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/90 dark:bg-gray-800/90 backdrop-blur px-4 py-2 rounded-full shadow-lg flex gap-2">
                <button class="viseme-test-btn px-2 py-1 text-sm font-bold rounded hover:bg-gray-200 dark:hover:bg-gray-700" data-v="REST">Rest</button>
                <button class="viseme-test-btn px-2 py-1 text-sm font-bold rounded hover:bg-gray-200 dark:hover:bg-gray-700" data-v="A">A</button>
                <button class="viseme-test-btn px-2 py-1 text-sm font-bold rounded hover:bg-gray-200 dark:hover:bg-gray-700" data-v="E">E</button>
                <button class="viseme-test-btn px-2 py-1 text-sm font-bold rounded hover:bg-gray-200 dark:hover:bg-gray-700" data-v="O">O</button>
                <button class="viseme-test-btn px-2 py-1 text-sm font-bold rounded hover:bg-gray-200 dark:hover:bg-gray-700" data-v="W">W</button>
                <button class="viseme-test-btn px-2 py-1 text-sm font-bold rounded hover:bg-gray-200 dark:hover:bg-gray-700" data-v="M">M</button>
                <button class="viseme-test-btn px-2 py-1 text-sm font-bold rounded hover:bg-gray-200 dark:hover:bg-gray-700" data-v="F">F</button>
                <button class="viseme-test-btn px-2 py-1 text-sm font-bold rounded hover:bg-gray-200 dark:hover:bg-gray-700" data-v="L">L</button>
                <button class="viseme-test-btn px-2 py-1 text-sm font-bold rounded hover:bg-gray-200 dark:hover:bg-gray-700" data-v="T">T</button>
            </div>
        </section>

    </main>

    <script>
        // --- App State ---
        const state = {
            currentViseme: 'REST',
            colors: {
                skin: '#fca5a5',
                mouth: '#450a0a',
                tongue: '#ef4444',
                teeth: '#ffffff',
                outline: '#171717'
            },
            speedMs: 100, // ms per character
            audioPreview: true,
            isAnimating: false,
            isRecording: false,
            timeline: [] // Array of { viseme, char, duration, startTime }
        };

        // --- Phoneme to Viseme Dictionary ---
        const phonemeMap = {
            'a': 'A', 'i': 'A',
            'e': 'E', 'y': 'E',
            'o': 'O',
            'u': 'W', 'w': 'W', 'r': 'W', 'q': 'W',
            'm': 'M', 'b': 'M', 'p': 'M',
            'f': 'F', 'v': 'F',
            'l': 'L', 'n': 'L',
            'c': 'T', 'd': 'T', 'g': 'T', 'k': 'T', 's': 'T', 't': 'T', 'x': 'T', 'z': 'T', 'j': 'T', 'h': 'T',
            ' ': 'REST', '.': 'REST', ',': 'REST', '!': 'REST', '?': 'REST'
        };

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // High-res square canvas
        canvas.width = 1000;
        canvas.height = 1000;

        // DOM Elements
        const scriptInput = document.getElementById('script-input');
        const speedSlider = document.getElementById('speech-speed');
        const audioPreviewCheck = document.getElementById('audio-preview');
        const colorSkin = document.getElementById('skin-color');
        const colorMouth = document.getElementById('mouth-color');
        const colorTongue = document.getElementById('tongue-color');
        const currentWordDisplay = document.getElementById('current-word');

        // --- Text Parser Engine ---
        function generateTimeline(text) {
            const timeline = [];
            let currentTime = 0;
            const chars = text.toLowerCase().split('');

            for (let i = 0; i < chars.length; i++) {
                const char = chars[i];
                let viseme = phonemeMap[char] || 'REST';
                
                // Base duration
                let duration = state.speedMs;

                // Adjust timing for punctuation to simulate pauses
                if (char === ' ') duration = state.speedMs * 1.5;
                if (['.', ',', '!', '?'].includes(char)) duration = state.speedMs * 4;

                timeline.push({
                    char: char,
                    viseme: viseme,
                    duration: duration,
                    startTime: currentTime
                });

                currentTime += duration;
            }

            // End with a resting frame
            timeline.push({ char: '', viseme: 'REST', duration: 500, startTime: currentTime });
            return { timeline, totalDuration: currentTime + 500 };
        }

        // --- Canvas Vector Drawing Engine ---
        function drawBackground() {
            ctx.fillStyle = state.colors.skin;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Standard mouth drawing configurations (Center is 0,0)
        function drawViseme(visemeType) {
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            
            // Global style defaults
            ctx.lineWidth = 14;
            ctx.strokeStyle = state.colors.outline;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            switch (visemeType) {
                case 'REST':
                case 'M':
                    // Closed, slight smile
                    ctx.beginPath();
                    ctx.moveTo(-120, 0);
                    ctx.quadraticCurveTo(0, 40, 120, 0);
                    ctx.stroke();
                    // Dimples
                    ctx.beginPath(); ctx.moveTo(-130, -15); ctx.quadraticCurveTo(-140, -5, -120, 15); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(130, -15); ctx.quadraticCurveTo(140, -5, 120, 15); ctx.stroke();
                    break;

                case 'A':
                    // Wide Open
                    ctx.fillStyle = state.colors.mouth;
                    ctx.beginPath();
                    ctx.moveTo(-140, -20);
                    ctx.quadraticCurveTo(0, 20, 140, -20); // Top lip
                    ctx.quadraticCurveTo(0, 200, -140, -20); // Bottom lip
                    ctx.fill();
                    ctx.stroke();

                    // Inner clip for tongue
                    ctx.save();
                    ctx.clip();
                    ctx.fillStyle = state.colors.tongue;
                    ctx.beginPath();
                    ctx.arc(0, 120, 80, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    break;

                case 'E':
                    // Wide, clenched teeth
                    ctx.fillStyle = state.colors.mouth;
                    ctx.beginPath();
                    ctx.moveTo(-160, -20);
                    ctx.quadraticCurveTo(0, 40, 160, -20);
                    ctx.quadraticCurveTo(0, 120, -160, -20);
                    ctx.fill();
                    ctx.stroke();

                    // Teeth
                    ctx.save();
                    ctx.clip();
                    ctx.fillStyle = state.colors.teeth;
                    // Top teeth
                    ctx.fillRect(-150, -20, 300, 35);
                    // Bottom teeth
                    ctx.fillRect(-150, 70, 300, 30);
                    // Teeth separation line
                    ctx.beginPath(); ctx.moveTo(-150, 15); ctx.lineTo(150, 15); ctx.lineWidth = 4; ctx.stroke();
                    ctx.restore();
                    break;

                case 'O':
                    // Tall Oval
                    ctx.fillStyle = state.colors.mouth;
                    ctx.beginPath();
                    ctx.ellipse(0, 40, 50, 80, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    break;

                case 'W':
                    // Small Pucker
                    ctx.fillStyle = state.colors.mouth;
                    ctx.beginPath();
                    ctx.ellipse(0, 40, 30, 35, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // Wrinkle lines
                    ctx.beginPath(); ctx.moveTo(-50, 40); ctx.lineTo(-70, 40); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(50, 40); ctx.lineTo(70, 40); ctx.stroke();
                    break;

                case 'T':
                    // Slight open, showing teeth
                    ctx.fillStyle = state.colors.mouth;
                    ctx.beginPath();
                    ctx.moveTo(-130, 0);
                    ctx.quadraticCurveTo(0, 30, 130, 0);
                    ctx.quadraticCurveTo(0, 60, -130, 0);
                    ctx.fill();
                    ctx.stroke();

                    ctx.save();
                    ctx.clip();
                    ctx.fillStyle = state.colors.teeth;
                    ctx.fillRect(-130, 0, 260, 25);
                    ctx.restore();
                    break;

                case 'L':
                    // Wide open, tongue at the roof
                    ctx.fillStyle = state.colors.mouth;
                    ctx.beginPath();
                    ctx.moveTo(-120, -10);
                    ctx.quadraticCurveTo(0, 30, 120, -10);
                    ctx.quadraticCurveTo(0, 140, -120, -10);
                    ctx.fill();
                    ctx.stroke();

                    ctx.save();
                    ctx.clip();
                    // Tongue hitting top
                    ctx.fillStyle = state.colors.tongue;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 80, 50, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#b91c1c'; // Darker red for tongue crease
                    ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.moveTo(0, 20); ctx.quadraticCurveTo(20, 0, 40, 20); ctx.stroke();
                    ctx.restore();
                    break;

                case 'F':
                    // Biting lower lip
                    ctx.fillStyle = state.colors.mouth;
                    ctx.beginPath();
                    ctx.moveTo(-100, -10);
                    ctx.quadraticCurveTo(0, 40, 100, -10);
                    ctx.quadraticCurveTo(0, 70, -100, -10);
                    ctx.fill();
                    ctx.stroke();

                    ctx.save();
                    ctx.clip();
                    // Top teeth coming down
                    ctx.fillStyle = state.colors.teeth;
                    ctx.fillRect(-100, -10, 200, 35);
                    // Indentation to look like teeth biting
                    ctx.beginPath();
                    ctx.moveTo(-60, 25); ctx.lineTo(-60, 40);
                    ctx.moveTo(-20, 25); ctx.lineTo(-20, 40);
                    ctx.moveTo(20, 25); ctx.lineTo(20, 40);
                    ctx.moveTo(60, 25); ctx.lineTo(60, 40);
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.restore();
                    
                    // Lower lip bulge
                    ctx.beginPath();
                    ctx.moveTo(-80, 50);
                    ctx.quadraticCurveTo(0, 100, 80, 50);
                    ctx.stroke();
                    break;
            }

            ctx.restore();
        }

        function renderFrame() {
            drawBackground();
            drawViseme(state.currentViseme);
        }

        // --- UI Interactions ---
        function updateColors() {
            state.colors.skin = colorSkin.value;
            state.colors.mouth = colorMouth.value;
            state.colors.tongue = colorTongue.value;
            renderFrame();
        }

        colorSkin.addEventListener('input', updateColors);
        colorMouth.addEventListener('input', updateColors);
        colorTongue.addEventListener('input', updateColors);

        speedSlider.addEventListener('input', (e) => {
            state.speedMs = parseInt(e.target.value);
            document.getElementById('speed-val').textContent = state.speedMs + 'ms/char';
        });

        audioPreviewCheck.addEventListener('change', (e) => {
            state.audioPreview = e.target.checked;
        });

        document.querySelectorAll('.viseme-test-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (state.isAnimating) return;
                state.currentViseme = e.target.getAttribute('data-v');
                currentWordDisplay.textContent = `Testing: ${state.currentViseme}`;
                renderFrame();
            });
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        document.getElementById('load-sample').addEventListener('click', () => {
            scriptInput.value = "Why did the developer go broke? Because he used up all his cache! Hahaha.";
        });

        // Initialize
        updateColors();

        // --- Animation & Recording Engine ---
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const overlay = document.getElementById('recording-overlay');

        async function runLipSync(recordCallback = null) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            const text = scriptInput.value.trim();
            if (!text) {
                state.isAnimating = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                return;
            }

            const { timeline, totalDuration } = generateTimeline(text);
            
            // Native TTS Audio Preview (Only during preview, not export)
            if (state.audioPreview && !recordCallback) {
                window.speechSynthesis.cancel(); // Stop any ongoing speech
                const utterance = new SpeechSynthesisUtterance(text);
                // Approximate sync: 100ms per char is roughly normal speed (rate = 1)
                utterance.rate = 100 / state.speedMs; 
                window.speechSynthesis.speak(utterance);
            }
            
            if (recordCallback) await recordCallback();

            const startTime = performance.now();

            return new Promise((resolve) => {
                function loop(currentTime) {
                    const elapsed = currentTime - startTime;

                    // Find the current viseme in the timeline
                    let activeFrame = timeline[timeline.length - 1]; // default to last
                    for (let i = 0; i < timeline.length; i++) {
                        if (elapsed >= timeline[i].startTime && elapsed < timeline[i].startTime + timeline[i].duration) {
                            activeFrame = timeline[i];
                            break;
                        }
                    }

                    if (state.currentViseme !== activeFrame.viseme) {
                        state.currentViseme = activeFrame.viseme;
                        renderFrame();
                        
                        // Update UI display
                        if (activeFrame.char) {
                            currentWordDisplay.innerHTML = `<span class="text-brand-500 font-bold text-lg mr-2">${activeFrame.char.toUpperCase()}</span> -> [${activeFrame.viseme}]`;
                        } else {
                            currentWordDisplay.textContent = "Resting...";
                        }
                    }

                    if (elapsed < totalDuration) {
                        requestAnimationFrame(loop);
                    } else {
                        state.currentViseme = 'REST';
                        renderFrame();
                        currentWordDisplay.textContent = "Finished.";
                        state.isAnimating = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        resolve();
                    }
                }
                requestAnimationFrame(loop);
            });
        }

        btnAnimate.addEventListener('click', () => runLipSync());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimating || state.isRecording) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                // High quality stream capture at 60fps
                const stream = canvas.captureStream(60);
                
                let options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm;codecs=vp8' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' };
                    }
                }

                options.videoBitsPerSecond = 5000000; // 5 Mbps

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `lipsync-animation.webm`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                };

                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');

                // Record: Hold first frame 0.5s, animate, hold last frame 1s
                state.currentViseme = 'REST';
                renderFrame();
                
                await new Promise(r => setTimeout(r, 500)); 
                mediaRecorder.start();
                
                await runLipSync();

                setTimeout(() => {
                    mediaRecorder.stop();
                }, 1000);

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                overlay.classList.remove('translate-y-4');
                overlay.classList.add('-translate-y-20');
                state.isAnimating = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                renderFrame();
            }
        });

    </script>
</body>
