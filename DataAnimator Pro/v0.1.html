<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DataAnimator Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { color-scheme: dark; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; 
            color: #ececf1;
            overflow: hidden;
            touch-action: none;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        .checker-bg {
            background-color: #0f172a;
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 24px 24px;
            background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }

        .tool-btn { transition: all 0.2s ease; border: 1px solid transparent; }
        .tool-btn.active {
            background-color: rgba(16, 185, 129, 0.2); 
            border-color: rgba(16, 185, 129, 0.5);
            color: #34d399; 
        }
        .tool-btn:hover:not(.active) { background-color: rgba(255, 255, 255, 0.05); }

        #scale-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 16px; 
        }

        #draw-canvas {
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 30px 60px -12px rgba(0,0,0,0.8);
            transform-origin: center center;
            will-change: transform;
            border-radius: 8px;
            background-color: #0f172a; /* Slate 900 base */
        }
    </style>
</head>
<body class="flex flex-col h-screen text-sm">

    <!-- macOS Glass Header -->
    <header class="absolute top-0 w-full h-14 bg-zinc-900/80 backdrop-blur-2xl border-b border-white/5 flex items-center justify-between px-4 sm:px-6 z-40">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-emerald-400 to-teal-600 flex items-center justify-center shadow-inner shadow-white/20">
                <i data-lucide="bar-chart-2" class="w-4 h-4 text-zinc-900"></i>
            </div>
            <h1 class="font-semibold tracking-tight whitespace-nowrap hidden sm:block text-zinc-100">DataAnimator <span class="text-zinc-500 font-normal">Pro</span></h1>
        </div>

        <div class="flex items-center gap-2 bg-black/40 p-1 rounded-xl ring-1 ring-white/10 shrink-0">
            <button onclick="resetAnimation()" class="px-3 py-1.5 rounded-lg text-zinc-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-2 text-xs font-medium" title="Reset Timeline">
                <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> <span class="hidden md:inline">Reset</span>
            </button>
        </div>

        <div class="flex items-center justify-end gap-3 shrink-0">
            <button onclick="togglePreview()" id="btn-play" class="flex items-center gap-2 px-3 py-1.5 bg-white/5 hover:bg-white/10 text-white rounded-lg font-medium transition-colors ring-1 ring-white/5 text-xs sm:text-sm shadow-sm">
                <i data-lucide="play" class="w-4 h-4" id="icon-play"></i>
                <span id="text-play" class="hidden sm:inline">Preview</span>
            </button>
            
            <div class="flex bg-emerald-600 rounded-lg shadow-lg shadow-emerald-600/20 ring-1 ring-inset ring-white/20 transition-all hover:bg-emerald-500">
                <select id="export-res" class="bg-transparent text-white font-medium pl-2 pr-1 py-1.5 outline-none cursor-pointer appearance-none text-xs border-r border-emerald-400/30 hidden sm:block">
                    <option value="1920" class="bg-zinc-800" selected>HD 1080p</option>
                    <option value="2560" class="bg-zinc-800">2K 1440p</option>
                    <option value="3840" class="bg-zinc-800">4K 2160p</option>
                </select>
                <button onclick="exportVideo()" id="btn-export" class="flex items-center gap-2 px-3 py-1.5 text-white font-medium transition-all rounded-r-lg text-xs sm:text-sm">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Export WebM</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex flex-1 pt-14 relative overflow-hidden flex-col md:flex-row">
        
        <!-- Left Sidebar: Controls -->
        <aside class="w-full md:w-80 flex-shrink-0 bg-zinc-900/60 backdrop-blur-3xl border-r border-white/5 z-30 h-[45%] md:h-full flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.5)] md:shadow-none order-2 md:order-1">
            
            <div class="p-5 overflow-y-auto space-y-6">
                
                <!-- Chart Type -->
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-3 flex items-center gap-1.5">
                        <i data-lucide="layout-template" class="w-3 h-3"></i> Chart Type
                    </label>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="tool-btn active py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border border-white/10 flex flex-col justify-center items-center gap-1.5" data-type="bar" onclick="setChartType('bar')">
                            <i data-lucide="bar-chart-horizontal" class="w-5 h-5"></i> <span>Bar Race</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border border-white/10 flex flex-col justify-center items-center gap-1.5" data-type="line" onclick="setChartType('line')">
                            <i data-lucide="line-chart" class="w-5 h-5"></i> <span>Line Race</span>
                        </button>
                    </div>
                </div>

                <div class="w-full h-px bg-white/5"></div>

                <!-- Data Templates -->
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-3 flex items-center gap-1.5">
                        <i data-lucide="database" class="w-3 h-3"></i> Real-World Data Templates
                    </label>
                    <select id="data-select" class="w-full bg-black/40 border border-white/10 rounded-lg text-sm text-zinc-200 px-3 py-2.5 outline-none focus:ring-1 focus:ring-emerald-400 appearance-none cursor-pointer" onchange="loadDataset(this.value)">
                        <option value="gdp">Top 10 Global GDP (2010 - 2024)</option>
                        <option value="tech">Tech Giants Revenue (2015 - 2023)</option>
                        <option value="pop">Most Populous Countries (1960 - 2020)</option>
                    </select>
                </div>

                <div class="w-full h-px bg-white/5"></div>

                <!-- Properties -->
                <div class="space-y-4">
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-1">Animation & Style</label>
                    
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium">Duration (Seconds)</span>
                            <span id="duration-val" class="text-xs text-emerald-400 font-bold">12s</span>
                        </div>
                        <input type="range" id="prop-duration" min="3" max="30" value="12" class="w-full accent-emerald-400" oninput="updateProp('duration', parseInt(this.value));">
                    </div>

                    <div id="prop-max-items-container">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium">Max Items to Show</span>
                            <span id="max-items-val" class="text-xs text-emerald-400 font-bold">10</span>
                        </div>
                        <input type="range" id="prop-max-items" min="3" max="15" value="10" class="w-full accent-emerald-400" oninput="updateProp('maxItems', parseInt(this.value));">
                    </div>
                </div>

            </div>
        </aside>

        <!-- Main Canvas Area -->
        <main class="flex-1 relative bg-zinc-950 checker-bg overflow-hidden order-1 md:order-2 flex items-center justify-center">
            
            <div id="scale-wrapper">
                <!-- Fixed Resolution 1080p Output Canvas -->
                <canvas id="draw-canvas" width="1920" height="1080"></canvas>
            </div>
            
            <div id="status-indicator" class="absolute top-6 right-6 flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/50 text-emerald-400 px-4 py-2.5 rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none backdrop-blur-md z-50">
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse" id="status-dot"></div>
                <span class="text-xs font-bold tracking-wide uppercase" id="status-text">Playing Sequence</span>
            </div>
        </main>
    </div>

    <!-- Export Loading Overlay -->
    <div id="export-loader" class="fixed inset-0 z-50 bg-black/80 hidden flex flex-col items-center justify-center transition-opacity opacity-0 backdrop-blur-sm">
        <div class="w-12 h-12 border-4 border-white/10 border-t-emerald-400 rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-bold text-white mb-2">Rendering WebM Video</h2>
        <p class="text-sm text-zinc-400 font-mono font-medium" id="rec-time">Processing 0%</p>
    </div>

    <!-- Toasts -->
    <div id="toast-container" class="fixed top-20 right-6 z-[60] flex flex-col gap-2 pointer-events-none"></div>

    <script>
        lucide.createIcons();

        // --- Datasets ---
        const datasets = {
            gdp: {
                title: "Top Global Economies (GDP in Billions)",
                unitPrefix: "$",
                unitSuffix: "B",
                labels: [2010, 2012, 2014, 2016, 2018, 2020, 2022, 2024],
                series: [
                    { name: "United States", color: "#3b82f6", data: [14992, 16155, 17427, 18707, 20580, 20936, 25462, 27360] },
                    { name: "China", color: "#ef4444", data: [6087, 8532, 10482, 11233, 13894, 14687, 17963, 17700] },
                    { name: "Japan", color: "#10b981", data: [5700, 6203, 4850, 4949, 5037, 5040, 4231, 4212] },
                    { name: "Germany", color: "#f59e0b", data: [3396, 3527, 3883, 3477, 3961, 3846, 4072, 4429] },
                    { name: "India", color: "#f97316", data: [1675, 1827, 2039, 2263, 2702, 2660, 3385, 3732] },
                    { name: "United Kingdom", color: "#8b5cf6", data: [2475, 2693, 3065, 2694, 2878, 2756, 3070, 3332] },
                    { name: "France", color: "#ec4899", data: [2642, 2683, 2852, 2471, 2787, 2630, 2782, 3049] },
                    { name: "Brazil", color: "#14b8a6", data: [2208, 2465, 2455, 1796, 1916, 1448, 1920, 2126] },
                    { name: "Italy", color: "#84cc16", data: [2129, 2073, 2155, 1877, 2091, 1893, 2010, 2186] },
                    { name: "Canada", color: "#6366f1", data: [1613, 1828, 1803, 1528, 1716, 1645, 2139, 2117] },
                    { name: "Russia", color: "#d946ef", data: [1524, 2208, 2059, 1276, 1657, 1488, 2240, 1862] },
                    { name: "South Korea", color: "#f43f5e", data: [1144, 1278, 1484, 1500, 1725, 1637, 1665, 1706] }
                ]
            },
            tech: {
                title: "Tech Giants Annual Revenue",
                unitPrefix: "$",
                unitSuffix: "B",
                labels: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023],
                series: [
                    { name: "Apple", color: "#a8a29e", data: [233, 215, 229, 265, 260, 274, 365, 394, 383] },
                    { name: "Amazon", color: "#f59e0b", data: [107, 135, 177, 232, 280, 386, 469, 513, 574] },
                    { name: "Alphabet", color: "#ef4444", data: [74, 90, 110, 136, 161, 182, 257, 282, 307] },
                    { name: "Microsoft", color: "#3b82f6", data: [93, 85, 89, 110, 125, 143, 168, 198, 211] },
                    { name: "Meta", color: "#06b6d4", data: [17, 27, 40, 55, 70, 85, 117, 116, 134] },
                    { name: "Tencent", color: "#10b981", data: [15, 21, 36, 47, 54, 73, 86, 82, 86] },
                    { name: "Nvidia", color: "#84cc16", data: [4, 5, 6, 9, 11, 10, 16, 26, 60] }
                ]
            },
            pop: {
                title: "Most Populous Countries (Millions)",
                unitPrefix: "",
                unitSuffix: "M",
                labels: [1960, 1970, 1980, 1990, 2000, 2010, 2020],
                series: [
                    { name: "China", color: "#ef4444", data: [667, 818, 981, 1135, 1262, 1337, 1411] },
                    { name: "India", color: "#f97316", data: [450, 555, 698, 873, 1056, 1234, 1396] },
                    { name: "United States", color: "#3b82f6", data: [180, 205, 227, 249, 282, 309, 331] },
                    { name: "Indonesia", color: "#10b981", data: [87, 114, 147, 181, 211, 241, 273] },
                    { name: "Pakistan", color: "#f59e0b", data: [44, 58, 78, 107, 142, 179, 227] },
                    { name: "Brazil", color: "#14b8a6", data: [72, 95, 121, 149, 174, 195, 213] },
                    { name: "Nigeria", color: "#8b5cf6", data: [45, 55, 73, 95, 122, 158, 208] },
                    { name: "Bangladesh", color: "#ec4899", data: [48, 65, 81, 103, 127, 147, 167] },
                    { name: "Russia", color: "#d946ef", data: [119, 130, 138, 147, 146, 142, 144] },
                    { name: "Mexico", color: "#84cc16", data: [37, 52, 67, 83, 97, 112, 128] }
                ]
            }
        };

        // --- Application State ---
        const state = {
            chartType: 'bar', // 'bar' or 'line'
            dataKey: 'gdp',
            duration: 12, // seconds
            maxItems: 10,
            
            isPlaying: false,
            isExporting: false,
            
            // Animation Engine
            playbackStartMs: 0,
            progress: 0, // 0.0 to 1.0
            
            // Smoothing State for perfect visuals
            renderState: {}, // Stores y-positions and scale maxes
            scaleMax: 0,
            
            mediaRecorder: null,
            recordedChunks: []
        };

        const canvas = document.getElementById('draw-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const W = canvas.width;
        const H = canvas.height;

        // --- Viewport Scaling ---
        function updateLayoutScale() {
            const wrapper = document.getElementById('scale-wrapper');
            const padding = 32; 
            const availW = wrapper.clientWidth - padding;
            const availH = wrapper.clientHeight - padding;
            const scale = Math.min(availW / W, availH / H, 1.0);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', updateLayoutScale);
        updateLayoutScale();

        // --- UI Updaters ---
        function setChartType(type) {
            state.chartType = type;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.type === type) btn.classList.add('active');
            });
            
            const maxItemsContainer = document.getElementById('prop-max-items-container');
            if (type === 'line') maxItemsContainer.style.opacity = '0.5';
            else maxItemsContainer.style.opacity = '1';

            resetAnimation();
        }

        function loadDataset(key) {
            state.dataKey = key;
            resetAnimation();
        }

        function updateProp(prop, val) {
            state[prop] = val;
            if (prop === 'duration') document.getElementById('duration-val').innerText = val + 's';
            if (prop === 'maxItems') document.getElementById('max-items-val').innerText = val;
            if (!state.isPlaying) renderScene(state.progress); 
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `bg-zinc-800/95 backdrop-blur-md text-white px-4 py-3 rounded-xl shadow-2xl ring-1 ring-white/10 flex items-center gap-3 transform transition-all -translate-y-4 opacity-0 z-50`;
            let icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-triangle' : 'info');
            let color = type === 'success' ? 'text-emerald-400' : (type === 'error' ? 'text-red-400' : 'text-sky-400');
            toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 ${color}"></i> <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast); lucide.createIcons();
            requestAnimationFrame(() => toast.classList.remove('-translate-y-4', 'opacity-0'));
            setTimeout(() => { toast.classList.add('-translate-y-4', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // --- Data Math & Interpolation ---
        function getInterpolatedData(progress) {
            const ds = datasets[state.dataKey];
            const numPoints = ds.labels.length;
            const floatIndex = progress * (numPoints - 1);
            const idx1 = Math.floor(floatIndex);
            const idx2 = Math.min(idx1 + 1, numPoints - 1);
            const fraction = floatIndex - idx1;

            const currentLabel = ds.labels[idx1] + (ds.labels[idx2] - ds.labels[idx1]) * fraction;
            
            const currentData = ds.series.map(s => {
                const val1 = s.data[idx1];
                const val2 = s.data[idx2];
                const currentVal = val1 + (val2 - val1) * fraction;
                return { name: s.name, color: s.color, value: currentVal, dataArr: s.data };
            });

            // Sort descending
            currentData.sort((a, b) => b.value - a.value);

            return { currentLabel, currentData, numPoints, floatIndex };
        }

        // --- Rendering Engine ---
        function roundRect(ctx, x, y, width, height, radius) {
            if (width < radius * 2) radius = width / 2;
            if (height < radius * 2) radius = height / 2;
            if (radius < 0) radius = 0;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.arcTo(x + width, y, x + width, y + height, radius);
            ctx.arcTo(x + width, y + height, x, y + height, radius);
            ctx.arcTo(x, y + height, x, y, radius);
            ctx.arcTo(x, y, x + width, y, radius);
            ctx.closePath();
            ctx.fill();
        }

        function renderScene(progress, timeDeltaMs = 16) {
            const ds = datasets[state.dataKey];
            const { currentLabel, currentData, floatIndex } = getInterpolatedData(progress);
            
            // Clear Background
            ctx.fillStyle = '#0f172a'; // Slate 900
            ctx.fillRect(0, 0, W, H);

            // Draw Background Year/Label
            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.font = 'bold 360px Inter, sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.fillText(Math.floor(currentLabel), W - 100, H - 100);
            ctx.restore();

            // Draw Title
            ctx.fillStyle = '#f8fafc';
            ctx.font = 'bold 48px Inter, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(ds.title, 100, 60);

            // Smooth Factor (frame-rate independent easing)
            // If timeDeltaMs is 0 (like seeking), snap immediately
            const smoothFactor = timeDeltaMs === 0 ? 1 : (1 - Math.exp(-0.015 * timeDeltaMs));

            if (state.chartType === 'bar') {
                renderBarRace(currentData, ds, smoothFactor);
            } else {
                renderLineRace(currentData, ds, floatIndex, smoothFactor);
            }
        }

        function renderBarRace(currentData, ds, smoothFactor) {
            const maxItems = state.maxItems;
            const margin = { top: 180, bottom: 80, left: 350, right: 250 };
            const drawW = W - margin.left - margin.right;
            const drawH = H - margin.top - margin.bottom;
            
            const barSpacing = drawH / maxItems;
            const barThickness = barSpacing * 0.75;

            // Determine Target Max Scale
            let targetMax = currentData.length > 0 ? currentData[0].value : 100;
            targetMax = Math.max(targetMax, 1); 
            state.scaleMax += (targetMax - state.scaleMax) * smoothFactor;
            
            // Draw Axis Lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin.left, margin.top - 20);
            ctx.lineTo(margin.left, H - margin.bottom + 20);
            ctx.stroke();

            // Draw Bars
            for (let i = 0; i < currentData.length; i++) {
                const item = currentData[i];
                if (!state.renderState[item.name]) {
                    // Initialize if unseen (start from bottom)
                    state.renderState[item.name] = { 
                        y: margin.top + (maxItems + 2) * barSpacing, 
                        val: item.value 
                    };
                }

                const s = state.renderState[item.name];
                const targetY = margin.top + i * barSpacing;
                
                // Smoothly update state
                s.y += (targetY - s.y) * smoothFactor;
                s.val += (item.value - s.val) * smoothFactor;

                // Culling: Don't render if completely off screen
                if (s.y > margin.top + maxItems * barSpacing + barThickness) continue;

                // Opacity fades out if it drops below rank
                let alpha = 1.0;
                if (s.y > margin.top + (maxItems - 1) * barSpacing) {
                    alpha = Math.max(0, 1 - (s.y - (margin.top + (maxItems - 1) * barSpacing)) / barSpacing);
                }

                ctx.save();
                ctx.globalAlpha = alpha;
                
                // Bar width
                let barW = (s.val / state.scaleMax) * drawW;
                barW = Math.max(barW, 2);

                // Draw Bar
                ctx.fillStyle = item.color;
                roundRect(ctx, margin.left, s.y, barW, barThickness, barThickness / 2);

                // Draw Name Label
                ctx.fillStyle = '#e2e8f0';
                ctx.font = 'bold 28px Inter, sans-serif';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.name, margin.left - 20, s.y + barThickness / 2 + 2);

                // Draw Value Label
                ctx.fillStyle = item.color; // Color matched value
                ctx.font = 'bold 28px Inter, sans-serif';
                ctx.textAlign = 'left';
                const displayVal = Math.round(s.val).toLocaleString();
                ctx.fillText(`${ds.unitPrefix}${displayVal}${ds.unitSuffix}`, margin.left + barW + 15, s.y + barThickness / 2 + 2);

                ctx.restore();
            }
        }

        function renderLineRace(currentData, ds, floatIndex, smoothFactor) {
            const margin = { top: 180, bottom: 120, left: 150, right: 300 };
            const drawW = W - margin.left - margin.right;
            const drawH = H - margin.top - margin.bottom;

            // X scale is determined purely by exact floatIndex across labels
            const numPoints = ds.labels.length;
            const getX = (idx) => margin.left + (idx / (numPoints - 1)) * drawW;

            // Determine Y Scale
            // Look ahead to the end to find global max, or dynamic max? 
            // Dynamic max is cooler.
            let targetMax = 0;
            currentData.forEach(s => { if (s.value > targetMax) targetMax = s.value; });
            targetMax = Math.max(targetMax, 1);
            state.scaleMax += (targetMax * 1.1 - state.scaleMax) * smoothFactor; 

            const getY = (val) => margin.top + drawH - (val / state.scaleMax) * drawH;

            // Draw Axes
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            // Y Axis
            ctx.moveTo(margin.left, margin.top);
            ctx.lineTo(margin.left, H - margin.bottom);
            // X Axis
            ctx.lineTo(W - margin.right, H - margin.bottom);
            ctx.stroke();

            // Draw X Axis Labels (Years)
            ctx.fillStyle = '#94a3b8';
            ctx.font = '20px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for(let i=0; i<numPoints; i++) {
                let x = getX(i);
                ctx.fillText(ds.labels[i], x, H - margin.bottom + 20);
                // Grid lines
                ctx.beginPath();
                ctx.moveTo(x, margin.top);
                ctx.lineTo(x, H - margin.bottom);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.stroke();
            }

            // To avoid clutter, only label top 8 in line race at the end
            let topN = currentData.slice(0, 8).map(d => d.name);

            // Draw Lines
            for (let i = 0; i < currentData.length; i++) {
                const item = currentData[i];
                if (!state.renderState[item.name]) {
                    state.renderState[item.name] = { labelY: getY(item.value) };
                }
                
                ctx.strokeStyle = item.color;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                
                let lastX, lastY;
                
                // Draw historical segments
                let completeSegments = Math.floor(floatIndex);
                for(let j=0; j <= completeSegments; j++) {
                    let x = getX(j);
                    let y = getY(item.dataArr[j]);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    lastX = x; lastY = y;
                }

                // Draw fraction segment
                if (completeSegments < numPoints - 1) {
                    const fraction = floatIndex - completeSegments;
                    const nextVal = item.dataArr[completeSegments + 1];
                    const curVal = item.dataArr[completeSegments];
                    const interpVal = curVal + (nextVal - curVal) * fraction;
                    
                    lastX = getX(floatIndex);
                    lastY = getY(interpVal);
                    ctx.lineTo(lastX, lastY);
                }

                ctx.stroke();

                // Draw Leading Dot
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.arc(lastX, lastY, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Draw Label (with simple collision avoidance / smoothing)
                if (topN.includes(item.name)) {
                    let s = state.renderState[item.name];
                    s.labelY += (lastY - s.labelY) * smoothFactor;
                    
                    ctx.fillStyle = item.color;
                    ctx.font = 'bold 24px Inter, sans-serif';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    const displayVal = Math.round(item.value).toLocaleString();
                    ctx.fillText(`${item.name} (${ds.unitPrefix}${displayVal}${ds.unitSuffix})`, lastX + 20, s.labelY);
                }
            }
        }

        // --- Playback Engine ---
        function setPlayUI(playing) {
            const btnPlay = document.getElementById('btn-play');
            const iconPlay = document.getElementById('icon-play');
            const textPlay = document.getElementById('text-play');
            const ind = document.getElementById('status-indicator');
            const txt = document.getElementById('status-text');

            document.querySelectorAll('button:not(#btn-play):not(#btn-export), input, select').forEach(b => b.disabled = playing);

            if (playing) {
                ind.classList.remove('opacity-0');
                if (state.isExporting) {
                    btnPlay.disabled = true;
                    ind.classList.replace('bg-emerald-500/10', 'bg-rose-500/10');
                    ind.classList.replace('border-emerald-500/50', 'border-rose-500/50');
                    ind.classList.replace('text-emerald-400', 'text-rose-400');
                    document.getElementById('status-dot').classList.replace('bg-emerald-400', 'bg-rose-400');
                    txt.innerText = 'Rendering Video...';
                } else {
                    btnPlay.classList.add('bg-white/5', 'text-zinc-400', 'ring-white/10');
                    btnPlay.classList.remove('bg-white/5', 'text-white', 'ring-white/5');
                    iconPlay.setAttribute('data-lucide', 'square');
                    textPlay.innerText = 'Stop';
                    txt.innerText = 'Playing Sequence';
                }
            } else {
                btnPlay.disabled = false;
                btnPlay.classList.remove('bg-white/5', 'text-zinc-400', 'ring-white/10');
                btnPlay.classList.add('bg-white/5', 'text-white', 'ring-white/5');
                iconPlay.setAttribute('data-lucide', 'play');
                textPlay.innerText = 'Preview';
                
                ind.classList.add('opacity-0');
                ind.classList.replace('bg-rose-500/10', 'bg-emerald-500/10');
                ind.classList.replace('border-rose-500/50', 'border-emerald-500/50');
                ind.classList.replace('text-rose-400', 'text-emerald-400');
                document.getElementById('status-dot').classList.replace('bg-rose-400', 'bg-emerald-400');
            }
            lucide.createIcons();
        }

        function resetAnimation() {
            state.progress = 0;
            state.renderState = {};
            state.scaleMax = 0;
            if (!state.isPlaying) renderScene(0, 0); // Snap 0
        }

        function togglePreview() {
            if (state.isPlaying) {
                stopPlayback();
                return;
            }

            if (state.progress >= 1.0) resetAnimation();

            state.isPlaying = true;
            setPlayUI(true);
            
            requestAnimationFrame((timestamp) => {
                // Compute offset so pausing/playing doesn't jump
                state.playbackStartMs = timestamp - (state.progress * state.duration * 1000);
                playbackLoop(timestamp, timestamp);
            });
        }

        function playbackLoop(timestamp, lastTimestamp) {
            if (!state.isPlaying) return;
            
            let timeDeltaMs = timestamp - lastTimestamp;
            let elapsedMs = timestamp - state.playbackStartMs; 
            
            state.progress = Math.min(1.0, elapsedMs / (state.duration * 1000));

            renderScene(state.progress, timeDeltaMs);

            if (state.isExporting) {
                let pct = Math.min(100, Math.round(state.progress * 100));
                document.getElementById('rec-time').innerText = `Processing ${pct}%`;
            }

            if (state.progress >= 1.0) {
                if (state.isExporting) {
                    document.getElementById('rec-time').innerText = `Finalizing File...`;
                    setTimeout(stopPlayback, 500); 
                } else {
                    stopPlayback();
                }
                return;
            }

            requestAnimationFrame((ts) => playbackLoop(ts, timestamp));
        }

        function stopPlayback() {
            state.isPlaying = false;
            if (state.isExporting) {
                if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
                    state.mediaRecorder.stop();
                }
                state.isExporting = false;
                document.getElementById('export-loader').classList.add('opacity-0');
                setTimeout(() => document.getElementById('export-loader').classList.add('hidden'), 300);
            }
            setPlayUI(false);
        }

        // --- Export Media Controller ---
        function exportVideo() {
            if (state.isPlaying || state.isExporting) return;

            try {
                const targetWidth = parseInt(document.getElementById('export-res').value);
                const aspect = H / W;
                const targetHeight = targetWidth * aspect;
                const exportScale = targetWidth / W;

                // Hidden export canvas
                const expCanvas = document.createElement('canvas');
                expCanvas.width = targetWidth;
                expCanvas.height = targetHeight;
                const eCtx = expCanvas.getContext('2d', { alpha: false });

                const stream = expCanvas.captureStream(60); 
                state.recordedChunks = [];
                
                state.mediaRecorder = new MediaRecorder(stream, { 
                    mimeType: 'video/webm; codecs=vp9',
                    videoBitsPerSecond: 20000000 
                });
                
                state.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) state.recordedChunks.push(e.data);
                };

                state.mediaRecorder.onstop = () => {
                    const blob = new Blob(state.recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `dataanimator-${state.chartType}-${targetWidth}w-${Date.now()}.webm`;
                    link.click();
                    URL.revokeObjectURL(url);
                    showToast('Video exported successfully!', 'success');
                };

                state.mediaRecorder.start();
                
                state.isPlaying = true;
                state.isExporting = true;
                setPlayUI(true);
                resetAnimation(); // Always start export from 0
                
                const loader = document.getElementById('export-loader');
                loader.classList.remove('hidden');
                requestAnimationFrame(() => loader.classList.remove('opacity-0'));

                const totalTimeMs = state.duration * 1000;
                let exportStartTime = performance.now();
                let lastExportTime = exportStartTime;
                
                function exportRenderLoop(now) {
                    let timeDeltaMs = now - lastExportTime;
                    lastExportTime = now;
                    let elapsedMs = now - exportStartTime;
                    
                    state.progress = Math.min(1.0, elapsedMs / totalTimeMs);

                    // Sync visual preview canvas
                    renderScene(state.progress, timeDeltaMs);
                    
                    // Render scaled frame to export canvas
                    eCtx.save();
                    eCtx.scale(exportScale, exportScale);
                    eCtx.drawImage(canvas, 0, 0);
                    eCtx.restore();

                    let pct = Math.min(100, Math.round(state.progress * 100));
                    document.getElementById('rec-time').innerText = `Processing WebM ${pct}%`;

                    if (state.progress < 1.0) {
                        requestAnimationFrame(exportRenderLoop);
                    } else {
                        document.getElementById('rec-time').innerText = `Finalizing File...`;
                        setTimeout(stopPlayback, 500); 
                    }
                }
                
                requestAnimationFrame(exportRenderLoop);

            } catch (err) {
                console.error(err);
                showToast('Export failed. Browser might not support high-res WebM recording.', 'error');
                stopPlayback();
            }
        }

        // Initial Paint
        resetAnimation();

    </script>
</body>
</html>
