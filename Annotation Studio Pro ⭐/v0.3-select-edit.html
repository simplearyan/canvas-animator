<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Annotation Studio Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { color-scheme: dark; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; /* Zinc 950 */
            color: #ececf1;
            overflow: hidden;
            touch-action: none; /* Prevents mobile scrolling while drawing */
            -webkit-font-smoothing: antialiased;
        }

        /* macOS style scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        .pattern-grid {
            background-size: 24px 24px;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
        }

        /* Photoshop-style Transparency Checkerboard */
        .checker-bg {
            background-color: #0f172a;
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 24px 24px;
            background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
        }

        /* Sleek Range Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }

        /* Color Picker Reset */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            padding: 0;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); }

        /* Tool Buttons */
        .tool-btn { transition: all 0.2s ease; border: 1px solid transparent; }
        .tool-btn.active {
            background-color: rgba(59, 130, 246, 0.2); /* Blue 500 w/ opacity */
            border-color: rgba(59, 130, 246, 0.5);
            color: #60a5fa; /* Blue 400 */
        }
        .tool-btn:hover:not(.active) { background-color: rgba(255, 255, 255, 0.05); }

        .gradient-btn { transition: transform 0.1s; }
        .gradient-btn:hover { transform: scale(1.05); }

        #scale-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0px; /* Minimized padding for larger canvas */
        }

        #draw-canvas {
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 30px 60px -12px rgba(0,0,0,0.8);
            transform-origin: center center;
            will-change: transform;
            border-radius: 8px;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .cursor-draw { cursor: crosshair; }
        .cursor-select { cursor: default; }
        .cursor-move { cursor: move; }

    </style>
</head>
<body class="flex flex-col h-screen text-sm">

    <!-- Glass Header -->
    <header class="absolute top-0 w-full h-14 bg-zinc-900/80 backdrop-blur-2xl border-b border-white/5 flex items-center justify-between px-4 sm:px-6 z-40">
        
        <!-- Logo -->
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-inner shadow-white/20">
                <i data-lucide="pen-tool" class="w-4 h-4 text-white"></i>
            </div>
            <h1 class="font-semibold tracking-tight whitespace-nowrap hidden sm:block text-zinc-100">Annotation <span class="text-zinc-500 font-normal">Studio Pro</span></h1>
        </div>

        <!-- Canvas Actions -->
        <div class="flex items-center gap-2 bg-black/40 p-1 rounded-xl ring-1 ring-white/10 shrink-0">
            <button onclick="undoLast()" class="px-3 py-1.5 rounded-lg text-zinc-400 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-2 text-xs font-medium" title="Undo Last Stroke">
                <i data-lucide="undo" class="w-3.5 h-3.5"></i> <span class="hidden md:inline">Undo</span>
            </button>
            <div class="w-px h-4 bg-white/10"></div>
            <button onclick="clearCanvas()" class="px-3 py-1.5 rounded-lg text-rose-400 hover:text-rose-300 hover:bg-rose-500/10 transition-colors flex items-center gap-2 text-xs font-medium" title="Clear All">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> <span class="hidden md:inline">Clear</span>
            </button>
        </div>

        <!-- Play & Export -->
        <div class="flex items-center justify-end gap-3 shrink-0">
            <button onclick="togglePreview()" id="btn-play" class="flex items-center gap-2 px-3 py-1.5 bg-white/5 hover:bg-white/10 text-white rounded-lg font-medium transition-colors ring-1 ring-white/5 text-xs sm:text-sm">
                <i data-lucide="play" class="w-4 h-4" id="icon-play"></i>
                <span id="text-play" class="hidden sm:inline">Preview</span>
            </button>
            
            <div class="flex bg-blue-600 rounded-lg shadow-lg shadow-blue-600/20 ring-1 ring-inset ring-white/20 transition-all hover:bg-blue-500">
                <select id="export-res" class="bg-transparent text-white font-medium pl-2 pr-1 py-1.5 outline-none cursor-pointer appearance-none text-xs border-r border-blue-400/30 hidden sm:block">
                    <option value="1920" class="bg-zinc-800" selected>HD 1080p</option>
                    <option value="2560" class="bg-zinc-800">2K 1440p</option>
                    <option value="3840" class="bg-zinc-800">4K 2160p</option>
                </select>
                <button onclick="exportVideo()" id="btn-export" class="flex items-center gap-2 px-3 py-1.5 text-white font-medium transition-all rounded-r-lg text-xs sm:text-sm">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Export WebM</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex flex-1 pt-14 relative overflow-hidden flex-col md:flex-row">
        
        <!-- Left Sidebar: Drawing Tools & Properties -->
        <aside class="w-full md:w-80 flex-shrink-0 bg-zinc-900/60 backdrop-blur-3xl border-r border-white/5 z-30 h-[45%] md:h-full flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.5)] md:shadow-none order-2 md:order-1">
            
            <div class="p-5 overflow-y-auto space-y-6">
                
                <!-- Annotation Tools -->
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-3 flex items-center gap-1.5">
                        <i data-lucide="pen-tool" class="w-3 h-3"></i> Workspace Tools
                    </label>
                    <div class="grid grid-cols-4 md:grid-cols-2 gap-2 mb-2">
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/40 border-white/10 flex justify-center items-center gap-1.5 col-span-full mb-1" data-tool="select" onclick="setTool('select')">
                            <i data-lucide="mouse-pointer-2" class="w-4 h-4"></i> Select & Edit
                        </button>
                        
                        <button class="tool-btn active py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/20 flex flex-col justify-center items-center gap-1.5" data-tool="arrow" onclick="setTool('arrow')">
                            <i data-lucide="arrow-up-right" class="w-5 h-5"></i> <span class="hidden md:inline">Arrow</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/20 flex flex-col justify-center items-center gap-1.5" data-tool="arc_arrow" onclick="setTool('arc_arrow')">
                            <i data-lucide="redo-2" class="w-5 h-5"></i> <span class="hidden md:inline">Arc Arrow</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/20 flex flex-col justify-center items-center gap-1.5" data-tool="rect" onclick="setTool('rect')">
                            <i data-lucide="square" class="w-5 h-5"></i> <span class="hidden md:inline">Rectangle</span>
                        </button>
                        <button class="tool-btn py-2.5 rounded-lg text-xs font-medium text-zinc-300 bg-black/20 flex flex-col justify-center items-center gap-1.5" data-tool="circle" onclick="setTool('circle')">
                            <i data-lucide="circle" class="w-5 h-5"></i> <span class="hidden md:inline">Circle</span>
                        </button>
                    </div>
                </div>

                <div class="w-full h-px bg-white/5"></div>

                <!-- Object Properties (Updates selected object if active) -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between mb-1">
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block">Shape Properties</label>
                        <span id="selection-badge" class="text-[9px] font-bold uppercase tracking-widest text-blue-400 bg-blue-500/10 px-2 py-0.5 rounded hidden">Editing</span>
                    </div>
                    
                    <!-- Color Presets & Custom Picker -->
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-zinc-300 hidden md:inline">Color</span>
                        <div class="flex-1 md:flex-none flex justify-between md:justify-end gap-2">
                            <button class="w-6 h-6 rounded-full bg-[#f43f5e] border border-white/20" onclick="updateProp('color', '#f43f5e')"></button>
                            <button class="w-6 h-6 rounded-full bg-[#3b82f6] border border-white/20" onclick="updateProp('color', '#3b82f6')"></button>
                            <button class="w-6 h-6 rounded-full bg-[#10b981] border border-white/20" onclick="updateProp('color', '#10b981')"></button>
                            <button class="w-6 h-6 rounded-full bg-[#f59e0b] border border-white/20" onclick="updateProp('color', '#f59e0b')"></button>
                            <button class="w-6 h-6 rounded-full bg-[#ffffff] border border-white/20" onclick="updateProp('color', '#ffffff')"></button>
                            
                            <!-- Custom Color Picker -->
                            <div class="relative w-6 h-6 rounded-full border border-white/20 bg-[url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAnv37v3/n0QciwZkR+BThM8wUshwQxgAYeAU/6+E4wYAAAAASUVORK5CYII=')] overflow-hidden cursor-pointer" title="Custom Color">
                                <input type="color" class="absolute w-full h-full opacity-0 inset-0 cursor-pointer" value="#f43f5e" id="prop-color" onchange="updateProp('color', this.value)" oninput="updateProp('color', this.value)">
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium">Thickness</span>
                            <span id="width-val" class="text-xs text-zinc-400 font-mono">8px</span>
                        </div>
                        <input type="range" id="prop-width" min="2" max="30" value="8" class="w-full accent-blue-500" oninput="updateProp('width', parseInt(this.value)); document.getElementById('width-val').innerText = this.value + 'px';">
                    </div>

                    <!-- Curvature Slider (Dynamic) -->
                    <div id="curve-panel" class="hidden pt-2">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium text-blue-300">Arc Curvature</span>
                            <span id="bend-val" class="text-xs text-zinc-400 font-mono">30%</span>
                        </div>
                        <input type="range" id="prop-bend" min="-100" max="100" value="30" class="w-full accent-blue-400" oninput="updateProp('bend', parseInt(this.value)); document.getElementById('bend-val').innerText = this.value + '%';">
                    </div>

                    <!-- Delete Selected -->
                    <button id="btn-delete" onclick="deleteSelected()" class="w-full mt-2 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg text-xs font-bold transition-colors hidden border border-red-500/20 flex items-center justify-center gap-2">
                        <i data-lucide="trash" class="w-3.5 h-3.5"></i> Delete Shape
                    </button>
                </div>

                <div class="w-full h-px bg-white/5"></div>

                <!-- Canvas Background Customization -->
                <div class="bg-white/5 rounded-2xl p-4 ring-1 ring-white/5 space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block">Canvas Background</label>
                        <label class="flex items-center gap-1.5 cursor-pointer text-[10px] text-zinc-400 hover:text-white transition-colors" title="Export as transparent WebM">
                            <input type="checkbox" id="bg-transparent-toggle" class="accent-blue-500 w-3 h-3" onchange="state.bgTransparent = this.checked; renderScene();"> Transparent
                        </label>
                    </div>
                    <div class="grid grid-cols-6 gap-2">
                        <button class="gradient-btn w-full aspect-square rounded-lg shadow-sm border border-white/10" style="background: #18181b;" onclick="setBgColor('#18181b')"></button>
                        <button class="gradient-btn w-full aspect-square rounded-lg shadow-sm border border-white/10" style="background: #ffffff;" onclick="setBgColor('#ffffff')"></button>
                        <button class="gradient-btn w-full aspect-square rounded-lg shadow-sm border border-white/10" style="background: #2dd4bf;" onclick="setBgColor('#2dd4bf')"></button>
                        <button class="gradient-btn w-full aspect-square rounded-lg shadow-sm border border-white/10" style="background: #ef4444;" onclick="setBgColor('#ef4444')"></button>
                        <button class="gradient-btn w-full aspect-square rounded-lg shadow-sm border border-white/10" style="background: #8b5cf6;" onclick="setBgColor('#8b5cf6')"></button>
                        
                        <!-- Custom BG Color Picker -->
                        <div class="relative w-full aspect-square rounded-lg shadow-sm border border-white/10 bg-[url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAnv37v3/n0QciwZkR+BThM8wUshwQxgAYeAU/6+E4wYAAAAASUVORK5CYII=')] overflow-hidden cursor-pointer col-span-1">
                             <input type="color" class="absolute opacity-0 w-full h-full inset-0 cursor-pointer" onchange="setBgColor(this.value)" oninput="setBgColor(this.value)">
                             <div class="absolute inset-0 flex items-center justify-center pointer-events-none text-[10px] font-bold text-white drop-shadow-md">
                                 <i data-lucide="palette" class="w-4 h-4"></i>
                             </div>
                        </div>
                    </div>
                </div>

                <!-- Animation Engine settings -->
                <div class="space-y-4">
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest block mb-1">Timing Engine</label>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-zinc-300 font-medium">Draw Duration</span>
                            <span id="dur-val" class="text-xs text-blue-400 font-bold">1.0s</span>
                        </div>
                        <input type="range" min="0.2" max="3.0" step="0.1" value="1.0" class="w-full accent-blue-500" oninput="state.animDuration = parseFloat(this.value); document.getElementById('dur-val').innerText = parseFloat(this.value).toFixed(1) + 's';">
                        <p class="text-[10px] text-zinc-500 mt-2 leading-relaxed">New shapes will automatically sequence after the previous ones finish drawing.</p>
                    </div>
                </div>

            </div>
        </aside>

        <!-- Main Canvas Area -->
        <main class="flex-1 relative bg-zinc-950 pattern-grid overflow-hidden order-1 md:order-2 flex items-center justify-center">
            
            <div id="scale-wrapper" class="checker-bg">
                <canvas id="draw-canvas" width="1920" height="1080" class="cursor-draw"></canvas>
            </div>
            
            <div id="status-indicator" class="absolute top-6 right-6 flex items-center gap-2 bg-blue-500/10 border border-blue-500/50 text-blue-400 px-4 py-2.5 rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none backdrop-blur-md z-50">
                <div class="w-2 h-2 rounded-full bg-blue-400 animate-pulse" id="status-dot"></div>
                <span class="text-xs font-bold tracking-wide uppercase" id="status-text">Playing Sequence</span>
            </div>
        </main>
    </div>

    <!-- Export Loading Overlay -->
    <div id="export-loader" class="fixed inset-0 z-50 bg-black/80 hidden flex flex-col items-center justify-center transition-opacity opacity-0 backdrop-blur-sm">
        <div class="w-12 h-12 border-4 border-white/10 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-bold text-white mb-2">Rendering WebM Video</h2>
        <p class="text-sm text-zinc-400 font-mono font-medium" id="rec-time">Processing 0%</p>
    </div>

    <!-- Toasts -->
    <div id="toast-container" class="fixed top-20 right-6 z-[60] flex flex-col gap-2 pointer-events-none"></div>

    <script>
        lucide.createIcons();

        // --- Application State ---
        const state = {
            tool: 'arrow', // 'select', 'rect', 'circle', 'ellipse', 'arrow', 'arc_arrow'
            
            // Global Defaults
            strokeColor: '#f43f5e',
            strokeWidth: 8,
            arcBend: 0.3, // 30%
            animDuration: 1.0, 
            
            bgTransparent: false,
            bgColor: '#18181b', // Zinc 900
            
            // Interaction Engine
            selectedShapeId: null,
            isDragging: false,
            lastDragPos: {x: 0, y: 0},
            currentShape: null,
            shapes: [], 
            
            // Timeline Engine
            timelineCursor: 0, 
            
            // Playback & Export Engine
            isPlaying: false,
            isExporting: false,
            playbackStartTime: 0,
            
            mediaRecorder: null,
            recordedChunks: []
        };

        const canvas = document.getElementById('draw-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // --- Viewport Scaling ---
        function updateLayoutScale() {
            const wrapper = document.getElementById('scale-wrapper');
            const padding = 0; // Maximized view
            const availW = wrapper.clientWidth - padding;
            const availH = wrapper.clientHeight - padding;

            const logicalW = 1920;
            const logicalH = 1080;

            const scale = Math.min(availW / logicalW, availH / logicalH, 1.0);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', updateLayoutScale);
        updateLayoutScale();

        // --- UI Updaters ---
        function setTool(tool) {
            state.tool = tool;
            state.selectedShapeId = null; // Clear selection on tool change
            syncUI();
            
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.tool === tool) btn.classList.add('active');
            });
            
            if (tool === 'select') canvas.className = 'cursor-select';
            else canvas.className = 'cursor-draw';
            
            renderScene();
        }

        function updateProp(prop, val) {
            if (state.selectedShapeId) {
                const shape = state.shapes.find(s => s.id === state.selectedShapeId);
                if (shape) {
                    if (prop === 'color') shape.color = val;
                    if (prop === 'width') shape.width = val;
                    if (prop === 'bend') shape.bend = val / 100;
                    renderScene();
                }
            } else {
                // Update global defaults if nothing selected
                if (prop === 'color') { state.strokeColor = val; document.getElementById('prop-color').value = val; }
                if (prop === 'width') { state.strokeWidth = val; }
                if (prop === 'bend') { state.arcBend = val / 100; }
            }
            
            // Sync Arc Panel visibility globally if drawing an arc
            if (!state.selectedShapeId) syncUI(); 
        }

        function deleteSelected() {
            if (state.selectedShapeId) {
                state.shapes = state.shapes.filter(s => s.id !== state.selectedShapeId);
                state.selectedShapeId = null;
                
                // Recalculate timeline cursor
                state.timelineCursor = 0;
                state.shapes.forEach(s => {
                    s.startTime = state.timelineCursor;
                    state.timelineCursor += s.duration;
                });
                
                syncUI();
                renderScene();
                showToast('Shape deleted', 'success');
            }
        }

        function syncUI() {
            const badge = document.getElementById('selection-badge');
            const btnDel = document.getElementById('btn-delete');
            const curvePnl = document.getElementById('curve-panel');
            
            if (state.selectedShapeId) {
                badge.classList.remove('hidden');
                btnDel.classList.remove('hidden');
                
                const shape = state.shapes.find(s => s.id === state.selectedShapeId);
                if (shape) {
                    document.getElementById('prop-color').value = shape.color;
                    document.getElementById('prop-width').value = shape.width;
                    document.getElementById('width-val').innerText = shape.width + 'px';
                    
                    if (shape.type === 'arc_arrow') {
                        curvePnl.classList.remove('hidden');
                        document.getElementById('prop-bend').value = Math.round((shape.bend || 0.3) * 100);
                        document.getElementById('bend-val').innerText = Math.round((shape.bend || 0.3) * 100) + '%';
                    } else {
                        curvePnl.classList.add('hidden');
                    }
                }
            } else {
                badge.classList.add('hidden');
                btnDel.classList.add('hidden');
                
                document.getElementById('prop-color').value = state.strokeColor;
                document.getElementById('prop-width').value = state.strokeWidth;
                document.getElementById('width-val').innerText = state.strokeWidth + 'px';
                
                if (state.tool === 'arc_arrow') {
                    curvePnl.classList.remove('hidden');
                    document.getElementById('prop-bend').value = Math.round(state.arcBend * 100);
                    document.getElementById('bend-val').innerText = Math.round(state.arcBend * 100) + '%';
                } else {
                    curvePnl.classList.add('hidden');
                }
            }
        }
        
        function setBgColor(hex) {
            state.bgTransparent = false;
            state.bgColor = hex;
            document.getElementById('bg-transparent-toggle').checked = false;
            renderScene();
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `bg-zinc-800/95 backdrop-blur-md text-white px-4 py-3 rounded-xl shadow-2xl ring-1 ring-white/10 flex items-center gap-3 transform transition-all -translate-y-4 opacity-0 z-50`;
            let icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-triangle' : 'info');
            let color = type === 'success' ? 'text-emerald-400' : (type === 'error' ? 'text-rose-400' : 'text-blue-400');
            toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 ${color}"></i> <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast); lucide.createIcons();
            requestAnimationFrame(() => toast.classList.remove('-translate-y-4', 'opacity-0'));
            setTimeout(() => { toast.classList.add('-translate-y-4', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // --- Mathematics & Hit Testing ---

        function easeOutQuart(x) { return 1 - Math.pow(1 - x, 4); }

        function drawArrowHead(ctx, x, y, angle, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.moveTo(-size, -size * 0.7);
            ctx.lineTo(0, 0);
            ctx.lineTo(-size, size * 0.7);
            ctx.stroke();
            ctx.restore();
        }

        function getShapeBounds(shape) {
            const pad = Math.max(20, shape.width * 2); // Generous padding for easier clicking
            let minX = Math.min(shape.startX, shape.endX) - pad;
            let maxX = Math.max(shape.startX, shape.endX) + pad;
            let minY = Math.min(shape.startY, shape.endY) - pad;
            let maxY = Math.max(shape.startY, shape.endY) + pad;

            if (shape.type === 'arc_arrow') {
                const ext = Math.abs(shape.bend || 0.3) * Math.hypot(shape.endX-shape.startX, shape.endY-shape.startY);
                minX -= ext; maxX += ext;
                minY -= ext; maxY += ext;
            }
            return {minX, maxX, minY, maxY};
        }

        function hitTest(x, y) {
            for (let i = state.shapes.length - 1; i >= 0; i--) {
                const b = getShapeBounds(state.shapes[i]);
                if (x >= b.minX && x <= b.maxX && y >= b.minY && y <= b.maxY) {
                    return state.shapes[i].id;
                }
            }
            return null;
        }

        // Core Render Function for a single shape based on 'progress' (0 to 1)
        function drawShape(ctx, shape, progress) {
            if (progress <= 0) return;

            const p = easeOutQuart(Math.min(1, progress));

            ctx.beginPath();
            ctx.strokeStyle = shape.color;
            ctx.lineWidth = shape.width;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 4;

            if (shape.type === 'rect') {
                const w = shape.endX - shape.startX;
                const h = shape.endY - shape.startY;
                const perimeter = 2 * (Math.abs(w) + Math.abs(h));
                ctx.setLineDash([perimeter]);
                ctx.lineDashOffset = perimeter * (1 - p);
                ctx.strokeRect(shape.startX, shape.startY, w, h);
                ctx.setLineDash([]); 
            } 
            else if (shape.type === 'circle' || shape.type === 'ellipse') {
                const rx = Math.abs(shape.endX - shape.startX) / 2;
                const ry = Math.abs(shape.endY - shape.startY) / 2;
                const cx = shape.startX + (shape.endX - shape.startX) / 2;
                const cy = shape.startY + (shape.endY - shape.startY) / 2;
                
                let radiusX = rx, radiusY = ry;
                if (shape.type === 'circle') {
                    const r = Math.max(rx, ry);
                    radiusX = r; radiusY = r;
                }

                ctx.ellipse(cx, cy, radiusX, radiusY, 0, 0, 2 * Math.PI * p);
                ctx.stroke();
            } 
            else if (shape.type === 'line' || shape.type === 'arrow') {
                const curX = shape.startX + (shape.endX - shape.startX) * p;
                const curY = shape.startY + (shape.endY - shape.startY) * p;
                
                ctx.moveTo(shape.startX, shape.startY);
                ctx.lineTo(curX, curY);
                ctx.stroke();

                if (shape.type === 'arrow' && p > 0.05) {
                    const angle = Math.atan2(shape.endY - shape.startY, shape.endX - shape.startX);
                    drawArrowHead(ctx, curX, curY, angle, shape.width * 2.5);
                }
            }
            else if (shape.type === 'arc_arrow') {
                const dx = shape.endX - shape.startX;
                const dy = shape.endY - shape.startY;
                const midX = shape.startX + dx/2;
                const midY = shape.startY + dy/2;
                
                let nx = -dy; let ny = dx;
                const len = Math.hypot(nx, ny);
                if (len > 0) { nx /= len; ny /= len; }
                
                const bendAmount = shape.bend !== undefined ? shape.bend : 0.3;
                const bendPixels = len * bendAmount; 
                const cpX = midX + nx * bendPixels;
                const cpY = midY + ny * bendPixels;

                const steps = 50;
                const targetStep = Math.max(1, Math.floor(steps * p));
                
                ctx.moveTo(shape.startX, shape.startY);
                let curX = shape.startX, curY = shape.startY;
                
                for (let i = 1; i <= targetStep; i++) {
                    const t = i / steps;
                    const u = 1 - t;
                    curX = u*u*shape.startX + 2*u*t*cpX + t*t*shape.endX;
                    curY = u*u*shape.startY + 2*u*t*cpY + t*t*shape.endY;
                    ctx.lineTo(curX, curY);
                }
                ctx.stroke();

                if (p > 0.05) {
                    const t = p; const u = 1 - t;
                    const dX = 2*u*(cpX - shape.startX) + 2*t*(shape.endX - cpX);
                    const dY = 2*u*(cpY - shape.startY) + 2*t*(shape.endY - cpY);
                    drawArrowHead(ctx, curX, curY, Math.atan2(dY, dX), shape.width * 2.5);
                }
            }
            
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            
            // Draw Selection Highlight
            if (state.selectedShapeId === shape.id && !state.isPlaying && !state.isExporting) {
                const b = getShapeBounds(shape);
                ctx.save();
                ctx.strokeStyle = '#60a5fa'; // Blue 400
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 8]);
                ctx.strokeRect(b.minX, b.minY, b.maxX - b.minX, b.maxY - b.minY);
                ctx.restore();
            }
        }

        function renderScene(forcedTime = null) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!state.bgTransparent) {
                ctx.fillStyle = state.bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            state.shapes.forEach(shape => {
                let progress = 1; 
                if (state.isPlaying && forcedTime !== null) {
                    progress = (forcedTime - shape.startTime) / shape.duration;
                }
                drawShape(ctx, shape, progress);
            });

            if (state.isDragging && state.currentShape && state.tool !== 'select') {
                drawShape(ctx, state.currentShape, 1.0); 
            }
        }

        // --- Interaction Engine ---
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('pointerdown', (e) => {
            if (state.isPlaying || state.isExporting) return;
            e.preventDefault();
            
            const pos = getMousePos(e);
            
            if (state.tool === 'select') {
                const hitId = hitTest(pos.x, pos.y);
                state.selectedShapeId = hitId;
                syncUI();
                renderScene();
                
                if (hitId) {
                    state.isDragging = true;
                    state.lastDragPos = pos;
                    canvas.setPointerCapture(e.pointerId);
                }
                return;
            }

            state.selectedShapeId = null; // Deselect when drawing new shape
            syncUI();
            
            state.isDragging = true;
            canvas.setPointerCapture(e.pointerId);

            state.currentShape = {
                id: Date.now() + Math.random(),
                type: state.tool,
                color: state.strokeColor,
                width: state.strokeWidth,
                bend: state.arcBend,
                startX: pos.x,
                startY: pos.y,
                endX: pos.x,
                endY: pos.y,
                startTime: state.timelineCursor,
                duration: state.animDuration
            };
            renderScene();
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!state.isDragging || state.isPlaying) return;
            e.preventDefault();
            const pos = getMousePos(e);
            
            if (state.tool === 'select' && state.selectedShapeId) {
                const shape = state.shapes.find(s => s.id === state.selectedShapeId);
                if (shape) {
                    const dx = pos.x - state.lastDragPos.x;
                    const dy = pos.y - state.lastDragPos.y;
                    shape.startX += dx;
                    shape.endX += dx;
                    shape.startY += dy;
                    shape.endY += dy;
                    state.lastDragPos = pos;
                    renderScene();
                }
            } else if (state.tool !== 'select' && state.currentShape) {
                state.currentShape.endX = pos.x;
                state.currentShape.endY = pos.y;
                renderScene();
            }
        });

        canvas.addEventListener('pointerup', (e) => {
            if (!state.isDragging || state.isPlaying) return;
            state.isDragging = false;
            canvas.releasePointerCapture(e.pointerId);
            
            if (state.tool !== 'select' && state.currentShape) {
                const dx = Math.abs(state.currentShape.endX - state.currentShape.startX);
                const dy = Math.abs(state.currentShape.endY - state.currentShape.startY);
                
                if (dx > 10 || dy > 10) {
                    state.shapes.push({...state.currentShape});
                    state.timelineCursor += state.animDuration;
                    
                    // Auto-select newly created shape
                    state.selectedShapeId = state.currentShape.id;
                    syncUI();
                }
                state.currentShape = null;
            }
            renderScene();
        });

        function clearCanvas() {
            if (state.isPlaying || state.isExporting) return;
            state.shapes = [];
            state.timelineCursor = 0;
            state.selectedShapeId = null;
            syncUI();
            renderScene();
            showToast('Canvas cleared', 'success');
        }

        function undoLast() {
            if (state.isPlaying || state.isExporting) return;
            if (state.shapes.length > 0) {
                const removed = state.shapes.pop();
                state.timelineCursor = Math.max(0, state.timelineCursor - removed.duration);
                if (state.selectedShapeId === removed.id) {
                    state.selectedShapeId = null;
                    syncUI();
                }
                renderScene();
            }
        }

        // --- Playback & Export Engine ---
        function setPlayUI(playing) {
            const btnPlay = document.getElementById('btn-play');
            const iconPlay = document.getElementById('icon-play');
            const textPlay = document.getElementById('text-play');
            const ind = document.getElementById('status-indicator');
            const txt = document.getElementById('status-text');

            document.querySelectorAll('button:not(#btn-play):not(#btn-export), input, select').forEach(b => b.disabled = playing);

            if (playing) {
                ind.classList.remove('opacity-0');
                if (state.isExporting) {
                    btnPlay.disabled = true;
                    ind.classList.replace('bg-blue-500/10', 'bg-rose-500/10');
                    ind.classList.replace('border-blue-500/50', 'border-rose-500/50');
                    ind.classList.replace('text-blue-400', 'text-rose-400');
                    document.getElementById('status-dot').classList.replace('bg-blue-400', 'bg-rose-400');
                    txt.innerText = 'Rendering Video...';
                } else {
                    btnPlay.classList.add('bg-white/5', 'text-zinc-400', 'ring-white/10');
                    btnPlay.classList.remove('bg-white/5', 'text-white', 'ring-white/5');
                    iconPlay.setAttribute('data-lucide', 'square');
                    textPlay.innerText = 'Stop';
                    txt.innerText = 'Playing Sequence';
                }
            } else {
                btnPlay.disabled = false;
                btnPlay.classList.remove('bg-white/5', 'text-zinc-400', 'ring-white/10');
                btnPlay.classList.add('bg-white/5', 'text-white', 'ring-white/5');
                iconPlay.setAttribute('data-lucide', 'play');
                textPlay.innerText = 'Preview';
                
                ind.classList.add('opacity-0');
                
                ind.classList.replace('bg-rose-500/10', 'bg-blue-500/10');
                ind.classList.replace('border-rose-500/50', 'border-blue-500/50');
                ind.classList.replace('text-rose-400', 'text-blue-400');
                document.getElementById('status-dot').classList.replace('bg-rose-400', 'bg-blue-400');
            }
            lucide.createIcons();
        }

        function togglePreview() {
            if (state.isPlaying) {
                stopPlayback();
                return;
            }
            if (state.shapes.length === 0) return showToast('Draw annotations first!', 'error');

            state.isPlaying = true;
            setPlayUI(true);
            
            requestAnimationFrame((timestamp) => {
                state.playbackStartTime = timestamp;
                playbackLoop(timestamp);
            });
        }

        function playbackLoop(timestamp) {
            if (!state.isPlaying) return;
            
            let elapsed = (timestamp - state.playbackStartTime) / 1000; 
            let totalTime = state.timelineCursor + 1.0; 

            renderScene(elapsed);

            if (state.isExporting) {
                let pct = Math.min(100, Math.round((elapsed / totalTime) * 100));
                document.getElementById('rec-time').innerText = `Processing ${pct}%`;
            }

            if (elapsed >= totalTime) {
                if (state.isExporting) {
                    document.getElementById('rec-time').innerText = `Finalizing File...`;
                    setTimeout(stopPlayback, 500); 
                } else {
                    stopPlayback();
                }
                return;
            }

            requestAnimationFrame(playbackLoop);
        }

        function stopPlayback() {
            state.isPlaying = false;
            if (state.isExporting && state.mediaRecorder) {
                if (state.mediaRecorder.state !== 'inactive') state.mediaRecorder.stop();
                state.isExporting = false;
                document.getElementById('export-loader').classList.add('opacity-0');
                setTimeout(() => document.getElementById('export-loader').classList.add('hidden'), 300);
            }
            setPlayUI(false);
            renderScene(); 
        }

        function exportVideo() {
            if (state.shapes.length === 0) return showToast('Draw annotations first!', 'error');
            if (state.isPlaying || state.isExporting) return;

            try {
                const targetWidth = parseInt(document.getElementById('export-res').value);
                const aspect = 1080 / 1920;
                const targetHeight = targetWidth * aspect;

                const expCanvas = document.createElement('canvas');
                expCanvas.width = targetWidth;
                expCanvas.height = targetHeight;
                const eCtx = expCanvas.getContext('2d');
                
                const exportScale = targetWidth / 1920;

                const stream = expCanvas.captureStream(60); 
                state.recordedChunks = [];
                
                state.mediaRecorder = new MediaRecorder(stream, { 
                    mimeType: 'video/webm; codecs=vp9',
                    videoBitsPerSecond: 20000000 
                });
                
                state.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) state.recordedChunks.push(e.data);
                };

                state.mediaRecorder.onstop = () => {
                    const blob = new Blob(state.recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    
                    const bgStatus = state.bgTransparent ? 'transparent' : 'solid';
                    link.download = `annotation-pro-${targetWidth}w-${bgStatus}-${Date.now()}.webm`;
                    
                    link.click();
                    URL.revokeObjectURL(url);
                    showToast('Video exported successfully!', 'success');
                };

                state.mediaRecorder.start();
                
                state.isPlaying = true;
                state.isExporting = true;
                setPlayUI(true);
                
                const loader = document.getElementById('export-loader');
                loader.classList.remove('hidden');
                requestAnimationFrame(() => loader.classList.remove('opacity-0'));

                const totalTime = state.timelineCursor + 1.0;
                let exportStartTime = performance.now();
                
                function exportRenderLoop(now) {
                    let elapsed = (now - exportStartTime) / 1000;
                    
                    eCtx.clearRect(0, 0, targetWidth, targetHeight);
                    if (!state.bgTransparent) {
                        eCtx.fillStyle = state.bgColor;
                        eCtx.fillRect(0, 0, targetWidth, targetHeight);
                    }

                    eCtx.save();
                    eCtx.scale(exportScale, exportScale);
                    state.shapes.forEach(shape => {
                        let progress = 1;
                        if (elapsed < shape.startTime + shape.duration) {
                            progress = Math.max(0, (elapsed - shape.startTime) / shape.duration);
                        }
                        drawShape(eCtx, shape, progress);
                    });
                    eCtx.restore();

                    renderScene(elapsed);

                    let pct = Math.min(100, Math.round((elapsed / totalTime) * 100));
                    document.getElementById('rec-time').innerText = `Processing ${pct}%`;

                    if (elapsed < totalTime) {
                        requestAnimationFrame(exportRenderLoop);
                    } else {
                        document.getElementById('rec-time').innerText = `Finalizing File...`;
                        setTimeout(stopPlayback, 500); 
                    }
                }
                
                requestAnimationFrame(exportRenderLoop);

            } catch (err) {
                console.error(err);
                showToast('Export failed. Browser might not support high-res WebM recording.', 'error');
                stopPlayback();
            }
        }

        syncUI();
        renderScene();

    </script>
</body>
</html>
