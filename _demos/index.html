<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Animator | Presets Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #111827;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }
        .preset-card {
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }
        .preset-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #d1d5db;
        }
        .video-container {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #f3f4f6;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transition: opacity 0.3s;
        }
        .preset-card:hover video {
            opacity: 1;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <!-- Header -->
    <header class="max-w-7xl mx-auto mb-16">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4">
            Free motion <br>graphics templates
        </h1>
        <p class="text-lg md:text-xl text-gray-500 max-w-2xl leading-relaxed">
            Create professional animations in no time with our collection of free, fully customizable motion design templates.
        </p>
    </header>

    <!-- Gallery -->
    <main class="max-w-7xl mx-auto">
        <div id="gallery" class="gallery-grid">
            <!-- Items injected via JS -->
            <div class="animate-pulse flex flex-col gap-4">
                <div class="aspect-video bg-gray-200 rounded-xl"></div>
                <div class="h-4 bg-gray-200 w-1/2 rounded"></div>
            </div>
            <div class="animate-pulse flex flex-col gap-4">
                <div class="aspect-video bg-gray-200 rounded-xl"></div>
                <div class="h-4 bg-gray-200 w-1/2 rounded"></div>
            </div>
            <div class="animate-pulse flex flex-col gap-4">
                <div class="aspect-video bg-gray-200 rounded-xl"></div>
                <div class="h-4 bg-gray-200 w-1/2 rounded"></div>
            </div>
        </div>
    </main>

    <script>
        async function loadGallery() {
            try {
                const response = await fetch('gallery-data.json');
                const items = await response.json();
                const container = document.getElementById('gallery');
                container.innerHTML = '';

                items.forEach(item => {
                    const card = document.createElement('a');
                    card.href = item.file;
                    card.className = 'preset-card group';
                    
                    card.innerHTML = `
                        <div class="video-container">
                            <video 
                                src="${item.preview}" 
                                muted 
                                loop 
                                playsinline
                                onmouseover="this.play()" 
                                onmouseout="this.pause(); this.currentTime = 0;"
                            ></video>
                        </div>
                        <div class="p-5">
                            <h3 class="text-lg font-bold group-hover:text-blue-600 transition-colors">${item.title}</h3>
                            <p class="text-sm text-gray-400 mt-1 uppercase tracking-wider font-semibold">${item.width}x${item.height}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error('Failed to load gallery data:', e);
                document.getElementById('gallery').innerHTML = `
                    <div class="col-span-full py-20 text-center border-2 border-dashed border-gray-200 rounded-2xl">
                        <p class="text-gray-400 font-medium">No presets found. Run <code class="bg-gray-100 px-2 py-1 rounded">node automate.js</code> to generate previews.</p>
                    </div>
                `;
            }
        }

        loadGallery();
    </script>
</body>
</html>
