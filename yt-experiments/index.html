        /* Hide Scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        body { transition: background-color 0.2s ease, color 0.2s ease; overscroll-behavior-y: none; }

        .chip-scroll::-webkit-scrollbar { display: none; }
        
        .video-container {
            aspect-ratio: 16/9;
            background: transparent;
            border-radius: 16px;
            position: relative;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            background: transparent;
            transition: border-radius 0.3s;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }
        
        .duration-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 12px;
            font-weight: 500;
            padding: 1px 4px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .preset-card {
            position: relative;
            z-index: 1;
            border-radius: 16px;
        }
        .preset-card::before {
            content: '';
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            background-color: var(--ambient-color, #f0f0f0);
            border-radius: 20px;
            z-index: -1;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.3s cubic-bezier(0.2, 0, 0, 1), transform 0.3s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .dark .preset-card::before {
            background-color: var(--ambient-color-dark, #272727);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .preset-card:hover {
            z-index: 10;
        }
        .preset-card:hover::before {
            opacity: 1;
            transform: scale(1);
        }
        
        /* Grid Layout matching YouTube */
        .yt-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px 24px;
        }
        @media (min-width: 640px) { .yt-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .yt-grid { grid-template-columns: repeat(3, 1fr); } }

        @media (max-width: 639px) { .main-content-pt { padding-top: 120px; } }

    <script>
        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
        });

        // --- Sidebar Toggle Logic ---
        const menuToggleBtn = document.getElementById('menu-toggle');
        const fullSidebar = document.getElementById('full-sidebar');
        const miniSidebar = document.getElementById('mini-sidebar');
        const mainContent = document.getElementById('main-content');
        const filterBar = document.getElementById('filter-bar');
        
        // Create an overlay for the tablet off-canvas drawer
        const overlay = document.createElement('div');
        overlay.className = 'fixed inset-0 top-14 bg-black/50 z-[45] hidden xl:hidden cursor-pointer transition-opacity';
        document.body.appendChild(overlay);

        menuToggleBtn.addEventListener('click', () => {
            if (window.innerWidth >= 1280) { // xl breakpoint
                // Desktop: Toggle between full and mini sidebar classes
                fullSidebar.classList.toggle('xl:flex');
                miniSidebar.classList.toggle('xl:hidden');
                mainContent.classList.toggle('xl:ml-[240px]');
                filterBar.classList.toggle('xl:left-[240px]');
                
                // Ensure hidden class state makes sense
                if (fullSidebar.classList.contains('xl:flex')) {
                    fullSidebar.classList.remove('hidden');
                } else {
                    fullSidebar.classList.add('hidden');
                }
            } else {
                // Tablet: Toggle off-canvas drawer
                if (fullSidebar.classList.contains('hidden') || !fullSidebar.classList.contains('flex')) {
                    fullSidebar.classList.remove('hidden');
                    fullSidebar.classList.add('flex', 'shadow-2xl');
                    overlay.classList.remove('hidden');
                    document.body.style.overflow = 'hidden'; // Stop background scrolling
                } else {
                    closeDrawer();
                }
            }
        });

        function closeDrawer() {
            if (window.innerWidth < 1280) {
                fullSidebar.classList.add('hidden');
                fullSidebar.classList.remove('flex', 'shadow-2xl');
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        overlay.addEventListener('click', closeDrawer);

        // Reset drawer state on window resize to avoid visual bugs
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1280) {
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
                fullSidebar.classList.remove('flex', 'shadow-2xl');
                
                if (!fullSidebar.classList.contains('xl:flex')) {
                    fullSidebar.classList.add('hidden');
                } else {
                    fullSidebar.classList.remove('hidden');
                }
            } else {
                if (!overlay.classList.contains('hidden')) {
                     fullSidebar.classList.remove('hidden');
                     fullSidebar.classList.add('flex', 'shadow-2xl');
                }
            }
        });

        // --- Smart Scroll for Mobile Navbar and Header ---
        let lastScrollY = window.scrollY;
        const mainHeader = document.getElementById('main-header');
        const bottomNav = document.getElementById('bottom-nav');

        window.addEventListener('scroll', () => {
            // Only apply this logic for mobile screens (Tailwind 'sm' breakpoint is 640px)
            if (window.innerWidth >= 640) return;

            const currentScrollY = window.scrollY;

            // Address iOS Safari rubber-band effect at the top of the page
            if (currentScrollY <= 0) {
                mainHeader.style.transform = 'translateY(0)';
                filterBar.style.transform = 'translateY(0)';
                bottomNav.style.transform = 'translateY(0)';
                lastScrollY = currentScrollY;
                return;
            }

            // Scrolling down and past a 50px threshold
            if (currentScrollY > lastScrollY && currentScrollY > 50) {
                mainHeader.style.transform = 'translateY(-100%)';
                // Move the filter bar up by 56px (the height of the h-14 header) so there is no gap
                filterBar.style.transform = 'translateY(-56px)'; 
                bottomNav.style.transform = 'translateY(100%)';
            } else {
                // Scrolling up
                mainHeader.style.transform = 'translateY(0)';
                filterBar.style.transform = 'translateY(0)';
                bottomNav.style.transform = 'translateY(0)';
            }

            lastScrollY = currentScrollY;
        }, { passive: true });

        // Ensure everything is visible if window is resized back to desktop size
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 640) {
                mainHeader.style.transform = 'translateY(0)';
                filterBar.style.transform = 'translateY(0)';
                bottomNav.style.transform = 'translateY(0)';
            }
        });

        // Gallery Logic
        let allItems = [];
        let verticalItems = [];
        let layoutConfig = { layout: [], config: { columns: 3 } };
        let gallerySettings = { playMode: 'hover' };

        async function loadGallery() {
            try {
                const [galleryResponse, verticalResponse, layoutResponse] = await Promise.all([
                    fetch('gallery-data.json'),
                    fetch('vertical-data.json'),
                    fetch('layout-config.json')
                ]);
                
                if (!galleryResponse.ok) throw new Error(`HTTP ${galleryResponse.status}`);
                
                const data = await galleryResponse.json();
                const verticalData = verticalResponse.ok ? await verticalResponse.json() : { items: [] };
                layoutConfig = layoutResponse.ok ? await layoutResponse.json() : { layout: [], config: { columns: 3 } };
                
                allItems = data.items || [];
                verticalItems = verticalData.items || [];
                gallerySettings = data.settings || { playMode: 'hover' };
                renderGallery(allItems);
            } catch (e) {
                document.getElementById('gallery').innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i class="ph ph-warning-circle text-4xl text-yt-textSecondaryLight dark:text-yt-textSecondaryDark mb-2"></i>
                        <h2 class="text-lg font-medium mb-1">No videos found</h2>
                        <p class="text-sm text-yt-textSecondaryLight dark:text-yt-textSecondaryDark">Run node automate.js to generate gallery previews.</p>
                    </div>`;
            }
        }

        function renderGallery(items) {
            const container = document.getElementById('gallery');
            container.innerHTML = '';
            
            if (!items.length) {
                container.innerHTML = '<div class="col-span-full py-20 text-center text-sm text-yt-textSecondaryLight dark:text-yt-textSecondaryDark">No matching results found.</div>';
                return;
            }
            
            const ambientColorsDark = ['#3e2a22', '#1a2b3c', '#2a3c2a', '#3c1a2b', '#2c2c2c', '#3a3a1c'];
            const ambientColorsLight = ['#f5e6e1', '#e1ebf5', '#e6f5e1', '#f5e1eb', '#f0f0f0', '#f5f5e1'];

            const renderAdCard = () => {
                const adCard = document.createElement('div');
                adCard.className = 'preset-card flex flex-col gap-3 relative';
                adCard.innerHTML = `
                    <div class="video-container overflow-hidden flex items-center justify-center bg-gray-100 dark:bg-[#181818] border border-yt-borderLight dark:border-yt-borderDark">
                        <span class="absolute text-yt-textSecondaryLight dark:text-yt-textSecondaryDark text-xs font-medium tracking-widest z-0 pointer-events-none">ADVERTISEMENT</span>
                        <ins class="adsbygoogle relative z-10" style="display:block; width:100%; height:100%;" data-ad-client="ca-pub-7993314093599705" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>
                    </div>
                    <div class="flex gap-3 pr-6">
                        <div class="w-9 h-9 rounded-full bg-yt-light dark:bg-yt-dark flex items-center justify-center text-yt-textSecondaryLight dark:text-yt-textSecondaryDark flex-shrink-0 mt-0.5"><i class="ph-bold ph-megaphone text-lg"></i></div>
                        <div class="flex flex-col w-full">
                            <h3 class="text-sm sm:text-base font-medium text-black dark:text-white line-clamp-2 leading-snug mb-1">Special Offer</h3>
                            <div class="flex items-center mb-2">
                                <span class="text-[12px] font-bold text-black dark:text-white">Sponsored</span>
                                <span class="text-[12px] text-yt-textSecondaryLight dark:text-yt-textSecondaryDark mx-1">•</span>
                                <span class="text-[12px] text-yt-textSecondaryLight dark:text-yt-textSecondaryDark">Google AdSense</span>
                            </div>
                            <button class="w-full bg-blue-50 hover:bg-blue-100 dark:bg-blue-900/30 dark:hover:bg-blue-900/50 text-blue-600 dark:text-blue-400 font-medium text-sm py-1.5 rounded-full transition-colors mt-1">Learn More</button>
                        </div>
                    </div>`;
                container.appendChild(adCard);
                try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
            };

            const renderShortsRow = () => {
                const shortsRow = document.createElement('div');
                shortsRow.style.gridColumn = '1 / -1';
                shortsRow.className = 'w-full my-8 flex flex-col gap-4 border-t border-b border-yt-borderLight dark:border-yt-borderDark py-6';
                let shortsCardsHTML = '';
                verticalItems.forEach((short, i) => {
                    const darkColor = ambientColorsDark[i % ambientColorsDark.length];
                    const lightColor = ambientColorsLight[i % ambientColorsLight.length];
                    shortsCardsHTML += `
                        <a href="#" class="preset-card flex-shrink-0 flex flex-col gap-3 snap-start group cursor-pointer w-[240px] sm:w-[260px] md:w-[280px] lg:w-[calc((100%-4rem)/5)]" style="--ambient-color-dark: ${darkColor}; --ambient-color: ${lightColor};">
                            <div class="relative w-full aspect-[9/16] bg-transparent rounded-2xl flex items-center justify-center">
                                <video src="${short.file}#t=0.1" preload="metadata" muted loop playsinline onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0.1" class="h-full w-full object-cover rounded-2xl transition-transform duration-300" style="transform: translateZ(0); -webkit-transform: translateZ(0);"></video>
                            </div>
                            <div class="w-full px-1 relative z-10">
                                <h3 class="text-sm sm:text-base font-medium text-black dark:text-white line-clamp-2 leading-snug transition-colors">${short.title}</h3>
                                <span class="text-xs text-yt-textSecondaryLight dark:text-yt-textSecondaryDark mt-0.5 block">${short.views}</span>
                            </div>
                        </a>`;
                });
                shortsRow.innerHTML = `
                    <div class="flex items-center gap-2 px-1 mb-2">
                        <i class="ph-fill ph-rocket-launch text-2xl text-purple-500"></i>
                        <h2 class="text-xl font-bold text-black dark:text-white tracking-tight">Made for Socials</h2>
                    </div>
                    <div class="flex gap-4 overflow-x-auto no-scrollbar py-6 px-4 -mx-4 snap-x snap-mandatory scroll-smooth" style="scroll-padding-left: 1rem;">${shortsCardsHTML}</div>`;
                container.appendChild(shortsRow);
            };

            const renderProStudiosRow = () => {
                if (!gallerySettings.showProStudios) return;
                const studiosRow = document.createElement('div');
                studiosRow.style.gridColumn = '1 / -1';
                studiosRow.className = 'w-full mt-4 mb-12 flex flex-col gap-4 py-6 relative';
                const mockStudios = [
                    { file: 'mock-animation/16-9/annotation-pro-2560w-solid-1777291438316.webm', title: 'Macify Lens Studio', desc: '3D Camera & Scene Builder' },
                    { file: 'mock-animation/16-9/editorial-chart.webm', title: 'FocusFrame Engine', desc: 'Smart Motion Tracking' },
                    { file: 'mock-animation/16-9/editorial-chart (1).webm', title: 'Mixamo 3D Studio', desc: 'Character Animation' },
                    { file: 'mock-animation/16-9/editorial-chart (2).webm', title: 'IITM Annotator', desc: 'Interactive Touch Canvas' },
                    { file: 'mock-animation/9-16/cinematic-motion-1080p-1777356376987.webm', title: 'Title Animator', desc: 'Kinetic Typography' }
                ];
                let studioCardsHTML = '';
                mockStudios.forEach((studio, i) => {
                    const darkColor = ambientColorsDark[(i+3) % ambientColorsDark.length];
                    const lightColor = ambientColorsLight[(i+3) % ambientColorsLight.length];
                    studioCardsHTML += `
                        <a href="#" class="preset-card flex-shrink-0 flex flex-col gap-3 snap-start group cursor-pointer w-[240px] sm:w-[260px] md:w-[280px] lg:w-[calc((100%-4rem)/5)]" style="--ambient-color-dark: ${darkColor}; --ambient-color: ${lightColor};">
                            <div class="relative w-full aspect-[4/5] bg-gray-100 dark:bg-[#1f1f1f] rounded-2xl flex flex-col items-center justify-between p-1.5 border border-yt-borderLight dark:border-yt-borderDark overflow-hidden transition-all duration-300">
                                <video src="${studio.file}#t=0.1" preload="metadata" muted loop playsinline onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0.1" class="absolute inset-0 w-full h-full object-cover z-0 transition-transform duration-500 group-hover:scale-105" style="transform: translateZ(0); -webkit-transform: translateZ(0);"></video>
                                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent z-10 pointer-events-none"></div>
                                <div class="w-full flex justify-between relative z-20 px-1 pt-1"><span class="bg-black/60 backdrop-blur-md text-white text-[10px] font-bold px-2 py-1 rounded-sm uppercase tracking-wide border border-white/10 shadow-sm">Pro</span></div>
                                <div class="w-full relative z-20 mt-auto px-1 pb-1"><div class="w-full bg-white text-[#0f0f0f] hover:bg-gray-100 text-sm font-bold py-2 rounded-full text-center transition-transform duration-300 shadow-md">Launch</div></div>
                            </div>
                            <div class="w-full px-1 relative z-10 flex justify-between items-start">
                                <div class="flex flex-col"><h3 class="text-sm sm:text-base font-medium text-black dark:text-white line-clamp-1 leading-snug transition-colors">${studio.title}</h3><span class="text-[12px] text-yt-textSecondaryLight dark:text-yt-textSecondaryDark mt-0.5 block">${studio.desc}</span></div>
                                <button class="text-yt-textSecondaryLight dark:text-yt-textSecondaryDark hover:text-black dark:hover:text-white p-1 -mt-1"><i class="ph-bold ph-dots-three-vertical"></i></button>
                            </div>
                        </a>`;
                });
                studiosRow.innerHTML = `
                    <div class="flex items-center justify-between px-1 mb-2">
                        <div class="flex items-center gap-3">
                            <div class="bg-amber-500/10 dark:bg-amber-500/20 text-amber-500 p-1.5 rounded-full flex items-center justify-center"><i class="ph-fill ph-sparkle text-2xl"></i></div>
                            <div class="flex flex-col"><h2 class="text-xl font-bold text-black dark:text-white tracking-tight flex items-center gap-2">Pro Studios <span class="text-[10px] uppercase font-bold bg-amber-100 text-amber-600 dark:bg-amber-900/30 dark:text-amber-400 px-1.5 py-0.5 rounded-sm">PRO</span></h2><span class="text-xs text-yt-textSecondaryLight dark:text-yt-textSecondaryDark">Advanced tools, full control</span></div>
                        </div>
                        <div class="flex items-center gap-4"><button class="hidden sm:block text-sm font-medium border border-yt-borderLight dark:border-yt-borderDark rounded-full px-4 py-1.5 hover:bg-gray-100 dark:hover:bg-yt-dark transition-colors text-black dark:text-white">View all</button><button class="text-yt-textSecondaryLight dark:text-yt-textSecondaryDark hover:text-black dark:hover:text-white"><i class="ph-bold ph-x text-xl"></i></button></div>
                    </div>
                    <div class="flex gap-4 overflow-x-auto no-scrollbar py-6 px-4 -mx-4 snap-x snap-mandatory scroll-smooth" style="scroll-padding-left: 1rem;">${studioCardsHTML}</div>
                    <div class="w-full flex justify-center mt-2 border-t border-yt-borderLight dark:border-yt-borderDark relative"><button class="absolute -top-[15px] bg-white dark:bg-[#0f0f0f] border border-yt-borderLight dark:border-yt-borderDark text-sm font-medium rounded-full px-6 py-1 hover:bg-gray-50 dark:hover:bg-yt-light/10 transition-colors flex items-center gap-2 z-10 text-black dark:text-white shadow-sm">Show more <i class="ph-bold ph-caret-down"></i></button></div>`;
                container.appendChild(studiosRow);
            };

            const renderBannerAd = () => {
                const banner = document.createElement('div');
                banner.style.gridColumn = '1 / -1';
                banner.className = 'max-w-[2000px] mx-auto w-full mb-8 rounded-2xl overflow-hidden relative group cursor-pointer bg-gradient-to-r from-[#17e3e0] to-[#0fd2ee] shadow-sm';
                banner.innerHTML = `
                    <div class="px-6 py-5 sm:py-7 flex flex-col justify-between relative z-10 w-full md:w-3/4">
                        <div class="mb-5 sm:mb-6">
                            <h2 class="text-2xl sm:text-[28px] font-bold text-black mb-2 leading-tight tracking-tight">Get ad-free YouTube with prepaid plans & UPI</h2>
                            <p class="text-black/80 text-[13px] font-medium mb-1">YouTube featured</p>
                            <p class="text-black/60 text-[11px] mt-2 max-w-sm">Terms apply. Monthly paid subscription. Cancel anytime</p>
                        </div>
                        <div>
                            <button class="bg-black/10 hover:bg-black/20 text-black font-semibold text-sm px-5 py-2 rounded-full transition-colors border border-black/5">Get Premium</button>
                        </div>
                    </div>
                    <div class="absolute top-4 right-4 z-20">
                        <button class="bg-white/40 hover:bg-white/60 text-black w-8 h-8 rounded-full flex items-center justify-center transition-colors">
                            <i class="ph-bold ph-dots-three-vertical text-xl"></i>
                        </button>
                    </div>
                    <div class="absolute inset-0 z-0 opacity-0 pointer-events-none">
                        <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-client="ca-pub-7993314093599705" data-ad-slot="XXXXXXXXXX" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
                    </div>`;
                container.appendChild(banner);
                try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
            };

            const sectionMap = { adCard: renderAdCard, shortsRow: renderShortsRow, proStudiosRow: renderProStudiosRow, bannerAd: renderBannerAd };
            const cols = layoutConfig.config.columns || 3;
            
            const renderItem = (item, idx) => {
                const card = document.createElement('a');
                card.href = item.file;
                card.className = 'preset-card flex flex-col gap-3 group';
                card.target = '_blank';
                card.style.setProperty('--ambient-color-dark', ambientColorsDark[idx % ambientColorsDark.length]);
                card.style.setProperty('--ambient-color', ambientColorsLight[idx % ambientColorsLight.length]);
                const isLoop = gallerySettings.playMode === 'loop';
                const duration = "0:12"; 
                card.innerHTML = `
                    <div class="video-container">
                        <video src="${item.preview}#t=0.1" preload="metadata" muted loop playsinline ${isLoop ? 'autoplay' : ''}
                            ${!isLoop ? 'onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0.1"' : ''}></video>
                        <div class="duration-badge">${duration}</div>
                    </div>
                    <div class="flex gap-3 pr-6 relative">
                        <div class="w-9 h-9 rounded-full bg-purple-600 flex items-center justify-center text-white font-medium text-sm flex-shrink-0 mt-0.5">AS</div>
                        <div class="flex flex-col">
                            <h3 class="text-sm sm:text-base font-medium text-black dark:text-white line-clamp-2 leading-snug mb-1 transition-colors">${item.title}</h3>
                            <span class="text-[12px] text-yt-textSecondaryLight dark:text-yt-textSecondaryDark hover:text-black dark:hover:text-white transition">Animator Studio</span>
                            <div class="text-[12px] text-yt-textSecondaryLight dark:text-yt-textSecondaryDark flex items-center">
                                <span>${item.width}x${item.height}</span>
                                <span class="mx-1">•</span>
                                <span>Free Template</span>
                            </div>
                        </div>
                        <button class="absolute right-0 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 p-1.5 hover:bg-yt-hoverLight dark:hover:bg-yt-hoverDark rounded-full transition">
                            <i class="ph-bold ph-dots-three-vertical text-xl"></i>
                        </button>
                    </div>`;
                container.appendChild(card);
            };
            
            // Track sections that have been rendered to avoid duplicates for row-based singletons
            const renderedRowSections = new Set();
            let itemIdx = 0;
            const adCount = layoutConfig.sections.filter(s => s.id === 'adCard' && s.enabled).length;

            // Initial check for afterRow: 0 (Top of gallery)
            layoutConfig.sections.forEach(sec => {
                if (sec.enabled && sec.id !== 'adCard' && sec.afterRow === 0 && !renderedRowSections.has(sec.id)) {
                    sectionMap[sec.id]?.();
                    renderedRowSections.add(sec.id);
                }
            });

            for (let s = 0; s < items.length + adCount + 10; s++) {
                // Row Breaking sections (Full width)
                if (s > 0 && s % cols === 0) {
                    const rowFinished = s / cols;
                    const rowSec = layoutConfig.sections.find(sec => sec.enabled && sec.id !== 'adCard' && sec.afterRow === rowFinished);
                    if (rowSec && !renderedRowSections.has(rowSec.id)) {
                        sectionMap[rowSec.id]?.();
                        renderedRowSections.add(rowSec.id);
                    }
                }

                // Grid Item sections (Ads counting as preview cards)
                const ad = layoutConfig.sections.find(sec => sec.enabled && sec.id === 'adCard' && sec.index === s);
                if (ad) {
                    renderAdCard();
                } else if (itemIdx < items.length) {
                    renderItem(items[itemIdx], itemIdx);
                    itemIdx++;
                } else {
                    break;
                }
            }

            // Check if any row sections haven't been rendered yet
            layoutConfig.sections.forEach(sec => {
                if (sec.enabled && sec.id !== 'adCard' && !renderedRowSections.has(sec.id)) {
                    sectionMap[sec.id]?.();
                    renderedRowSections.add(sec.id);
                }
            });
        }

        document.getElementById('search').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            renderGallery(allItems.filter(i => i.title.toLowerCase().includes(q) || i.file.toLowerCase().includes(q)));
        });

        loadGallery();
    </script>
</body>
</html>
