<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roughboard Canvas</title>

    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Rough.js for hand-drawn shapes -->
    <script src="https://unpkg.com/roughjs@latest/bundled/rough.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Kalam Font for hand-drawn text -->
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">

    <!-- MathJax Configuration and Script for LaTeX -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'local' }, // Local font cache is required to serialize SVGs standalone
            startup: {
                ready: () => {
                    MathJax.startup.defaultReady();
                    window.mathJaxReady = true;
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fcfcfc;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Kalam', cursive;
            touch-action: none; /* Prevent scrolling on mobile */
        }

        #board {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        .tool-btn {
            @apply p-2 rounded-lg flex items-center justify-center text-gray-600 hover:bg-gray-100 transition-colors duration-200 relative;
        }

        .tool-btn.active {
            @apply bg-indigo-100 text-indigo-600;
        }

        .color-btn {
            @apply w-8 h-8 md:w-10 md:h-10 rounded-full border-4 border-white hover:scale-110 transition-transform cursor-pointer shadow-md;
        }

        .color-btn.active {
            @apply border-gray-300 scale-110 shadow-lg;
        }

        #input-container {
            position: absolute;
            display: none;
            z-index: 50;
        }

        #text-input {
            background: transparent;
            border: 2px dashed #9ca3af;
            outline: none;
            resize: none;
            padding: 4px;
            font-family: 'Kalam', cursive;
            font-size: 24px;
            min-width: 200px;
            min-height: 40px;
            border-radius: 4px;
            line-height: 1.2;
        }
        
        /* Specific Highlighter Colors */
        .color-black { background-color: #171717; }
        .color-blue { background-color: #0EA5E9; }
        .color-purple { background-color: #8B5CF6; }
        .color-pink { background-color: #EC4899; }
        .color-orange { background-color: #F97316; }
        .color-yellow { background-color: #EAB308; }

        /* Tooltip */
        .tool-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            font-family: sans-serif;
        }
        .tool-btn:hover::after { opacity: 1; }
    </style>
</head>
<body>

    <!-- Canvas Element -->
    <canvas id="board"></canvas>

    <!-- Top Toolbar (Tools & Actions) -->
    <div class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-white rounded-xl shadow-lg border border-gray-200 p-2 flex flex-col md:flex-row items-center gap-4 z-10 font-sans">
        
        <!-- Tools Section -->
        <div class="flex gap-1 border-b md:border-b-0 md:border-r border-gray-200 pb-2 md:pb-0 md:pr-4">
            <button class="tool-btn" data-tool="select" data-tooltip="Select (V)">
                <i class="ph ph-cursor text-2xl"></i>
            </button>
            <button class="tool-btn active" data-tool="pencil" data-tooltip="Freedraw (P)">
                <i class="ph ph-pencil text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="marker" data-tooltip="Marker (H)">
                <i class="ph ph-highlighter text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="line" data-tooltip="Line (L)">
                <i class="ph ph-line-segment text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="rectangle" data-tooltip="Rectangle (R)">
                <i class="ph ph-rectangle text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="circle" data-tooltip="Circle (C)">
                <i class="ph ph-circle text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="text" data-tooltip="Text (T)">
                <i class="ph ph-text-t text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="math" data-tooltip="LaTeX Equation (M)">
                <i class="ph ph-function text-2xl"></i>
            </button>
        </div>

        <!-- Action Section -->
        <div class="flex gap-1 px-2">
            <button class="tool-btn" id="jitter-btn" data-tooltip="Toggle Jitter (J)">
                <i class="ph ph-scribble-loop text-2xl"></i>
            </button>
            <button class="tool-btn" id="undo-btn" data-tooltip="Undo (Ctrl+Z)">
                <i class="ph ph-arrow-u-up-left text-2xl"></i>
            </button>
            <button class="tool-btn text-red-500 hover:bg-red-50 hover:text-red-600" id="clear-btn" data-tooltip="Clear Board">
                <i class="ph ph-trash text-2xl"></i>
            </button>
        </div>
    </div>

    <!-- Bottom Toolbar (Colors) -->
    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-white/80 backdrop-blur-md rounded-full shadow-xl border border-gray-200 p-3 flex items-center gap-3 z-10 font-sans">
        <div class="color-btn color-black active" data-color="#171717" title="Black"></div>
        <div class="color-btn color-blue" data-color="#0EA5E9" title="Blue"></div>
        <div class="color-btn color-purple" data-color="#8B5CF6" title="Purple"></div>
        <div class="color-btn color-pink" data-color="#EC4899" title="Pink"></div>
        <div class="color-btn color-orange" data-color="#F97316" title="Orange"></div>
        <div class="color-btn color-yellow" data-color="#EAB308" title="Yellow"></div>
    </div>

    <!-- Hidden Input Container for Text and Math -->
    <div id="input-container">
        <textarea id="text-input" placeholder="Type here..."></textarea>
        <div id="math-hint" class="absolute -bottom-6 left-0 text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded shadow-sm whitespace-nowrap hidden font-sans font-medium">
            Enter LaTeX (e.g., E = mc^2). Press Enter to finish.
        </div>
    </div>

    <script>
        // --- Core Variables ---
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const inputContainer = document.getElementById('input-container');
        const textInput = document.getElementById('text-input');
        const mathHint = document.getElementById('math-hint');
        
        let rc; // RoughJS instance
        let elements = [];
        let isDrawing = false;
        let currentTool = 'pencil';
        let currentColor = '#171717';
        let currentElement = null;
        let isJitterEnabled = false; // Toggle to randomize seed on every redraw

        // Selection & Editing state
        let selectedIndex = -1;
        let isDragging = false;
        let dragLastX = 0;
        let dragLastY = 0;
        let lastClickTime = 0;
        let editingIndex = -1;

        // --- Setup & Resize ---
        function initCanvas() {
            // Support high DPI displays
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = `${window.innerWidth}px`;
            canvas.style.height = `${window.innerHeight}px`;
            ctx.scale(dpr, dpr);
            
            rc = rough.canvas(canvas);
            redraw();
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();

        function getSeed() {
            return Math.floor(Math.random() * 2147483648);
        }

        // --- UI Interactions ---
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.tool-btn.active')?.classList.remove('active');
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                
                // Adjust cursor based on tool
                if (['text', 'math'].includes(currentTool)) {
                    canvas.style.cursor = 'text';
                } else if (currentTool === 'select') {
                    canvas.style.cursor = 'default';
                } else {
                    canvas.style.cursor = 'crosshair';
                }
                
                // Clear selection if switching away from select tool
                if (currentTool !== 'select') {
                    selectedIndex = -1;
                    redraw();
                }
                
                hideInput();
            });
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.color-btn.active')?.classList.remove('active');
                btn.classList.add('active');
                currentColor = btn.dataset.color;
                textInput.style.color = currentColor;

                // Update selected element color
                if (selectedIndex > -1) {
                    elements[selectedIndex].color = currentColor;
                    redraw();
                }
            });
        });

        document.getElementById('jitter-btn').addEventListener('click', (e) => {
            isJitterEnabled = !isJitterEnabled;
            e.currentTarget.classList.toggle('active', isJitterEnabled);
            redraw();
        });

        document.getElementById('undo-btn').addEventListener('click', () => {
            elements.pop();
            selectedIndex = -1;
            redraw();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            elements = [];
            selectedIndex = -1;
            redraw();
        });

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            // Don't trigger shortcuts if user is typing
            if (document.activeElement === textInput) return;

            if (e.key.toLowerCase() === 'p') clickTool('pencil');
            if (e.key.toLowerCase() === 'h') clickTool('marker');
            if (e.key.toLowerCase() === 'v') clickTool('select');
            if (e.key.toLowerCase() === 'l') clickTool('line');
            if (e.key.toLowerCase() === 'r') clickTool('rectangle');
            if (e.key.toLowerCase() === 'c') clickTool('circle');
            if (e.key.toLowerCase() === 't') clickTool('text');
            if (e.key.toLowerCase() === 'm') clickTool('math');
            if (e.key.toLowerCase() === 'j') document.getElementById('jitter-btn').click();
            if (e.ctrlKey && e.key === 'z') {
                elements.pop();
                selectedIndex = -1;
                redraw();
            }
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIndex > -1) {
                elements.splice(selectedIndex, 1);
                selectedIndex = -1;
                redraw();
            }
        });

        function clickTool(toolName) {
            const btn = document.querySelector(`.tool-btn[data-tool="${toolName}"]`);
            if (btn) btn.click();
        }

        // --- LaTeX Processing ---
        async function latexToImage(tex, color) {
            if (!window.mathJaxReady) {
                alert("MathJax is still loading, please wait a moment.");
                return null;
            }

            try {
                const node = MathJax.tex2svg(tex, {display: true});
                const svg = node.querySelector('svg');
                if (!svg) return null;

                // Apply current color to SVG
                svg.style.color = color;
                svg.setAttribute('color', color);
                
                // Scale up the SVG from 'ex' units to pixels for canvas rendering
                const wStr = svg.getAttribute('width');
                const hStr = svg.getAttribute('height');
                if (wStr && wStr.includes('ex')) {
                    svg.setAttribute('width', (parseFloat(wStr) * 16) + 'px');
                }
                if (hStr && hStr.includes('ex')) {
                    svg.setAttribute('height', (parseFloat(hStr) * 16) + 'px');
                }

                // Serialize SVG
                const svgData = new XMLSerializer().serializeToString(svg);
                const svg64 = btoa(unescape(encodeURIComponent(svgData)));
                const image64 = 'data:image/svg+xml;base64,' + svg64;

                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = image64;
                });
            } catch (err) {
                console.error("LaTeX Rendering Error:", err);
                return null;
            }
        }

        // --- Text/Math Input Handling ---
        let inputPosition = { x: 0, y: 0 };

        function showInput(x, y, editIndex = -1) {
            inputPosition = { x, y };
            editingIndex = editIndex;
            inputContainer.style.display = 'block';
            inputContainer.style.left = `${x}px`;
            inputContainer.style.top = `${y}px`;
            
            if (editIndex > -1) {
                const el = elements[editIndex];
                textInput.value = el.text || "";
                currentColor = el.color;
                // Sync color UI
                document.querySelector('.color-btn.active')?.classList.remove('active');
                const matchingBtn = Array.from(document.querySelectorAll('.color-btn')).find(b => b.dataset.color.toUpperCase() === currentColor.toUpperCase());
                if (matchingBtn) matchingBtn.classList.add('active');
            } else {
                textInput.value = '';
            }
            
            textInput.style.color = currentColor;
            
            if (currentTool === 'math' && editIndex === -1) {
                mathHint.style.display = 'block';
                textInput.placeholder = "E = mc^2";
                textInput.style.fontFamily = 'monospace';
                textInput.style.fontSize = '20px';
            } else {
                mathHint.style.display = 'none';
                textInput.placeholder = "Type here...";
                textInput.style.fontFamily = "'Kalam', cursive";
                textInput.style.fontSize = '28px';
            }
            
            // Allow DOM to update before focusing
            setTimeout(() => {
                textInput.focus();
            }, 50);
        }

        function hideInput() {
            inputContainer.style.display = 'none';
            textInput.value = '';
            editingIndex = -1;
        }

        async function finalizeInput() {
            if (inputContainer.style.display === 'none') return;
            const text = textInput.value.trim();
            
            if (text) {
                if (currentTool === 'text' || (editingIndex > -1 && elements[editingIndex].type === 'text')) {
                    if (editingIndex > -1) {
                        elements[editingIndex].text = text;
                        elements[editingIndex].color = currentColor;
                    } else {
                        elements.push({
                            type: 'text',
                            text: text,
                            x: inputPosition.x,
                            y: inputPosition.y,
                            color: currentColor
                        });
                    }
                    redraw();
                } else if (currentTool === 'math') {
                    // Show generating state
                    textInput.value = "Generating...";
                    const img = await latexToImage(text, currentColor);
                    if (img) {
                        elements.push({
                            type: 'math',
                            img: img,
                            x: inputPosition.x,
                            y: inputPosition.y - (img.height / 2), // Adjust vertical alignment
                            color: currentColor
                        });
                        redraw();
                    }
                }
            }
            hideInput();
        }

        textInput.addEventListener('keydown', (e) => {
            // Finish input on enter (allow Shift+Enter for newlines in text mode)
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                finalizeInput();
            }
            // Cancel on escape
            if (e.key === 'Escape') hideInput();
        });

        textInput.addEventListener('blur', () => {
             // Delay to prevent race condition if pressing tool button
            setTimeout(finalizeInput, 100);
        });

        // --- Selection & Hit Testing ---
        function getBoundingBox(el) {
            if (el.type === 'pencil' || el.type === 'marker') {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                el.points.forEach(([x, y]) => {
                    if (x < minX) minX = x; if (y < minY) minY = y;
                    if (x > maxX) maxX = x; if (y > maxY) maxY = y;
                });
                return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
            } else if (el.type === 'line' || el.type === 'rectangle') {
                const minX = Math.min(el.x1, el.x2), minY = Math.min(el.y1, el.y2);
                const maxX = Math.max(el.x1, el.x2), maxY = Math.max(el.y1, el.y2);
                return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
            } else if (el.type === 'circle') {
                const dx = el.x2 - el.x1, dy = el.y2 - el.y1;
                const r = Math.sqrt(dx*dx + dy*dy);
                return { x: el.x1 - r, y: el.y1 - r, w: r*2, h: r*2 };
            } else if (el.type === 'text') {
                ctx.font = '28px Kalam, cursive';
                const lines = el.text.split('\n');
                let maxW = 0;
                lines.forEach(line => { maxW = Math.max(maxW, ctx.measureText(line).width); });
                return { x: el.x, y: el.y, w: maxW, h: lines.length * 32 };
            } else if (el.type === 'math' && el.img) {
                return { x: el.x, y: el.y, w: el.img.width, h: el.img.height };
            }
            return { x: 0, y: 0, w: 0, h: 0 };
        }

        function hitTest(x, y) {
            // Traverse backwards to select topmost element
            for (let i = elements.length - 1; i >= 0; i--) {
                const box = getBoundingBox(elements[i]);
                const padding = 15; // Generous hit area for easier grabbing (esp marker)
                if (x >= box.x - padding && x <= box.x + box.w + padding &&
                    y >= box.y - padding && y <= box.y + box.h + padding) {
                    return i;
                }
            }
            return -1;
        }

        function moveElement(el, dx, dy) {
            if (el.type === 'pencil' || el.type === 'marker') {
                el.points = el.points.map(([px, py]) => [px + dx, py + dy]);
            } else if (['line', 'rectangle', 'circle'].includes(el.type)) {
                el.x1 += dx; el.y1 += dy;
                el.x2 += dx; el.y2 += dy;
            } else if (['text', 'math'].includes(el.type)) {
                el.x += dx; el.y += dy;
            }
        }

        // --- Mouse & Touch Event Handling ---
        function getCoordinates(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function handlePointerDown(e) {
            if (e.target !== canvas) return;
            
            const { x, y } = getCoordinates(e);

            if (currentTool === 'select') {
                const hitIndex = hitTest(x, y);
                const now = Date.now();
                const isDoubleClick = (now - lastClickTime) < 300;
                lastClickTime = now;

                if (hitIndex > -1) {
                    selectedIndex = hitIndex;
                    isDragging = true;
                    dragLastX = x;
                    dragLastY = y;

                    // Edit text on double click
                    if (isDoubleClick && elements[selectedIndex].type === 'text') {
                        showInput(elements[selectedIndex].x, elements[selectedIndex].y, selectedIndex);
                        isDragging = false;
                    }
                } else {
                    selectedIndex = -1;
                }
                redraw();
                return;
            }

            if (currentTool === 'text' || currentTool === 'math') {
                // If input is already open and clicked elsewhere, finalizeInput happens via blur event
                if (inputContainer.style.display === 'none') {
                    showInput(x, y);
                }
                return;
            }

            isDrawing = true;
            
            if (currentTool === 'pencil' || currentTool === 'marker') {
                currentElement = { type: currentTool, points: [[x, y]], color: currentColor, seed: getSeed() };
            } else if (['line', 'rectangle', 'circle'].includes(currentTool)) {
                currentElement = { type: currentTool, x1: x, y1: y, x2: x, y2: y, color: currentColor, seed: getSeed() };
            }
            
            if (currentElement) {
                elements.push(currentElement);
            }
        }

        function handlePointerMove(e) {
            const { x, y } = getCoordinates(e);

            if (currentTool === 'select' && isDragging && selectedIndex > -1) {
                const dx = x - dragLastX;
                const dy = y - dragLastY;
                moveElement(elements[selectedIndex], dx, dy);
                dragLastX = x;
                dragLastY = y;
                redraw();
                return;
            }

            if (!isDrawing || !currentElement) return;

            if (currentTool === 'pencil' || currentTool === 'marker') {
                currentElement.points.push([x, y]);
            } else if (['line', 'rectangle', 'circle'].includes(currentTool)) {
                currentElement.x2 = x;
                currentElement.y2 = y;
            }
            
            redraw();
        }

        function handlePointerUp() {
            isDrawing = false;
            isDragging = false;
            currentElement = null;
        }

        // Attach standard events
        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        // Attach touch events
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handlePointerMove(e); }, { passive: false });
        window.addEventListener('touchend', handlePointerUp);

        // --- Render Engine ---
        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            elements.forEach(el => {
                const seedToUse = isJitterEnabled ? getSeed() : el.seed;

                const options = { 
                    stroke: el.color, 
                    strokeWidth: 2.5, 
                    roughness: 1.2,
                    bowing: 1,
                    seed: seedToUse
                };

                if (el.type === 'pencil' && el.points.length > 1) {
                    rc.curve(el.points, options);
                } else if (el.type === 'marker' && el.points.length > 1) {
                    ctx.save();
                    ctx.globalAlpha = 0.4;
                    // Markers have thicker stroke and slightly lower roughness to mimic highlighting
                    rc.curve(el.points, { ...options, strokeWidth: 16, roughness: 1.5 });
                    ctx.restore();
                } else if (el.type === 'line') {
                    rc.line(el.x1, el.y1, el.x2, el.y2, options);
                } else if (el.type === 'rectangle') {
                    const w = el.x2 - el.x1;
                    const h = el.y2 - el.y1;
                    rc.rectangle(el.x1, el.y1, w, h, options);
                } else if (el.type === 'circle') {
                    // Radius based on dragged distance from center
                    const dx = el.x2 - el.x1;
                    const dy = el.y2 - el.y1;
                    const r = Math.sqrt(dx*dx + dy*dy);
                    rc.circle(el.x1, el.y1, r * 2, options); // Roughjs takes diameter
                } else if (el.type === 'text') {
                    ctx.font = '28px Kalam, cursive';
                    ctx.fillStyle = el.color;
                    ctx.textBaseline = 'top';
                    const lines = el.text.split('\n');
                    lines.forEach((line, i) => {
                        ctx.fillText(line, el.x, el.y + (i * 32));
                    });
                } else if (el.type === 'math' && el.img) {
                    ctx.drawImage(el.img, el.x, el.y);
                }
            });

            // Draw Selection Box
            if (selectedIndex > -1 && elements[selectedIndex]) {
                const box = getBoundingBox(elements[selectedIndex]);
                ctx.save();
                ctx.strokeStyle = '#0EA5E9';
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 1.5;
                ctx.strokeRect(box.x - 6, box.y - 6, box.w + 12, box.h + 12);
                ctx.fillStyle = 'rgba(14, 165, 233, 0.1)';
                ctx.fillRect(box.x - 6, box.y - 6, box.w + 12, box.h + 12);
                ctx.restore();
            }
        }
    </script>
</body>
</html>
