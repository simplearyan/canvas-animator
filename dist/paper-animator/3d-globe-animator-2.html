<!DOCTYPE html>
<html lang="en" class="dark">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flourish 3D Globe Animator</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            500: '#ec4899', // Pink
                            600: '#db2777',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Phosphor Icons -->

    <!-- Three.js for 3D Globe -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ec4899;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #475569;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Canvas Wrapper Pattern */
        #canvas-container {
            background-color: #0f172a;
            background-image: 
                radial-gradient(#1e293b 1px, transparent 1px),
                radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->

        <div class="flex items-center gap-3">

            </div>

        </div>
        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2.5 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition" title="Toggle UI Theme">
                <i class="ph-fill ph-moon text-xl dark:hidden"></i>
                <i class="ph-fill ph-sun text-xl hidden dark:block"></i>
            </button>

    </header>

    <!-- MAIN APP AREA -->

        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-lg z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            Rendering 3D Visualization...
        </div>

        <!-- TOOLBAR / SIDEBAR -->
        <aside class="w-full md:w-[440px] bg-white dark:bg-gray-800 border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-700 p-4 md:p-5 flex flex-col gap-5 overflow-y-auto z-10 flex-shrink-0 h-[50vh] md:h-full">
            
            <!-- Quick Templates -->
            <div class="flex flex-col gap-2 flex-shrink-0">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Quick Templates</h2>
                <div class="grid grid-cols-2 gap-2">
                    <button class="template-btn py-1.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 hover:text-brand-500 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition truncate px-2 text-left" data-template="network">🌐 Global Trade Network</button>
                    <button class="template-btn py-1.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 hover:text-brand-500 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition truncate px-2 text-left" data-template="population">🏙️ Mega Cities (Spikes)</button>
                    <button class="template-btn py-1.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 hover:text-brand-500 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition truncate px-2 text-left" data-template="internet">📶 Undersea Cables</button>
                    <button class="template-btn py-1.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 hover:text-brand-500 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition truncate px-2 text-left" data-template="mixed">✨ Mixed Data Types</button>

    <script>
        // --- Template Data ---
        const templates = {
            'network': {

                style: 'dark',
                csv: `Label,StartLat,StartLng,EndLat,EndLng,Value,Color

            'population': {

                source: 'SOURCE: UN DEMOGRAPHIC REPORT',
                style: 'dark',
                csv: `Label,Lat,Lng,Value,Color
Tokyo,35.67,139.65,37,#ec4899
Delhi,19.07,72.87,31,#ec4899

            'internet': {
                title: 'Undersea Cable Network',

                source: 'SOURCE: TELEGEOGRAPHY',
                style: 'wireframe',
                csv: `Label,StartLat,StartLng,EndLat,EndLng,Value,Color
Trans-Atlantic,40.7,-74.0,51.5,-0.1,100,#38bdf8
Trans-Pacific,34.0,-118.2,35.6,139.6,85,#38bdf8

SAFE,-33.8,151.2,1.3,103.8,65,#38bdf8
SouthAm,-23.5,-46.6,25.7,-80.1,50,#38bdf8`
            },
            'mixed': {
                title: 'Global Command Center',
                subtitle: 'Tracking regional assets and active supply lines.',
                source: 'SOURCE: TACTICAL SIMULATION',
                style: 'dark',
                csv: `Label,Lat,Lng,Value,Color
HQ Alpha,40.71,-74.00,100,#10b981
HQ Bravo,51.50,-0.12,80,#10b981
Base Charlie,35.67,139.65,60,#f59e0b
Route 1,40.71,-74.00,51.50,-0.12,40,#3b82f6
Route 2,51.50,-0.12,35.67,139.65,30,#3b82f6
Route 3,35.67,139.65,-33.86,151.20,50,#ec4899`
            }
        };

        // --- App State ---
        const state = {
            data: [], // Parsed CSV data
            maxVal: 1,
            
            // UI Config
            title: '',
            subtitle: '',
            source: '',
            globeStyle: 'dark',
            fontFamily: 'Inter',
            duration: 6000,
            dataScale: 1.0,
            showLabels: true,
            
            // Animation Engine
            progress: 1.0,
            isAnimating: false,
            isRecording: false,
            
            // 3D Engine Refs
            scene: null,
            camera: null,
            renderer: null,
            globeGroup: null,
            dataGroup: null,
            
            // Interactive rotation
            rotationY: Math.PI / 4,
            rotationX: 0.2
        };

        const exportCanvas = document.getElementById('export-canvas');
        const ctx = exportCanvas.getContext('2d', { alpha: false });
        exportCanvas.width = 1920;
        exportCanvas.height = 1080;

        const glCanvas = document.getElementById('gl-canvas');

        // DOM UI Elements
        const uiTitle = document.getElementById('chart-title');
        const uiSubtitle = document.getElementById('chart-subtitle');
        const uiSource = document.getElementById('chart-source');
        const dataInput = document.getElementById('data-input');
        
        const styleSelect = document.getElementById('globe-style');
        const fontSelect = document.getElementById('font-family');
        const durationSlider = document.getElementById('anim-duration');
        const scaleSlider = document.getElementById('data-scale');
        const showLabelsCheck = document.getElementById('show-labels');
        const canvasContainer = document.getElementById('canvas-container');

        // --- Three.js Engine Setup ---
        function initThreeJS() {
            state.scene = new THREE.Scene();
            
            // Camera setup to match the 16:9 1080p output
            state.camera = new THREE.PerspectiveCamera(45, 1920 / 1080, 0.1, 1000);
            state.camera.position.z = 250; // Pull back to see the whole globe

            state.renderer = new THREE.WebGLRenderer({ 
                canvas: glCanvas, 
                alpha: true, 
                antialias: true,
                preserveDrawingBuffer: true // Crucial for 2D composite capturing
            });
            state.renderer.setSize(1920, 1080);
            state.renderer.setPixelRatio(1); // Standardize for video export

            state.globeGroup = new THREE.Group();
            state.dataGroup = new THREE.Group();
            state.scene.add(state.globeGroup);
            state.scene.add(state.dataGroup);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            state.scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(100, 100, 50);
            state.scene.add(dirLight);
            
            const backLight = new THREE.DirectionalLight(0x4444ff, 0.5);
            backLight.position.set(-100, -100, -50);
            state.scene.add(backLight);
            
            rebuildGlobe();
        }

        function rebuildGlobe() {
            // Clear existing globe
            while(state.globeGroup.children.length > 0){ 
                state.globeGroup.remove(state.globeGroup.children[0]); 
            }

            const radius = 80;
            const segments = 64;
            const geo = new THREE.SphereGeometry(radius, segments, segments);
            
            let mat;
            let bgColor = '#0f172a'; // default dark slate

            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('Anonymous');

            if (state.globeStyle === 'dark') {
                // Load high-contrast dark satellite map
                const tex = loader.load('https://unpkg.com/three-globe/example/img/earth-dark.jpg', () => { 
                    if(!state.isAnimating) renderFrame(state.progress); 
                });
                mat = new THREE.MeshStandardMaterial({ 
                    map: tex,
                    color: 0xffffff, 
                    roughness: 0.6, 
                    metalness: 0.2 
                });
                bgColor = '#0f172a';
            } 
            else if (state.globeStyle === 'light') {
                // Load daytime "Blue Marble" map
                const tex = loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', () => { 
                    if(!state.isAnimating) renderFrame(state.progress); 
                });
                mat = new THREE.MeshStandardMaterial({ 
                    map: tex,
                    color: 0xffffff, 
                    roughness: 0.8, 
                    metalness: 0.1 
                });
                bgColor = '#e2e8f0';
            }
            else if (state.globeStyle === 'wireframe') {
                // Holographic wireframe overlay
                mat = new THREE.MeshBasicMaterial({ 
                    color: 0x38bdf8, // light blue
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });
                bgColor = '#020617';
                
                // Add a solid inner core with a dark map so lines don't get messy
                const tex = loader.load('https://unpkg.com/three-globe/example/img/earth-dark.jpg', () => { 
                    if(!state.isAnimating) renderFrame(state.progress); 
                });
                const coreGeo = new THREE.SphereGeometry(radius * 0.98, 64, 64);
                const coreMat = new THREE.MeshStandardMaterial({ 
                    map: tex,
                    color: 0x444444, // Darken the map slightly
                    roughness: 0.9,
                });
                const coreMesh = new THREE.Mesh(coreGeo, coreMat);
                state.globeGroup.add(coreMesh);
            }

            const mesh = new THREE.Mesh(geo, mat);
            state.globeGroup.add(mesh);
            
            canvasContainer.style.backgroundColor = bgColor;
        }

        // --- Data Parsing & 3D Geometry ---

        // Convert Lat/Lng to 3D Vector on the sphere
        function latLongToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            
            return new THREE.Vector3(x, y, z);
        }

        function parseCSV() {
            const raw = dataInput.value.trim();
            if (!raw) return;

            const lines = raw.split('\n').map(l => l.split(',').map(c => c.trim()));
            if (lines.length < 2) return;

            state.data = [];
            state.maxVal = 0;

            for (let i = 1; i < lines.length; i++) {
                const row = lines[i];
                if (row.length < 4) continue;
                
                const label = row[0];
                let item = null;

                // Detect if it's a spike or an arc based on column count
                // Spike: Label, Lat, Lng, Value, Color
                if (row.length === 5 || (row.length === 4 && !isNaN(parseFloat(row[3])))) {
                    const value = parseFloat(row[3]) || 0;
                    item = {
                        type: 'spike',
                        label: label,
                        lat: parseFloat(row[1]),
                        lng: parseFloat(row[2]),
                        value: value,
                        color: row[4] || '#ec4899'
                    };
                    if (value > state.maxVal) state.maxVal = value;
                }
                // Arc: Label, StartLat, StartLng, EndLat, EndLng, Value, Color
                else if (row.length >= 6) {
                    const value = parseFloat(row[5]) || 0;
                    item = {
                        type: 'arc',
                        label: label,
                        startLat: parseFloat(row[1]),
                        startLng: parseFloat(row[2]),
                        endLat: parseFloat(row[3]),
                        endLng: parseFloat(row[4]),
                        value: value,
                        color: row[6] || '#3b82f6'
                    };
                    if (value > state.maxVal) state.maxVal = value;
                }

                if (item) state.data.push(item);
            }
            if (state.maxVal === 0) state.maxVal = 1; // prevent div by 0
            
            rebuildDataGeometries();
        }

        function rebuildDataGeometries() {
            // Clear old data
            while(state.dataGroup.children.length > 0){ 
                state.dataGroup.remove(state.dataGroup.children[0]); 
            }

            const radius = 80;

            state.data.forEach(item => {
                const normalizedVal = item.value / state.maxVal;
                
                if (item.type === 'spike') {
                    // Create Spike (Cylinder)
                    const maxHeight = 40 * normalizedVal * state.dataScale;
                    
                    // Shift geometry so origin is at the base, not center
                    const geo = new THREE.CylinderGeometry(0.5, 2, maxHeight, 8);
                    geo.translate(0, maxHeight / 2, 0); 
                    
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: item.color, 
                        roughness: 0.3,
                        emissive: item.color,
                        emissiveIntensity: 0.4
                    });
                    
                    const mesh = new THREE.Mesh(geo, mat);
                    
                    // Position on globe
                    const pos = latLongToVector3(item.lat, item.lng, radius);
                    mesh.position.copy(pos);
                    
                    // Orient spike to point outward
                    mesh.lookAt(new THREE.Vector3(0,0,0));
                    mesh.rotateX(-Math.PI / 2); // Cylinder defaults pointing up Y

                    // Save reference for animation
                    item.mesh = mesh;
                    item.maxHeight = maxHeight;
                    item.basePos = pos;
                    
                    state.dataGroup.add(mesh);
                } 
                else if (item.type === 'arc') {
                    // Create Arc (Tube/Line)
                    const startPos = latLongToVector3(item.startLat, item.startLng, radius);
                    const endPos = latLongToVector3(item.endLat, item.endLng, radius);
                    
                    // Midpoint pushed outward for the arc
                    const dist = startPos.distanceTo(endPos);
                    const midPos = startPos.clone().lerp(endPos, 0.5);
                    const arcHeight = dist * 0.4 * state.dataScale; 
                    midPos.normalize().multiplyScalar(radius + arcHeight);

                    const curve = new THREE.QuadraticBezierCurve3(startPos, midPos, endPos);
                    
                    // Tube is thicker for higher values
                    const tubeRadius = (0.5 + (normalizedVal * 1.5)) * state.dataScale;
                    // We generate full geometry, but we will animate `setDrawRange` via BufferGeometry
                    const geo = new THREE.TubeGeometry(curve, 40, tubeRadius, 8, false);
                    
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: item.color, 
                        roughness: 0.4,
                        emissive: item.color,
                        emissiveIntensity: 0.6
                    });

                    const mesh = new THREE.Mesh(geo, mat);
                    
                    item.mesh = mesh;
                    item.tubeGeo = geo; // reference to animate draw range
                    item.midPos = midPos; // For label placement
                    
                    state.dataGroup.add(mesh);
                }
            });
        }

        // --- Hybrid Render Loop ---
        
        function easeOutQuint(x) {
            return 1 - Math.pow(1 - x, 5);
        }

        function renderFrame(progress) {
            // 1. Update 3D Scene Math
            const easeP = easeOutQuint(progress);
            
            // Continuous spin + Animation spin
            const timeOffset = Date.now() * 0.0001;
            // When animating, we add a deliberate spin over the duration
            const animSpin = easeP * Math.PI; 
            
            state.globeGroup.rotation.y = state.rotationY + (state.isAnimating ? animSpin : timeOffset);
            state.globeGroup.rotation.x = state.rotationX;
            
            state.dataGroup.rotation.copy(state.globeGroup.rotation);

            // Animate Data Geometries
            state.data.forEach(item => {
                if (!item.mesh) return;
                
                if (item.type === 'spike') {
                    // Scale the spike from 0 to 1 based on progress
                    const scaleY = Math.max(0.001, easeP); 
                    item.mesh.scale.set(1, scaleY, 1);
                } 
                else if (item.type === 'arc') {
                    // Reveal the tube over time
                    const maxDraw = item.tubeGeo.attributes.position.count;
                    item.tubeGeo.setDrawRange(0, maxDraw * easeP);
                }
            });

            // 2. Render WebGL
            state.renderer.render(state.scene, state.camera);

            // 3. Composite onto 2D Export Canvas
            const w = exportCanvas.width;
            const h = exportCanvas.height;
            
            // Background
            ctx.fillStyle = state.globeStyle === 'light' ? '#e2e8f0' : '#020617';
            ctx.fillRect(0, 0, w, h);

            // Draw WebGL Output
            ctx.drawImage(glCanvas, 0, 0, w, h);

            // 4. Draw Typography & Overlays (2D)
            const fontBase = state.fontFamily;
            const textColor = state.globeStyle === 'light' ? '#0f172a' : '#f8fafc';
            const subColor = state.globeStyle === 'light' ? '#475569' : '#94a3b8';

            ctx.textAlign = 'left';
            let currentY = 80;
            
            if (state.title) {
                ctx.textBaseline = 'top';
                ctx.font = `800 64px "${fontBase}"`;
                ctx.fillStyle = textColor;
                ctx.fillText(state.title, 80, currentY);
                currentY += 80;
            }
            if (state.subtitle) {
                ctx.textBaseline = 'top';
                ctx.font = `500 36px "${fontBase}"`;
                ctx.fillStyle = subColor;
                ctx.fillText(state.subtitle, 80, currentY);
            }
            if (state.source) {
                ctx.textBaseline = 'bottom';
                ctx.font = `600 20px "JetBrains Mono"`;
                ctx.fillStyle = subColor;
                ctx.fillText(state.source, 80, h - 40);
            }

            // 5. Draw 3D Data Labels Tracking in 2D
            if (state.showLabels && easeP > 0.5) {
                // Update matrix world to ensure accurate projections
                state.camera.updateMatrixWorld();
                
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.font = `700 22px "${fontBase}"`;
                
                // Fade labels in during the second half of animation
                ctx.globalAlpha = (easeP - 0.5) * 2; 

                state.data.forEach(item => {
                    let targetVec = new THREE.Vector3();
                    
                    if (item.type === 'spike') {
                        // Project the tip of the spike
                        // We need the local position of the tip, then apply the group's rotation
                        const localTip = item.basePos.clone().normalize().multiplyScalar(80 + item.maxHeight * easeP);
                        targetVec.copy(localTip).applyMatrix4(state.dataGroup.matrixWorld);
                    } else if (item.type === 'arc') {
                        // Project the midpoint of the arc
                        targetVec.copy(item.midPos).applyMatrix4(state.dataGroup.matrixWorld);
                    }

                    // Check if point is behind the globe (z < 0 relative to camera)
                    // Actually, simple dot product with camera dir is better
                    const camDir = new THREE.Vector3().subVectors(state.camera.position, targetVec).normalize();
                    const pointNormal = targetVec.clone().normalize(); // Assuming sphere at origin
                    
                    if (camDir.dot(pointNormal) > 0.1) { // Visible on front half
                        // Project to 2D screen space
                        targetVec.project(state.camera);
                        
                        const sx = (targetVec.x * 0.5 + 0.5) * w;
                        const sy = (-(targetVec.y * 0.5) + 0.5) * h;

                        // Draw Label
                        ctx.fillStyle = item.color;
                        ctx.fillText(item.label.toUpperCase(), sx, sy - 15);
                        
                        // Draw small anchor dot
                        ctx.beginPath();
                        ctx.arc(sx, sy, 4, 0, Math.PI*2);
                        ctx.fill();
                    }
                });
                ctx.globalAlpha = 1.0;
            }
        }

        // --- Interaction & State Sync ---
        function updateStateFromUI() {
            state.title = uiTitle.value;
            state.subtitle = uiSubtitle.value;
            state.source = uiSource.value;
            
            const oldStyle = state.globeStyle;
            const oldScale = state.dataScale;

            state.globeStyle = styleSelect.value;
            state.fontFamily = fontSelect.value;
            state.duration = parseFloat(durationSlider.value) * 1000;
            state.dataScale = parseFloat(scaleSlider.value);
            state.showLabels = showLabelsCheck.checked;

            parseCSV();

            if (oldStyle !== state.globeStyle) {
                rebuildGlobe();
            }
            if (oldScale !== state.dataScale) {
                rebuildDataGeometries();
            }
        }

        // Setup Template Buttons
        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const template = btn.getAttribute('data-template');
                if (templates[template]) {
                    uiTitle.value = templates[template].title;
                    uiSubtitle.value = templates[template].subtitle;
                    uiSource.value = templates[template].source;
                    styleSelect.value = templates[template].style;
                    dataInput.value = templates[template].csv;
                    
                    updateStateFromUI();
                    renderFrame(1.0);
                }
            });
        });

        // UI Listeners
        const inputs = [uiTitle, uiSubtitle, uiSource, dataInput, styleSelect, fontSelect];
        inputs.forEach(el => el.addEventListener('input', () => {
            updateStateFromUI();
            if(!state.isAnimating) renderFrame(1.0);
        }));
        
        durationSlider.addEventListener('input', (e) => { 
            document.getElementById('duration-val').textContent = e.target.value + 's';
            state.duration = parseFloat(e.target.value) * 1000;
        });

        scaleSlider.addEventListener('input', (e) => { 
            document.getElementById('scale-val').textContent = e.target.value + 'x';
            updateStateFromUI();
            if(!state.isAnimating) renderFrame(1.0);
        });

        showLabelsCheck.addEventListener('change', () => {
            state.showLabels = showLabelsCheck.checked;
            if(!state.isAnimating) renderFrame(1.0);
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // Mouse Rotation for Globe
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        canvasContainer.addEventListener('mousedown', (e) => { isDragging = true; });
        canvasContainer.addEventListener('mousemove', (e) => {
            if (isDragging && !state.isAnimating) {
                const deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
                state.rotationY += deltaMove.x * 0.01;
                state.rotationX += deltaMove.y * 0.01;
                
                // Clamp X rotation
                state.rotationX = Math.max(-Math.PI/2, Math.min(Math.PI/2, state.rotationX));
            }
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // Idle Render Loop (for continuous spin)
        function idleLoop() {
            if (!state.isAnimating && !state.isRecording) {
                renderFrame(1.0);
            }
            requestAnimationFrame(idleLoop);
        }

        // Initialization
        initThreeJS();
        updateStateFromUI();
        setTimeout(() => document.querySelector('[data-template="network"]').click(), 100);
        idleLoop();

        // --- Animation & Recording Engine ---
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const overlay = document.getElementById('recording-overlay');

        async function runAnimation(recordCallback = null) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            updateStateFromUI(); 
            
            if (recordCallback) await recordCallback();

            const startTime = performance.now();
            const durationMs = state.duration;
            const startRotY = state.rotationY; // Lock starting rotation

            return new Promise((resolve) => {
                function animLoop(currentTime) {
                    const elapsed = Math.max(0, currentTime - startTime);
                    let p = durationMs > 0 ? elapsed / durationMs : 1.0;
                    p = Math.max(0, Math.min(1, p));
                    
                    // Reset base rotation for animation consistency
                    state.rotationY = startRotY;
                    
                    state.progress = p;
                    renderFrame(p);

                    if (p < 1.0) {
                        requestAnimationFrame(animLoop);
                    } else {
                        state.isAnimating = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        resolve();
                    }
                }
                requestAnimationFrame(animLoop);
            });
        }

        btnAnimate.addEventListener('click', () => runAnimation());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimating || state.isRecording) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                // Capture the 2D COMPOSITE canvas, not the WebGL one
                const stream = exportCanvas.captureStream(60); 
                
                const format = document.getElementById('export-format').value;
                let options = { mimeType: `video/${format};codecs=vp9` };
                
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: `video/${format}` };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' };
                    }
                }

                // 10 Mbps for high quality 3D rendering
                options.videoBitsPerSecond = 10000000; 

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    const ext = options.mimeType.includes('mp4') ? 'mp4' : 'webm';
                    a.download = `flourish-3d-globe.${ext}`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                    state.progress = 1.0;
                };

                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');

                state.progress = 0;
                renderFrame(0);
                
                // Pump frames to guarantee MediaRecorder catches the start
                let idleInterval = setInterval(() => renderFrame(0), 16); // 60fps
                
                mediaRecorder.start();
                await new Promise(r => setTimeout(r, 500)); 
                clearInterval(idleInterval);
                
                await runAnimation();

                // Post-roll
                let endInterval = setInterval(() => renderFrame(1.0), 16);
                setTimeout(() => {
                    clearInterval(endInterval);
                    mediaRecorder.stop();
                }, 2000);

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                overlay.classList.remove('translate-y-4');
                overlay.classList.add('-translate-y-20');
                state.isAnimating = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                renderFrame(1.0);
            }
        });

    </script>
</body>
</html>
