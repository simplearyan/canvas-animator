<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roughboard Canvas</title>

    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Rough.js for hand-drawn shapes -->
    <script src="https://unpkg.com/roughjs@latest/bundled/rough.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Kalam Font for hand-drawn text -->
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">

    <!-- MathJax Configuration and Script for LaTeX -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'local' },
            startup: {
                ready: () => {
                    MathJax.startup.defaultReady();
                    window.mathJaxReady = true;
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fcfcfc;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Kalam', cursive;
            touch-action: none;
        }

        #board {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        /* Replaced @apply with standard CSS to guarantee visibility */
        .tool-btn {
            padding: 0.5rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            transition: all 0.2s;
            position: relative;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .tool-btn:hover {
            background-color: #f3f4f6;
        }

        .tool-btn.active {
            background-color: #eef2ff;
            color: #4f46e5;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(99, 102, 241, 0.2);
        }

        /* Guaranteed width, height, and display for Color Buttons */
        .color-btn {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 9999px;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            display: inline-block;
        }

        .color-btn.active {
            box-shadow: 0 0 0 2px #ffffff, 0 0 0 4px #6366f1;
            border-color: transparent;
            transform: scale(1.1);
        }

        /* Standard CSS Classes for Colors */
        .c-black  { background-color: #1e1e1e; }
        .c-gray   { background-color: #868e96; }
        .c-red    { background-color: #fa5252; }
        .c-orange { background-color: #fd7e14; }
        .c-yellow { background-color: #fcc419; }
        .c-green  { background-color: #40c057; }
        .c-blue   { background-color: #228be6; }
        .c-purple { background-color: #be4bdb; }
        .c-pink   { background-color: #f783ac; }

        #input-container {
            position: absolute;
            display: none;
            z-index: 50;
        }

        #text-input {
            background: transparent;
            border: 2px dashed #9ca3af;
            outline: none;
            resize: none;
            padding: 4px;
            font-family: 'Kalam', cursive;
            font-size: 24px;
            min-width: 200px;
            min-height: 40px;
            border-radius: 4px;
            line-height: 1.2;
        }

        /* Custom Tooltip */
        .tool-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -34px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            font-size: 11px;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            transform-origin: top center;
            z-index: 100;
            font-family: sans-serif;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .tool-btn:hover::after { 
            opacity: 1; 
            transform: translateX(-50%) translateY(2px);
        }
    </style>
</head>
<body>

    <!-- Canvas Element -->
    <canvas id="board"></canvas>

    <!-- Unified Top Toolbar -->
    <div class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur shadow-sm border border-gray-200 rounded-xl p-1.5 flex flex-wrap items-center justify-center gap-1 z-10 w-[96vw] max-w-fit font-sans">
        
        <!-- Selection & Freehand -->
        <button class="tool-btn" data-tool="select" data-tooltip="Select (V)"><i class="ph ph-cursor text-xl"></i></button>
        <div class="w-px h-5 bg-gray-200 mx-1 hidden sm:block"></div>
        <button class="tool-btn active" data-tool="pencil" data-tooltip="Freedraw (P)"><i class="ph ph-pencil text-xl"></i></button>
        <button class="tool-btn" data-tool="marker" data-tooltip="Marker (H)"><i class="ph ph-highlighter text-xl"></i></button>
        
        <!-- Shapes -->
        <div class="w-px h-5 bg-gray-200 mx-1 hidden sm:block"></div>
        <button class="tool-btn" data-tool="line" data-tooltip="Line (L)"><i class="ph ph-line-segment text-xl"></i></button>
        <button class="tool-btn" data-tool="arrow" data-tooltip="Arrow (A)"><i class="ph ph-arrow-up-right text-xl"></i></button>
        <button class="tool-btn" data-tool="rectangle" data-tooltip="Rectangle (R)"><i class="ph ph-rectangle text-xl"></i></button>
        <button class="tool-btn" data-tool="circle" data-tooltip="Circle (C)"><i class="ph ph-circle text-xl"></i></button>
        
        <!-- Text & Math -->
        <div class="w-px h-5 bg-gray-200 mx-1 hidden sm:block"></div>
        <button class="tool-btn" data-tool="text" data-tooltip="Text (T)"><i class="ph ph-text-t text-xl"></i></button>
        <button class="tool-btn" data-tool="math" data-tooltip="LaTeX Equation (M)"><i class="ph ph-function text-xl"></i></button>
        
        <!-- Actions -->
        <div class="w-px h-5 bg-gray-200 mx-1 hidden sm:block"></div>
        <button class="tool-btn" id="jitter-btn" data-tooltip="Toggle Jitter (J)"><i class="ph ph-scribble-loop text-xl"></i></button>
        <button class="tool-btn" id="undo-btn" data-tooltip="Undo (Ctrl+Z)"><i class="ph ph-arrow-u-up-left text-xl"></i></button>
        <button class="tool-btn text-red-500 hover:bg-red-50 hover:text-red-600" id="clear-btn" data-tooltip="Clear Board"><i class="ph ph-trash text-xl"></i></button>
    </div>

    <!-- Responsive Color Palette (Left on desktop, Bottom on mobile) -->
    <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 md:bottom-auto md:top-1/2 md:left-4 md:-translate-y-1/2 md:-translate-x-0 bg-white/95 backdrop-blur shadow-sm border border-gray-200 rounded-2xl p-2.5 flex flex-row md:flex-col gap-3 z-10 w-max max-w-[90vw] overflow-x-auto font-sans">
        <div class="color-btn c-black active" data-color="#1e1e1e" title="Black"></div>
        <div class="color-btn c-gray" data-color="#868e96" title="Gray"></div>
        <div class="color-btn c-red" data-color="#fa5252" title="Red"></div>
        <div class="color-btn c-orange" data-color="#fd7e14" title="Orange"></div>
        <div class="color-btn c-yellow" data-color="#fcc419" title="Yellow"></div>
        <div class="color-btn c-green" data-color="#40c057" title="Green"></div>
        <div class="color-btn c-blue" data-color="#228be6" title="Blue"></div>
        <div class="color-btn c-purple" data-color="#be4bdb" title="Purple"></div>
        <div class="color-btn c-pink" data-color="#f783ac" title="Pink"></div>
    </div>

    <!-- Hidden Input Container for Text and Math -->
    <div id="input-container">
        <textarea id="text-input" placeholder="Type here..."></textarea>
        <div id="math-hint" class="absolute -bottom-6 left-0 text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded shadow-sm whitespace-nowrap hidden font-sans font-medium">
            Enter LaTeX (e.g., E = mc^2). Press Enter to finish.
        </div>
    </div>

    <script>
        // --- Core Variables ---
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const inputContainer = document.getElementById('input-container');
        const textInput = document.getElementById('text-input');
        const mathHint = document.getElementById('math-hint');
        
        let rc; // RoughJS instance
        let elements = [];
        let isDrawing = false;
        let currentTool = 'pencil';
        let currentColor = '#1e1e1e';
        let currentElement = null;
        let isJitterEnabled = false;

        // Selection & Editing state
        let selectedIndex = -1;
        let isDragging = false;
        let dragLastX = 0;
        let dragLastY = 0;
        let lastClickTime = 0;
        let editingIndex = -1;

        // --- Setup & Resize ---
        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = `${window.innerWidth}px`;
            canvas.style.height = `${window.innerHeight}px`;
            ctx.scale(dpr, dpr);
            
            rc = rough.canvas(canvas);
            redraw();
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();

        function getSeed() {
            return Math.floor(Math.random() * 2147483648);
        }

        // --- UI Interactions ---
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.tool-btn.active')?.classList.remove('active');
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                
                // Adjust cursor based on tool
                if (['text', 'math'].includes(currentTool)) {
                    canvas.style.cursor = 'text';
                } else if (currentTool === 'select') {
                    canvas.style.cursor = 'default';
                } else {
                    canvas.style.cursor = 'crosshair';
                }
                
                // Clear selection if switching away from select tool
                if (currentTool !== 'select') {
                    selectedIndex = -1;
                    redraw();
                }
                
                hideInput();
            });
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.color-btn.active')?.classList.remove('active');
                btn.classList.add('active');
                currentColor = btn.dataset.color;
                textInput.style.color = currentColor;

                // Update selected element color
                if (selectedIndex > -1) {
                    elements[selectedIndex].color = currentColor;
                    redraw();
                }
            });
        });

        document.getElementById('jitter-btn').addEventListener('click', (e) => {
            isJitterEnabled = !isJitterEnabled;
            e.currentTarget.classList.toggle('active', isJitterEnabled);
            redraw();
        });

        document.getElementById('undo-btn').addEventListener('click', () => {
            elements.pop();
            selectedIndex = -1;
            redraw();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            elements = [];
            selectedIndex = -1;
            redraw();
        });

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            // Don't trigger shortcuts if user is typing
            if (document.activeElement === textInput) return;

            if (e.key.toLowerCase() === 'p') clickTool('pencil');
            if (e.key.toLowerCase() === 'h') clickTool('marker');
            if (e.key.toLowerCase() === 'a') clickTool('arrow');
            if (e.key.toLowerCase() === 'v') clickTool('select');
            if (e.key.toLowerCase() === 'l') clickTool('line');
            if (e.key.toLowerCase() === 'r') clickTool('rectangle');
            if (e.key.toLowerCase() === 'c') clickTool('circle');
            if (e.key.toLowerCase() === 't') clickTool('text');
            if (e.key.toLowerCase() === 'm') clickTool('math');
            if (e.key.toLowerCase() === 'j') document.getElementById('jitter-btn').click();
            if (e.ctrlKey && e.key === 'z') {
                elements.pop();
                selectedIndex = -1;
                redraw();
            }
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIndex > -1) {
                elements.splice(selectedIndex, 1);
                selectedIndex = -1;
                redraw();
            }
        });

        function clickTool(toolName) {
            const btn = document.querySelector(`.tool-btn[data-tool="${toolName}"]`);
            if (btn) btn.click();
        }

        // --- LaTeX Processing ---
        async function latexToImage(tex, color) {
            if (!window.mathJaxReady) {
                alert("MathJax is still loading, please wait a moment.");
                return null;
            }

            try {
                const node = MathJax.tex2svg(tex, {display: true});
                const svg = node.querySelector('svg');
                if (!svg) return null;

                // Apply current color to SVG
                svg.style.color = color;
                svg.setAttribute('color', color);
                
                const wStr = svg.getAttribute('width');
                const hStr = svg.getAttribute('height');
                if (wStr && wStr.includes('ex')) {
                    svg.setAttribute('width', (parseFloat(wStr) * 16) + 'px');
                }
                if (hStr && hStr.includes('ex')) {
                    svg.setAttribute('height', (parseFloat(hStr) * 16) + 'px');
                }

                const svgData = new XMLSerializer().serializeToString(svg);
                const svg64 = btoa(unescape(encodeURIComponent(svgData)));
                const image64 = 'data:image/svg+xml;base64,' + svg64;

                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = image64;
                });
            } catch (err) {
                console.error("LaTeX Rendering Error:", err);
                return null;
            }
        }

        // --- Text/Math Input Handling ---
        let inputPosition = { x: 0, y: 0 };

        function showInput(x, y, editIndex = -1) {
            inputPosition = { x, y };
            editingIndex = editIndex;
            inputContainer.style.display = 'block';
            inputContainer.style.left = `${x}px`;
            inputContainer.style.top = `${y}px`;
            
            if (editIndex > -1) {
                const el = elements[editIndex];
                textInput.value = el.text || "";
                currentColor = el.color;
                // Sync color UI
                document.querySelector('.color-btn.active')?.classList.remove('active');
                const matchingBtn = Array.from(document.querySelectorAll('.color-btn')).find(b => b.dataset.color.toUpperCase() === currentColor.toUpperCase());
                if (matchingBtn) matchingBtn.classList.add('active');
            } else {
                textInput.value = '';
            }
            
            textInput.style.color = currentColor;
            
            if (currentTool === 'math' && editIndex === -1) {
                mathHint.style.display = 'block';
                textInput.placeholder = "E = mc^2";
                textInput.style.fontFamily = 'monospace';
                textInput.style.fontSize = '20px';
            } else {
                mathHint.style.display = 'none';
                textInput.placeholder = "Type here...";
                textInput.style.fontFamily = "'Kalam', cursive";
                textInput.style.fontSize = '28px';
            }
            
            setTimeout(() => {
                textInput.focus();
            }, 50);
        }

        function hideInput() {
            inputContainer.style.display = 'none';
            textInput.value = '';
            editingIndex = -1;
        }

        async function finalizeInput() {
            if (inputContainer.style.display === 'none') return;
            const text = textInput.value.trim();
            
            if (text) {
                if (currentTool === 'text' || (editingIndex > -1 && elements[editingIndex].type === 'text')) {
                    if (editingIndex > -1) {
                        elements[editingIndex].text = text;
                        elements[editingIndex].color = currentColor;
                    } else {
                        elements.push({
                            type: 'text',
                            text: text,
                            x: inputPosition.x,
                            y: inputPosition.y,
                            color: currentColor
                        });
                    }
                    redraw();
                } else if (currentTool === 'math') {
                    textInput.value = "Generating...";
                    const img = await latexToImage(text, currentColor);
                    if (img) {
                        elements.push({
                            type: 'math',
                            img: img,
                            x: inputPosition.x,
                            y: inputPosition.y - (img.height / 2),
                            color: currentColor
                        });
                        redraw();
                    }
                }
            }
            hideInput();
        }

        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                finalizeInput();
            }
            if (e.key === 'Escape') hideInput();
        });

        textInput.addEventListener('blur', () => {
            setTimeout(finalizeInput, 100);
        });

        // --- Selection & Hit Testing ---
        function getBoundingBox(el) {
            if (el.type === 'pencil' || el.type === 'marker') {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                el.points.forEach(([x, y]) => {
                    if (x < minX) minX = x; if (y < minY) minY = y;
                    if (x > maxX) maxX = x; if (y > maxY) maxY = y;
                });
                return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
            } else if (['line', 'arrow', 'rectangle'].includes(el.type)) {
                const minX = Math.min(el.x1, el.x2), minY = Math.min(el.y1, el.y2);
                const maxX = Math.max(el.x1, el.x2), maxY = Math.max(el.y1, el.y2);
                return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
            } else if (el.type === 'circle') {
                const dx = el.x2 - el.x1, dy = el.y2 - el.y1;
                const r = Math.sqrt(dx*dx + dy*dy);
                return { x: el.x1 - r, y: el.y1 - r, w: r*2, h: r*2 };
            } else if (el.type === 'text') {
                ctx.font = '28px Kalam, cursive';
                const lines = el.text.split('\n');
                let maxW = 0;
                lines.forEach(line => { maxW = Math.max(maxW, ctx.measureText(line).width); });
                return { x: el.x, y: el.y, w: maxW, h: lines.length * 32 };
            } else if (el.type === 'math' && el.img) {
                return { x: el.x, y: el.y, w: el.img.width, h: el.img.height };
            }
            return { x: 0, y: 0, w: 0, h: 0 };
        }

        function hitTest(x, y) {
            for (let i = elements.length - 1; i >= 0; i--) {
                const box = getBoundingBox(elements[i]);
                const padding = 15;
                if (x >= box.x - padding && x <= box.x + box.w + padding &&
                    y >= box.y - padding && y <= box.y + box.h + padding) {
                    return i;
                }
            }
            return -1;
        }

        function moveElement(el, dx, dy) {
            if (el.type === 'pencil' || el.type === 'marker') {
                el.points = el.points.map(([px, py]) => [px + dx, py + dy]);
            } else if (['line', 'arrow', 'rectangle', 'circle'].includes(el.type)) {
                el.x1 += dx; el.y1 += dy;
                el.x2 += dx; el.y2 += dy;
            } else if (['text', 'math'].includes(el.type)) {
                el.x += dx; el.y += dy;
            }
        }

        // --- Mouse & Touch Event Handling ---
        function getCoordinates(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function handlePointerDown(e) {
            if (e.target !== canvas) return;
            
            const { x, y } = getCoordinates(e);

            if (currentTool === 'select') {
                const hitIndex = hitTest(x, y);
                const now = Date.now();
                const isDoubleClick = (now - lastClickTime) < 300;
                lastClickTime = now;

                if (hitIndex > -1) {
                    selectedIndex = hitIndex;
                    isDragging = true;
                    dragLastX = x;
                    dragLastY = y;

                    if (isDoubleClick && elements[selectedIndex].type === 'text') {
                        showInput(elements[selectedIndex].x, elements[selectedIndex].y, selectedIndex);
                        isDragging = false;
                    }
                } else {
                    selectedIndex = -1;
                }
                redraw();
                return;
            }

            if (currentTool === 'text' || currentTool === 'math') {
                if (inputContainer.style.display === 'none') {
                    showInput(x, y);
                }
                return;
            }

            isDrawing = true;
            
            if (currentTool === 'pencil' || currentTool === 'marker') {
                currentElement = { type: currentTool, points: [[x, y]], color: currentColor, seed: getSeed() };
            } else if (['line', 'arrow', 'rectangle', 'circle'].includes(currentTool)) {
                currentElement = { type: currentTool, x1: x, y1: y, x2: x, y2: y, color: currentColor, seed: getSeed() };
            }
            
            if (currentElement) {
                elements.push(currentElement);
            }
        }

        function handlePointerMove(e) {
            const { x, y } = getCoordinates(e);

            if (currentTool === 'select' && isDragging && selectedIndex > -1) {
                const dx = x - dragLastX;
                const dy = y - dragLastY;
                moveElement(elements[selectedIndex], dx, dy);
                dragLastX = x;
                dragLastY = y;
                redraw();
                return;
            }

            if (!isDrawing || !currentElement) return;

            if (currentTool === 'pencil' || currentTool === 'marker') {
                currentElement.points.push([x, y]);
            } else if (['line', 'arrow', 'rectangle', 'circle'].includes(currentTool)) {
                currentElement.x2 = x;
                currentElement.y2 = y;
            }
            
            redraw();
        }

        function handlePointerUp() {
            isDrawing = false;
            isDragging = false;
            currentElement = null;
        }

        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handlePointerMove(e); }, { passive: false });
        window.addEventListener('touchend', handlePointerUp);

        // --- Render Engine ---
        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            elements.forEach(el => {
                const seedToUse = isJitterEnabled ? getSeed() : el.seed;

                const options = { 
                    stroke: el.color, 
                    strokeWidth: 2.5, 
                    roughness: 1.2,
                    bowing: 1,
                    seed: seedToUse
                };

                if (el.type === 'pencil' && el.points.length > 1) {
                    rc.curve(el.points, options);
                } else if (el.type === 'marker' && el.points.length > 1) {
                    ctx.save();
                    ctx.globalAlpha = 0.4;
                    rc.curve(el.points, { ...options, strokeWidth: 16, roughness: 1.5 });
                    ctx.restore();
                } else if (el.type === 'line') {
                    rc.line(el.x1, el.y1, el.x2, el.y2, options);
                } else if (el.type === 'arrow') {
                    const angle = Math.atan2(el.y2 - el.y1, el.x2 - el.x1);
                    const headlen = 20; 
                    
                    // Main line
                    rc.line(el.x1, el.y1, el.x2, el.y2, options);
                    
                    // Arrowhead (drawn as continuous linear path)
                    const p1 = [el.x2 - headlen * Math.cos(angle - Math.PI / 6), el.y2 - headlen * Math.sin(angle - Math.PI / 6)];
                    const p2 = [el.x2, el.y2];
                    const p3 = [el.x2 - headlen * Math.cos(angle + Math.PI / 6), el.y2 - headlen * Math.sin(angle + Math.PI / 6)];
                    rc.linearPath([p1, p2, p3], options);
                } else if (el.type === 'rectangle') {
                    const w = el.x2 - el.x1;
                    const h = el.y2 - el.y1;
                    rc.rectangle(el.x1, el.y1, w, h, options);
                } else if (el.type === 'circle') {
                    const dx = el.x2 - el.x1;
                    const dy = el.y2 - el.y1;
                    const r = Math.sqrt(dx*dx + dy*dy);
                    rc.circle(el.x1, el.y1, r * 2, options);
                } else if (el.type === 'text') {
                    ctx.font = '28px Kalam, cursive';
                    ctx.fillStyle = el.color;
                    ctx.textBaseline = 'top';
                    const lines = el.text.split('\n');
                    lines.forEach((line, i) => {
                        ctx.fillText(line, el.x, el.y + (i * 32));
                    });
                } else if (el.type === 'math' && el.img) {
                    ctx.drawImage(el.img, el.x, el.y);
                }
            });

            // Draw Selection Box
            if (selectedIndex > -1 && elements[selectedIndex]) {
                const box = getBoundingBox(elements[selectedIndex]);
                ctx.save();
                ctx.strokeStyle = '#0EA5E9';
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 1.5;
                ctx.strokeRect(box.x - 6, box.y - 6, box.w + 12, box.h + 12);
                ctx.fillStyle = 'rgba(14, 165, 233, 0.1)';
                ctx.fillRect(box.x - 6, box.y - 6, box.w + 12, box.h + 12);
                ctx.restore();
            }
        }
    </script>
</body>
</html>
