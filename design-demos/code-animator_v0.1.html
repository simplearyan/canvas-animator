    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        
        /* Checkered background for canvas container to show transparency/padding */
        #canvas-container {
            touch-action: none;
            background-color: #f1f5f9;
            background-image: 
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            transition: background-color 0.3s ease;
        }
        .dark #canvas-container {
            background-color: #0f172a;
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
        }

        /* Custom scrollbars */

        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        textarea {
            tab-size: 4;
        }
    </style>
</head>

async function generateUniverse() {

                <div class="grid grid-cols-2 gap-4">

                            <button class="bg-color-btn w-6 h-6 rounded-full border-2 border-transparent hover:scale-110 transition ring-2 ring-offset-2 ring-brand-500 ring-offset-white dark:ring-offset-gray-800" data-color="#8b5cf6" style="background-color: #8b5cf6;"></button>
                            <button class="bg-color-btn w-6 h-6 rounded-full border-2 border-transparent hover:scale-110 transition ring-offset-white dark:ring-offset-gray-800" data-color="#ec4899" style="background-color: #ec4899;"></button>
                            <button class="bg-color-btn w-6 h-6 rounded-full border-2 border-transparent hover:scale-110 transition ring-offset-white dark:ring-offset-gray-800" data-color="#14b8a6" style="background-color: #14b8a6;"></button>
                            <button class="bg-color-btn w-6 h-6 rounded-full border-2 border-transparent hover:scale-110 transition ring-offset-white dark:ring-offset-gray-800" data-color="#1e293b" style="background-color: #1e293b;"></button>

        <!-- CANVAS AREA -->

    </main>

    <script>
        // --- Syntax Highlighting Themes Data ---
        const syntaxThemes = {
            'dracula': {
                bg: '#282a36',
                frame: '#1e1f29',
                text: '#f8f8f2',
                keyword: '#ff79c6',
                function: '#50fa7b',
                string: '#f1fa8c',
                comment: '#6272a4',
                number: '#bd93f9',
                operator: '#ff79c6',
                punctuation: '#f8f8f2',
                property: '#8be9fd',
                class: '#8be9fd'
            },
            'monokai': {
                bg: '#272822',
                frame: '#1e1f1c',
                text: '#f8f8f2',
                keyword: '#f92672',
                function: '#a6e22e',
                string: '#e6db74',
                comment: '#75715e',
                number: '#ae81ff',
                operator: '#f92672',
                punctuation: '#f8f8f2',
                property: '#66d9ef',
                class: '#a6e22e'
            },
            'github-dark': {
                bg: '#0d1117',
                frame: '#010409',
                text: '#c9d1d9',
                keyword: '#ff7b72',
                function: '#d2a8ff',
                string: '#a5d6ff',
                comment: '#8b949e',
                number: '#79c0ff',
                operator: '#c9d1d9',
                punctuation: '#c9d1d9',
                property: '#79c0ff',
                class: '#ff7b72'
            },
            'github-light': {
                bg: '#ffffff',
                frame: '#f6f8fa',
                text: '#24292f',
                keyword: '#cf222e',
                function: '#8250df',
                string: '#0a3069',
                comment: '#6e7781',
                number: '#0550ae',
                operator: '#24292f',
                punctuation: '#24292f',
                property: '#0550ae',
                class: '#cf222e'
            },
            'synthwave': {
                bg: '#2b213a',
                frame: '#1e1528',
                text: '#f92aad',
                keyword: '#f4eee4',
                function: '#36f9f6',
                string: '#ff8b39',
                comment: '#848bbd',
                number: '#f92aad',
                operator: '#f4eee4',
                punctuation: '#36f9f6',
                property: '#fdfdfd',
                class: '#f4eee4'
            }
        };

        // --- App State ---
        const state = {
            outerBg: '#8b5cf6',
            theme: 'dracula',
            language: 'javascript',
            animation: 'typewriter',
            fontSize: 20,
            isAnimating: false,
            isRecording: false,
            progress: 1.0 // 0.0 to 1.0
        };

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Disable alpha for better export
        
        // Fixed export resolution (1080p standard)
        canvas.width = 1920;
        canvas.height = 1080;

        // UI Elements
        const codeInput = document.getElementById('code-input');
        const languageSelect = document.getElementById('language-select');
        const themeSelect = document.getElementById('theme-select');
        const animationSelect = document.getElementById('animation-style');
        const fontSizeSlider = document.getElementById('font-size');

        // --- Tokenization Engine (Prism.js Wrapper) ---
        function flattenTokens(tokens, currentType = 'text') {
            let flat = [];
            for (let t of tokens) {
                if (typeof t === 'string') {
                    flat.push({ text: t, type: currentType });
                } else {
                    // Prism uses alias sometimes for fallback colors
                    const type = t.alias ? (Array.isArray(t.alias) ? t.alias[0] : t.alias) : t.type;
                    flat = flat.concat(flattenTokens(t.content, type));
                }
            }
            return flat;
        }

        function parseCode() {
            const code = codeInput.value;
            const lang = state.language;
            
            // Default to JS if grammar isn't loaded properly
            const grammar = Prism.languages[lang] || Prism.languages.javascript;
            const tokens = Prism.tokenize(code, grammar);
            
            return flattenTokens(tokens);
        }

        // --- Canvas Rendering Engine ---
        function renderFrame(progress) {
            const themeColors = syntaxThemes[state.theme];
            
            // 1. Draw Outer Background
            ctx.fillStyle = state.outerBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Calculate layout bounds
            const scaleMultiplier = state.fontSize / 20; // Base relative scaling
            const editorPadding = 60;
            const topBarHeight = 60;
            
            // Prepare code structure
            const flatTokens = parseCode();
            ctx.font = `${28 * scaleMultiplier}px "JetBrains Mono", monospace`;
            
            // Pre-calculate line widths to determine dynamic window size
            let maxLineWidth = 0;
            let currentLineWidth = 0;
            let lineCount = 1;
            
            flatTokens.forEach(token => {
                const lines = token.text.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (i > 0) {
                        maxLineWidth = Math.max(maxLineWidth, currentLineWidth);
                        currentLineWidth = 0;
                        lineCount++;
                    }
                    currentLineWidth += ctx.measureText(lines[i]).width;
                }
            });
            maxLineWidth = Math.max(maxLineWidth, currentLineWidth);

            // Window Dimensions
            const lineHeight = 42 * scaleMultiplier;
            const codeWidth = maxLineWidth;
            const codeHeight = lineCount * lineHeight;
            
            const windowWidth = Math.max(600, codeWidth + (editorPadding * 2));
            const windowHeight = Math.max(400, codeHeight + topBarHeight + (editorPadding * 2));
            
            // Center the window on canvas
            const startX = (canvas.width - windowWidth) / 2;
            const startY = (canvas.height - windowHeight) / 2;

            // 2. Draw Window Shadow
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            ctx.shadowBlur = 40;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 20;
            
            // 3. Draw Window Background
            ctx.fillStyle = themeColors.bg;
            ctx.beginPath();
            ctx.roundRect(startX, startY, windowWidth, windowHeight, 16);
            ctx.fill();
            
            ctx.shadowColor = 'transparent'; // Reset shadow for internal drawing

            // 4. Draw Window Top Bar (macOS style)
            ctx.fillStyle = themeColors.frame;
            ctx.beginPath();
            ctx.roundRect(startX, startY, windowWidth, topBarHeight, [16, 16, 0, 0]);
            ctx.fill();

            // Window controls (Red, Yellow, Green dots)
            const dotY = startY + (topBarHeight / 2);
            const dotRadius = 8;
            ctx.fillStyle = '#ff5f56'; // Red
            ctx.beginPath(); ctx.arc(startX + 30, dotY, dotRadius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffbd2e'; // Yellow
            ctx.beginPath(); ctx.arc(startX + 60, dotY, dotRadius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#27c93f'; // Green
            ctx.beginPath(); ctx.arc(startX + 90, dotY, dotRadius, 0, Math.PI*2); ctx.fill();

            // 5. Draw Code Tokens with Animation Logic
            
            // Animation Prep
            let totalChars = 0;
            if (state.animation === 'typewriter') {
                flatTokens.forEach(t => totalChars += t.text.length);
            }
            
            const charsToDraw = Math.floor(totalChars * progress);
            let charsDrawn = 0;
            
            let cx = startX + editorPadding;
            let cy = startY + topBarHeight + editorPadding + (lineHeight * 0.75); // baseline adj
            let currentLine = 0;

            for (let token of flatTokens) {
                // Map Prism type to theme color, fallback to plain text color
                const color = themeColors[token.type] || themeColors.text;
                ctx.fillStyle = color;

                const lines = token.text.split('\n');
                
                for (let i = 0; i < lines.length; i++) {
                    if (i > 0) {
                        cx = startX + editorPadding;
                        cy += lineHeight;
                        currentLine++;
                    }

                    let textSegment = lines[i];

                    // Handle Animations
                    if (state.animation === 'none') {
                        ctx.globalAlpha = 1.0;
                    } 
                    else if (state.animation === 'typewriter') {
                        if (charsDrawn + textSegment.length > charsToDraw) {
                            // Cut string to limits
                            const diff = charsToDraw - charsDrawn;
                            if (diff > 0) {
                                const sub = textSegment.substring(0, diff);
                                ctx.fillText(sub, cx, cy);
                                
                                // Draw cursor
                                ctx.fillStyle = themeColors.text;
                                ctx.fillRect(cx + ctx.measureText(sub).width + 2, cy - lineHeight*0.7, 10, lineHeight*0.8);
                            }
                            return; // Stop drawing everything else
                        }
                        charsDrawn += textSegment.length;
                    }
                    else if (state.animation === 'fade') {
                        // Global fade relative to lines
                        const lineProgress = Math.max(0, Math.min(1, (progress * lineCount) - currentLine));
                        ctx.globalAlpha = lineProgress;
                    }
                    else if (state.animation === 'slide-up') {
                        const lineProgress = Math.max(0, Math.min(1, (progress * lineCount) - currentLine));
                        ctx.globalAlpha = lineProgress;
                        const yOffset = (1 - lineProgress) * 20; // Slide up from 20px below
                        ctx.fillText(textSegment, cx, cy + yOffset);
                        cx += ctx.measureText(textSegment).width;
                        continue; // skip normal fillText
                    }

                    // Standard Draw
                    ctx.fillText(textSegment, cx, cy);
                    cx += ctx.measureText(textSegment).width;
                }
            }

            // Draw cursor at the very end if fully finished (typewriter)
            if (state.animation === 'typewriter' && progress >= 1.0) {
                // Blink cursor logic based on time (if not recording)
                if (state.isRecording || Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = themeColors.text;
                    ctx.fillRect(cx + 2, cy - lineHeight*0.7, 10, lineHeight*0.8);
                }
            }

            ctx.globalAlpha = 1.0; // reset
        }

        // Keep canvas updated live while editing
        function loop() {
            if (!state.isAnimating) {
                renderFrame(1.0); // Static preview
            }
            requestAnimationFrame(loop);
        }
        loop(); // Start idle render loop (useful for blinking cursor)

        // --- UI Event Listeners ---
        
        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // Input Bindings
        codeInput.addEventListener('input', () => renderFrame(1.0));
        languageSelect.addEventListener('change', (e) => { state.language = e.target.value; renderFrame(1.0); });
        themeSelect.addEventListener('change', (e) => { state.theme = e.target.value; renderFrame(1.0); });
        animationSelect.addEventListener('change', (e) => { state.animation = e.target.value; renderFrame(1.0); });
        fontSizeSlider.addEventListener('input', (e) => { state.fontSize = parseInt(e.target.value); renderFrame(1.0); });

        // Allow tab key in textarea
        codeInput.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
                renderFrame(1.0);
            }
        });

        // Background Color Pickers
        const bgBtns = document.querySelectorAll('.bg-color-btn');
        const customBgBtn = document.getElementById('custom-bg');

        function setBgBtnActive(btn) {
            bgBtns.forEach(b => b.classList.remove('ring-2', 'ring-brand-500'));
            customBgBtn.parentElement.classList.remove('ring-2', 'ring-brand-500');
            if (btn === customBgBtn) {
                customBgBtn.parentElement.classList.add('ring-2', 'ring-brand-500');
            } else {
                btn.classList.add('ring-2', 'ring-brand-500');
            }
            renderFrame(1.0);
        }

        bgBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                state.outerBg = e.target.getAttribute('data-color');
                setBgBtnActive(e.target);
            });
        });

        customBgBtn.addEventListener('input', (e) => {
            state.outerBg = e.target.value;
            setBgBtnActive(customBgBtn);
        });
        setBgBtnActive(bgBtns[0]);

        // --- Animation & Recording Logic ---
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const overlay = document.getElementById('recording-overlay');

        function getDuration() {
            if (state.animation === 'none') return 0;
            const textLength = codeInput.value.length;
            // Typewriter scales with length, others are fixed
            if (state.animation === 'typewriter') {
                return Math.max(2000, Math.min(8000, textLength * 20)); // Between 2s and 8s
            }
            return 2500; // 2.5s for fade/slide
        }

        async function runAnimation(recordCallback = null) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            const durationMs = getDuration();
            const fps = 60;
            const frames = Math.max(1, Math.floor((durationMs / 1000) * fps));
            
            if (recordCallback) await recordCallback();

            // Run animation loop via requestAnimationFrame for smooth UI, 
            // but tie progress to actual elapsed time.
            const startTime = performance.now();

            return new Promise((resolve) => {
                function animLoop(currentTime) {
                    const elapsed = currentTime - startTime;
                    let p = durationMs > 0 ? elapsed / durationMs : 1.0;
                    
                    if (p > 1.0) p = 1.0;
                    
                    // Apply easing for non-typewriter
                    if (state.animation !== 'typewriter' && state.animation !== 'none') {
                        // easeOutCubic
                        const ease = 1 - Math.pow(1 - p, 3);
                        renderFrame(ease);
                    } else {
                        renderFrame(p);
                    }

                    if (p < 1.0) {
                        requestAnimationFrame(animLoop);
                    } else {
                        state.isAnimating = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        resolve();
                    }
                }
                requestAnimationFrame(animLoop);
            });
        }

        btnAnimate.addEventListener('click', () => runAnimation());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimating || state.isRecording) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                // High quality stream capture
                const stream = canvas.captureStream(60);
                
                let options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm;codecs=vp8' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' };
                    }
                }

                // Higher bitrate for crisp text
                options.videoBitsPerSecond = 5000000; // 5 Mbps

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `code-snippet.webm`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                    renderFrame(1.0); // Reset UI
                };

                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');

                // Record: Hold first frame 0.5s, animate, hold last frame 1.5s
                await runAnimation(async () => {
                    mediaRecorder.start();
                    // Optional: pre-animation hold
                    await new Promise(r => setTimeout(r, 500));
                });

                // Post-animation hold
                setTimeout(() => {
                    mediaRecorder.stop();
                }, 1500);

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                overlay.classList.remove('translate-y-4');
                overlay.classList.add('-translate-y-20');
                state.isAnimating = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                renderFrame(1.0);
            }
        });

    </script>
</body>
</html>
