<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Animator (Blueprint Node)</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overscroll-behavior-y: none; }
        /* Blueprint Pattern */
        #canvas-container {
            background-color: #f1f5f9;
            background-image: 
                radial-gradient(#cbd5e1 1px, transparent 1px),
                radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex flex-col overflow-hidden font-sans">

    <!-- HEADER -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg shadow-sm">
                <i class="ph-bold ph-chart-bar text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-800 mt-0.5">Data Animator UI</h1>
        </div>
    </header>

    <!-- MAIN APP AREA -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Recording Overlay -->
        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-lg z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            Processing Media...
        </div>

        <!-- TOOLBAR / SIDEBAR -->
        <aside class="w-full md:w-[320px] bg-white border-b md:border-b-0 md:border-r border-gray-200 p-5 flex flex-col gap-6 overflow-y-auto z-10 flex-shrink-0">
            
            <div class="flex flex-col gap-4">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500">Export Settings</h2>
                
                <div>
                    <label class="block text-xs font-medium mb-1 text-gray-700">Format</label>
                    <select id="export-format" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm cursor-pointer border-r-8 border-transparent">
                        <option value="mp4">MP4 Video (.mp4)</option>
                        <option value="webm">WebM Video (.webm)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium mb-1 text-gray-700">Framerate</label>
                    <select id="export-fps" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm cursor-pointer border-r-8 border-transparent">
                        <option value="24">24 FPS (Cinematic)</option>
                        <option value="30">30 FPS (Standard)</option>
                        <option value="60" selected>60 FPS (Smooth)</option>
                    </select>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mt-auto pt-4 border-t border-gray-100">
                <button id="btn-animate" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-gray-100 text-gray-900 hover:bg-gray-200 rounded-lg font-bold transition disabled:opacity-50">
                    <i class="ph-fill ph-play-circle text-xl"></i> Preview Play
                </button>
                <div class="flex flex-col gap-2">
                    <button id="btn-record" class="flex-1 bg-red-500 hover:bg-red-600 text-white rounded-lg font-bold py-3 transition shadow-md disabled:opacity-50 flex items-center justify-center gap-2">
                        <i class="ph-fill ph-record text-xl"></i> Fast Record stream()
                    </button>
                    <button id="btn-render" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold py-3 transition shadow-md disabled:opacity-50 flex items-center justify-center gap-2">
                        <i class="ph-fill ph-cpu text-xl text-blue-200"></i> Render WebCodec
                    </button>
                </div>
            </div>
        </aside>

        <!-- CANVAS AREA -->
        <section id="canvas-container" class="flex-1 relative overflow-hidden flex items-center justify-center p-4 sm:p-8">
            <canvas id="main-canvas" class="w-full max-w-[1280px] aspect-video shadow-2xl rounded-lg bg-white border border-gray-200"></canvas>
        </section>

    </main>

    <!-- App Logic handled by Vite automatically parsing <script type="module"> -->
    <script type="module">
        import { Exporter } from '../core/exporter.js';

        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        // Fixed 1080p
        canvas.width = 1920;
        canvas.height = 1080;

        const durationMs = 4000;

        let lastData = [100, 200, 150, 400, 250];

        // The exact draw function to render any time `progress` between 0.0 and 1.0
        async function drawFrame(progress) {
            // Easing
            const easeP = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 80px "Inter", sans-serif';
            ctx.fillText('Data Animator Core Module', 100, 150);

            // Draw some animated bars
            const originX = 100;
            const originY = 900;
            const barWidth = 120;
            const gap = 40;

            for (let i = 0; i < lastData.length; i++) {
                const targetH = lastData[i] * 1.5;
                const currentH = targetH * easeP;
                
                const x = originX + (i * (barWidth + gap));
                const y = originY - currentH;

                ctx.fillStyle = '#2563eb';
                // Add staggered effect
                const localP = Math.max(0, Math.min(1, (easeP - (i * 0.05)) * 1.2));
                
                ctx.beginPath();
                ctx.roundRect(x, originY - (targetH * localP), barWidth, targetH * localP, [16, 16, 0, 0]);
                ctx.fill();
            }

            // Draw progress circle
            ctx.beginPath();
            ctx.arc(1700, 150, 60, 0, Math.PI * 2 * easeP);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 16;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        // Initialize our central Exporter
        const exporter = new Exporter(canvas, drawFrame);

        drawFrame(1.0); // Initial static draw

        // UI Binding
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const btnRender = document.getElementById('btn-render');
        const overlay = document.getElementById('recording-overlay');
        
        function setUI(state) {
            btnAnimate.disabled = state;
            btnRecord.disabled = state;
            btnRender.disabled = state;
            if (state) {
                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');
            } else {
                overlay.classList.remove('translate-y-4');
                overlay.classList.add('-translate-y-20');
            }
        }

        btnAnimate.addEventListener('click', async () => {
            setUI(true);
            const start = performance.now();
            const anim = (time) => {
                const p = Math.min(1.0, (time - start) / durationMs);
                drawFrame(p);
                if (p < 1) requestAnimationFrame(anim);
                else setUI(false);
            }
            requestAnimationFrame(anim);
        });

        btnRecord.addEventListener('click', async () => {
            const fmt = document.getElementById('export-format').value;
            const fps = parseInt(document.getElementById('export-fps').value, 10);
            
            setUI(true);
            await exporter.recordRealtime(fmt, fps, durationMs);
            setUI(false);
        });

        btnRender.addEventListener('click', async () => {
            const fmt = document.getElementById('export-format').value;
            const fps = parseInt(document.getElementById('export-fps').value, 10);
            
            setUI(true);
            await exporter.renderOffline(fmt, fps, durationMs, (progress) => {
                overlay.innerHTML = `<div class="w-3 h-3 bg-white rounded-full animate-pulse"></div> Rendering: ${progress.current} / ${progress.total}`;
            });
            setUI(false);
            overlay.innerHTML = `<div class="w-3 h-3 bg-white rounded-full animate-pulse"></div> Processing Media...`;
        });

    </script>
</body>
</html>
