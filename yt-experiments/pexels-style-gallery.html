<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free Motion Templates - Animator Studio (Pexels Style)</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            teal: '#05a081', /* Pexels Brand Color */
                            dark: '#1a1a1a',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        /* Hero Image/Banner Gradient */
        .hero-banner {
            position: relative;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            overflow: hidden;
            background-color: #f7f7f7;
        }
        
        .hero-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('https://images.pexels.com/photos/1743165/pexels-photo-1743165.jpeg?auto=compress&cs=tinysrgb&w=1600');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: 0;
        }

        /* Masonry Grid using CSS Columns */
        .masonry-grid {
            column-count: 1;
            column-gap: 24px;
            padding: 0 24px;
            max-width: 1800px;
            margin: 0 auto;
        }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1440px) { .masonry-grid { column-count: 4; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 24px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background-color: #f0f0f0;
            cursor: zoom-in;
        }

        /* Video / Thumbnail sizing */
        .masonry-item video, .masonry-item img {
            width: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        /* Overlay for Hover State */
        .masonry-item .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%);
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            pointer-events: none; /* Let hover trigger on parent */
        }

        .masonry-item:hover .overlay {
            opacity: 1;
        }
        
        .overlay-top {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .overlay-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Action Buttons */
        .action-btn {
            background-color: rgba(255, 255, 255, 0.9);
            color: #1a1a1a;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto; /* Re-enable clicks */
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .action-btn:hover {
            background-color: #ffffff;
        }
        .action-btn-icon {
            padding: 8px;
        }

        /* Top Navigation */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 50;
            transition: all 0.3s;
        }
        .header-scrolled {
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- TOP NAVIGATION -->
    <header id="main-header" class="w-full h-[72px] px-6 flex items-center justify-between">
        <div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
            <!-- Mock Logo -->
            <div class="w-8 h-8 bg-brand-dark rounded flex items-center justify-center">
                <i data-lucide="layers" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-brand-dark">Animator</span>
        </div>

        <div class="hidden lg:flex items-center gap-8 font-medium text-[15px] text-gray-700">
            <a href="#" class="hover:text-black flex items-center gap-1">Explore <i data-lucide="chevron-down" class="w-4 h-4"></i></a>
            <a href="#" class="hover:text-black">License</a>
            <a href="#" class="hover:text-black flex items-center gap-1">Tools <i data-lucide="chevron-down" class="w-4 h-4"></i></a>
            <button class="hover:text-black"><i data-lucide="bell" class="w-5 h-5"></i></button>
            <button class="hover:text-black"><i data-lucide="more-horizontal" class="w-5 h-5"></i></button>
            <button class="bg-brand-teal text-white px-6 py-2.5 rounded-md hover:bg-[#04886e] transition-colors font-semibold">Join</button>
        </div>
        
        <div class="lg:hidden flex items-center gap-4">
            <i data-lucide="search" class="w-6 h-6"></i>
            <i data-lucide="menu" class="w-6 h-6"></i>
        </div>
    </header>

    <!-- HERO BANNER -->
    <section class="hero-banner">
        <div class="relative z-10 w-full max-w-[850px] flex flex-col items-center">
            <h1 class="text-4xl md:text-5xl lg:text-[56px] font-bold text-center text-brand-dark leading-[1.1] tracking-tight mb-8">
                The best free motion templates, charts & studios shared by creators.
            </h1>
            
            <!-- Search Bar -->
            <div class="w-full bg-white rounded-lg shadow-lg flex items-center p-2 focus-within:shadow-xl transition-shadow">
                <div class="px-4 py-2 bg-gray-100 rounded-md text-sm font-semibold flex items-center gap-1 cursor-pointer">
                    Templates <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500"></i>
                </div>
                <input type="text" id="hero-search" placeholder="Search for free motion graphics or charts" class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-[17px] text-brand-dark placeholder-gray-400">
                <button class="p-3 text-gray-400 hover:text-brand-dark transition-colors">
                    <i data-lucide="search" class="w-6 h-6"></i>
                </button>
            </div>
            
            <!-- Trending tags under search -->
            <div class="flex items-center gap-3 mt-5 text-sm font-medium text-gray-600 flex-wrap justify-center">
                <span class="text-gray-400">Trending:</span>
                <a href="#" class="hover:text-black transition">bar chart race</a>, 
                <a href="#" class="hover:text-black transition">audio visualizer</a>, 
                <a href="#" class="hover:text-black transition">whiteboard</a>, 
                <a href="#" class="hover:text-black transition">kinetic typography</a>
            </div>
        </div>
    </section>

    <!-- MAIN CONTENT / TABS -->
    <main class="w-full pt-6 pb-20">
        
        <!-- Tabs -->
        <div class="flex items-center justify-center gap-8 font-semibold text-[15px] mb-8 border-b border-gray-200">
            <button class="pb-4 px-2 border-b-2 border-brand-dark text-brand-dark">Home</button>
            <button class="pb-4 px-2 text-gray-500 hover:text-brand-dark transition">Studios</button>
            <button class="pb-4 px-2 text-gray-500 hover:text-brand-dark transition">Leaderboard</button>
            <button class="pb-4 px-2 text-gray-500 hover:text-brand-dark transition">Challenges</button>
        </div>

        <!-- Filter / Sub-header -->
        <div class="max-w-[1800px] mx-auto px-6 mb-6 flex items-center justify-between">
            <h2 class="text-2xl font-bold tracking-tight">Free Stock Templates</h2>
            <button class="flex items-center gap-2 border border-gray-300 rounded-md px-4 py-2 font-semibold text-sm hover:border-gray-400 transition">
                Trending <i data-lucide="chevron-down" class="w-4 h-4"></i>
            </button>
        </div>
        
        <!-- Filter Pills (Scrollable) -->
        <div class="max-w-[1800px] mx-auto px-6 mb-8">
            <div class="flex gap-4 overflow-x-auto no-scrollbar py-2">
                <button class="flex items-center gap-2 px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:border-gray-400 transition whitespace-nowrap"><div class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center"><i data-lucide="bar-chart-2" class="w-3 h-3 text-blue-600"></i></div> Charts</button>
                <button class="flex items-center gap-2 px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:border-gray-400 transition whitespace-nowrap"><div class="w-6 h-6 rounded-full bg-purple-100 flex items-center justify-center"><i data-lucide="radio" class="w-3 h-3 text-purple-600"></i></div> Audio Viz</button>
                <button class="flex items-center gap-2 px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:border-gray-400 transition whitespace-nowrap"><div class="w-6 h-6 rounded-full bg-yellow-100 flex items-center justify-center"><i data-lucide="type" class="w-3 h-3 text-yellow-600"></i></div> Typography</button>
                <button class="flex items-center gap-2 px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:border-gray-400 transition whitespace-nowrap"><div class="w-6 h-6 rounded-full bg-green-100 flex items-center justify-center"><i data-lucide="aperture" class="w-3 h-3 text-green-600"></i></div> Particles</button>
                <button class="flex items-center gap-2 px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:border-gray-400 transition whitespace-nowrap"><div class="w-6 h-6 rounded-full bg-red-100 flex items-center justify-center"><i data-lucide="youtube" class="w-3 h-3 text-red-600"></i></div> YouTube Intros</button>
            </div>
        </div>

        <!-- MASONRY GALLERY -->
        <div id="masonry-gallery" class="masonry-grid">
            <!-- Items injected by JS -->
        </div>

    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Header Scroll Effect
        const header = document.getElementById('main-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                header.classList.add('header-scrolled');
            } else {
                header.classList.remove('header-scrolled');
            }
        });

        // Mock Data for the Gallery to simulate different aspect ratios (Masonry effect)
        // Since we want the "Pexels" vibe, we need different heights.
        const mockGalleryData = [
            { id: 1, type: 'video', src: 'mock-animation/16-9/editorial-chart.webm', title: 'Editorial Chart Animator', author: 'CanvasStudio', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=A', aspect: '16/9' },
            { id: 2, type: 'video', src: 'mock-animation/9-16/cinematic-motion-1080p-1777356376987.webm', title: 'Cinematic Motion Vertical', author: 'MotionGenius', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=B', aspect: '9/16' },
            { id: 3, type: 'video', src: 'mock-animation/16-9/annotation-pro-2560w-solid-1777291438316.webm', title: 'Annotation Pro', author: 'DesignLab', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=C', aspect: '16/9' },
            { id: 4, type: 'video', src: 'mock-animation/1-1/square-anim.webm', title: 'Square Post Animation', author: 'SocialBuilder', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=D', aspect: '1/1' },
            { id: 5, type: 'video', src: 'mock-animation/16-9/editorial-chart (1).webm', title: 'Bar Chart Race', author: 'DataVizHQ', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=E', aspect: '16/9' },
            { id: 6, type: 'video', src: 'mock-animation/9-16/tiktok-dance.webm', title: 'TikTok Template', author: 'TrendSetter', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=F', aspect: '9/16' },
            { id: 7, type: 'video', src: 'mock-animation/16-9/editorial-chart (2).webm', title: 'Newsroom Graphics', author: 'NewsAnimator', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=G', aspect: '16/9' },
            { id: 8, type: 'video', src: 'mock-animation/4-3/presentation.webm', title: 'Pitch Deck Slide', author: 'CorpDesign', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=H', aspect: '4/3' }
        ];

        // Function to render the Masonry Grid
        async function loadPexelsGallery() {
            const container = document.getElementById('masonry-gallery');
            
            // In a real scenario, we fetch from gallery-data.json. 
            // For this prototype, if fetch fails, we fallback to mock data to show the layout.
            let itemsToRender = mockGalleryData;
            try {
                const response = await fetch('gallery-data.json');
                if (response.ok) {
                    const data = await response.json();
                    if(data.items && data.items.length > 0) {
                        // Map the real data to fit our layout needs
                        itemsToRender = data.items.map((item, idx) => ({
                            id: idx,
                            type: 'video',
                            src: item.preview || item.file,
                            title: item.title,
                            author: 'Creator ' + idx,
                            avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${item.title}`,
                            // Randomize aspect ratio for masonry effect if not provided
                            aspect: Math.random() > 0.5 ? '16/9' : (Math.random() > 0.5 ? '9/16' : '1/1')
                        }));
                    }
                }
            } catch (e) {
                console.log("Using mock data for Pexels gallery prototype");
            }

            // Duplicate items to make the grid look full for the prototype
            const displayItems = [...itemsToRender, ...itemsToRender, ...itemsToRender].slice(0, 15);

            displayItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'masonry-item group';
                
                // Add padding-bottom trick for aspect ratio if the video isn't loaded yet
                let pb = '56.25%'; // 16:9
                if(item.aspect === '9/16') pb = '177.77%';
                if(item.aspect === '1/1') pb = '100%';
                if(item.aspect === '4/3') pb = '75%';

                card.innerHTML = `
                    <div style="position: relative; width: 100%; padding-bottom: ${pb}; background: #e5e7eb;">
                        <!-- Mock Video Element -->
                        <video 
                            src="${item.src}" 
                            class="absolute inset-0 w-full h-full object-cover"
                            loop muted playsinline
                        ></video>
                        
                        <!-- Overlay UI -->
                        <div class="overlay">
                            <div class="overlay-top">
                                <button class="action-btn action-btn-icon" aria-label="Bookmark">
                                    <i data-lucide="bookmark" class="w-5 h-5"></i>
                                </button>
                                <button class="action-btn action-btn-icon" aria-label="Like">
                                    <i data-lucide="heart" class="w-5 h-5"></i>
                                </button>
                            </div>
                            <div class="overlay-bottom">
                                <div class="flex items-center gap-3 text-white">
                                    <div class="w-8 h-8 rounded-full overflow-hidden border-2 border-white/30 bg-white">
                                        <img src="${item.avatar}" alt="${item.author}" class="w-full h-full object-cover">
                                    </div>
                                    <span class="font-semibold text-[15px] drop-shadow-md">${item.author}</span>
                                </div>
                                <button class="action-btn action-btn-icon" aria-label="Download">
                                    <i data-lucide="download" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                // Hover to play logic
                card.addEventListener('mouseenter', () => {
                    const video = card.querySelector('video');
                    if (video) video.play().catch(e => console.log("Autoplay prevented"));
                });
                
                card.addEventListener('mouseleave', () => {
                    const video = card.querySelector('video');
                    if (video) {
                        video.pause();
                        video.currentTime = 0;
                    }
                });

                container.appendChild(card);
            });
            
            lucide.createIcons();
        }

        loadPexelsGallery();

        // Search interaction
        document.getElementById('hero-search').addEventListener('focus', function() {
            this.parentElement.classList.add('ring-2', 'ring-brand-teal', 'ring-opacity-50');
        });
        document.getElementById('hero-search').addEventListener('blur', function() {
            this.parentElement.classList.remove('ring-2', 'ring-brand-teal', 'ring-opacity-50');
        });

    </script>
</body>
</html>
