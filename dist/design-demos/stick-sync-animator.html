    <style>
        body {

            overscroll-behavior-y: none;

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;

            border-radius: 50%;

            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;

            cursor: pointer;
            background: #cbd5e1;

            background: #475569;

        ::-webkit-scrollbar { width: 8px; height: 8px; }

                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="O"><b class="block text-gray-900 dark:text-white pointer-events-none">O</b>Round</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="U"><b class="block text-gray-900 dark:text-white pointer-events-none">U_W</b>Pucker</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="M"><b class="block text-gray-900 dark:text-white pointer-events-none">M_B_P</b>Closed</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="F"><b class="block text-gray-900 dark:text-white pointer-events-none">F_V</b>Bite</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="L"><b class="block text-gray-900 dark:text-white pointer-events-none">L_N</b>Tongue</button>

            <!-- Action Buttons -->

        <!-- CANVAS AREA -->
        <section id="canvas-wrapper" class="flex-1 relative overflow-hidden flex items-center justify-center p-4 sm:p-8">

    <script>
        // --- App State ---
        const state = {
            currentViseme: 'REST',
            action: 'idle',
            colors: {
                bg: '#f8fafc',
                stick: '#f97316' // Orange default
            },
            speedMs: 100, // ms per character
            audioPreview: true,
            isAnimatingLips: false,
            isRecording: false,
            timeline: []
        };

        // --- Custom Phoneme Dictionary ---
        const phonemeMap = {
            'a': 'A', 'i': 'A',
            'e': 'E', 'y': 'E',
            'o': 'O',
            'u': 'U', 'w': 'U', 'q': 'U',
            'b': 'M', 'm': 'M', 'p': 'M',
            'f': 'F', 'v': 'F',
            'l': 'L', 'n': 'L',
            'c': 'E', 'd': 'E', 'g': 'E', 'k': 'E', 's': 'E', 't': 'E', 'x': 'E', 'z': 'E', 'h': 'E', 'j': 'E',
            ' ': 'REST', '.': 'REST', ',': 'REST', '!': 'REST', '?': 'REST'
        };

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // High-res square canvas
        canvas.width = 1000;
        canvas.height = 1000;

        // DOM Elements
        const scriptInput = document.getElementById('script-input');
        const speedSlider = document.getElementById('speech-speed');
        const audioPreviewCheck = document.getElementById('audio-preview');
        
        const colorBg = document.getElementById('bg-color');
        const actionSelect = document.getElementById('action-select');
        const currentWordDisplay = document.getElementById('current-word');

        // --- Text Parser Engine ---
        function generateTimeline(text) {
            const timeline = [];
            let currentTime = 0;
            const chars = text.toLowerCase().split('');

            for (let i = 0; i < chars.length; i++) {
                const char = chars[i];
                let viseme = phonemeMap[char] || 'REST';
                
                let duration = state.speedMs;
                if (char === ' ') duration = state.speedMs * 1.5;
                if (['.', ',', '!', '?'].includes(char)) duration = state.speedMs * 4;

                timeline.push({
                    char: char,
                    viseme: viseme,
                    duration: duration,
                    startTime: currentTime
                });

                currentTime += duration;
            }

            timeline.push({ char: '', viseme: 'REST', duration: 500, startTime: currentTime });
            return { timeline, totalDuration: currentTime + 500 };
        }

        // --- Stick Figure Skeleton Engine ---
        function drawBackground() {
            ctx.fillStyle = state.colors.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawLimb(startX, startY, angle1, length1, angle2, length2, isArm) {
            ctx.save();
            ctx.translate(startX, startY);
            ctx.rotate(angle1);
            
            // Draw upper segment
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, length1);
            ctx.stroke();

            // Move to joint
            ctx.translate(0, length1);
            ctx.rotate(angle2);
            
            // Draw lower segment
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, length2);
            ctx.stroke();

            ctx.restore();
        }

        function drawFace(headX, headY, headRadius) {
            ctx.save();
            ctx.translate(headX, headY);

            // Blinking logic
            const time = Date.now();
            const isBlinking = (time % 3500) > 3350;

            // Draw Eyes
            ctx.fillStyle = state.colors.stick;
            const eyeSpacing = 20;
            const eyeYOffset = -10;
            const eyeSize = 8;

            if (isBlinking) {
                ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(-eyeSpacing - 10, eyeYOffset); ctx.quadraticCurveTo(-eyeSpacing, eyeYOffset + 10, -eyeSpacing + 10, eyeYOffset); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(eyeSpacing - 10, eyeYOffset); ctx.quadraticCurveTo(eyeSpacing, eyeYOffset + 10, eyeSpacing + 10, eyeYOffset); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(-eyeSpacing, eyeYOffset, eyeSize, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeSpacing, eyeYOffset, eyeSize, 0, Math.PI*2); ctx.fill();
            }

            // Draw Mouth (Lip Sync)
            ctx.translate(0, 20); // Move down to mouth area
            drawMouthViseme(state.currentViseme);

            ctx.restore();
        }

        function drawMouthViseme(viseme) {
            ctx.lineWidth = 6;
            ctx.strokeStyle = state.colors.stick;
            ctx.fillStyle = state.colors.stick;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            switch (viseme) {
                case 'REST':
                case 'M': // Closed
                    ctx.beginPath();
                    ctx.moveTo(-15, 0);
                    ctx.quadraticCurveTo(0, 5, 15, 0);
                    ctx.stroke();
                    break;
                case 'A': // Wide open
                    ctx.beginPath();
                    ctx.ellipse(0, 5, 15, 20, 0, 0, Math.PI*2);
                    ctx.fill();
                    break;
                case 'E': // Smiling teeth
                    ctx.beginPath();
                    ctx.moveTo(-20, -5);
                    ctx.quadraticCurveTo(0, 10, 20, -5);
                    ctx.quadraticCurveTo(0, 20, -20, -5);
                    ctx.fill();
                    break;
                case 'O': // Round
                    ctx.beginPath();
                    ctx.arc(0, 5, 12, 0, Math.PI*2);
                    ctx.fill();
                    break;
                case 'U': // Tight Pucker
                    ctx.beginPath();
                    ctx.arc(0, 5, 6, 0, Math.PI*2);
                    ctx.fill();
                    break;
                case 'F': // Bite
                    ctx.beginPath();
                    ctx.moveTo(-15, 0);
                    ctx.quadraticCurveTo(0, 15, 15, 0);
                    ctx.stroke();
                    ctx.fillRect(-10, -5, 20, 8); // White teeth overlay block? No, keep it solid stick color for simplicity
                    break;
                case 'L': // Tongue up
                    ctx.beginPath();
                    ctx.moveTo(-15, 0);
                    ctx.quadraticCurveTo(0, 20, 15, 0);
                    ctx.fill();
                    break;
            }
        }

        // Main Kinematics & Rendering Loop
        function renderFrame() {
            drawBackground();

            const t = Date.now() / 1000; // seconds
            
            // Base properties matching the reference image thick strokes
            ctx.lineWidth = 28;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = state.colors.stick;

            // --- Kinematics based on Action State ---
            let bounceY = 0;
            let leanAngle = 0;
            
            // Angles (0 is straight down relative to attachment point)
            let lArm1 = 0.4, lArm2 = 0;
            let rArm1 = -0.4, rArm2 = 0;
            let lLeg1 = 0.2, lLeg2 = 0;
            let rLeg1 = -0.2, rLeg2 = 0;

            const speed = 6; // base animation speed multiplier

            if (state.action === 'idle') {
                bounceY = Math.sin(t * 3) * 5;
                lArm1 = 0.3 + Math.sin(t * 2) * 0.05; 
                rArm1 = -0.3 - Math.sin(t * 2) * 0.05;
                lLeg1 = 0.15; rLeg1 = -0.15;
            } 
            else if (state.action === 'wave') {
                bounceY = Math.sin(t * 3) * 5;
                lArm1 = 0.3;
                // Waving right arm high
                rArm1 = Math.PI - 0.5 + Math.sin(t * 15) * 0.4;
                rArm2 = 0; // Keep straight or slightly bent
                lLeg1 = 0.15; rLeg1 = -0.15;
            } 
            else if (state.action === 'walk') {
                bounceY = Math.abs(Math.sin(t * speed)) * -15;
                
                lLeg1 = Math.sin(t * speed) * 0.7;
                rLeg1 = Math.sin(t * speed + Math.PI) * 0.7;
                
                // Bend knees when lifting leg back
                lLeg2 = lLeg1 < 0 ? Math.sin(t * speed) * 0.8 : 0.1;
                rLeg2 = rLeg1 < 0 ? Math.sin(t * speed + Math.PI) * 0.8 : 0.1;

                // Arms swing opposite
                lArm1 = -lLeg1 * 0.8;
                rArm1 = -rLeg1 * 0.8;
                lArm2 = lArm1 < 0 ? -0.5 : 0;
                rArm2 = rArm1 < 0 ? -0.5 : 0;
            }
            else if (state.action === 'run') {
                bounceY = Math.abs(Math.sin(t * speed * 1.5)) * -25;
                leanAngle = 0.3; // Lean forward
                
                lLeg1 = Math.sin(t * speed * 1.5) * 1.2;
                rLeg1 = Math.sin(t * speed * 1.5 + Math.PI) * 1.2;
                
                // High knee bending
                lLeg2 = lLeg1 < 0 ? 1.5 : 0.2;
                rLeg2 = rLeg1 < 0 ? 1.5 : 0.2;

                lArm1 = -lLeg1 * 1.2;
                rArm1 = -rLeg1 * 1.2;
                
                // Keep elbows bent for running
                lArm2 = -1.2; 
                rArm2 = -1.2;
            }
            else if (state.action === 'dance') {
                bounceY = Math.abs(Math.sin(t * 8)) * -20;
                leanAngle = Math.sin(t * 4) * 0.2;
                
                lArm1 = Math.PI/2 + Math.sin(t * 8) * 1.5;
                rArm1 = -Math.PI/2 + Math.cos(t * 8) * 1.5;
                lArm2 = Math.sin(t * 6);
                rArm2 = Math.cos(t * 6);

                lLeg1 = 0.3 + Math.sin(t * 4) * 0.4;
                rLeg1 = -0.3 + Math.cos(t * 4) * 0.4;
                lLeg2 = Math.abs(Math.sin(t * 8)) * 0.8;
                rLeg2 = Math.abs(Math.cos(t * 8)) * 0.8;
            }

            // --- Structure Dimensions ---
            const headRadius = 75;
            const bodyLength = 200;
            const armLen1 = 110, armLen2 = 100;
            const legLen1 = 130, legLen2 = 120;

            // Center of Canvas
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.save();
            // Center the entire figure and apply bounce
            ctx.translate(cx, cy + bounceY);

            // Draw Head First
            ctx.beginPath();
            ctx.arc(0, -bodyLength/2 - headRadius, headRadius, 0, Math.PI*2);
            ctx.stroke();

            // Draw Face Elements inside the head
            drawFace(0, -bodyLength/2 - headRadius, headRadius);

            // Apply body lean
            ctx.rotate(leanAngle);

            const shoulderY = -bodyLength/2 + 20;
            const pelvisY = bodyLength/2;

            // Draw Body Line
            ctx.beginPath();
            ctx.moveTo(0, -bodyLength/2);
            ctx.lineTo(0, pelvisY);
            ctx.stroke();

            // Draw Left Limbs (Back)
            drawLimb(0, shoulderY, lArm1, armLen1, lArm2, armLen2, true);
            drawLimb(0, pelvisY, lLeg1, legLen1, lLeg2, legLen2, false);

            // Draw Right Limbs (Front)
            drawLimb(0, shoulderY, rArm1, armLen1, rArm2, armLen2, true);
            drawLimb(0, pelvisY, rLeg1, legLen1, rLeg2, legLen2, false);

            ctx.restore();

            requestAnimationFrame(renderFrame);
        }

        // --- UI Interactions ---
        function updateStyles() {
            state.colors.bg = colorBg.value;
        }

        colorBg.addEventListener('input', updateStyles);

        const colorBtns = document.querySelectorAll('.color-btn');
        const customColorBtn = document.getElementById('custom-color');

        function setActiveColorBtn(btn) {
            colorBtns.forEach(b => b.classList.remove('ring-brand-500'));
            customColorBtn.parentElement.classList.remove('ring-2', 'ring-brand-500', 'ring-offset-2');
            if (btn === customColorBtn) {
                customColorBtn.parentElement.classList.add('ring-2', 'ring-brand-500', 'ring-offset-2');
            } else {
                btn.classList.add('ring-brand-500');
            }
        }

        colorBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                state.colors.stick = e.target.getAttribute('data-color');
                setActiveColorBtn(e.target);
            });
        });

        customColorBtn.addEventListener('input', (e) => {
            state.colors.stick = e.target.value;
            setActiveColorBtn(customColorBtn);
        });

        actionSelect.addEventListener('change', (e) => {
            state.action = e.target.value;
        });

        speedSlider.addEventListener('input', (e) => {
            state.speedMs = parseInt(e.target.value);
            document.getElementById('speed-val').textContent = state.speedMs + 'ms/char';
        });

        audioPreviewCheck.addEventListener('change', (e) => {
            state.audioPreview = e.target.checked;
        });

        document.querySelectorAll('.viseme-test-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (state.isAnimatingLips) return;
                state.currentViseme = e.target.getAttribute('data-v');
                currentWordDisplay.textContent = `Testing: ${state.currentViseme}`;
            });
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        document.getElementById('load-sample').addEventListener('click', () => {
            scriptInput.value = "Look at me! I am walking and talking at the exact same time. This is so cool!";
            actionSelect.value = 'walk';
            state.action = 'walk';
        });

        // Initialize & start continuous loop
        updateStyles();
        setActiveColorBtn(colorBtns[3]); // Start with Orange as default!
        requestAnimationFrame(renderFrame);

        // --- Audio & Recording Engine ---
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const overlay = document.getElementById('recording-overlay');

        async function runLipSync(recordCallback = null) {
            if (state.isAnimatingLips) return;
            state.isAnimatingLips = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            const text = scriptInput.value.trim();
            if (!text) {
                state.isAnimatingLips = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                return;
            }

            const { timeline, totalDuration } = generateTimeline(text);
            
            if (state.audioPreview && !recordCallback) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                
                const estimatedNormalDuration = text.length * 75;
                const calculatedRate = estimatedNormalDuration / totalDuration;
                
                utterance.rate = Math.max(0.1, Math.min(10, calculatedRate)); 
                window.speechSynthesis.speak(utterance);
            }
            
            if (recordCallback) await recordCallback();

            const startTime = performance.now();

            return new Promise((resolve) => {
                function loop(currentTime) {
                    const elapsed = currentTime - startTime;

                    let activeFrame = timeline[timeline.length - 1]; 
                    for (let i = 0; i < timeline.length; i++) {
                        if (elapsed >= timeline[i].startTime && elapsed < timeline[i].startTime + timeline[i].duration) {
                            activeFrame = timeline[i];
                            break;
                        }
                    }

                    if (state.currentViseme !== activeFrame.viseme) {
                        state.currentViseme = activeFrame.viseme;
                        
                        if (activeFrame.char) {
                            currentWordDisplay.innerHTML = `<span class="text-brand-500 font-bold text-lg mr-2">${activeFrame.char.toUpperCase()}</span> -> [${activeFrame.viseme}]`;
                        } else {
                            currentWordDisplay.textContent = "Resting...";
                        }
                    }

                    if (elapsed < totalDuration) {
                        requestAnimationFrame(loop);
                    } else {
                        state.currentViseme = 'REST';
                        currentWordDisplay.textContent = "Finished.";
                        state.isAnimatingLips = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        resolve();
                    }
                }
                requestAnimationFrame(loop);
            });
        }

        btnAnimate.addEventListener('click', () => runLipSync());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimatingLips || state.isRecording) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                const stream = canvas.captureStream(60);
                
                let options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm;codecs=vp8' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' };
                    }
                }

                options.videoBitsPerSecond = 5000000;

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `sticksync-animation.webm`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                };

                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');

                state.currentViseme = 'REST';
                
                await new Promise(r => setTimeout(r, 500)); 
                mediaRecorder.start();
                
                await runLipSync();

                setTimeout(() => {
                    mediaRecorder.stop();
                }, 1000);

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                overlay.classList.remove('translate-y-4');
                overlay.classList.add('-translate-y-20');
                state.isAnimatingLips = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
            }
        });

    </script>
</body>
</html>
