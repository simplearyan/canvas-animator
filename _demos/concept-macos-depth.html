<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Animator | Gallery — macOS Depth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Light Mode Variables */
            --bg-base: #f5f5f7;
            --bg-sidebar: rgba(236, 236, 235, 0.6);
            --bg-content: #ffffff;
            --bg-menubar: rgba(255, 255, 255, 0.75);
            
            --bg-surface: #ffffff;
            --bg-surface-hover: #f1f1f2;
            --bg-input: #f0f0f1;
            
            --border: rgba(0, 0, 0, 0.1);
            --border-highlight: rgba(255, 255, 255, 0.8);
            
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            
            --accent: #007aff;
            --accent-text: #ffffff;
            
            /* Depth Shadows */
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.02);
            --shadow-card-hover: 0 12px 24px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.04);
            --shadow-inset-soft: inset 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-inset-deep: inset 0 1px 4px rgba(0, 0, 0, 0.1);
            --shadow-convex: inset 0 1px 0 rgba(255, 255, 255, 1), 0 1px 2px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            /* Dark Mode Variables */
            --bg-base: #000000;
            --bg-sidebar: rgba(30, 30, 30, 0.6);
            --bg-content: #1e1e1e;
            --bg-menubar: rgba(35, 35, 35, 0.75);
            
            --bg-surface: #2c2c2e;
            --bg-surface-hover: #3a3a3c;
            --bg-input: #1c1c1e;
            
            --border: rgba(255, 255, 255, 0.1);
            --border-highlight: rgba(255, 255, 255, 0.05);
            
            --text-main: #f5f5f7;
            --text-muted: #98989d;
            
            --accent: #0a84ff;
            --accent-text: #ffffff;
            
            /* Depth Shadows */
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-card-hover: 0 16px 32px rgba(0, 0, 0, 0.5), 0 4px 8px rgba(0, 0, 0, 0.3);
            --shadow-inset-soft: inset 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-inset-deep: inset 0 2px 5px rgba(0, 0, 0, 0.5);
            --shadow-convex: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 1px 2px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, 'SF Pro Display', 'Inter', BlinkMacSystemFont, sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        /* Fake macOS Window Wrapper */
        .macos-window {
            width: 100%;
            max-width: 1600px;
            height: calc(100vh - 40px);
            background: var(--bg-content);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 1px var(--border);
            position: relative;
            transition: all 0.3s ease;
        }
        /* Inner shadow for window depth */
        .macos-window::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            box-shadow: inset 0 1px 0 var(--border-highlight);
            pointer-events: none;
            z-index: 1000;
        }

        /* Menubar */
        .macos-menubar {
            background: var(--bg-menubar);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
            box-shadow: 0 1px 0 var(--border-highlight) inset;
        }
        .traffic-lights {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .tl { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), inset 0 -1px 2px rgba(0,0,0,0.1), 0 1px 1px rgba(0,0,0,0.1);
        }
        .tl-close  { background: linear-gradient(135deg, #ff5f56, #e0443e); border: 1px solid rgba(224, 68, 62, 0.5); }
        .tl-min    { background: linear-gradient(135deg, #ffbd2e, #dea123); border: 1px solid rgba(222, 161, 35, 0.5); }
        .tl-max    { background: linear-gradient(135deg, #27c93f, #1da831); border: 1px solid rgba(29, 168, 49, 0.5); }

        .macos-search-wrap {
            position: relative;
            flex: 1;
            max-width: 480px;
            margin: 0 auto;
        }
        .macos-search {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 14px 6px 32px;
            font-size: 13px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            box-shadow: var(--shadow-inset-soft);
        }
        .macos-search::placeholder { color: var(--text-muted); }
        .macos-search:focus {
            box-shadow: var(--shadow-inset-soft), 0 0 0 3px rgba(10, 132, 255, 0.3);
            border-color: var(--accent);
        }
        .macos-search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            stroke-width: 2;
        }

        .theme-toggle {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: var(--shadow-convex);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .theme-toggle:active {
            box-shadow: var(--shadow-inset-soft);
            transform: scale(0.98);
        }

        /* Layout */
        .app-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 24px 12px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            overflow-y: auto;
        }
        .sidebar-section {
            margin-bottom: 24px;
        }
        .sidebar-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding: 0 10px;
            margin-bottom: 8px;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            margin-bottom: 2px;
        }
        .sidebar-item.active {
            background: var(--accent);
            color: var(--accent-text);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.2);
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .sidebar-item:hover:not(.active) {
            background: var(--bg-surface);
            box-shadow: var(--shadow-convex);
        }
        .sidebar-item i { width: 16px; height: 16px; }
        
        .pill-badge {
            margin-left: auto;
            background: var(--bg-input);
            color: var(--text-muted);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            box-shadow: var(--shadow-inset-soft);
            border: 1px solid var(--border);
        }
        .sidebar-item.active .pill-badge {
            background: rgba(0,0,0,0.2);
            color: var(--accent-text);
            border-color: transparent;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: var(--bg-content);
            position: relative;
        }
        /* Subtle inner shadow on the main content area */
        .main-content::before {
            content: '';
            position: fixed;
            top: 50px; left: 240px; right: 0; bottom: 0;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.02);
            pointer-events: none;
            z-index: 10;
        }

        .content-header {
            margin-bottom: 32px;
        }
        .content-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .content-subtitle {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Inner Shadow Filter Well */
        .filter-well {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 6px;
            display: flex;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 32px;
            box-shadow: var(--shadow-inset-deep);
        }
        .filter-well::-webkit-scrollbar { display: none; }
        .filter-tab {
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .filter-tab.active {
            background: var(--bg-surface);
            color: var(--text-main);
            box-shadow: var(--shadow-convex), 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        .filter-tab:hover:not(.active) {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        /* Gallery grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }
        @media (min-width: 800px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }

        /* Depth Cards */
        .preset-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-card);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }
        /* Top highlight inner border */
        .preset-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            box-shadow: inset 0 1px 0 var(--border-highlight);
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .preset-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--shadow-card-hover);
            border-color: rgba(128, 128, 128, 0.3);
        }

        .video-wrapper {
            padding: 8px 8px 0;
        }
        .video-container {
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-inset-deep);
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: opacity 0.3s;
        }
        .preset-card:hover video { opacity: 1; }
        
        .card-info { 
            padding: 16px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .card-meta {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            background: var(--bg-input);
            padding: 4px 8px;
            border-radius: 6px;
            box-shadow: var(--shadow-inset-soft);
            border: 1px solid var(--border);
        }

        /* Simple Footer */
        .window-footer {
            border-top: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-content);
            font-size: 12px;
            color: var(--text-muted);
            box-shadow: inset 0 1px 0 var(--border-highlight);
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .macos-window { height: 100vh; border-radius: 0; border: none; }
            body { padding: 0; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="macos-window">
        <!-- macOS Menubar -->
        <div class="macos-menubar">
            <div class="traffic-lights">
                <div class="tl tl-close"></div>
                <div class="tl tl-min"></div>
                <div class="tl tl-max"></div>
            </div>
            
            <div class="macos-search-wrap">
                <i data-lucide="search" class="macos-search-icon w-3.5 h-3.5"></i>
                <input type="text" id="search" placeholder="Search templates..." class="macos-search">
            </div>
            
            <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
                <i data-lucide="sun" class="w-4 h-4 hidden" id="icon-sun"></i>
                <i data-lucide="moon" class="w-4 h-4" id="icon-moon"></i>
            </button>
        </div>

        <div class="app-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-label">Animator Studio</div>
                    <a href="../index.html" class="sidebar-item">
                        <i data-lucide="home" class="w-4 h-4"></i> Overview
                    </a>
                    <div class="sidebar-item active">
                        <i data-lucide="grid" class="w-4 h-4"></i> Gallery
                        <span class="pill-badge" id="total-count">0</span>
                    </div>
                    <a href="../_templates/index.html" class="sidebar-item">
                        <i data-lucide="box" class="w-4 h-4"></i> Components
                    </a>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-label">Library</div>
                    <div class="sidebar-item"><i data-lucide="bar-chart-2" class="w-4 h-4"></i> Charts</div>
                    <div class="sidebar-item"><i data-lucide="type" class="w-4 h-4"></i> Typography</div>
                    <div class="sidebar-item"><i data-lucide="pen-tool" class="w-4 h-4"></i> Whiteboard</div>
                    <div class="sidebar-item"><i data-lucide="instagram" class="w-4 h-4"></i> Social Media</div>
                </div>
                <div class="sidebar-section mt-auto">
                    <div class="sidebar-label">Resources</div>
                    <a href="../about/index.html" class="sidebar-item">
                        <i data-lucide="info" class="w-4 h-4"></i> About
                    </a>
                    <a href="https://github.com/simplearyan/canvas-animator" target="_blank" class="sidebar-item">
                        <i data-lucide="github" class="w-4 h-4"></i> GitHub
                    </a>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="main-content">
                <div class="content-header">
                    <h1 class="content-title">Template Gallery</h1>
                    <p class="content-subtitle">High-fidelity motion graphic presets with deep customization.</p>
                </div>

                <!-- Depth Filter Well -->
                <div class="filter-well">
                    <div class="filter-tab active">All Items</div>
                    <div class="filter-tab">Recent</div>
                    <div class="filter-tab">Favorites</div>
                    <div class="filter-tab">Data Viz</div>
                    <div class="filter-tab">Marketing</div>
                </div>

                <!-- Gallery Grid -->
                <div id="gallery" class="gallery-grid"></div>
            </div>
        </div>
        
        <div class="window-footer">
            <span>Ready.</span>
            <span>Animator Studio Research Lab</span>
        </div>
    </div>

    <script>
        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const iconSun = document.getElementById('icon-sun');
        const iconMoon = document.getElementById('icon-moon');
        const body = document.body;

        // Check system preference initially
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            setTheme('light');
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        function setTheme(theme) {
            body.setAttribute('data-theme', theme);
            if (theme === 'dark') {
                iconMoon.classList.remove('hidden');
                iconSun.classList.add('hidden');
            } else {
                iconSun.classList.remove('hidden');
                iconMoon.classList.add('hidden');
            }
        }

        // Gallery Logic
        let allItems = [];
        let gallerySettings = { playMode: 'hover' };

        async function loadGallery() {
            try {
                const response = await fetch('gallery-data.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = JSON.parse(await response.text());
                allItems = data.items || [];
                gallerySettings = data.settings || { playMode: 'hover' };
                
                document.getElementById('total-count').innerText = allItems.length;
                renderGallery(allItems);
            } catch (e) {
                document.getElementById('gallery').innerHTML = `
                    <div style="grid-column:1/-1;padding:80px 20px;text-align:center;border-radius:12px;background:var(--bg-input);border:1px solid var(--border);box-shadow:var(--shadow-inset-deep);">
                        <i data-lucide="alert-circle" style="width:32px;height:32px;color:var(--text-muted);margin:0 auto 12px;"></i>
                        <p style="color:var(--text-main);font-size:15px;margin-bottom:6px;font-weight:600;">No templates found</p>
                        <p style="color:var(--text-muted);font-size:13px;">Run <code>node automate.js</code> to generate preview data.</p>
                    </div>`;
                lucide.createIcons();
            }
        }

        function renderGallery(items) {
            const container = document.getElementById('gallery');
            container.innerHTML = '';
            
            if (!items.length) {
                container.innerHTML = '<div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--text-muted)">No matching templates.</div>';
                return;
            }
            
            items.forEach(item => {
                const card = document.createElement('a');
                card.href = item.file;
                card.className = 'preset-card';
                card.target = '_blank';
                const isLoop = gallerySettings.playMode === 'loop';
                
                card.innerHTML = `
                    <div class="video-wrapper">
                        <div class="video-container">
                            <video src="${item.preview}" muted loop playsinline ${isLoop ? 'autoplay' : ''}
                                ${!isLoop ? 'onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"' : ''}></video>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">${item.width}×${item.height}</div>
                    </div>`;
                container.appendChild(card);
            });
        }

        document.getElementById('search').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            renderGallery(allItems.filter(i => i.title.toLowerCase().includes(q) || i.file.toLowerCase().includes(q)));
        });

        lucide.createIcons();
        loadGallery();
    </script>
</body>
</html>
