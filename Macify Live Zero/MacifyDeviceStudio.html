<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macify Device Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] },
                    colors: { apple: { dark: '#000000', grayDark: '#1c1c1e', blue: '#0A84FF' } }
                } 
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #09090b; color: #fff; overflow: hidden; }
        
        /* Grid Background */
        .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
        }

        /* Sliders */
        input[type="range"] { -webkit-appearance: none; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; }

        /* 3D Scene Setup */
        #scene-container {
            perspective: 2000px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }

        #device-wrapper {
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
            transition: width 0.4s ease, height 0.4s ease, border-radius 0.4s ease;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1);
            background: #000;
            overflow: hidden;
        }

        /* Device Specific Styles */
        .device-desktop { width: 1024px; height: 640px; border-radius: 12px; }
        .device-ipad { width: 820px; height: 1180px; border-radius: 24px; }
        .device-mobile { width: 390px; height: 844px; border-radius: 40px; }

        /* macOS Header Bar */
        .mac-header {
            height: 38px;
            background: #2b2b2d;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 1px solid rgba(0,0,0,0.5);
            transition: opacity 0.3s ease;
        }

        iframe { width: 100%; height: 100%; border: none; background: #fff; }
    </style>
</head>
<body class="flex h-screen text-sm">

    <aside class="w-80 bg-zinc-900/95 backdrop-blur-xl border-r border-white/10 flex flex-col z-20 shrink-0 shadow-2xl">
        <div class="p-5 border-b border-white/10">
            <h1 class="text-lg font-bold tracking-tight text-white flex items-center gap-2">
                <i data-lucide="layers" class="w-5 h-5 text-apple-blue"></i> Device Studio
            </h1>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-8">
            
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Target URL</label>
                <input type="text" id="url-input" value="https://apple.com" class="w-full bg-black/50 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:border-apple-blue outline-none" onchange="loadUrl(this.value)">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Device Frame</label>
                <div class="flex bg-black/40 rounded-lg p-1 border border-white/5">
                    <button onclick="setDevice('mobile')" id="btn-mobile" class="flex-1 py-1.5 rounded-md text-xs font-medium text-zinc-400 hover:text-white transition-colors"><i data-lucide="smartphone" class="w-4 h-4 mx-auto mb-1"></i> Phone</button>
                    <button onclick="setDevice('ipad')" id="btn-ipad" class="flex-1 py-1.5 rounded-md text-xs font-medium text-zinc-400 hover:text-white transition-colors"><i data-lucide="tablet" class="w-4 h-4 mx-auto mb-1"></i> iPad</button>
                    <button onclick="setDevice('desktop')" id="btn-desktop" class="flex-1 py-1.5 rounded-md text-xs font-medium bg-white/10 text-white shadow-sm transition-colors"><i data-lucide="monitor" class="w-4 h-4 mx-auto mb-1"></i> Mac</button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Spatial Transform</label>
                    <button onclick="resetTransform()" class="text-[10px] text-apple-blue hover:text-blue-400">Reset</button>
                </div>
                
                <div>
                    <div class="flex justify-between mb-1"><span class="text-xs text-zinc-400">Scale (Zoom)</span><span id="val-scale" class="text-xs text-zinc-500">80%</span></div>
                    <input type="range" id="slide-scale" min="20" max="200" value="80" class="w-full accent-apple-blue" oninput="updateTransform()">
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="text-xs text-zinc-400">Rotate X (Tilt)</span><span id="val-rx" class="text-xs text-zinc-500">15°</span></div>
                    <input type="range" id="slide-rx" min="-60" max="60" value="15" class="w-full accent-apple-blue" oninput="updateTransform()">
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="text-xs text-zinc-400">Rotate Y (Pan)</span><span id="val-ry" class="text-xs text-zinc-500">-25°</span></div>
                    <input type="range" id="slide-ry" min="-60" max="60" value="-25" class="w-full accent-apple-blue" oninput="updateTransform()">
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="text-xs text-zinc-400">Rotate Z (Spin)</span><span id="val-rz" class="text-xs text-zinc-500">0°</span></div>
                    <input type="range" id="slide-rz" min="-180" max="180" value="0" class="w-full accent-apple-blue" oninput="updateTransform()">
                </div>
            </div>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Export Engine</label>
                
                <div class="grid grid-cols-2 gap-2">
                    <select id="export-res" class="bg-black/50 border border-white/10 rounded-lg px-2 py-2 text-xs text-white outline-none">
                        <option value="1920">HD 1080p</option>
                        <option value="2560" selected>2K 1440p</option>
                        <option value="3840">4K 2160p</option>
                    </select>
                    <select id="export-fps" class="bg-black/50 border border-white/10 rounded-lg px-2 py-2 text-xs text-white outline-none">
                        <option value="30">30 FPS</option>
                        <option value="60" selected>60 FPS</option>
                    </select>
                </div>

                <div class="flex gap-2 pt-2">
                    <button onclick="captureSnapshot()" class="flex-1 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-white font-medium flex justify-center items-center gap-2 transition-colors">
                        <i data-lucide="camera" class="w-4 h-4"></i> PNG
                    </button>
                    <button onclick="toggleRecording()" id="btn-record" class="flex-1 py-2 bg-apple-blue hover:bg-blue-600 rounded-lg text-white font-medium flex justify-center items-center gap-2 transition-colors">
                        <i data-lucide="video" class="w-4 h-4" id="icon-record"></i> <span id="text-record">Record</span>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 relative bg-zinc-950 bg-grid overflow-hidden">
        <div id="scene-container">
            
            <div id="capture-target" class="w-full h-full flex items-center justify-center p-20">
                <div id="device-wrapper" class="device-desktop flex flex-col">
                    
                    <div id="mac-header" class="mac-header shrink-0">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-[#ff5f56]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#ffbd2e]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#27c93f]"></div>
                        </div>
                    </div>
                    
                    <div id="mobile-notch" class="hidden absolute top-0 left-1/2 -translate-x-1/2 w-[120px] h-[30px] bg-black rounded-b-3xl z-10"></div>

                    <iframe id="target-iframe" src="https://apple.com" sandbox="allow-same-origin allow-scripts"></iframe>
                </div>
            </div>

        </div>
    </main>

    <video id="pipe-video" class="hidden" autoplay muted playsinline></video>

    <div id="overlay" class="fixed inset-0 z-50 bg-black/90 hidden flex-col items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="w-12 h-12 border-4 border-apple-blue border-t-transparent rounded-full animate-spin mb-4" id="spinner"></div>
        <h2 class="text-xl font-bold text-white mb-2" id="overlay-title">Select Tab to Record</h2>
        <p class="text-sm text-zinc-400 text-center max-w-sm" id="overlay-desc">Browser security requires you to select "This Tab" to capture the live iframe interactions.</p>
    </div>

    <script>
        lucide.createIcons();

        const state = {
            device: 'desktop', // desktop, ipad, mobile
            scale: 80, rx: 15, ry: -25, rz: 0,
            isRecording: false,
            mediaRecorder: null,
            recordedChunks: [],
            stream: null
        };

        function loadUrl(url) {
            if (!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('target-iframe').src = url;
        }

        function setDevice(device) {
            state.device = device;
            
            // Update UI buttons
            ['mobile', 'ipad', 'desktop'].forEach(d => {
                const btn = document.getElementById(`btn-${d}`);
                if (d === device) {
                    btn.classList.add('bg-white/10', 'text-white', 'shadow-sm');
                    btn.classList.remove('text-zinc-400');
                } else {
                    btn.classList.remove('bg-white/10', 'text-white', 'shadow-sm');
                    btn.classList.add('text-zinc-400');
                }
            });

            // Update Device Frame
            const wrapper = document.getElementById('device-wrapper');
            wrapper.className = `device-${device} flex flex-col relative`;
            
            // Toggle hardware features
            const header = document.getElementById('mac-header');
            const notch = document.getElementById('mobile-notch');
            
            if (device === 'desktop') {
                header.style.display = 'flex';
                notch.classList.add('hidden');
            } else if (device === 'mobile') {
                header.style.display = 'none';
                notch.classList.remove('hidden');
            } else {
                header.style.display = 'none';
                notch.classList.add('hidden');
            }
        }

        function updateTransform() {
            state.scale = document.getElementById('slide-scale').value;
            state.rx = document.getElementById('slide-rx').value;
            state.ry = document.getElementById('slide-ry').value;
            state.rz = document.getElementById('slide-rz').value;

            document.getElementById('val-scale').innerText = state.scale + '%';
            document.getElementById('val-rx').innerText = state.rx + '°';
            document.getElementById('val-ry').innerText = state.ry + '°';
            document.getElementById('val-rz').innerText = state.rz + '°';

            const wrapper = document.getElementById('device-wrapper');
            wrapper.style.transform = `scale(${state.scale / 100}) rotateX(${state.rx}deg) rotateY(${state.ry}deg) rotateZ(${state.rz}deg)`;
        }

        function resetTransform() {
            document.getElementById('slide-scale').value = 80;
            document.getElementById('slide-rx').value = 15;
            document.getElementById('slide-ry').value = -25;
            document.getElementById('slide-rz').value = 0;
            updateTransform();
        }

        // --- Core Export Engine (Bypassing CORS via Screen Capture) ---
        function showOverlay(title, desc, hideSpinner = false) {
            const el = document.getElementById('overlay');
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('overlay-desc').innerText = desc;
            document.getElementById('spinner').style.display = hideSpinner ? 'none' : 'block';
            el.classList.remove('hidden');
            requestAnimationFrame(() => el.classList.remove('opacity-0'));
        }

        function hideOverlay() {
            const el = document.getElementById('overlay');
            el.classList.add('opacity-0');
            setTimeout(() => el.classList.add('hidden'), 300);
        }

        async function startCapturePipe() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { displaySurface: "browser" },
                    audio: false,
                    preferCurrentTab: true
                });
                const video = document.getElementById('pipe-video');
                video.srcObject = stream;
                state.stream = stream;
                await new Promise(r => video.onloadedmetadata = () => { video.play().then(r); });
                return video;
            } catch (err) {
                console.error(err);
                hideOverlay();
                alert("Permission denied. We need screen capture to bypass iframe security.");
                return null;
            }
        }

        function captureCroppedCanvas(video) {
            const target = document.getElementById('capture-target');
            const rect = target.getBoundingClientRect();
            
            // Map CSS pixels to Video Pixels
            const scaleX = video.videoWidth / window.innerWidth;
            const scaleY = video.videoHeight / window.innerHeight;
            
            const sx = rect.left * scaleX;
            const sy = rect.top * scaleY;
            const sw = rect.width * scaleX;
            const sh = rect.height * scaleY;

            // Target Resolution
            const outWidth = parseInt(document.getElementById('export-res').value);
            const outHeight = Math.round(outWidth * (rect.height / rect.width));

            const canvas = document.createElement('canvas');
            canvas.width = outWidth;
            canvas.height = outHeight;
            const ctx = canvas.getContext('2d', {alpha: false});
            
            // Fill background to match dark grid
            ctx.fillStyle = '#09090b';
            ctx.fillRect(0, 0, outWidth, outHeight);
            
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, outWidth, outHeight);
            return canvas;
        }

        async function captureSnapshot() {
            showOverlay('Requesting Access', 'Select "This Tab" to capture.', true);
            const video = await startCapturePipe();
            if (!video) return;

            showOverlay('Processing...', 'Generating high-res PNG');
            
            setTimeout(() => {
                const canvas = captureCroppedCanvas(video);
                const link = document.createElement('a');
                link.download = `device-studio-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                state.stream.getTracks().forEach(t => t.stop());
                hideOverlay();
            }, 500);
        }

        async function toggleRecording() {
            if (state.isRecording) {
                // Stop Recording
                state.isRecording = false;
                state.mediaRecorder.stop();
                showOverlay('Finalizing Video', 'Encoding high quality WebM...');
                
                const btn = document.getElementById('btn-record');
                btn.classList.remove('bg-red-600', 'hover:bg-red-500');
                btn.classList.add('bg-apple-blue', 'hover:bg-blue-600');
                document.getElementById('text-record').innerText = 'Record';
                document.getElementById('icon-record').setAttribute('data-lucide', 'video');
                lucide.createIcons();
                return;
            }

            // Start Recording
            showOverlay('Requesting Access', 'Select "This Tab" to record interactions.', true);
            const video = await startCapturePipe();
            if (!video) return;

            hideOverlay();
            state.isRecording = true;

            const btn = document.getElementById('btn-record');
            btn.classList.remove('bg-apple-blue', 'hover:bg-blue-600');
            btn.classList.add('bg-red-600', 'hover:bg-red-500');
            document.getElementById('text-record').innerText = 'Stop Recording';
            document.getElementById('icon-record').setAttribute('data-lucide', 'square');
            lucide.createIcons();

            // Set up processing canvas & stream
            const targetWidth = parseInt(document.getElementById('export-res').value);
            const fps = parseInt(document.getElementById('export-fps').value);
            
            const target = document.getElementById('capture-target');
            const rect = target.getBoundingClientRect();
            const targetHeight = Math.round(targetWidth * (rect.height / rect.width));

            const canvas = document.createElement('canvas');
            canvas.width = targetWidth; canvas.height = targetHeight;
            const ctx = canvas.getContext('2d', {alpha: false});

            const outStream = canvas.captureStream(fps);
            state.recordedChunks = [];
            
            const bitrate = targetWidth > 2000 ? 25000000 : 10000000;
            state.mediaRecorder = new MediaRecorder(outStream, { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: bitrate });
            
            state.mediaRecorder.ondataavailable = e => { if(e.data.size > 0) state.recordedChunks.push(e.data); };
            state.mediaRecorder.onstop = () => {
                const blob = new Blob(state.recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `device-recording-${Date.now()}.webm`;
                link.href = url; link.click();
                URL.revokeObjectURL(url);
                
                state.stream.getTracks().forEach(t => t.stop());
                hideOverlay();
            };

            state.mediaRecorder.start();

            // Loop to pipe raw video, crop it, and paint to export canvas
            function recordLoop() {
                if (!state.isRecording) return;
                
                const scaleX = video.videoWidth / window.innerWidth;
                const scaleY = video.videoHeight / window.innerHeight;
                const sx = rect.left * scaleX; const sy = rect.top * scaleY;
                const sw = rect.width * scaleX; const sh = rect.height * scaleY;

                ctx.fillStyle = '#09090b'; ctx.fillRect(0, 0, targetWidth, targetHeight);
                ctx.drawImage(video, sx, sy, sw, sh, 0, 0, targetWidth, targetHeight);
                
                requestAnimationFrame(recordLoop);
            }
            recordLoop();
        }

        // Initialize
        updateTransform();
    </script>
</body>
</html>
