<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotionCanvas Pro - Text & Audio Animator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        mac: {
                            dark: '#1e1e1e',
                            panel: '#2d2d2d',
                            border: '#3e3e42',
                            blue: '#0a84ff',
                            text: '#f5f5f6'
                        }
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* macOS style scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
        
        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(45, 45, 45, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Timeline grid background */
        .timeline-grid {
            background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 100%;
        }

        input[type="range"] {
            accent-color: #0a84ff;
        }
        
        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-mac-dark text-mac-text h-screen overflow-hidden flex flex-col font-sans select-none">

    <!-- Top Navigation -->
    <header class="h-14 glass-panel border-b border-mac-border flex items-center justify-between px-4 z-20 shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
            <h1 class="ml-4 font-semibold text-sm tracking-wide text-gray-200"><i data-lucide="clapperboard" class="inline w-4 h-4 mr-2 -mt-1 text-mac-blue"></i>MotionCanvas Pro</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-xs text-gray-400">Duration: <span id="ui-total-duration">10.0</span>s</div>
            <button id="btn-export" class="bg-mac-blue hover:bg-blue-500 text-white px-4 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                <i data-lucide="download" class="w-4 h-4"></i> Export WebM
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left Sidebar: Tools -->
        <aside class="w-16 glass-panel border-r border-mac-border flex flex-col items-center py-4 gap-4 z-10 shrink-0">
            <button id="btn-add-text" class="w-10 h-10 rounded-xl hover:bg-white/10 flex items-center justify-center text-gray-300 transition-colors" title="Add Text Layer">
                <i data-lucide="type" class="w-5 h-5"></i>
            </button>
            <div class="w-8 h-px bg-mac-border my-1"></div>
            <label class="w-10 h-10 rounded-xl hover:bg-white/10 flex items-center justify-center text-gray-300 transition-colors cursor-pointer" title="Add Audio/Extract from Video">
                <i data-lucide="music" class="w-5 h-5"></i>
                <input type="file" id="input-audio" class="hidden" accept="audio/*, video/mp4, video/webm, video/quicktime">
            </label>
        </aside>

        <!-- Center: Canvas & Playback -->
        <section class="flex-1 flex flex-col relative bg-[#121212]">
            <!-- Canvas Container -->
            <div class="flex-1 flex items-center justify-center p-8 overflow-hidden relative">
                <!-- 16:9 Aspect Ratio Wrapper -->
                <div class="relative shadow-2xl ring-1 ring-white/10 rounded-lg overflow-hidden bg-black" style="aspect-ratio: 16/9; max-height: 100%; width: 100%; max-width: 1280px;">
                    <canvas id="main-canvas" width="1280" height="720" class="w-full h-full object-contain"></canvas>
                    
                    <!-- Exporting Overlay -->
                    <div id="export-overlay" class="absolute inset-0 bg-black/80 backdrop-blur-sm hidden flex-col items-center justify-center z-50">
                        <i data-lucide="loader" class="w-10 h-10 text-mac-blue animate-spin mb-4"></i>
                        <h2 class="text-xl font-bold">Rendering Video...</h2>
                        <p class="text-sm text-gray-400 mt-2">Please do not close this tab.</p>
                        <div class="w-64 h-2 bg-gray-800 rounded-full mt-4 overflow-hidden">
                            <div id="export-progress" class="h-full bg-mac-blue w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Playback Controls -->
            <div class="h-16 glass-panel border-t border-mac-border flex items-center justify-center gap-6 shrink-0">
                <span id="ui-time-current" class="text-sm font-mono text-gray-400 w-16 text-right">0.00s</span>
                
                <button id="btn-stop" class="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center text-gray-300">
                    <i data-lucide="square" class="w-4 h-4 fill-current"></i>
                </button>
                <button id="btn-play-pause" class="w-12 h-12 rounded-full bg-mac-blue hover:bg-blue-500 text-white flex items-center justify-center shadow-md">
                    <i data-lucide="play" id="icon-play" class="w-5 h-5 fill-current ml-1"></i>
                    <i data-lucide="pause" id="icon-pause" class="w-5 h-5 fill-current hidden"></i>
                </button>
                
                <span id="ui-time-total" class="text-sm font-mono text-gray-400 w-16 text-left">10.00s</span>
            </div>
        </section>

        <!-- Right Sidebar: Properties -->
        <aside class="w-72 glass-panel border-l border-mac-border flex flex-col z-10 shrink-0">
            <div class="h-10 border-b border-mac-border flex items-center px-4 font-medium text-sm text-gray-300">
                Properties
            </div>
            <div id="properties-panel" class="flex-1 overflow-y-auto p-4 text-sm">
                <div class="text-gray-500 text-center mt-10">
                    <i data-lucide="mouse-pointer-click" class="w-8 h-8 mx-auto mb-3 opacity-50"></i>
                    Select a text or audio track<br>in the timeline to edit.
                </div>
            </div>
        </aside>
    </main>

    <!-- Bottom: Timeline -->
    <footer class="h-64 glass-panel border-t border-mac-border flex flex-col shrink-0 z-20">
        <!-- Timeline Header -->
        <div class="h-8 border-b border-mac-border flex text-xs text-gray-400 bg-black/20">
            <div class="w-48 border-r border-mac-border flex items-center px-4 shrink-0">
                Layers & Tracks
            </div>
            <div class="flex-1 relative overflow-hidden">
                <div id="timeline-ruler" class="absolute inset-0 timeline-grid">
                    <!-- Ruler marks generated by JS -->
                </div>
                <div id="playhead-top" class="absolute top-0 bottom-0 w-px bg-red-500 z-10 ml-[0%] pointer-events-none">
                    <div class="w-3 h-3 bg-red-500 rotate-45 -ml-1.5 -mt-1.5 rounded-sm"></div>
                </div>
            </div>
        </div>
        
        <!-- Timeline Tracks Container -->
        <div class="flex-1 overflow-y-auto flex">
            <!-- Track Headers (Left) -->
            <div id="track-headers" class="w-48 border-r border-mac-border bg-black/10 shrink-0">
                <!-- Generated by JS -->
            </div>
            <!-- Track Bodies (Right) -->
            <div class="flex-1 relative overflow-x-auto overflow-y-hidden bg-[#1e1e1e]">
                <div id="track-bodies" class="relative min-w-full h-full timeline-grid">
                    <!-- Generated by JS -->
                    <div id="playhead-line" class="absolute top-0 bottom-0 w-px bg-red-500/50 z-10 ml-[0%] pointer-events-none"></div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Script Logic -->
    <script>
        // --- 1. State & Setup ---
        const state = {
            duration: 10, // seconds
            currentTime: 0,
            isPlaying: false,
            selectedId: null,
            texts: [],
            audio: [],
            isExporting: false
        };

        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        let audioCtx = null;
        let activeAudioNodes = [];
        let animationFrameId = null;
        let lastTime = 0;

        // UI Elements
        const uiCurrentTime = document.getElementById('ui-time-current');
        const playheadTop = document.getElementById('playhead-top');
        const playheadLine = document.getElementById('playhead-line');
        const propertiesPanel = document.getElementById('properties-panel');
        const trackHeaders = document.getElementById('track-headers');
        const trackBodies = document.getElementById('track-bodies');

        // Initialize Lucide Icons
        lucide.createIcons();

        // Ensure AudioContext is created after user interaction
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        // --- 2. Canvas Rendering Engine ---
        function easeOutQuart(x) {
            return 1 - Math.pow(1 - x, 4);
        }

        function renderCanvas(time) {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Background (Solid Color for now, can be expanded)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Sort texts by layer order (array index)
            state.texts.forEach(item => {
                if (time < item.start || time > item.end) return;

                ctx.save();
                
                let alpha = 1;
                let scaleX = 1;
                let scaleY = 1;
                let offsetX = 0;
                let offsetY = 0;

                const inDuration = 0.8;
                const outDuration = 0.8;
                const timeIn = time - item.start;
                const timeOut = item.end - time;

                // --- In Animations ---
                if (timeIn < inDuration) {
                    const progress = timeIn / inDuration;
                    const eased = easeOutQuart(progress);
                    
                    if (item.animIn === 'fade') alpha = eased;
                    if (item.animIn === 'slideUp') { alpha = eased; offsetY = (1 - eased) * 100; }
                    if (item.animIn === 'scale') { alpha = eased; scaleX = eased; scaleY = eased; }
                    if (item.animIn === 'drop') { alpha = eased; offsetY = -(1 - eased) * 200; }
                }

                // --- Out Animations ---
                if (timeOut < outDuration) {
                    const progress = timeOut / outDuration;
                    const eased = easeOutQuart(progress);

                    if (item.animOut === 'fade') alpha = eased;
                    if (item.animOut === 'slideDown') { alpha = eased; offsetY = (1 - eased) * 100; }
                    if (item.animOut === 'scale') { alpha = eased; scaleX = eased; scaleY = eased; }
                }

                // --- Loop Animations ---
                if (timeIn >= inDuration && timeOut >= outDuration) {
                    if (item.animLoop === 'pulse') {
                        const p = 1 + Math.sin(time * 4) * 0.05;
                        scaleX *= p; scaleY *= p;
                    }
                    if (item.animLoop === 'float') {
                        offsetY += Math.sin(time * 3) * 15;
                    }
                    if (item.animLoop === 'wave') {
                        offsetX += Math.sin(time * 5) * 10;
                    }
                }

                // Apply Transforms
                ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                
                // Calculate center position for transforms
                const posX = (item.x / 100) * canvas.width;
                const posY = (item.y / 100) * canvas.height;

                ctx.translate(posX + offsetX, posY + offsetY);
                ctx.scale(scaleX, scaleY);

                // Draw Text
                ctx.font = `bold ${item.size}px ${item.font}`;
                ctx.fillStyle = item.color;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Handle multiline
                const lines = item.text.split('\n');
                const lineHeight = item.size * 1.2;
                const startY = -(lines.length - 1) * lineHeight / 2;

                // Add slight shadow for better visibility on dark backgrounds
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                lines.forEach((line, index) => {
                    ctx.fillText(line, 0, startY + (index * lineHeight));
                });

                ctx.restore();
            });
        }

        // --- 3. Playback Engine ---
        function updatePlayheadUI() {
            uiCurrentTime.innerText = state.currentTime.toFixed(2) + 's';
            const percent = (state.currentTime / state.duration) * 100;
            playheadTop.style.left = `${percent}%`;
            playheadTop.style.marginLeft = '0';
            playheadLine.style.left = `${percent}%`;
            playheadLine.style.marginLeft = '0';
        }

        function play() {
            if (state.isPlaying) return;
            initAudioContext();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            if (state.currentTime >= state.duration) state.currentTime = 0;

            state.isPlaying = true;
            lastTime = performance.now();
            
            document.getElementById('icon-play').classList.add('hidden');
            document.getElementById('icon-pause').classList.remove('hidden');

            // Schedule Audio
            state.audio.forEach(track => {
                if (track.start < state.duration && (track.start + track.buffer.duration) > state.currentTime) {
                    const source = audioCtx.createBufferSource();
                    source.buffer = track.buffer;
                    const gain = audioCtx.createGain();
                    gain.gain.value = track.volume;
                    
                    source.connect(gain);
                    gain.connect(audioCtx.destination);

                    let offset = Math.max(0, state.currentTime - track.start);
                    let delay = Math.max(0, track.start - state.currentTime);
                    
                    source.start(audioCtx.currentTime + delay, offset);
                    activeAudioNodes.push({ id: track.id, source, gain });
                }
            });

            loop();
        }

        function pause() {
            state.isPlaying = false;
            cancelAnimationFrame(animationFrameId);
            
            document.getElementById('icon-play').classList.remove('hidden');
            document.getElementById('icon-pause').classList.add('hidden');

            // Stop Audio
            activeAudioNodes.forEach(node => {
                try { node.source.stop(); } catch(e) {}
            });
            activeAudioNodes = [];
            
            renderCanvas(state.currentTime);
        }

        function stop() {
            pause();
            state.currentTime = 0;
            updatePlayheadUI();
            renderCanvas(state.currentTime);
        }

        function loop() {
            if (!state.isPlaying) return;
            
            const now = performance.now();
            const delta = (now - lastTime) / 1000; // to seconds
            lastTime = now;

            state.currentTime += delta;

            if (state.currentTime >= state.duration) {
                if (state.isExporting) {
                    // Export handles its own stop
                } else {
                    pause();
                    state.currentTime = state.duration;
                }
            }

            updatePlayheadUI();
            renderCanvas(state.currentTime);

            if (state.isPlaying) {
                animationFrameId = requestAnimationFrame(loop);
            }
        }

        // --- 4. Timeline & UI Rendering ---
        function selectItem(id) {
            state.selectedId = id;
            renderTimeline(); // Update selection styling
            renderProperties();
        }

        function renderTimeline() {
            trackHeaders.innerHTML = '';
            
            // Clear track bodies but keep playhead
            const playhead = document.getElementById('playhead-line');
            trackBodies.innerHTML = '';
            trackBodies.appendChild(playhead);

            const allTracks = [...state.texts, ...state.audio];
            
            if (allTracks.length === 0) {
                trackBodies.innerHTML += `<div class="absolute inset-0 flex items-center justify-center text-gray-600 text-sm italic pointer-events-none">Timeline empty. Add text or audio.</div>`;
            }

            allTracks.forEach((item, index) => {
                const isText = 'text' in item;
                const isSelected = item.id === state.selectedId;
                const typeIcon = isText ? 'type' : 'music';
                const typeColor = isText ? 'bg-blue-500/20 text-blue-400 border-blue-500/50' : 'bg-green-500/20 text-green-400 border-green-500/50';
                
                let label = isText ? `Text: ${item.text.substring(0, 10)}...` : `${item.type.toUpperCase()}: ${item.name.substring(0, 15)}`;

                // Header
                const headerDiv = document.createElement('div');
                headerDiv.className = `h-10 border-b border-mac-border flex items-center px-3 gap-2 cursor-pointer transition-colors ${isSelected ? 'bg-white/10' : 'hover:bg-white/5'}`;
                headerDiv.onclick = () => selectItem(item.id);
                headerDiv.innerHTML = `
                    <i data-lucide="${typeIcon}" class="w-4 h-4 text-gray-400 shrink-0"></i>
                    <span class="text-xs text-gray-300 truncate">${label}</span>
                    <button class="ml-auto text-gray-500 hover:text-red-400 shrink-0 delete-btn" data-id="${item.id}">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                `;
                trackHeaders.appendChild(headerDiv);

                // Body Track Row
                const rowDiv = document.createElement('div');
                rowDiv.className = `h-10 border-b border-mac-border relative ${isSelected ? 'bg-white/5' : ''}`;
                
                // The actual block
                const blockDuration = isText ? (item.end - item.start) : Math.min(item.buffer.duration, state.duration - item.start);
                const leftPercent = (item.start / state.duration) * 100;
                const widthPercent = (blockDuration / state.duration) * 100;

                const blockDiv = document.createElement('div');
                blockDiv.className = `absolute top-1.5 bottom-1.5 rounded border shadow-sm cursor-pointer overflow-hidden flex items-center px-2 ${typeColor} ${isSelected ? 'ring-1 ring-white' : ''}`;
                blockDiv.style.left = `${leftPercent}%`;
                blockDiv.style.width = `${widthPercent}%`;
                blockDiv.onclick = (e) => { e.stopPropagation(); selectItem(item.id); };
                blockDiv.innerHTML = `<span class="text-[10px] truncate whitespace-nowrap opacity-80">${label}</span>`;
                
                rowDiv.appendChild(blockDiv);
                trackBodies.appendChild(rowDiv);
            });

            // Re-init icons for new DOM
            lucide.createIcons();

            // Setup Delete buttons
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const id = e.currentTarget.getAttribute('data-id');
                    state.texts = state.texts.filter(t => t.id !== id);
                    state.audio = state.audio.filter(a => a.id !== id);
                    if (state.selectedId === id) {
                        state.selectedId = null;
                        renderProperties();
                    }
                    renderTimeline();
                    renderCanvas(state.currentTime);
                }
            });
        }

        function createInputGroup(label, id, type, value, options = {}) {
            let inputHtml = '';
            if (type === 'select') {
                inputHtml = `<select id="${id}" class="w-full bg-mac-dark border border-mac-border rounded px-2 py-1.5 text-xs text-white focus:outline-none focus:border-mac-blue">
                    ${options.choices.map(c => `<option value="${c.value}" ${c.value === value ? 'selected' : ''}>${c.label}</option>`).join('')}
                </select>`;
            } else if (type === 'textarea') {
                inputHtml = `<textarea id="${id}" rows="2" class="w-full bg-mac-dark border border-mac-border rounded px-2 py-1.5 text-xs text-white focus:outline-none focus:border-mac-blue resize-none">${value}</textarea>`;
            } else {
                let extra = '';
                if (type === 'number') {
                    extra = `min="${options.min||0}" max="${options.max||1000}" step="${options.step||1}"`;
                }
                inputHtml = `<input type="${type}" id="${id}" value="${value}" ${extra} class="w-full bg-mac-dark border border-mac-border rounded px-2 py-1.5 text-xs text-white focus:outline-none focus:border-mac-blue ${type==='color' ? 'h-8 p-0.5' : ''}">`;
            }

            return `
                <div class="mb-3">
                    <label class="block text-xs text-gray-400 mb-1 font-medium">${label}</label>
                    ${inputHtml}
                </div>
            `;
        }

        function renderProperties() {
            if (!state.selectedId) {
                propertiesPanel.innerHTML = `
                    <div class="text-gray-500 text-center mt-10">
                        <i data-lucide="mouse-pointer-click" class="w-8 h-8 mx-auto mb-3 opacity-50"></i>
                        Select a text or audio track<br>in the timeline to edit.
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const textItem = state.texts.find(t => t.id === state.selectedId);
            const audioItem = state.audio.find(a => a.id === state.selectedId);

            let html = '';

            if (textItem) {
                html += `<div class="font-semibold text-gray-200 mb-4 pb-2 border-b border-white/10 flex items-center gap-2"><i data-lucide="type" class="w-4 h-4"></i> Text Properties</div>`;
                html += createInputGroup('Text Content', 'prop-text', 'textarea', textItem.text);
                
                html += `<div class="grid grid-cols-2 gap-2">`;
                html += createInputGroup('Font', 'prop-font', 'select', textItem.font, {
                    choices: [
                        {value: 'Arial', label: 'Arial'},
                        {value: 'Courier New', label: 'Courier New'},
                        {value: 'Impact', label: 'Impact'},
                        {value: 'Times New Roman', label: 'Times'},
                        {value: 'Helvetica', label: 'Helvetica'},
                        {value: 'Verdana', label: 'Verdana'}
                    ]
                });
                html += createInputGroup('Size', 'prop-size', 'number', textItem.size, {min: 10, max: 300});
                html += `</div>`;

                html += `<div class="grid grid-cols-2 gap-2">`;
                html += createInputGroup('Color', 'prop-color', 'color', textItem.color);
                html += `</div>`;

                html += `<div class="grid grid-cols-2 gap-2">`;
                html += createInputGroup('Position X (%)', 'prop-x', 'number', textItem.x, {min: 0, max: 100});
                html += createInputGroup('Position Y (%)', 'prop-y', 'number', textItem.y, {min: 0, max: 100});
                html += `</div>`;

                html += `<div class="grid grid-cols-2 gap-2 mt-2">`;
                html += createInputGroup('Start Time (s)', 'prop-start', 'number', textItem.start, {min: 0, max: state.duration, step: 0.1});
                html += createInputGroup('End Time (s)', 'prop-end', 'number', textItem.end, {min: 0, max: state.duration, step: 0.1});
                html += `</div>`;

                html += `<div class="mt-4 font-semibold text-gray-200 mb-2 pb-1 border-b border-white/10 text-xs">Animations</div>`;
                html += createInputGroup('In Animation', 'prop-animIn', 'select', textItem.animIn, {
                    choices: [{value:'none', label:'None'}, {value:'fade', label:'Fade'}, {value:'slideUp', label:'Slide Up'}, {value:'scale', label:'Scale In'}, {value:'drop', label:'Drop In'}]
                });
                html += createInputGroup('Loop Animation', 'prop-animLoop', 'select', textItem.animLoop, {
                    choices: [{value:'none', label:'None'}, {value:'pulse', label:'Pulse'}, {value:'float', label:'Float'}, {value:'wave', label:'Wave'}]
                });
                html += createInputGroup('Out Animation', 'prop-animOut', 'select', textItem.animOut, {
                    choices: [{value:'none', label:'None'}, {value:'fade', label:'Fade'}, {value:'slideDown', label:'Slide Down'}, {value:'scale', label:'Scale Out'}]
                });
            } else if (audioItem) {
                html += `<div class="font-semibold text-gray-200 mb-4 pb-2 border-b border-white/10 flex items-center gap-2"><i data-lucide="music" class="w-4 h-4"></i> Audio Properties</div>`;
                html += `<div class="text-xs text-gray-400 mb-4 truncate" title="${audioItem.name}">File: ${audioItem.name}</div>`;
                
                html += createInputGroup('Track Type', 'prop-type', 'select', audioItem.type, {
                    choices: [{value:'music', label:'Music'}, {value:'dialog', label:'Dialog'}, {value:'sfx', label:'SFX'}, {value:'background', label:'Background'}]
                });
                
                html += createInputGroup('Start Time (s)', 'prop-start', 'number', audioItem.start, {min: 0, max: state.duration, step: 0.1});
                
                html += `
                    <div class="mb-3">
                        <label class="block text-xs text-gray-400 mb-1 font-medium">Volume (${Math.round(audioItem.volume*100)}%)</label>
                        <input type="range" id="prop-volume" min="0" max="2" step="0.05" value="${audioItem.volume}" class="w-full">
                    </div>
                `;
            }

            propertiesPanel.innerHTML = html;
            lucide.createIcons();

            // Attach listeners to update state live
            const bindInput = (id, key, parser = (v)=>v) => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', (e) => {
                        const val = parser(e.target.value);
                        if (textItem) textItem[key] = val;
                        if (audioItem) audioItem[key] = val;
                        
                        // Handle end time validation
                        if (textItem && key === 'start' && textItem.start >= textItem.end) textItem.end = textItem.start + 1;
                        if (textItem && key === 'end' && textItem.end <= textItem.start) textItem.start = Math.max(0, textItem.end - 1);

                        renderTimeline();
                        renderCanvas(state.currentTime);
                    });
                }
            };

            if (textItem) {
                bindInput('prop-text', 'text');
                bindInput('prop-font', 'font');
                bindInput('prop-size', 'size', Number);
                bindInput('prop-color', 'color');
                bindInput('prop-x', 'x', Number);
                bindInput('prop-y', 'y', Number);
                bindInput('prop-start', 'start', Number);
                bindInput('prop-end', 'end', Number);
                bindInput('prop-animIn', 'animIn');
                bindInput('prop-animLoop', 'animLoop');
                bindInput('prop-animOut', 'animOut');
            }
            if (audioItem) {
                bindInput('prop-type', 'type');
                bindInput('prop-start', 'start', Number);
                bindInput('prop-volume', 'volume', Number);
                
                const volEl = document.getElementById('prop-volume');
                if (volEl) {
                    volEl.addEventListener('input', (e) => {
                        volEl.previousElementSibling.innerText = `Volume (${Math.round(e.target.value*100)}%)`;
                        // Update live audio nodes
                        activeAudioNodes.forEach(node => {
                            if (node.id === audioItem.id) node.gain.gain.value = audioItem.volume;
                        });
                    });
                }
            }
        }

        // --- 5. Interactions & Events ---
        document.getElementById('btn-play-pause').addEventListener('click', () => {
            state.isPlaying ? pause() : play();
        });

        document.getElementById('btn-stop').addEventListener('click', stop);

        document.getElementById('btn-add-text').addEventListener('click', () => {
            const newText = {
                id: generateId(),
                text: 'DOUBLE CLICK\nTO EDIT',
                font: 'Impact',
                size: 80,
                color: '#ffffff',
                x: 50,
                y: 50,
                start: 0,
                end: Math.min(3, state.duration),
                animIn: 'scale',
                animLoop: 'none',
                animOut: 'fade'
            };
            state.texts.push(newText);
            selectItem(newText.id);
            renderTimeline();
            renderCanvas(state.currentTime);
        });

        // Audio/Video Upload Handling
        document.getElementById('input-audio').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            initAudioContext();
            
            // Show loading state
            const origHTML = propertiesPanel.innerHTML;
            propertiesPanel.innerHTML = `<div class="p-4 text-center text-sm text-mac-blue animate-pulse">Extracting/Decoding Audio...</div>`;
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const newAudio = {
                    id: generateId(),
                    name: file.name,
                    type: 'music', // Default, can be changed in properties
                    buffer: audioBuffer,
                    start: state.currentTime,
                    volume: 1
                };
                
                state.audio.push(newAudio);
                selectItem(newAudio.id);
                renderTimeline();
            } catch (err) {
                alert("Error decoding audio. The file might be corrupted or unsupported.");
                propertiesPanel.innerHTML = origHTML;
            }
            
            e.target.value = ''; // Reset input
        });

        // Timeline clicking to seek
        document.getElementById('track-bodies').addEventListener('click', (e) => {
            // If clicked on empty area of timeline
            if (e.target.id === 'track-bodies' || e.target.classList.contains('timeline-grid')) {
                const rect = trackBodies.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const percent = x / rect.width;
                state.currentTime = percent * state.duration;
                updatePlayheadUI();
                renderCanvas(state.currentTime);
            }
        });

        // --- 6. Export to WebM ---
        document.getElementById('btn-export').addEventListener('click', async () => {
            if (state.isPlaying) stop();
            
            initAudioContext();
            
            const overlay = document.getElementById('export-overlay');
            const progress = document.getElementById('export-progress');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            progress.style.width = '0%';

            state.isExporting = true;
            state.currentTime = 0;

            // 1. Capture Canvas Stream
            const canvasStream = canvas.captureStream(30); // 30 FPS
            
            // 2. Setup Audio Destination Node for mixing
            const mediaStreamDest = audioCtx.createMediaStreamDestination();
            
            // We need a dummy audio track if there is no audio, otherwise MediaRecorder might fail 
            // if we promise audio but don't deliver.
            const dummyOsc = audioCtx.createOscillator();
            const dummyGain = audioCtx.createGain();
            dummyGain.gain.value = 0;
            dummyOsc.connect(dummyGain);
            dummyGain.connect(mediaStreamDest);
            dummyOsc.start();

            // 3. Combine Streams
            const combinedTracks = [
                ...canvasStream.getVideoTracks(),
                ...mediaStreamDest.stream.getAudioTracks()
            ];
            const combinedStream = new MediaStream(combinedTracks);

            // 4. Setup MediaRecorder
            let mimeType = 'video/webm;codecs=vp8,opus';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm'; // Fallback
            }

            const recorder = new MediaRecorder(combinedStream, { mimeType });
            const chunks = [];

            recorder.ondataavailable = e => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'MotionCanvas_Export.webm';
                a.click();
                URL.revokeObjectURL(url);
                
                // Cleanup
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
                state.isExporting = false;
                stop();
                dummyOsc.stop();
            };

            recorder.start(100); // Collect chunks every 100ms

            // 5. Custom Playback Loop for Export
            // Instead of routing to audioCtx.destination, we route to mediaStreamDest
            state.audio.forEach(track => {
                if (track.start < state.duration) {
                    const source = audioCtx.createBufferSource();
                    source.buffer = track.buffer;
                    const gain = audioCtx.createGain();
                    gain.gain.value = track.volume;
                    
                    source.connect(gain);
                    gain.connect(mediaStreamDest); // <--- Key difference for export
                    
                    source.start(audioCtx.currentTime + track.start);
                    activeAudioNodes.push({ source, gain });
                }
            });

            // Start rendering frames
            let startTime = performance.now();
            
            function exportLoop() {
                if (!state.isExporting) return;
                
                const now = performance.now();
                state.currentTime = (now - startTime) / 1000;
                
                if (state.currentTime >= state.duration) {
                    state.currentTime = state.duration;
                    renderCanvas(state.currentTime);
                    progress.style.width = '100%';
                    setTimeout(() => recorder.stop(), 500); // Buffer tail
                    return;
                }

                renderCanvas(state.currentTime);
                updatePlayheadUI();
                progress.style.width = `${(state.currentTime / state.duration) * 100}%`;
                
                requestAnimationFrame(exportLoop);
            }
            
            exportLoop();
        });

        // --- Init ---
        renderTimeline();
        renderCanvas(0);
        updatePlayheadUI();
        
        // Add a default text to show it's working
        state.texts.push({
            id: generateId(),
            text: 'MotionCanvas',
            font: 'Impact',
            size: 120,
            color: '#ffffff',
            x: 50,
            y: 50,
            start: 0,
            end: 5,
            animIn: 'scale',
            animLoop: 'float',
            animOut: 'fade'
        });
        renderTimeline();
        renderCanvas(0);

    </script>
</body>
</html>
