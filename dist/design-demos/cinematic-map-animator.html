<!DOCTYPE html>
<html lang="en" class="dark">
<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            500: '#f43f5e', // Rose/Red for tactical look
                            600: '#e11d48',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        #canvas-container {
            background-color: #020617; /* Very dark slate */
            background-image: 
                radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .json-editor {
            tab-size: 2;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 sm:px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-3">
            <div class="bg-brand-500 text-white p-1.5 rounded-lg shadow-sm">

            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-800 dark:text-gray-100 mt-0.5">Cinematic Map Animator</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2.5 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition" title="Toggle UI Theme">
                <i class="ph-fill ph-moon text-xl dark:hidden"></i>
                <i class="ph-fill ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>
    </header>

    <!-- MAIN APP AREA -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Recording Overlay -->
        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-lg z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            Rendering Cinematic Map...
        </div>

        <!-- TOOLBAR / SIDEBAR -->
        <aside class="w-full md:w-[460px] bg-white dark:bg-gray-800 border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-700 p-4 md:p-5 flex flex-col gap-5 overflow-y-auto z-10 flex-shrink-0 h-[50vh] md:h-full">
            
            <!-- Map Source -->
            <div class="flex flex-col gap-2 flex-shrink-0">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">1. Map Source</h2>
                <select id="map-select" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm font-semibold outline-none focus:ring-2 focus:ring-brand-500">
                    <option value="https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1920&q=80">Vintage Atlas</option>
                    <option value="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80">Satellite Dark</option>
                    <option value="https://images.unsplash.com/photo-1589519160732-57fc498494f8?auto=format&fit=crop&w=1920&q=80" selected>Dark Vector Globe</option>
                </select>
                <div class="flex items-center gap-2 mt-1">
                    <input type="text" id="custom-map-url" placeholder="Or paste custom image URL..." class="flex-1 p-2 rounded border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-xs outline-none focus:ring-1 focus:ring-brand-500 transition">
                    <button id="btn-load-custom" class="px-3 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded text-xs font-bold transition">Load</button>
                </div>
            </div>

            <!-- Quick Templates -->
            <div class="flex flex-col gap-2 flex-shrink-0 mt-2">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Quick Scenarios</h2>
                <div class="grid grid-cols-2 gap-2">
                    <button class="template-btn py-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 hover:text-brand-500 dark:hover:bg-gray-600 rounded text-[12px] font-bold transition truncate px-2" data-template="conflict">⚔️ Border Conflict</button>
                    <button class="template-btn py-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 hover:text-brand-500 dark:hover:bg-gray-600 rounded text-[12px] font-bold transition truncate px-2" data-template="flight">✈️ Flight Route</button>
                    <button class="template-btn py-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 hover:text-brand-500 dark:hover:bg-gray-600 rounded text-[12px] font-bold transition truncate px-2" data-template="spread">🦠 Pandemic Spread</button>

                </div>

            <!-- Export Settings -->

                    </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mt-auto pt-4 pb-6 md:pb-0">

        <!-- CANVAS AREA -->

            <div id="coord-helper" class="absolute top-4 right-4 bg-black/80 backdrop-blur border border-gray-700 text-white px-3 py-2 rounded-lg font-mono text-[11px] z-30 pointer-events-none opacity-50 shadow-lg flex flex-col items-end">
                <span class="text-gray-400 mb-1 font-sans text-[10px] uppercase tracking-wider">Hover to find map coords</span>
                <div>X: <span id="coord-x" class="text-brand-500 font-bold">50.0</span>%</div>
                <div>Y: <span id="coord-y" class="text-brand-500 font-bold">50.0</span>%</div>
            </div>

            <!-- 16:9 Canvas -->
            <canvas id="export-canvas" class="w-full h-full object-contain max-w-[100%] max-h-[100%] shadow-2xl bg-[#020617]"></canvas>
            
            <div id="loading-indicator" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 text-white z-40 hidden">
                <i class="ph-bold ph-spinner-gap animate-spin text-5xl text-brand-500 mb-4"></i>
                <p class="font-medium">Loading Map Assets...</p>
            </div>
        </section>

    </main>

    <script>
        // --- Scenario Templates ---
        const templates = {
            'conflict': {
                map: 'https://images.unsplash.com/photo-1589519160732-57fc498494f8?auto=format&fit=crop&w=1920&q=80', // Dark Vector
                script: `{
  "duration": 12,
  "events": [
    { "time": 0.0, "type": "camera", "x": 60, "y": 30, "zoom": 1.0 },
    { "time": 1.0, "type": "camera", "x": 75, "y": 35, "zoom": 3.5, "dur": 4.0 },
    
    { "time": 2.0, "type": "target", "x": 75, "y": 35, "color": "#f43f5e", "label": "Capital City" },
    
    { "time": 3.5, "type": "path", "start": [68, 30], "end": [74, 34], "color": "#eab308", "dur": 2.0, "dashed": false },
    { "time": 4.0, "type": "path", "start": [70, 42], "end": [74, 36], "color": "#eab308", "dur": 2.0, "dashed": false },
    
    { "time": 6.5, "type": "highlight", "points": [[73,32], [78,33], [77,38], [72,37]], "color": "rgba(244, 63, 94, 0.4)", "dur": 1.0 },
    
    { "time": 8.0, "type": "camera", "x": 70, "y": 35, "zoom": 1.5, "dur": 3.0 }
  ]
}`
            },
            'flight': {
                map: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80', // Satellite
                script: `{
  "duration": 10,
  "events": [
    { "time": 0.0, "type": "camera", "x": 25, "y": 40, "zoom": 1.5 },
    { "time": 1.0, "type": "target", "x": 25, "y": 40, "color": "#3b82f6", "label": "JFK (New York)" },
    
    { "time": 2.0, "type": "camera", "x": 50, "y": 40, "zoom": 1.5, "dur": 4.0 },
    { "time": 2.0, "type": "path", "start": [25, 40], "end": [75, 38], "color": "#3b82f6", "dur": 4.0, "dashed": true },
    
    { "time": 5.0, "type": "target", "x": 75, "y": 38, "color": "#10b981", "label": "DXB (Dubai)" },
    { "time": 6.0, "type": "camera", "x": 75, "y": 38, "zoom": 2.5, "dur": 3.0 }
  ]
}`
            },
            'spread': {
                map: 'https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1920&q=80', // Vintage
                script: `{
  "duration": 10,
  "events": [
    { "time": 0.0, "type": "camera", "x": 50, "y": 50, "zoom": 1.0 },
    
    { "time": 1.0, "type": "target", "x": 78, "y": 42, "color": "#f43f5e", "label": "Origin" },
    
    { "time": 2.5, "type": "path", "start": [78, 42], "end": [25, 40], "color": "#f43f5e", "dur": 1.5, "dashed": true },
    { "time": 3.0, "type": "path", "start": [78, 42], "end": [52, 35], "color": "#f43f5e", "dur": 1.5, "dashed": true },
    { "time": 3.5, "type": "path", "start": [78, 42], "end": [85, 65], "color": "#f43f5e", "dur": 1.5, "dashed": true },
    
    { "time": 4.0, "type": "target", "x": 25, "y": 40, "color": "#f43f5e", "label": "Detected" },
    { "time": 4.5, "type": "target", "x": 52, "y": 35, "color": "#f43f5e", "label": "Detected" },
    { "time": 5.0, "type": "target", "x": 85, "y": 65, "color": "#f43f5e", "label": "Detected" },
    
    { "time": 6.0, "type": "camera", "x": 45, "y": 40, "zoom": 1.8, "dur": 3.0 }
  ]
}`
            },
            'tour': {
                map: 'https://images.unsplash.com/photo-1589519160732-57fc498494f8?auto=format&fit=crop&w=1920&q=80',
                script: `{
  "duration": 12,
  "events": [
    { "time": 0.0, "type": "camera", "x": 20, "y": 45, "zoom": 3.0 },
    { "time": 0.5, "type": "target", "x": 20, "y": 45, "color": "#14b8a6", "label": "Location A" },
    
    { "time": 2.0, "type": "camera", "x": 50, "y": 35, "zoom": 2.5, "dur": 3.0 },
    { "time": 2.5, "type": "path", "start": [20, 45], "end": [50, 35], "color": "#14b8a6", "dur": 2.5, "dashed": false },
    { "time": 5.0, "type": "target", "x": 50, "y": 35, "color": "#14b8a6", "label": "Location B" },
    
    { "time": 6.0, "type": "camera", "x": 75, "y": 65, "zoom": 3.0, "dur": 3.0 },
    { "time": 6.5, "type": "path", "start": [50, 35], "end": [75, 65], "color": "#14b8a6", "dur": 2.5, "dashed": false },
    { "time": 9.0, "type": "target", "x": 75, "y": 65, "color": "#14b8a6", "label": "Location C" }
  ]
}`
            }
        };

        // --- App State ---
        const state = {
            mapImage: null,
            mapWidth: 1920,
            mapHeight: 1080,
            
            script: null,
            time: 0,
            
            isAnimating: false,
            isRecording: false,
            
            // Current Camera State
            camX: 50, 
            camY: 50,
            camZoom: 1.0
        };

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // 1080p Resolution
        canvas.width = 1920;
        canvas.height = 1080;

        // UI Elements
        const mapSelect = document.getElementById('map-select');
        const customUrlInput = document.getElementById('custom-map-url');
        const btnLoadCustom = document.getElementById('btn-load-custom');
        const scriptInput = document.getElementById('script-input');
        const loadingIndicator = document.getElementById('loading-indicator');
        
        const coordHelper = document.getElementById('coord-helper');
        const cxText = document.getElementById('coord-x');
        const cyText = document.getElementById('coord-y');

        // --- Core Engine & Math ---

        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        function lerp(start, end, t) {
            return start * (1 - t) + end * t;
        }

        // Map Percent to Pixel Coordinate
        function pX(percent) { return (percent / 100) * state.mapWidth; }
        function pY(percent) { return (percent / 100) * state.mapHeight; }

        // --- Image Loader ---
        async function loadMap(url) {
            return new Promise((resolve, reject) => {
                loadingIndicator.classList.remove('hidden');
                
                const img = new Image();
                img.crossOrigin = "Anonymous"; 
                
                img.onload = () => {
                    state.mapImage = img;
                    state.mapWidth = img.width;
                    state.mapHeight = img.height;
                    loadingIndicator.classList.add('hidden');
                    renderFrame(0); // initial render
                    resolve();
                };
                
                img.onerror = () => {
                    loadingIndicator.classList.add('hidden');
                    alert("Failed to load map image. It may be restricted by CORS. Try a different URL.");
                    reject();
                };
                
                img.src = url;
            });
        }

        // --- Script Parser ---
        function parseScript() {
            try {
                const parsed = JSON.parse(scriptInput.value);
                state.script = parsed;
                return true;
            } catch (e) {
                alert("Invalid JSON in Event Script.\n" + e.message);
                return false;
            }
        }

        // --- Rendering Engine ---
        function renderFrame(time) {
            if (!state.mapImage || !state.script) return;

            // 1. Calculate Camera State
            const events = state.script.events || [];
            const camEvents = events.filter(e => e.type === 'camera').sort((a, b) => a.time - b.time);
            
            let currentCam = { x: 50, y: 50, zoom: 1.0 };

            if (camEvents.length > 0) {
                // Find current segment
                let prevCam = camEvents[0];
                let nextCam = null;

                for (let i = 0; i < camEvents.length; i++) {
                    if (time >= camEvents[i].time) {
                        prevCam = camEvents[i];
                        if (i + 1 < camEvents.length && time < camEvents[i+1].time) {
                            nextCam = camEvents[i+1];
                        }
                    }
                }

                if (!nextCam || !prevCam.dur) {
                    currentCam = { x: prevCam.x, y: prevCam.y, zoom: prevCam.zoom };
                } else {
                    const progress = Math.max(0, Math.min(1, (time - prevCam.time) / prevCam.dur));
                    const ease = easeInOutCubic(progress);
                    currentCam = {
                        x: lerp(prevCam.x, prevCam.x, ease), // Wait, nextCam x is what we want!
                        // Fix: if prevCam has a target x,y,zoom it actually acts as a "move to this point over dur" 
                        // Actually, Vox style: event defines the TARGET destination and duration to get there from current position.
                        // Let's redefine camera logic:
                    };
                }
            }

            // REDEFINED CAMERA LOGIC for easier scripting:
            // Every camera event sets a TARGET to reach BY its `time + dur`.
            // If time < event.time, we are at the previous state.
            currentCam = { x: 50, y: 50, zoom: 1.0 }; // defaults
            
            if (camEvents.length > 0) {
                currentCam = { x: camEvents[0].x, y: camEvents[0].y, zoom: camEvents[0].zoom };
                
                for (let i = 1; i < camEvents.length; i++) {
                    const target = camEvents[i];
                    const start = camEvents[i-1];
                    const dur = target.dur || 0.001; // Avoid div by 0
                    
                    if (time >= target.time) {
                        const progress = Math.max(0, Math.min(1, (time - target.time) / dur));
                        const ease = easeInOutCubic(progress);
                        
                        currentCam.x = lerp(start.x, target.x, ease);
                        currentCam.y = lerp(start.y, target.y, ease);
                        currentCam.zoom = lerp(start.zoom, target.zoom, ease);
                    }
                }
            }
            
            // Save state for coordinate helper
            state.camX = currentCam.x;
            state.camY = currentCam.y;
            state.camZoom = currentCam.zoom;

            // 2. Setup Canvas Transform (Ken Burns)
            ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Move to center of canvas
            ctx.translate(canvas.width / 2, canvas.height / 2);
            // Apply Zoom
            ctx.scale(currentCam.zoom, currentCam.zoom);
            // Move map so currentCam.x/y is at center
            ctx.translate(-pX(currentCam.x), -pY(currentCam.y));

            // 3. Draw Map Base
            ctx.drawImage(state.mapImage, 0, 0, state.mapWidth, state.mapHeight);

            // 4. Draw Highlights
            const highlights = events.filter(e => e.type === 'highlight');
            highlights.forEach(hl => {
                if (time >= hl.time) {
                    const dur = hl.dur || 1.0;
                    const progress = Math.min(1, (time - hl.time) / dur);
                    
                    ctx.beginPath();
                    hl.points.forEach((pt, i) => {
                        if (i === 0) ctx.moveTo(pX(pt[0]), pY(pt[1]));
                        else ctx.lineTo(pX(pt[0]), pY(pt[1]));
                    });
                    ctx.closePath();
                    
                    ctx.globalAlpha = progress; // Fade in
                    ctx.fillStyle = hl.color || 'rgba(255,255,255,0.3)';
                    ctx.fill();
                    
                    ctx.lineWidth = 2 / currentCam.zoom;
                    ctx.strokeStyle = hl.color ? hl.color.replace(/[\d.]+\)$/g, '1.0)') : 'white';
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                }
            });

            // 5. Draw Paths
            const paths = events.filter(e => e.type === 'path');
            paths.forEach(path => {
                if (time >= path.time) {
                    const dur = path.dur || 1.0;
                    const progress = Math.min(1, (time - path.time) / dur);
                    
                    const sx = pX(path.start[0]);
                    const sy = pY(path.start[1]);
                    const ex = pX(path.end[0]);
                    const ey = pY(path.end[1]);
                    
                    const curX = lerp(sx, ex, progress);
                    const curY = lerp(sy, ey, progress);
                    
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    
                    // Bezier curve for paths (simulating flight arcs)
                    // Control point is pushed "up" perpendicular to line
                    const midX = (sx + ex)/2;
                    const midY = (sy + ey)/2;
                    const dx = ex - sx;
                    const dy = ey - sy;
                    const cpX = midX - dy * 0.2;
                    const cpY = midY + dx * 0.2;
                    
                    // Since standard bezierTo doesn't support progress drawing easily, 
                    // we'll draw lines in tiny segments to support arcs, OR just use straight lines for now.
                    // Let's use an arc approximation using quadraticCurveTo if progress == 1, else draw to curX.
                    // For perfect progressive arcs, we calculate quadratic bezier points manually:
                    
                    let lastPx = sx, lastPy = sy;
                    const segments = 50 * progress; 
                    for (let i = 1; i <= segments; i++) {
                        const t = i / 50;
                        const bx = Math.pow(1-t, 2)*sx + 2*(1-t)*t*cpX + Math.pow(t, 2)*ex;
                        const by = Math.pow(1-t, 2)*sy + 2*(1-t)*t*cpY + Math.pow(t, 2)*ey;
                        ctx.lineTo(bx, by);
                        lastPx = bx; lastPy = by;
                    }

                    ctx.lineWidth = 6 / currentCam.zoom;
                    ctx.strokeStyle = path.color || 'white';
                    ctx.lineCap = 'round';
                    
                    if (path.dashed) {
                        ctx.setLineDash([15 / currentCam.zoom, 15 / currentCam.zoom]);
                    } else {
                        ctx.setLineDash([]);
                    }
                    
                    // Shadow for neon/glow effect
                    ctx.shadowColor = path.color || 'white';
                    ctx.shadowBlur = 10 / currentCam.zoom;
                    
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.setLineDash([]);
                    
                    // Draw leading dot
                    if (progress < 1) {
                        ctx.beginPath();
                        ctx.arc(lastPx, lastPy, 8 / currentCam.zoom, 0, Math.PI*2);
                        ctx.fillStyle = 'white';
                        ctx.fill();
                    }
                }
            });

            // 6. Draw Targets (Pings & Labels)
            const targets = events.filter(e => e.type === 'target');
            targets.forEach(t => {
                if (time >= t.time) {
                    const tx = pX(t.x);
                    const ty = pY(t.y);
                    const age = time - t.time;
                    
                    // Pulsing ring
                    const pulseDur = 2.0;
                    const p = (age % pulseDur) / pulseDur; // 0 to 1
                    
                    const maxRadius = 50 / currentCam.zoom;
                    const radius = p * maxRadius;
                    
                    ctx.beginPath();
                    ctx.arc(tx, ty, radius, 0, Math.PI*2);
                    ctx.strokeStyle = t.color || 'white';
                    ctx.lineWidth = 2 / currentCam.zoom;
                    ctx.globalAlpha = 1 - p; // fade out as it expands
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;

                    // Solid Center Dot
                    ctx.beginPath();
                    ctx.arc(tx, ty, 6 / currentCam.zoom, 0, Math.PI*2);
                    ctx.fillStyle = t.color || 'white';
                    ctx.fill();
                    
                    // Label
                    if (t.label) {
                        const fontSize = 24 / currentCam.zoom;
                        ctx.font = `800 ${fontSize}px "Inter"`;
                        
                        // Measure text to draw background box
                        const metrics = ctx.measureText(t.label);
                        const padX = 10 / currentCam.zoom;
                        const padY = 6 / currentCam.zoom;
                        
                        const lblX = tx + (15 / currentCam.zoom);
                        const lblY = ty - (15 / currentCam.zoom);
                        
                        ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        ctx.fillRect(lblX, lblY - fontSize, metrics.width + padX*2, fontSize + padY*2);
                        
                        ctx.fillStyle = 'white';
                        ctx.textBaseline = 'bottom';
                        ctx.fillText(t.label, lblX + padX, lblY + padY);
                        
                        // Connector line
                        ctx.beginPath();
                        ctx.moveTo(tx, ty);
                        ctx.lineTo(lblX, lblY);
                        ctx.strokeStyle = t.color || 'white';
                        ctx.lineWidth = 2 / currentCam.zoom;
                        ctx.stroke();
                    }
                }
            });

            // 7. Post-Processing (Vignette & Cinematic Bars overlay)
            // Reset transform for absolute screen overlays
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            // Vignette
            const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height*0.4, canvas.width/2, canvas.height/2, canvas.width*0.7);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.8)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Subtle Scanlines (optional aesthetic)
            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            for(let i=0; i<canvas.height; i+=4) {
                ctx.fillRect(0, i, canvas.width, 1);
            }
        }

        // --- Interaction & Event Listeners ---
        
        function updateUI() {
            if(parseScript()) {
                renderFrame(state.script.duration); // Preview final frame
            }
        }

        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const template = btn.getAttribute('data-template');
                if (templates[template]) {
                    scriptInput.value = templates[template].script;
                    
                    // Force map select to match template
                    let found = false;
                    Array.from(mapSelect.options).forEach(opt => {
                        if(opt.value === templates[template].map) {
                            mapSelect.value = opt.value;
                            found = true;
                        }
                    });
                    if(!found) {
                        customUrlInput.value = templates[template].map;
                    }
                    
                    await loadMap(templates[template].map);
                    updateUI();
                }
            });
        });

        mapSelect.addEventListener('change', async (e) => {
            await loadMap(e.target.value);
            updateUI();
        });

        btnLoadCustom.addEventListener('click', async () => {
            const url = customUrlInput.value.trim();
            if (url) {
                await loadMap(url);
                updateUI();
            }
        });

        scriptInput.addEventListener('input', () => {
            // Preview at time = 0 or max time depending on intent
            // Let's preview at time = duration to show end state
            updateUI();
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // --- Coordinate Helper ---
        canvas.addEventListener('mousemove', (e) => {
            coordHelper.style.opacity = '1';
            
            const rect = canvas.getBoundingClientRect();
            // Mouse X/Y relative to canvas element
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            
            // Map element coordinates to internal 1920x1080 resolution
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const internalX = mx * scaleX;
            const internalY = my * scaleY;
            
            // Inverse Camera Transform
            // screenX = (mapX - CamX) * Zoom + CanvasW/2
            // mapX = (screenX - CanvasW/2) / Zoom + CamX
            const mapPixelX = (internalX - canvas.width/2) / state.camZoom + pX(state.camX);
            const mapPixelY = (internalY - canvas.height/2) / state.camZoom + pY(state.camY);
            
            // Convert back to percentages
            const pctX = (mapPixelX / state.mapWidth) * 100;
            const pctY = (mapPixelY / state.mapHeight) * 100;
            
            cxText.textContent = pctX.toFixed(1);
            cyText.textContent = pctY.toFixed(1);
        });

        canvas.addEventListener('mouseleave', () => {
            coordHelper.style.opacity = '0.5';
        });

        // --- Init ---
        // Load default map and template
        loadMap(mapSelect.value).then(() => {
            document.querySelector('[data-template="conflict"]').click();
        });

        // --- Animation & Recording Engine ---
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const overlay = document.getElementById('recording-overlay');

        async function runAnimation(recordCallback = null) {
            if (state.isAnimating || !parseScript()) return;
            state.isAnimating = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            const durationSec = state.script.duration || 10;
            const durationMs = durationSec * 1000;
            
            if (recordCallback) await recordCallback();

            const startTime = performance.now();

            return new Promise((resolve) => {
                function animLoop(currentTime) {
                    const elapsed = Math.max(0, currentTime - startTime);
                    const p = elapsed / durationMs;
                    
                    const animTime = Math.min(durationSec, elapsed / 1000);
                    renderFrame(animTime);

                    if (animTime < durationSec) {
                        requestAnimationFrame(animLoop);
                    } else {
                        state.isAnimating = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        resolve();
                    }
                }
                requestAnimationFrame(animLoop);
            });
        }

        btnAnimate.addEventListener('click', () => runAnimation());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimating || state.isRecording || !parseScript()) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                const fps = parseInt(document.getElementById('export-fps').value);
                const stream = canvas.captureStream(fps);
                
                const format = document.getElementById('export-format').value;
                let options = { mimeType: `video/${format};codecs=vp9` };
                
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: `video/${format}` };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' }; // fallback
                    }
                }

                // 8 Mbps for high quality map textures
                options.videoBitsPerSecond = 8000000; 

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    const ext = options.mimeType.includes('mp4') ? 'mp4' : 'webm';
                    a.download = `cinematic-map.${ext}`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                    renderFrame(state.script.duration); // Reset to end
                };

                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');

                // Pre-roll
                renderFrame(0);
                let idleInterval = setInterval(() => renderFrame(0), 1000 / fps);
                
                mediaRecorder.start();
                await new Promise(r => setTimeout(r, 500)); 
                clearInterval(idleInterval);
                
                await runAnimation();

                // Post-roll hold
                let endInterval = setInterval(() => renderFrame(state.script.duration), 1000 / fps);
                setTimeout(() => {
                    clearInterval(endInterval);
                    mediaRecorder.stop();
                }, 2000); // 2 second pause at the end to read the map

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                overlay.classList.remove('translate-y-4');
                overlay.classList.add('-translate-y-20');
                state.isAnimating = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                renderFrame(state.script.duration);
            }
        });

    </script>
</body>
</html>
