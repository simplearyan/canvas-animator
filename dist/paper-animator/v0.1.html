<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paper Animator Studio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        hand: ['Caveat', 'cursive'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            500: '#8b5cf6', // Violet
                            600: '#7c3aed',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Rough.js for the hand-drawn effect -->
    <script src="https://unpkg.com/roughjs@4.5.2/bundled/rough.js"></script>

    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #8b5cf6;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #475569;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Canvas Wrapper Pattern */
        #canvas-wrapper {
            background-color: #f1f5f9;
            background-image: 
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .dark #canvas-wrapper {
            background-color: #0f172a;
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
        }

        /* The actual canvas dynamically sizes via JS but fits via CSS */
        #export-canvas {
            object-fit: contain;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 sm:px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-2">
            <div class="bg-brand-500 text-white p-1.5 rounded-lg shadow-sm">
                <i class="ph-bold ph-pencil-line text-2xl"></i>
            </div>
            <h1 class="text-2xl font-hand font-bold tracking-tight text-gray-800 dark:text-gray-100 mt-1">Paper Animator Studio</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2.5 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                <i class="ph-fill ph-moon text-xl dark:hidden"></i>
                <i class="ph-fill ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>
    </header>

    <!-- MAIN APP AREA -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Recording Overlay -->
        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-500 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-lg z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            Recording Animation...
        </div>

        <!-- TOOLBAR / SIDEBAR -->
        <aside class="w-full md:w-[440px] bg-white dark:bg-gray-800 border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-700 p-4 md:p-5 flex flex-col gap-6 overflow-y-auto z-10 flex-shrink-0 h-[50vh] md:h-full">
            
            <!-- Quick Templates -->
            <div class="flex flex-col gap-3 flex-shrink-0">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Drawing Templates</h2>
                <div class="grid grid-cols-3 gap-2">
                    <button class="template-btn py-2 bg-gray-100 dark:bg-gray-700 hover:bg-brand-50 hover:text-brand-600 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition flex flex-col items-center justify-center gap-1 active:bg-brand-100 dark:active:bg-brand-900 border-2 border-transparent active:border-brand-500" data-template="ball">
                        <i class="ph-fill ph-basketball text-lg"></i> Bouncing Ball
                    </button>
                    <button class="template-btn py-2 bg-gray-100 dark:bg-gray-700 hover:bg-brand-50 hover:text-brand-600 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition flex flex-col items-center justify-center gap-1 border-2 border-transparent active:border-brand-500" data-template="city">
                        <i class="ph-fill ph-buildings text-lg"></i> Cityscape
                    </button>
                    <button class="template-btn py-2 bg-gray-100 dark:bg-gray-700 hover:bg-brand-50 hover:text-brand-600 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition flex flex-col items-center justify-center gap-1 border-2 border-transparent active:border-brand-500" data-template="rocket">
                        <i class="ph-fill ph-rocket-launch text-lg"></i> Rocket
                    </button>
                </div>
            </div>

            <!-- Appearance Settings -->
            <div class="flex flex-col gap-4 flex-shrink-0">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Canvas & Ink Style</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Paper Type</label>
                        <select id="paper-type" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm font-semibold outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="ruled">Ruled Paper</option>
                            <option value="grid">Grid Paper</option>
                            <option value="craft">Craft Paper</option>
                            <option value="blank">Blank White</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Ink Color</label>
                        <div class="flex gap-2">
                            <div class="relative flex-1 h-[42px] rounded-lg overflow-hidden border border-gray-300 dark:border-gray-600">
                                <input type="color" id="ink-color" value="#0f172a" class="absolute -top-4 -left-4 w-[200%] h-[200%] cursor-pointer">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-[11px] font-medium text-gray-700 dark:text-gray-300">Roughness</label>
                            <span id="roughness-val" class="text-[10px] text-gray-500 font-mono">1.5</span>
                        </div>
                        <input type="range" id="anim-roughness" min="0" max="5" step="0.5" value="1.5" class="w-full mt-1">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-[11px] font-medium text-gray-700 dark:text-gray-300">Stroke Width</label>
                            <span id="stroke-val" class="text-[10px] text-gray-500 font-mono">4px</span>
                        </div>
                        <input type="range" id="anim-stroke" min="1" max="15" step="1" value="4" class="w-full mt-1">
                    </div>
                </div>
            </div>

            <!-- Export Settings -->
            <div class="flex flex-col gap-4 flex-shrink-0 mt-2">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Video Export Settings</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Aspect Ratio</label>
                        <select id="export-ratio" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="16:9">16:9 (Landscape)</option>
                            <option value="9:16">9:16 (Portrait/Shorts)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Resolution</label>
                        <select id="export-res" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="480">480p (SD)</option>
                            <option value="720">720p (HD)</option>
                            <option value="1080" selected>1080p (FHD)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Frame Rate (FPS)</label>
                        <select id="export-fps" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm font-semibold outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="12">12 fps (Stop Motion)</option>
                            <option value="24" selected>24 fps (Cinematic)</option>
                            <option value="30">30 fps (Standard)</option>
                            <option value="60">60 fps (Smooth)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Format</label>
                        <select id="export-format" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="webm">.WEBM (Best for web)</option>
                            <option value="mp4">.MP4 (Compatibility)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mt-auto pt-4 pb-6 md:pb-0">
                <button id="btn-animate" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-gray-200 text-gray-900 dark:bg-gray-700 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg font-bold transition disabled:opacity-50">
                    <i class="ph-fill ph-play-circle text-xl"></i> Preview Animation
                </button>
                <button id="btn-record" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-brand-500 hover:bg-brand-600 text-white rounded-lg font-bold transition shadow-md disabled:opacity-50 group">
                    <i class="ph-fill ph-video-camera text-xl text-purple-200 group-hover:text-white transition"></i> Record & Export Video
                </button>
            </div>
        </aside>

        <!-- CANVAS AREA -->
        <section id="canvas-wrapper" class="flex-1 relative overflow-hidden flex items-center justify-center p-4 sm:p-8">
            <!-- Canvas resolution set dynamically by JS, bounded by CSS object-fit -->
            <canvas id="export-canvas" class="bg-white rounded"></canvas>
        </section>

    </main>

    <script>
        // --- App State ---
        const state = {
            template: 'ball', // 'ball', 'city', 'rocket'
            paperType: 'ruled', // 'ruled', 'grid', 'craft', 'blank'
            inkColor: '#0f172a',
            roughness: 1.5,
            strokeWidth: 4,
            
            // Export Settings
            ratio: '16:9',
            resolutionHeight: 1080,
            fps: 24,
            format: 'webm',
            
            // Animation State
            progress: 1.0, // 0 to 1
            isAnimating: false,
            isRecording: false,
            durationMs: 4000 // Fixed duration for these templates
        };

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let rc; // RoughJS instance

        // DOM Elements
        const templateBtns = document.querySelectorAll('.template-btn');
        const paperSelect = document.getElementById('paper-type');
        const inkColorInput = document.getElementById('ink-color');
        const roughnessSlider = document.getElementById('anim-roughness');
        const strokeSlider = document.getElementById('anim-stroke');
        
        const ratioSelect = document.getElementById('export-ratio');
        const resSelect = document.getElementById('export-res');
        const fpsSelect = document.getElementById('export-fps');
        const formatSelect = document.getElementById('export-format');
        
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const recordingOverlay = document.getElementById('recording-overlay');

        // --- Canvas Sizing & Layout ---
        function updateCanvasResolution() {
            let w, h;
            const res = state.resolutionHeight; // 480, 720, 1080
            
            if (state.ratio === '16:9') {
                h = res;
                w = Math.round((res / 9) * 16);
            } else {
                // 9:16
                w = res;
                h = Math.round((res / 9) * 16);
                
                // If the selected ratio is 9:16, the "resolution height" effectively becomes the width to maintain quality
                // Let's standardise: 1080p 9:16 is 1080x1920
                w = res;
                h = Math.round((res / 9) * 16);
                if (res === 480) { w = 480; h = 854; }
                if (res === 720) { w = 720; h = 1280; }
                if (res === 1080) { w = 1080; h = 1920; }
            }

            canvas.width = w;
            canvas.height = h;
            
            // Re-init rough.js to new canvas size
            rc = rough.canvas(canvas);
            
            // Render immediately with full progress
            state.progress = 1.0;
            renderFrame(1.0);
        }

        // --- Paper Background Rendering ---
        function drawPaperBackground() {
            const w = canvas.width;
            const h = canvas.height;

            // Base color
            if (state.paperType === 'craft') {
                ctx.fillStyle = '#fde68a'; // Amber 200
            } else {
                ctx.fillStyle = '#ffffff'; // White base for ruled/grid/blank
            }
            ctx.fillRect(0, 0, w, h);

            if (state.paperType === 'blank') return;

            ctx.save();
            // Scale background patterns slightly based on resolution so they don't look tiny at 1080p
            const scale = Math.max(1, w / 1200); 

            if (state.paperType === 'ruled') {
                // Margin Line (Red)
                ctx.strokeStyle = '#fca5a5'; // Red 300
                ctx.lineWidth = 2 * scale;
                ctx.beginPath();
                ctx.moveTo(w * 0.15, 0);
                ctx.lineTo(w * 0.15, h);
                ctx.stroke();

                // Horizontal Lines (Blue)
                ctx.strokeStyle = '#bae6fd'; // Sky 200
                ctx.lineWidth = 2 * scale;
                const spacing = 40 * scale;
                ctx.beginPath();
                for (let y = spacing; y < h; y += spacing) {
                    ctx.moveTo(0, y);
                    ctx.lineTo(w, y);
                }
                ctx.stroke();
            } 
            else if (state.paperType === 'grid') {
                // Light blue grid
                ctx.strokeStyle = '#bae6fd';
                ctx.lineWidth = 1 * scale;
                const spacing = 30 * scale;
                
                ctx.beginPath();
                // Verticals
                for (let x = spacing; x < w; x += spacing) {
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, h);
                }
                // Horizontals
                for (let y = spacing; y < h; y += spacing) {
                    ctx.moveTo(0, y);
                    ctx.lineTo(w, y);
                }
                ctx.stroke();
            }
            else if (state.paperType === 'craft') {
                // Add some noise or subtle lines for texture
                ctx.strokeStyle = '#fcd34d'; // Amber 300
                ctx.lineWidth = 2;
                ctx.beginPath();
                for(let i=0; i<50; i++) {
                    ctx.moveTo(Math.random() * w, Math.random() * h);
                    ctx.lineTo(Math.random() * w, Math.random() * h);
                }
                ctx.stroke();
            }
            
            ctx.restore();
        }

        // --- Template Drawing Engines ---
        function getRoughOpts() {
            return {
                stroke: state.inkColor,
                strokeWidth: state.strokeWidth * (canvas.width / 1200), // Scale stroke with resolution
                roughness: state.roughness,
                bowing: 1
            };
        }

        function drawTemplateBall(p) {
            const opts = getRoughOpts();
            const w = canvas.width;
            const h = canvas.height;
            
            const floorY = h * 0.8;
            
            // Draw floor progressively
            if (p > 0.05) {
                const floorEnd = w * Math.min(1, p * 2);
                rc.line(w * 0.1, floorY, floorEnd, floorY, opts);
            }

            // Draw bouncing ball
            if (p > 0.2) {
                // Map progress 0.2 -> 1.0 to animation time
                const animP = (p - 0.2) / 0.8; 
                
                // 3 Bounces
                const bounces = 3;
                const totalDist = w * 0.8;
                
                // X moves linearly
                const ballX = (w * 0.1) + (totalDist * animP);
                
                // Y bounces using absolute sine wave
                const bounceHeight = h * 0.4 * (1 - animP); // decays over time
                const bouncePhase = animP * Math.PI * bounces;
                const ballY = floorY - 50 - Math.abs(Math.sin(bouncePhase)) * bounceHeight;
                
                // Draw trailing lines for speed effect
                if (animP > 0 && animP < 0.95) {
                    rc.line(ballX - 40, ballY, ballX - 80, ballY - 20, {...opts, strokeWidth: opts.strokeWidth/2});
                    rc.line(ballX - 40, ballY + 20, ballX - 70, ballY + 30, {...opts, strokeWidth: opts.strokeWidth/2});
                }

                // Draw ball
                // Fill if craft paper, else hollow
                const ballOpts = {...opts};
                if (state.paperType === 'craft') {
                    ballOpts.fill = state.inkColor;
                    ballOpts.fillStyle = 'hachure';
                }
                rc.circle(ballX, ballY, 80, ballOpts);
            }
        }

        function drawTemplateCity(p) {
            const opts = getRoughOpts();
            const w = canvas.width;
            const h = canvas.height;
            const ground = h * 0.85;

            // Draw ground
            if (p > 0) {
                rc.line(0, ground, w * Math.min(1, p*1.5), ground, opts);
            }

            const bldgOpts = {...opts, fill: state.inkColor, fillStyle: 'hachure'};

            // Building 1 (Left)
            if (p > 0.1) {
                const bHeight = h * 0.5;
                const bWidth = w * 0.15;
                const curH = bHeight * Math.min(1, (p - 0.1) * 3);
                rc.rectangle(w * 0.15, ground - curH, bWidth, curH, bldgOpts);
            }

            // Building 2 (Center, tall)
            if (p > 0.3) {
                const bHeight = h * 0.7;
                const bWidth = w * 0.2;
                const curH = bHeight * Math.min(1, (p - 0.3) * 3);
                rc.rectangle(w * 0.35, ground - curH, bWidth, curH, bldgOpts);
                
                // Spire
                if (p > 0.5) {
                    rc.line(w*0.45, ground - bHeight, w*0.45, ground - bHeight - (h*0.1*Math.min(1, (p-0.5)*4)), opts);
                }
            }

            // Building 3 (Right)
            if (p > 0.4) {
                const bHeight = h * 0.4;
                const bWidth = w * 0.18;
                const curH = bHeight * Math.min(1, (p - 0.4) * 3);
                rc.rectangle(w * 0.6, ground - curH, bWidth, curH, bldgOpts);
            }

            // Sun / Moon
            if (p > 0.6) {
                const radius = w * 0.08 * Math.min(1, (p - 0.6) * 3);
                rc.circle(w * 0.85, h * 0.2, radius, opts);
                
                // Rays
                if (p > 0.8) {
                    for(let i=0; i<8; i++) {
                        const a = (i/8) * Math.PI * 2;
                        const r1 = radius * 1.2;
                        const r2 = radius * 1.6;
                        rc.line(
                            w*0.85 + Math.cos(a)*r1, h*0.2 + Math.sin(a)*r1,
                            w*0.85 + Math.cos(a)*r2, h*0.2 + Math.sin(a)*r2,
                            opts
                        );
                    }
                }
            }
        }

        function drawTemplateRocket(p) {
            const opts = getRoughOpts();
            const w = canvas.width;
            const h = canvas.height;

            // Background Stars
            if (p > 0.1) {
                const starCount = Math.floor(20 * Math.min(1, (p - 0.1)*2));
                // Predictable random so they don't boil around the screen positions
                for(let i=0; i<starCount; i++) {
                    const sx = w * ((i*0.17)%1);
                    const sy = h * ((i*0.23)%1);
                    rc.circle(sx, sy, 10, opts);
                }
            }

            // Rocket position logic
            const startY = h * 0.9;
            const endY = -h * 0.2;
            let ry = startY;
            
            if (p > 0.3) {
                const animP = (p - 0.3) / 0.7;
                // easeInQuad for takeoff speed
                ry = startY - (startY - endY) * (animP * animP);
            }

            const rx = w / 2;
            const rW = w * 0.1;
            const rH = h * 0.25;

            // Draw Rocket Body if it hasn't completely taken off
            if (p > 0) {
                // Wait to draw body fully
                const buildP = Math.min(1, p * 3);
                const curH = rH * buildP;
                
                // Body
                rc.ellipse(rx, ry, rW, curH, opts);
                
                // Fins
                if (p > 0.15) {
                    rc.polygon([
                        [rx - rW/2, ry + curH/4],
                        [rx - rW, ry + curH/2],
                        [rx - rW/2, ry + curH/2 - 10]
                    ], opts);
                    rc.polygon([
                        [rx + rW/2, ry + curH/4],
                        [rx + rW, ry + curH/2],
                        [rx + rW/2, ry + curH/2 - 10]
                    ], opts);
                }

                // Window
                if (p > 0.25) {
                    rc.circle(rx, ry - curH/4, rW*0.4, opts);
                }

                // Exhaust Flames
                if (p > 0.3) {
                    const flameOpts = {...opts, stroke: '#ef4444', fill: '#f59e0b', fillStyle: 'solid'};
                    // Flame height flickers based on time
                    const flicker = 0.8 + Math.random() * 0.4;
                    const fH = (h * 0.15) * flicker;
                    
                    rc.polygon([
                        [rx - rW/3, ry + rH/2],
                        [rx, ry + rH/2 + fH],
                        [rx + rW/3, ry + rH/2]
                    ], flameOpts);
                }
            }
        }

        // --- Core Rendering Function ---
        function renderFrame(progressOverride = null) {
            if (progressOverride !== null) {
                state.progress = progressOverride;
            }

            // 1. Draw Paper
            drawPaperBackground();

            // 2. Route to correct template
            if (state.template === 'ball') drawTemplateBall(state.progress);
            if (state.template === 'city') drawTemplateCity(state.progress);
            if (state.template === 'rocket') drawTemplateRocket(state.progress);
        }

        // --- UI Interactions & State Sync ---
        function updateStateFromUI() {
            state.paperType = paperSelect.value;
            state.inkColor = inkColorInput.value;
            state.roughness = parseFloat(roughnessSlider.value);
            state.strokeWidth = parseInt(strokeSlider.value);
            
            const oldRatio = state.ratio;
            const oldRes = state.resolutionHeight;
            
            state.ratio = ratioSelect.value;
            state.resolutionHeight = parseInt(resSelect.value);
            state.fps = parseInt(fpsSelect.value);
            state.format = formatSelect.value;

            // Only rebuild canvas if dimensions changed
            if (oldRatio !== state.ratio || oldRes !== state.resolutionHeight) {
                updateCanvasResolution();
            } else {
                renderFrame(1.0);
            }
        }

        // Setup Template Buttons
        templateBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                templateBtns.forEach(b => {
                    b.classList.remove('border-brand-500', 'bg-brand-100', 'dark:bg-brand-900');
                    b.classList.add('border-transparent');
                });
                btn.classList.add('border-brand-500', 'bg-brand-100', 'dark:bg-brand-900');
                btn.classList.remove('border-transparent');
                
                state.template = btn.getAttribute('data-template');
                renderFrame(1.0);
            });
        });
        // Select first by default visually
        templateBtns[0].classList.add('border-brand-500', 'bg-brand-100', 'dark:bg-brand-900');
        templateBtns[0].classList.remove('border-transparent');

        // Listeners
        const inputs = [paperSelect, inkColorInput, roughnessSlider, strokeSlider, ratioSelect, resSelect, fpsSelect, formatSelect];
        inputs.forEach(el => el.addEventListener('change', updateStateFromUI));
        // Real-time slider updates
        roughnessSlider.addEventListener('input', (e) => {
            document.getElementById('roughness-val').textContent = parseFloat(e.target.value).toFixed(1);
            updateStateFromUI();
        });
        strokeSlider.addEventListener('input', (e) => {
            document.getElementById('stroke-val').textContent = e.target.value + 'px';
            updateStateFromUI();
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            renderFrame();
        });

        // Initialize
        updateCanvasResolution();

        // --- Animation & Recording Engine ---
        async function runAnimation(recordCallback = null) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            updateStateFromUI();
            
            if (recordCallback) await recordCallback();

            const startTime = performance.now();
            const totalDuration = state.durationMs;
            const frameDelay = 1000 / state.fps; // Target MS per frame
            let lastDrawTime = 0;

            return new Promise((resolve) => {
                function loop(currentTime) {
                    const elapsed = Math.max(0, currentTime - startTime);
                    let p = totalDuration > 0 ? elapsed / totalDuration : 1.0;
                    p = Math.max(0, Math.min(1, p));
                    
                    // FPS Throttling for Stop-Motion Effect
                    // Only draw if enough time has passed according to selected FPS
                    if (currentTime - lastDrawTime >= frameDelay) {
                        state.progress = p;
                        renderFrame(p);
                        lastDrawTime = currentTime;
                    }

                    if (p < 1.0) {
                        requestAnimationFrame(loop);
                    } else {
                        // Ensure final frame is drawn perfectly
                        renderFrame(1.0);
                        state.isAnimating = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        resolve();
                    }
                }
                requestAnimationFrame(loop);
            });
        }

        btnAnimate.addEventListener('click', () => runAnimation());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimating || state.isRecording) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                // Capture stream at EXACTLY the requested FPS
                const stream = canvas.captureStream(state.fps);
                
                let options = {};
                let ext = state.format;

                if (ext === 'mp4') {
                    if (MediaRecorder.isTypeSupported('video/mp4;codecs=avc1')) {
                        options = { mimeType: 'video/mp4;codecs=avc1' };
                    } else if (MediaRecorder.isTypeSupported('video/mp4')) {
                        options = { mimeType: 'video/mp4' };
                    } else {
                        console.warn("MP4 recording not supported in this browser, falling back to WebM.");
                        ext = 'webm';
                        options = { mimeType: 'video/webm;codecs=vp9' };
                        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                            options = { mimeType: 'video/webm;codecs=vp8' };
                            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                                options = { mimeType: 'video/webm' };
                            }
                        }
                    }
                } else {
                    options = { mimeType: 'video/webm;codecs=vp9' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm;codecs=vp8' };
                        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                            options = { mimeType: 'video/webm' };
                        }
                    }
                }

                // High bitrate to preserve sketchy details
                options.videoBitsPerSecond = 8000000; 

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `paper-animation.${ext}`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    recordingOverlay.classList.remove('translate-y-4');
                    recordingOverlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                };

                recordingOverlay.classList.remove('-translate-y-20');
                recordingOverlay.classList.add('translate-y-4');

                // Record: Hold first frame 0.5s, animate, hold last frame 1s
                renderFrame(0);
                
                // Interval to push static frames to the recorder during pre-roll
                let idleInterval = setInterval(() => renderFrame(0), 1000 / state.fps);
                
                mediaRecorder.start();
                await new Promise(r => setTimeout(r, 500)); 
                clearInterval(idleInterval);
                
                await runAnimation();

                // Post-roll
                let endInterval = setInterval(() => renderFrame(1.0), 1000 / state.fps);
                setTimeout(() => {
                    clearInterval(endInterval);
                    mediaRecorder.stop();
                }, 1000);

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                recordingOverlay.classList.remove('translate-y-4');
                recordingOverlay.classList.add('-translate-y-20');
                state.isAnimating = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                renderFrame(1.0);
            }
        });

    </script>
</body>
</html>
