<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Chart Animator Pro</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Carrois+Gothic&family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@600;700&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            500: '#f59e0b', // Amber for Race Theme
                            600: '#d97706',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- GIF.js for GIF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        
        /* Custom ranges for toolbar */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* Custom scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        /* Color inputs */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 100%;
            padding: 0;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2); }

        /* Canvas container background for depth */
        .checker-bg {
            background-color: #09090b; 
            background-image: 
                linear-gradient(45deg, #18181b 25%, transparent 25%), 
                linear-gradient(-45deg, #18181b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #18181b 75%), 
                linear-gradient(-45deg, transparent 75%, #18181b 75%);
            background-size: 24px 24px;
            background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
        }
        
        #export-canvas {
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 30px 60px -12px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="bg-zinc-950 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- HEADER (macOS Glass) -->
    <header class="h-14 bg-zinc-900/80 backdrop-blur-2xl border-b border-white/5 flex items-center justify-between px-4 sm:px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-br from-amber-400 to-orange-600 text-white p-1 rounded-md shadow-inner shadow-white/20">
                <i class="ph-bold ph-chart-line-up text-lg"></i>
            </div>
            <h1 class="text-sm font-semibold tracking-tight text-zinc-100 hidden sm:block">Race Chart Animator <span class="text-zinc-500 font-normal">Pro</span></h1>
        </div>

        <div class="flex items-center justify-end gap-3 shrink-0">
            <label class="hidden md:flex items-center gap-1.5 cursor-pointer bg-white/5 hover:bg-white/10 px-2 py-1.5 rounded border border-white/5 transition" title="Export as transparent PNG or GIF">
                <input type="checkbox" id="header-transparent" class="w-3.5 h-3.5 accent-brand-500 rounded cursor-pointer">
                <span class="text-[11px] font-medium text-zinc-300">Transparent</span>
            </label>

            <button id="btn-header-preview" class="flex items-center gap-2 px-3 py-1.5 bg-white/5 hover:bg-white/10 text-white rounded-lg font-medium transition-colors border border-white/10 text-xs shadow-sm">
                <i class="ph-fill ph-play-circle text-lg" id="icon-play"></i>
                <span id="text-play" class="hidden sm:inline">Preview</span>
            </button>
            
            <div class="flex bg-brand-600 rounded-lg shadow-lg shadow-brand-600/20 ring-1 ring-inset ring-white/20 transition-all hover:bg-brand-500">
                <select id="export-res" class="bg-transparent text-white font-semibold pl-2 pr-1 py-1.5 outline-none cursor-pointer appearance-none text-xs border-r border-brand-400/30 hidden sm:block">
                    <option value="640" class="bg-zinc-800">360p (GIF)</option>
                    <option value="854" class="bg-zinc-800">480p (GIF)</option>
                    <option value="1920" class="bg-zinc-800" selected>HD 1080p</option>
                    <option value="2560" class="bg-zinc-800">2K 1440p</option>
                    <option value="3840" class="bg-zinc-800">4K 2160p</option>
                </select>
                <select id="export-fmt" class="bg-transparent text-white font-semibold pl-2 pr-1 py-1.5 outline-none cursor-pointer appearance-none text-xs border-r border-brand-400/30" onchange="document.getElementById('text-export').innerText = this.value.toUpperCase()">
                    <option value="webm" class="bg-zinc-800" selected>WebM</option>
                    <option value="gif" class="bg-zinc-800">GIF</option>
                    <option value="png" class="bg-zinc-800">PNG</option>
                </select>
                <button id="btn-header-export" class="flex items-center gap-2 px-3 py-1.5 text-white font-bold transition-all rounded-r-lg text-xs">
                    <i class="ph-bold ph-download text-sm"></i>
                    <span class="hidden sm:inline" id="text-export">WEBM</span>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN APP AREA -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Recording Overlay -->
        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-500/90 backdrop-blur-md border border-red-500/50 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-[0_10px_30px_rgba(239,68,68,0.3)] z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
            <span id="recording-text">Rendering Video...</span>
        </div>

        <!-- TOOLBAR / SIDEBAR (macOS Glass) -->
        <aside class="w-full md:w-[380px] bg-zinc-900/60 backdrop-blur-3xl border-b md:border-b-0 md:border-r border-white/5 p-5 flex flex-col gap-6 overflow-y-auto z-10 flex-shrink-0 h-[45vh] md:h-full order-2 md:order-1 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] md:shadow-none">
            
            <!-- Quick Templates -->
            <div class="flex flex-col gap-2 flex-shrink-0">
                <h2 class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Race Templates</h2>
                <div class="grid grid-cols-3 gap-2">
                    <button class="template-btn py-2 bg-white/5 hover:bg-brand-500/20 border border-white/5 hover:border-brand-500/30 rounded-lg text-[11px] font-medium text-zinc-300 hover:text-brand-300 transition truncate px-2 text-center" data-template="bar_h">🏆 H-Bar</button>
                    <button class="template-btn py-2 bg-white/5 hover:bg-brand-500/20 border border-white/5 hover:border-brand-500/30 rounded-lg text-[11px] font-medium text-zinc-300 hover:text-brand-300 transition truncate px-2 text-center" data-template="bar_v">📊 V-Bar</button>
                    <button class="template-btn py-2 bg-white/5 hover:bg-brand-500/20 border border-white/5 hover:border-brand-500/30 rounded-lg text-[11px] font-medium text-zinc-300 hover:text-brand-300 transition truncate px-2 text-center" data-template="line">🚀 Line</button>
                </div>
            </div>

            <div class="w-full h-px bg-white/5"></div>

            <!-- Content Editor -->
            <div class="flex flex-col gap-3 flex-shrink-0">
                <h2 class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Chart Metadata</h2>
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="show-title" checked class="w-4 h-4 accent-brand-500 cursor-pointer" title="Toggle Title">
                    <input type="text" id="chart-title" value="Top Global Brands ($B)" class="flex-1 px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-sm text-zinc-100 font-semibold outline-none focus:ring-1 focus:ring-brand-500 transition-shadow" placeholder="Chart Title">
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="show-subtitle" checked class="w-4 h-4 accent-brand-500 cursor-pointer" title="Toggle Subtitle">
                    <input type="text" id="chart-subtitle" value="The rise of big tech over the last decade." class="flex-1 px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-sm text-zinc-200 outline-none focus:ring-1 focus:ring-brand-500 transition-shadow" placeholder="Chart Subtitle">
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="show-source" checked class="w-4 h-4 accent-brand-500 cursor-pointer" title="Toggle Source">
                    <input type="text" id="chart-source" value="SOURCE: INTERBRAND" class="flex-1 px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-xs text-zinc-400 uppercase outline-none focus:ring-1 focus:ring-brand-500 transition-shadow" placeholder="Source Attribution">
                </div>
            </div>

            <div class="w-full h-px bg-white/5"></div>

            <!-- Enhanced Data Editor -->
            <div class="flex flex-col gap-2 flex-1 min-h-[220px]">
                <div class="flex items-center justify-between">
                    <h2 class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Timeline Data (CSV)</h2>
                    <!-- View Toggle -->
                    <div class="flex bg-black/40 rounded p-0.5 border border-white/5">
                        <button id="tab-grid" class="px-3 py-1 text-[10px] font-bold rounded text-zinc-500 hover:text-zinc-300 transition">Grid View</button>
                        <button id="tab-csv" class="px-3 py-1 text-[10px] font-bold rounded bg-white/10 text-white shadow-sm transition">Raw CSV</button>
                    </div>
                </div>

                <!-- Grid View -->
                <div id="view-grid" class="hidden flex-col gap-2 flex-1 overflow-hidden mt-1">
                    <div class="flex text-[10px] font-medium text-zinc-500 px-1 uppercase tracking-wider">
                        <div class="flex-[2]" id="grid-lbl-header">Time / Year</div>
                        <div class="flex-[2]">Values (Comma Sep)</div>
                        <div class="w-6"></div>
                    </div>
                    <div id="data-grid-rows" class="flex flex-col gap-1.5 overflow-y-auto flex-1 pr-1 pb-1">
                        <!-- Rows injected via JS -->
                    </div>
                    <button id="btn-add-row" class="w-full py-2 border border-white/10 rounded-lg border-dashed text-xs text-zinc-400 hover:text-zinc-200 hover:bg-white/5 transition flex items-center justify-center gap-1 mt-1">
                        <i class="ph-bold ph-plus"></i> Add Row
                    </button>
                </div>

                <!-- CSV View -->
                <div id="view-csv" class="flex flex-col gap-1 flex-1 mt-1">
                    <p class="text-[10px] text-zinc-500 mb-1" id="csv-help">Format: Time, Series1, Series2... Paste your timeline data here.</p>
                    <textarea id="data-input" class="w-full flex-1 p-3 rounded-lg border border-white/10 bg-black/20 text-[12px] text-zinc-200 font-mono outline-none focus:ring-1 focus:ring-brand-500 resize-none whitespace-pre transition-shadow" spellcheck="false">
Year,Apple,Google,Microsoft,Amazon,Coca-Cola
2015,170,120,67,37,78
2016,178,133,72,50,73
2017,184,141,79,64,69
2018,214,155,92,100,66
2019,234,167,108,135,63
2020,322,165,166,200,56
2021,355,196,210,254,57
2022,482,251,278,281,57</textarea>
                </div>
            </div>

            <div class="w-full h-px bg-white/5"></div>

            <!-- Appearance Settings -->
            <div class="flex flex-col gap-4 flex-shrink-0">
                <h2 class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Layout & Style</h2>
                
                <!-- Chart Type & Palette -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-medium mb-1.5 text-zinc-400">Race Type</label>
                        <select id="chart-type" class="w-full px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-xs text-zinc-200 outline-none focus:ring-1 focus:ring-brand-500 appearance-none cursor-pointer">
                            <option value="horizontal">Horizontal Bar Race</option>
                            <option value="vertical">Vertical Bar Race</option>
                            <option value="line">Line Chart Race</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium mb-1.5 text-zinc-400">Color Palette</label>
                        <select id="color-palette" class="w-full px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-xs text-zinc-200 outline-none focus:ring-1 focus:ring-brand-500 appearance-none cursor-pointer">
                            <option value="vibrant">Vibrant</option>
                            <option value="pastel">Pastel Colors</option>
                            <option value="neon">Cyberpunk Neon</option>
                            <option value="sunset">Sunset Glow</option>
                            <option value="ocean">Deep Ocean</option>
                        </select>
                    </div>
                </div>

                <!-- Custom Colors: Defaulting to White Canvas -->
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[10px] font-medium mb-1.5 text-zinc-400">Canvas BG</label>
                        <div class="relative w-full h-8 rounded-lg overflow-hidden border border-white/20">
                            <input type="color" id="bg-color" value="#ffffff">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium mb-1.5 text-zinc-400">Title Color</label>
                        <div class="relative w-full h-8 rounded-lg overflow-hidden border border-white/20">
                            <input type="color" id="title-color" value="#18181b">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium mb-1.5 text-zinc-400">Text Color</label>
                        <div class="relative w-full h-8 rounded-lg overflow-hidden border border-white/20">
                            <input type="color" id="text-color" value="#71717a">
                        </div>
                    </div>
                </div>

                <!-- Font Select & Value Format -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-medium mb-1.5 text-zinc-400">Font Family</label>
                        <select id="font-family" class="w-full px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-xs text-zinc-200 outline-none focus:ring-1 focus:ring-brand-500 appearance-none cursor-pointer">
                            <option value="Inter">Inter (Modern)</option>
                            <option value="Carrois Gothic">Carrois Gothic (Editorial)</option>
                            <option value="Roboto">Roboto (Clean)</option>
                            <option value="JetBrains Mono">JetBrains (Code)</option>
                            <option value="Playfair Display">Playfair (Serif)</option>
                            <option value="Caveat">Caveat (Handdrawn)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium mb-1.5 text-zinc-400">Value Format</label>
                        <select id="value-format" class="w-full px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-xs text-zinc-200 outline-none focus:ring-1 focus:ring-brand-500 appearance-none cursor-pointer">
                            <option value="number">Plain Number</option>
                            <option value="currency">$ Currency</option>
                            <option value="percent">% Percentage</option>
                        </select>
                    </div>
                </div>

                <!-- Font Sizes -->
                <div class="grid grid-cols-3 gap-3 mt-1">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-medium text-zinc-400">Title Size</label>
                        </div>
                        <input type="range" id="title-size" min="30" max="100" step="2" value="64">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-medium text-zinc-400">Sub Size</label>
                        </div>
                        <input type="range" id="subtitle-size" min="16" max="60" step="2" value="38">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-medium text-zinc-400">Src Size</label>
                        </div>
                        <input type="range" id="source-size" min="10" max="40" step="2" value="20">
                    </div>
                </div>

                <!-- Specific Bar Styles -->
                <div class="grid grid-cols-3 gap-3 mt-2">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-medium text-zinc-400">Bar Width</label>
                            <span id="bar-thickness-val" class="text-[10px] text-zinc-500 font-mono">80%</span>
                        </div>
                        <input type="range" id="bar-thickness" min="10" max="100" step="1" value="80">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-medium text-zinc-400">Bar Radius</label>
                            <span id="bar-radius-val" class="text-[10px] text-zinc-500 font-mono">50%</span>
                        </div>
                        <input type="range" id="bar-radius" min="0" max="100" step="1" value="50">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-medium text-zinc-400">Bar Gap</label>
                            <span id="bar-gap-val" class="text-[10px] text-zinc-500 font-mono">20px</span>
                        </div>
                        <input type="range" id="bar-gap" min="0" max="60" step="2" value="20">
                    </div>
                </div>

                <!-- Generic Settings -->
                <div class="grid grid-cols-3 gap-3 mt-1">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-medium text-zinc-400">Max Items</label>
                            <span id="max-items-val" class="text-[10px] text-zinc-500 font-mono">10</span>
                        </div>
                        <input type="range" id="max-items" min="3" max="20" step="1" value="10">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-medium text-zinc-400">Duration</label>
                            <span id="duration-val" class="text-[10px] text-zinc-500 font-mono">10s</span>
                        </div>
                        <input type="range" id="anim-duration" min="1" max="30" step="1" value="10">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-medium text-zinc-400">Line Glow</label>
                            <span id="glow-val" class="text-[10px] text-zinc-500 font-mono">High</span>
                        </div>
                        <input type="range" id="line-glow" min="0" max="30" step="5" value="15">
                    </div>
                </div>

                <!-- Zoom & Pan -->
                <div class="flex flex-col mt-2 bg-black/20 p-3 rounded-lg border border-white/5">
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500">Zoom & Pan View</label>
                        <button id="btn-reset-view" class="text-[10px] text-brand-500 hover:text-brand-400 flex items-center gap-1 transition bg-brand-500/10 px-2 py-1 rounded"><i class="ph-bold ph-arrows-in"></i> Reset</button>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="block text-[10px] font-medium text-zinc-400">Zoom</label>
                                <span id="zoom-val" class="text-[10px] text-zinc-500 font-mono">1.0x</span>
                            </div>
                            <input type="range" id="chart-zoom" min="0.5" max="3" step="0.1" value="1.0">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="block text-[10px] font-medium text-zinc-400">Pan X</label>
                                <span id="pan-x-val" class="text-[10px] text-zinc-500 font-mono">0</span>
                            </div>
                            <input type="range" id="chart-pan-x" min="-1000" max="1000" step="10" value="0">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="block text-[10px] font-medium text-zinc-400">Pan Y</label>
                                <span id="pan-y-val" class="text-[10px] text-zinc-500 font-mono">0</span>
                            </div>
                            <input type="range" id="chart-pan-y" min="-1000" max="1000" step="10" value="0">
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-5 mt-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="show-grid" checked class="w-4 h-4 accent-brand-500">
                        <span class="text-[11px] font-medium text-zinc-300">Grid Lines</span>
                    </label>
                </div>
            </div>
        </aside>

        <!-- CANVAS AREA -->
        <section id="canvas-container" class="flex-1 relative overflow-hidden flex items-center justify-center p-4 sm:p-8 checker-bg order-1 md:order-2">
            <!-- Fixed Base Layout Canvas (scales visually via CSS) -->
            <canvas id="export-canvas" class="w-full max-w-[1200px] aspect-video rounded-lg"></canvas>
        </section>

    </main>

    <script>
        // --- Fetch GIF.js Worker to guarantee CORS safety ---
        let gifWorkerUrl = null;
        fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js')
            .then(res => res.text())
            .then(text => {
                const blob = new Blob([text], { type: 'application/javascript' });
                gifWorkerUrl = URL.createObjectURL(blob);
            })
            .catch(err => console.error('Failed to load GIF worker:', err));

        // --- Race Chart Templates ---
        const templates = {
            'bar_h': {
                title: 'Top Global Brands ($B)',
                subtitle: 'The rise of big tech over the last decade.',
                source: 'SOURCE: INTERBRAND',
                type: 'horizontal',
                duration: 10,
                csv: `Year,Apple,Google,Microsoft,Amazon,Coca-Cola\n2015,170,120,67,37,78\n2016,178,133,72,50,73\n2017,184,141,79,64,69\n2018,214,155,92,100,66\n2019,234,167,108,135,63\n2020,322,165,166,200,56\n2021,355,196,210,254,57\n2022,482,251,278,281,57`
            },
            'bar_v': {
                title: 'Top Cryptocurrencies ($B)',
                subtitle: 'Market capitalization growth over time.',
                source: 'SOURCE: COINMARKETCAP',
                type: 'vertical',
                duration: 8,

        // --- Custom Toast System ---
        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed top-20 right-6 z-[60] flex flex-col gap-2 pointer-events-none';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `bg-zinc-800/95 backdrop-blur-md text-white px-4 py-3 rounded-xl shadow-2xl ring-1 ring-white/10 flex items-center gap-3 transform transition-all -translate-y-4 opacity-0 z-50`;
            let icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'warning' : 'info');
            let color = type === 'success' ? 'text-brand-400' : (type === 'error' ? 'text-red-400' : 'text-sky-400');
            toast.innerHTML = `<i class="ph-fill ph-${icon} text-lg ${color}"></i> <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast); 
            requestAnimationFrame(() => toast.classList.remove('-translate-y-4', 'opacity-0'));
            setTimeout(() => { toast.classList.add('-translate-y-4', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function isDarkColor(hexColor) {
            const hex = hexColor.replace('#', '');
            if(hex.length === 6) {
                const r = parseInt(hex.substr(0, 2), 16);
                const g = parseInt(hex.substr(2, 2), 16);
                const b = parseInt(hex.substr(4, 2), 16);
                return (r * 0.299 + g * 0.587 + b * 0.114) < 128;
            }
            return false;
        }

        // --- Data Parsing & Management ---
        function parseCSVtoState(csvString) {
            const lines = csvString.split('\n');
            state.data = [];
            state.seriesNames = [];
            
            let startIdx = 0;
            if (lines.length > 0) {
                const headerRow = lines[0].split(',').map(c => c.trim());
                if (headerRow.length >= 2 && isNaN(parseFloat(headerRow[1]))) {
                    startIdx = 1;
                    state.seriesNames = headerRow.slice(1);
                } else {
                    state.seriesNames = ['Value']; 
                }
            }

            for (let i = startIdx; i < lines.length; i++) {
                const row = lines[i].split(',').map(c => c.trim());
                if (row.length < 2) continue;
                
                const label = row[0];
                const values = [];
                for(let j = 1; j < row.length; j++) {
                    values.push(parseFloat(row[j]) || 0);
                }
                
                state.data.push({ label, values }); 
            }
        }

        function generateCSVFromState() {
            let csv = `Label,${state.seriesNames.join(',')}\n`;
            csv += state.data.map(d => `${d.label},${d.values.join(',')}`).join('\n');
            return csv;
        }

        function buildGridFromState() {
            if (!gridRowsContainer) return;
            gridRowsContainer.innerHTML = '';
            
            state.data.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-1.5';
                
                const lblInput = document.createElement('input');
                lblInput.type = 'text';
                lblInput.value = item.label;
                lblInput.className = 'flex-[2] min-w-0 px-2 py-1.5 rounded-md bg-black/20 border border-white/10 text-xs text-white focus:border-brand-500 outline-none transition-shadow';
                lblInput.oninput = (e) => {
                    state.data[index].label = e.target.value;
                    syncFromGrid();
                };

                const valInput = document.createElement('input');
                valInput.type = 'text';
                valInput.value = item.values.join(', ');
                valInput.className = 'flex-[2] min-w-0 px-2 py-1.5 rounded-md bg-black/20 border border-white/10 text-xs text-white focus:border-brand-500 outline-none transition-shadow';
                valInput.oninput = (e) => {
                    state.data[index].values = e.target.value.split(',').map(v => parseFloat(v.trim()) || 0);
                    syncFromGrid();
                };

                const delBtn = document.createElement('button');
                delBtn.className = 'w-6 h-8 flex items-center justify-center text-zinc-500 hover:text-red-400 transition shrink-0';
                delBtn.innerHTML = '<i class="ph-bold ph-x"></i>';
                delBtn.onclick = () => {
                    state.data.splice(index, 1);
                    buildGridFromState();
                    syncFromGrid();
                };

                row.appendChild(lblInput);
                row.appendChild(valInput);
                row.appendChild(delBtn);
                
                gridRowsContainer.appendChild(row);
            });
        }

        if (btnAddRow) {
            btnAddRow.addEventListener('click', () => {
                const emptyVals = Array(state.seriesNames.length).fill(10);
                state.data.push({ label: 'New Item', values: emptyVals });

                syncFromGrid();
                if(gridRowsContainer) gridRowsContainer.scrollTop = gridRowsContainer.scrollHeight;

        function syncFromGrid() {
            if(dataInput) dataInput.value = generateCSVFromState();

        if (tabGrid) {

        function updateStateFromUI(rebuildGrid = true) {
            state.title = uiTitle ? uiTitle.value : '';
            state.subtitle = uiSubtitle ? uiSubtitle.value : '';
            state.source = uiSource ? uiSource.value : '';
            
            state.showTitle = uiShowTitle ? uiShowTitle.checked : true;
            state.showSubtitle = uiShowSubtitle ? uiShowSubtitle.checked : true;

            state.titleSize = uiTitleSize ? parseInt(uiTitleSize.value) : 64;

            state.titleColor = uiTitleColor ? uiTitleColor.value : '#18181b';

            state.fontFamily = fontSelect ? fontSelect.value : 'Inter';
            state.colorPalette = paletteSelect ? paletteSelect.value : 'vibrant';
            state.type = typeSelect ? typeSelect.value : 'horizontal';
            state.format = formatSelect ? formatSelect.value : 'number';
            
            state.showGrid = showGridCheck ? showGridCheck.checked : true;
            
            if (dataInput) {
                const raw = dataInput.value.trim();
                if (raw) parseCSVtoState(raw);

            if (rebuildGrid && currentDataMode === 'grid') {

        }

        function formatValue(val) {
            const rounded = Math.round(val);
            if (state.format === 'currency') return '$' + Number(rounded).toLocaleString();
            if (state.format === 'percent') return Number(rounded).toLocaleString() + '%';
            return Number(rounded).toLocaleString();
        }

        function easeOutQuint(x) {
            return 1 - Math.pow(1 - x, 5);
        }

        // --- Core Scaling Rendering Engine ---
        function renderFrame(progress, targetCanvas = canvas, exportScale = 1.0, isTransparent = false) {
            const tCtx = targetCanvas.getContext('2d', { alpha: isTransparent });
            
            const isDarkBg = isDarkColor(state.bgColor);
            const gridColor = isDarkBg ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
            const fontBase = state.fontFamily;
            const activePalette = palettes[state.colorPalette];

            const W = 1920;
            const H = 1080;

            tCtx.save();
            tCtx.scale(exportScale, exportScale);

            if (isTransparent) {
                tCtx.clearRect(0, 0, W, H);
            } else {
                tCtx.fillStyle = state.bgColor;
                tCtx.fillRect(0, 0, W, H);
            }

            // Apply global zoom & pan
            tCtx.translate(W / 2 + state.panX, H / 2 + state.panY);
            tCtx.scale(state.zoom, state.zoom);
            tCtx.translate(-W / 2, -H / 2);

            tCtx.textAlign = 'left';
            let currentY = 70;
            
            if (state.showTitle) {
                tCtx.textBaseline = 'top';
                tCtx.font = `800 ${state.titleSize}px "${fontBase}"`;
                tCtx.fillStyle = state.titleColor;
                tCtx.fillText(state.title, 80, currentY);
                currentY += state.titleSize + 16;
            } else {
                currentY = 70;
            }

            if (state.showSubtitle) {
                tCtx.textBaseline = 'top';
                tCtx.font = `400 ${state.subtitleSize}px "${fontBase}"`;
                tCtx.fillStyle = state.textColor;
                tCtx.fillText(state.subtitle, 80, currentY);
            }

            if (state.showSource) {
                tCtx.textBaseline = 'bottom';
                tCtx.font = `600 ${state.sourceSize}px "${fontBase}"`;
                tCtx.fillStyle = state.textColor;
                tCtx.fillText(state.source, 80, H - 40);
            }

            tCtx.beginPath();
            tCtx.moveTo(80, 220);
            tCtx.lineTo(W - 80, 220);
            tCtx.strokeStyle = gridColor;
            tCtx.lineWidth = 2;
            tCtx.stroke();

            tCtx.beginPath();
            tCtx.moveTo(80, H - 80);
            tCtx.lineTo(W - 80, H - 80);
            tCtx.stroke();

            if (state.data.length < 2 || state.seriesNames.length === 0) {
                tCtx.restore();
                return;
            }

            const chartArea = { x: 120, y: 280, w: W - 240, h: H - 400 };

            if (state.type === 'horizontal') {
                drawHorizontalRace(tCtx, chartArea, progress, state.textColor, gridColor, activePalette, fontBase);
            } else if (state.type === 'vertical') {
                drawVerticalRace(tCtx, chartArea, progress, state.textColor, gridColor, activePalette, fontBase);
            } else if (state.type === 'line') {
                drawLineRace(tCtx, chartArea, progress, state.textColor, gridColor, activePalette, fontBase);
            }

            tCtx.restore();
        }

        // Calculate rankings and interpolated values across time
        function calculateRaceState(progress) {
            const numPoints = state.data.length;
            const floatIdx = progress * (numPoints - 1);
            const idx1 = Math.floor(floatIdx);
            const idx2 = Math.min(idx1 + 1, numPoints - 1);
            const t = floatIdx - idx1; 

            // Interpolate the main label (Time/Year)
            let currentLabel = state.data[idx1].label;
            const l1 = parseFloat(state.data[idx1].label);
            const l2 = parseFloat(state.data[idx2].label);
            if (!isNaN(l1) && !isNaN(l2)) {
                currentLabel = Math.floor(l1 + (l2 - l1) * t);
            }

            // Interpolate values for all series
            const currentValues = state.seriesNames.map((name, sIdx) => {
                const v1 = state.data[idx1].values[sIdx] || 0;
                const v2 = state.data[idx2].values[sIdx] || 0;
                return {
                    name,
                    color: palettes[state.colorPalette][sIdx % palettes[state.colorPalette].length],
                    value: v1 + (v2 - v1) * t
                };
            });

            // Smooth rank calculation
            function getRanks(idx) {
                const vals = state.seriesNames.map((name, sIdx) => ({
                    name, value: state.data[idx].values[sIdx] || 0
                }));
                vals.sort((a, b) => b.value - a.value);
                const ranks = {};
                vals.forEach((v, i) => ranks[v.name] = i);
                return ranks;
            }
            const ranks1 = getRanks(idx1);
            const ranks2 = getRanks(idx2);

            // Eased Rank Transition
            const rankT = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
            currentValues.forEach(v => {
                v.rank = ranks1[v.name] + (ranks2[v.name] - ranks1[v.name]) * rankT;
            });

            currentValues.sort((a, b) => a.rank - b.rank);
            
            let currentMax = 0;
            currentValues.forEach(v => { if (v.value > currentMax) currentMax = v.value; });

            // Normalize max scale to nearest round number
            const magnitude = Math.pow(10, Math.floor(Math.log10(Math.max(0.1, currentMax))));
            let norm = currentMax / magnitude;
            if (norm <= 1.5) norm = 1.5;
            else if (norm <= 2) norm = 2;
            else if (norm <= 5) norm = 5;
            else norm = 10;
            const valueRange = Math.max(norm * magnitude, 1);

            return { currentLabel, currentValues, valueRange, numPoints, floatIdx, t, idx1, idx2 };
        }

        // Draw the massive background label
        function drawBgLabel(tCtx, area, currentLabel, fontBase) {
            tCtx.save();
            tCtx.textAlign = 'right';
            tCtx.textBaseline = 'bottom';
            tCtx.font = `800 ${area.h * 0.5}px "${fontBase}"`;
            tCtx.fillStyle = isDarkColor(state.bgColor) ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)';
            tCtx.fillText(currentLabel, area.x + area.w, area.y + area.h + 20);
            tCtx.restore();
        }

        function drawHorizontalRace(tCtx, area, progress, textColor, gridColor, palette, fontBase) {
            const { currentLabel, currentValues, valueRange } = calculateRaceState(progress);
            
            drawBgLabel(tCtx, area, currentLabel, fontBase);

            const topN = state.maxItems;
            const labelSpace = 250;
            const actualAreaW = area.w - labelSpace;
            const slotHeight = area.h / topN;
            const barHeight = (slotHeight - state.barGap) * (state.barThickness / 100);
            const maxRadius = barHeight / 2;
            const radius = maxRadius * (state.barRadius / 100);

            // X-Axis Grid
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'top';
            tCtx.font = `600 20px "${fontBase}"`;
            tCtx.fillStyle = textColor;
            const steps = 4;
            for (let i = 0; i <= steps; i++) {
                const val = (valueRange / steps) * i;
                const x = area.x + labelSpace + (val / valueRange) * actualAreaW;
                
                if (state.showGrid) {
                    tCtx.beginPath();
                    tCtx.setLineDash([8, 8]);
                    tCtx.moveTo(x, area.y);
                    tCtx.lineTo(x, area.y + area.h);
                    tCtx.strokeStyle = gridColor;
                    tCtx.lineWidth = 2;
                    tCtx.stroke();
                    tCtx.setLineDash([]);
                }
                tCtx.fillText(formatValue(val), x, area.y + area.h + 15);
            }

            tCtx.textBaseline = 'middle';

            currentValues.forEach((item) => {
                if (item.rank > topN) return; 

                const barWidth = (item.value / valueRange) * actualAreaW;
                const startY = area.y + (item.rank * slotHeight);
                const y = startY + (slotHeight - barHeight)/2;
                const x = area.x + labelSpace;

                let alpha = 1.0;
                if (item.rank > topN - 1) {
                    alpha = Math.max(0, 1 - (item.rank - (topN - 1)));
                }

                tCtx.globalAlpha = alpha;

                tCtx.textAlign = 'right';
                tCtx.font = `800 24px "${fontBase}"`;
                tCtx.fillStyle = textColor;
                tCtx.fillText(item.name, area.x + labelSpace - 20, startY + slotHeight/2);

                tCtx.fillStyle = item.color;
                tCtx.beginPath();
                tCtx.roundRect(x, y, Math.max(2, barWidth), barHeight, [0, radius, radius, 0]);
                tCtx.fill();

                tCtx.textAlign = 'left';
                tCtx.font = `800 28px "${fontBase === 'Caveat' || fontBase === 'Playfair Display' ? fontBase : 'JetBrains Mono'}"`;
                tCtx.fillStyle = item.color; 
                tCtx.fillText(formatValue(item.value), x + barWidth + 15, startY + slotHeight/2);

                tCtx.globalAlpha = 1.0;
            });
        }

        function drawVerticalRace(tCtx, area, progress, textColor, gridColor, palette, fontBase) {
            const { currentLabel, currentValues, valueRange } = calculateRaceState(progress);
            
            drawBgLabel(tCtx, area, currentLabel, fontBase);

            const topN = state.maxItems;
            const slotWidth = area.w / topN;
            const barWidth = (slotWidth - state.barGap) * (state.barThickness / 100);
            const maxRadius = barWidth / 2;
            const radius = maxRadius * (state.barRadius / 100);

            // Y-Axis Grid
            tCtx.textAlign = 'right';
            tCtx.textBaseline = 'middle';
            tCtx.font = `600 20px "${fontBase}"`;
            tCtx.fillStyle = textColor;
            const steps = 4;
            for (let i = 0; i <= steps; i++) {
                const val = (valueRange / steps) * i;
                const y = area.y + area.h - (val / valueRange) * area.h;
                
                if (state.showGrid) {
                    tCtx.beginPath();
                    tCtx.setLineDash([8, 8]);
                    tCtx.moveTo(area.x, y);
                    tCtx.lineTo(area.x + area.w, y);
                    tCtx.strokeStyle = gridColor;
                    tCtx.lineWidth = 2;
                    tCtx.stroke();
                    tCtx.setLineDash([]);
                }
                tCtx.fillText(formatValue(val), area.x - 20, y);
            }

            // Zero line
            tCtx.beginPath();
            tCtx.moveTo(area.x, area.y + area.h);
            tCtx.lineTo(area.x + area.w, area.y + area.h);
            tCtx.strokeStyle = gridColor;
            tCtx.lineWidth = 3;
            tCtx.stroke();

            tCtx.textAlign = 'center';

            currentValues.forEach((item) => {
                if (item.rank > topN) return; 

                const startX = area.x + (item.rank * slotWidth);
                const x = startX + (slotWidth - barWidth)/2;
                const barHeight = (item.value / valueRange) * area.h;
                const y = area.y + area.h - barHeight;

                let alpha = 1.0;
                if (item.rank > topN - 1) {
                    alpha = Math.max(0, 1 - (item.rank - (topN - 1)));
                }

                tCtx.globalAlpha = alpha;

                tCtx.textBaseline = 'top';
                tCtx.font = `800 24px "${fontBase}"`;
                tCtx.fillStyle = textColor;
                tCtx.fillText(item.name, startX + slotWidth/2, area.y + area.h + 15);

                tCtx.fillStyle = item.color;
                tCtx.beginPath();
                if (barHeight > 0) {
                    tCtx.roundRect(x, y, barWidth, barHeight, [radius, radius, 0, 0]);
                }
                tCtx.fill();

                tCtx.textBaseline = 'bottom';
                tCtx.font = `800 28px "${fontBase === 'Caveat' || fontBase === 'Playfair Display' ? fontBase : 'JetBrains Mono'}"`;
                tCtx.fillStyle = item.color; 
                tCtx.fillText(formatValue(item.value), startX + slotWidth/2, y - 10);

                tCtx.globalAlpha = 1.0;
            });
        }

        function drawLineRace(tCtx, area, progress, textColor, gridColor, palette, fontBase) {
            const { currentLabel, currentValues, valueRange, floatIdx, numPoints, idx1 } = calculateRaceState(progress);
            
            drawBgLabel(tCtx, area, currentLabel, fontBase);

            const xStep = area.w / (numPoints - 1);
            const currentXProg = area.x + progress * area.w;

            // Y-Axis Grid
            tCtx.textAlign = 'right';
            tCtx.textBaseline = 'middle';
            tCtx.font = `600 20px "${fontBase}"`;
            tCtx.fillStyle = textColor;
            const steps = 4;
            for (let i = 0; i <= steps; i++) {
                const val = (valueRange / steps) * i;
                const y = area.y + area.h - (val / valueRange) * area.h;
                
                if (state.showGrid) {
                    tCtx.beginPath();
                    tCtx.setLineDash([8, 8]);
                    tCtx.moveTo(area.x, y);
                    tCtx.lineTo(area.x + area.w, y);
                    tCtx.strokeStyle = gridColor;
                    tCtx.lineWidth = 2;
                    tCtx.stroke();
                    tCtx.setLineDash([]);
                }
                tCtx.fillText(formatValue(val), area.x - 20, y);
            }

            const endPoints = [];
            const topN = state.maxItems;

            state.seriesNames.forEach((seriesName, sIdx) => {
                const color = palette[sIdx % palette.length];
                tCtx.beginPath();
                tCtx.strokeStyle = color;
                
                tCtx.lineWidth = 4 + (state.barThickness / 100) * 8; 
                tCtx.lineJoin = 'round';
                tCtx.lineCap = 'round';
                
                if (state.glow > 0) {
                    tCtx.shadowColor = color;
                    tCtx.shadowBlur = state.glow;
                }
                
                let lastX = 0, lastY = 0, currentVal = 0;
                
                for (let i = 0; i < numPoints; i++) {
                    const val = state.data[i].values[sIdx] !== undefined ? state.data[i].values[sIdx] : 0;
                    const x = area.x + i * xStep;
                    const y = area.y + area.h - (val / valueRange) * area.h;
                    
                    if (i === 0) {
                        tCtx.moveTo(x, y);
                        lastX = x; lastY = y;
                        currentVal = val;
                    } else {
                        if (x <= currentXProg) {
                            tCtx.lineTo(x, y);
                            lastX = x; lastY = y;
                            currentVal = val;
                        } else if (lastX < currentXProg) {
                            const fraction = (currentXProg - lastX) / (x - lastX);
                            const interpY = lastY + (y - lastY) * fraction;
                            tCtx.lineTo(currentXProg, interpY);
                            currentVal = currentVal + (val - currentVal) * fraction;
                            lastX = currentXProg;
                            lastY = interpY;
                            break;
                        }
                    }
                }
                tCtx.stroke();
                tCtx.shadowBlur = 0; 
                
                // Track endpoints for labels
                if (progress > 0) {
                    endPoints.push({
                        name: seriesName,
                        color: color,
                        x: lastX,
                        y: lastY,
                        val: currentVal
                    });
                }
            });

            // Draw leading dots and resolve label collisions
            endPoints.sort((a, b) => b.val - a.val); // Sort by value to slice topN
            
            const activeEnds = endPoints.slice(0, topN);
            activeEnds.sort((a, b) => a.y - b.y); // Resort spatially for collision logic
            
            // Simple anti-collision
            const labelHeight = 35;
            for (let i = 1; i < activeEnds.length; i++) {
                if (activeEnds[i].y - activeEnds[i-1].y < labelHeight) {
                    activeEnds[i].y = activeEnds[i-1].y + labelHeight; 
                }
            }

            activeEnds.forEach(ep => {
                tCtx.beginPath();
                tCtx.arc(ep.x, ep.y, 8, 0, Math.PI * 2);
                tCtx.fillStyle = ep.color;
                tCtx.fill();
                tCtx.strokeStyle = state.bgColor;
                tCtx.lineWidth = 3;
                tCtx.stroke();

                tCtx.textAlign = 'left';
                tCtx.textBaseline = 'middle';
                tCtx.font = `800 24px "${fontBase === 'Caveat' || fontBase === 'Playfair Display' ? fontBase : 'JetBrains Mono'}"`;
                tCtx.fillStyle = ep.color;
                tCtx.fillText(`${ep.name}  ${formatValue(ep.val)}`, ep.x + 15, ep.y);
            });
        }


        // --- Interaction & Update Loops ---
        function updateAndRender(rebuildGrid = true) {
            updateStateFromUI(rebuildGrid);
            renderFrame(state.progress, canvas, 1.0, false);
        }

        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const template = btn.getAttribute('data-template');
                if (templates[template]) {
                    if (uiTitle) uiTitle.value = templates[template].title;
                    if (uiSubtitle) uiSubtitle.value = templates[template].subtitle;
                    if (uiSource) uiSource.value = templates[template].source;
                    if (dataInput) dataInput.value = templates[template].csv;
                    
                    if (durationSlider) {
                        durationSlider.value = templates[template].duration;
                        state.duration = templates[template].duration * 1000;
                        const dVal = document.getElementById('duration-val');
                        if(dVal) dVal.textContent = templates[template].duration + 's';
                    }
                    
                    if (templates[template].theme === 'light') {
                        if (uiBgColor) uiBgColor.value = '#ffffff';
                        if (uiTitleColor) uiTitleColor.value = '#18181b';
                        if (uiTextColor) uiTextColor.value = '#71717a';
                    } else {
                        if (uiBgColor) uiBgColor.value = '#18181b';
                        if (uiTitleColor) uiTitleColor.value = '#ffffff';
                        if (uiTextColor) uiTextColor.value = '#a1a1aa';
                    }

                    if (dataInput) {
                        const raw = dataInput.value.trim();
                        if (raw) parseCSVtoState(raw);
                    }
                    
                    if (typeSelect) typeSelect.value = templates[template].type;
                    
                    updateAndRender(true);
                }
            });
        });

        const inputs = [uiTitle, uiSubtitle, uiSource, uiBgColor, uiTitleColor, uiTextColor];
        inputs.forEach(el => {
            if (el) el.addEventListener('input', () => updateAndRender(false))
        });
        
        if (dataInput) dataInput.addEventListener('input', () => updateAndRender(true));

        [uiShowTitle, uiShowSubtitle, uiShowSource, showGridCheck].forEach(el => {
            if (el) el.addEventListener('change', () => updateAndRender(false))
        });
        
        [uiTitleSize, uiSubtitleSize, uiSourceSize].forEach(el => {
            if (el) el.addEventListener('input', () => updateAndRender(false))
        });
        
        [typeSelect, fontSelect, paletteSelect, formatSelect].forEach(el => {
            if (el) el.addEventListener('change', () => updateAndRender(true))
        }); 
        
        if (durationSlider) {
            durationSlider.addEventListener('input', (e) => { 
                state.duration = parseFloat(e.target.value) * 1000;
                document.getElementById('duration-val').textContent = e.target.value + 's';
            });
        }

        if (barThicknessSlider) {
            barThicknessSlider.addEventListener('input', (e) => { 
                state.barThickness = parseInt(e.target.value);
                document.getElementById('bar-thickness-val').textContent = state.barThickness + '%';
                renderFrame(state.progress);
            });
        }

        if (barRadiusSlider) {
            barRadiusSlider.addEventListener('input', (e) => { 
                state.barRadius = parseInt(e.target.value);
                document.getElementById('bar-radius-val').textContent = state.barRadius + '%';
                renderFrame(state.progress);
            });
        }

        if (barGapSlider) {
            barGapSlider.addEventListener('input', (e) => { 
                state.barGap = parseInt(e.target.value);
                document.getElementById('bar-gap-val').textContent = state.barGap + 'px';
                renderFrame(state.progress);
            });
        }

        if (maxItemsSlider) {
            maxItemsSlider.addEventListener('input', (e) => { 
                state.maxItems = parseInt(e.target.value);
                document.getElementById('max-items-val').textContent = state.maxItems;
                renderFrame(state.progress);
            });
        }

        if (glowSlider) {
            glowSlider.addEventListener('input', (e) => { 
                state.glow = parseInt(e.target.value);
                const valLabel = state.glow === 0 ? 'None' : (state.glow > 20 ? 'High' : 'Med');
                document.getElementById('glow-val').textContent = valLabel;
                renderFrame(state.progress);
            });
        }

        if (zoomSlider) {
            zoomSlider.addEventListener('input', (e) => { 
                state.zoom = parseFloat(e.target.value);
                document.getElementById('zoom-val').textContent = state.zoom.toFixed(1) + 'x';
                renderFrame(state.progress);
            });
        }

        if (panXSlider) {
            panXSlider.addEventListener('input', (e) => { 
                state.panX = parseInt(e.target.value);
                document.getElementById('pan-x-val').textContent = state.panX;
                renderFrame(state.progress);
            });
        }

        if (panYSlider) {
            panYSlider.addEventListener('input', (e) => { 
                state.panY = parseInt(e.target.value);
                document.getElementById('pan-y-val').textContent = state.panY;
                renderFrame(state.progress);
            });
        }

        if (btnResetView) {
            btnResetView.addEventListener('click', () => {
                if (zoomSlider) zoomSlider.value = 1.0;
                if (panXSlider) panXSlider.value = 0;
                if (panYSlider) panYSlider.value = 0;
                state.zoom = 1.0;
                state.panX = 0;
                state.panY = 0;
                document.getElementById('zoom-val').textContent = '1.0x';
                document.getElementById('pan-x-val').textContent = '0';
                document.getElementById('pan-y-val').textContent = '0';
                renderFrame(state.progress);
            });
        }

        // Initialize Application
        const defaultTemplateBtn = document.querySelector('[data-template="bar_h"]');
        if (defaultTemplateBtn) defaultTemplateBtn.click();

        // --- Header Actions & Export Logic ---
        const btnPreview = document.getElementById('btn-header-preview');
        const btnExport = document.getElementById('btn-header-export');
        const exportFmt = document.getElementById('export-fmt');
        const exportRes = document.getElementById('export-res');
        const transparentToggle = document.getElementById('header-transparent');
        const overlay = document.getElementById('recording-overlay');
        const recordingText = document.getElementById('recording-text');
        const iconPlay = document.getElementById('icon-play');
        const textPlay = document.getElementById('text-play');

        if (btnPreview) {
            btnPreview.addEventListener('click', () => {
                if (state.isRecording) return;
                if (state.isAnimating) {
                    state.isAnimating = false; // Graceful stop
                } else {
                    runAnimation();
                }
            });
        }

        if (btnExport) {
            btnExport.addEventListener('click', async () => {
                if (state.isAnimating || state.isRecording) return;
                
                const fmt = exportFmt ? exportFmt.value : 'webm';
                const targetWidth = exportRes ? parseInt(exportRes.value) : 1920;
                const exportScale = targetWidth / 1920;
                const isTransparent = transparentToggle && transparentToggle.checked && (fmt === 'png' || fmt === 'gif'); 

                if (fmt === 'png') {
                    exportSnapshot(targetWidth, exportScale, isTransparent);
                } else if (fmt === 'gif') {
                    exportGIF(targetWidth, exportScale, isTransparent);
                } else {
                    exportVideo(targetWidth, exportScale);
                }
            });
        }

        function runAnimation() {
            state.isAnimating = true;
            if (btnPreview) {
                btnPreview.classList.add('bg-rose-500/20', 'text-rose-400', 'border-rose-500/50');
                btnPreview.classList.remove('bg-white/5', 'text-white', 'border-white/10');
            }
            if (iconPlay) iconPlay.classList.replace('ph-play-circle', 'ph-stop-circle');
            if (textPlay) textPlay.innerText = 'Stop';
            if (btnExport) btnExport.disabled = true;

            updateStateFromUI(false); 

            const startTime = performance.now();
            const durationMs = state.duration;

            function animLoop(currentTime) {
                if (!state.isAnimating) {
                    resetPreviewBtn();
                    return;
                }

                const elapsed = Math.max(0, currentTime - startTime);
                let p = durationMs > 0 ? elapsed / durationMs : 1.0;
                p = Math.max(0, Math.min(1, p));
                
                state.progress = p;
                renderFrame(p, canvas, 1.0, false);

                if (p < 1.0) {
                    requestAnimationFrame(animLoop);
                } else {
                    state.isAnimating = false;
                    resetPreviewBtn();
                }
            }
            requestAnimationFrame(animLoop);
        }

        function resetPreviewBtn() {
            if (btnPreview) {
                btnPreview.classList.remove('bg-rose-500/20', 'text-rose-400', 'border-rose-500/50');
                btnPreview.classList.add('bg-white/5', 'text-white', 'border-white/10');
            }
            if (iconPlay) iconPlay.classList.replace('ph-stop-circle', 'ph-play-circle');
            if (textPlay) textPlay.innerText = 'Preview';
            if (btnExport) btnExport.disabled = false;
        }

        function exportSnapshot(targetWidth, exportScale, isTransparent) {
            const targetHeight = targetWidth * (1080/1920);
            const expCanvas = document.createElement('canvas');
            expCanvas.width = targetWidth;
            expCanvas.height = targetHeight;
            
            updateStateFromUI(false);
            renderFrame(state.progress, expCanvas, exportScale, isTransparent);

            const url = expCanvas.toDataURL("image/png");
            const a = document.createElement('a');
            a.href = url;
            const bgStatus = isTransparent ? 'transparent' : 'solid';
            a.download = `race-chart-snap-${targetWidth}w-${bgStatus}-${Date.now()}.png`;
            a.click();
            showToast('Snapshot exported successfully!', 'success');
        }

        function exportGIF(targetWidth, exportScale, isTransparent) {
            if (!gifWorkerUrl) return showToast('GIF encoder initializing. Try again in a moment.', 'info');
            
            const targetHeight = targetWidth * (1080/1920);
            const expCanvas = document.createElement('canvas');
            expCanvas.width = targetWidth;
            expCanvas.height = targetHeight;
            const eCtx = expCanvas.getContext('2d', { willReadFrequently: true });

            const gif = new GIF({
                workers: 2,
                quality: 10,
                width: targetWidth,
                height: targetHeight,
                workerScript: gifWorkerUrl,
                transparent: isTransparent ? 'rgba(0,0,0,0)' : null
            });

            state.isRecording = true;
            if (btnPreview) btnPreview.disabled = true;
            if (btnExport) btnExport.disabled = true;
            
            if (overlay) {
                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');
            }
            if (recordingText) recordingText.innerText = 'Preparing GIF...';

            updateStateFromUI(false);
            
            const fps = 15; 
            const totalTimeSec = state.duration / 1000;
            const totalFrames = Math.ceil(totalTimeSec * fps);
            let currentFrame = 0;

            function renderNextFrame() {
                if (!state.isRecording) return;

                let p = currentFrame / totalFrames;
                p = Math.max(0, Math.min(1, p));
                
                state.progress = p;
                
                renderFrame(p, expCanvas, exportScale, isTransparent);
                
                if (isTransparent) {
                    gif.addFrame(eCtx, {copy: true, delay: 1000 / fps, dispose: 2});
                } else {
                    gif.addFrame(eCtx, {copy: true, delay: 1000 / fps});
                }
                
                renderFrame(p, canvas, 1.0, false);

                let pct = Math.round((currentFrame / totalFrames) * 50); 
                if (recordingText) recordingText.innerText = `Rendering Frames ${pct}%`;

                currentFrame++;
                if (currentFrame <= totalFrames) {
                    requestAnimationFrame(renderNextFrame);
                } else {
                    if (recordingText) recordingText.innerText = `Encoding GIF... (This takes a while)`;
                    gif.render();
                }
            }

            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                const bgStatus = isTransparent ? 'transparent' : 'solid';
                a.download = `race-chart-anim-${targetWidth}w-${bgStatus}-${Date.now()}.gif`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);

                if (overlay) {
                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                }
                state.isRecording = false;
                state.progress = 1.0;
                renderFrame(1.0, canvas, 1.0, false); 
                if (btnPreview) btnPreview.disabled = false;
                if (btnExport) btnExport.disabled = false;
                if (recordingText) recordingText.innerText = 'Recording Animation...';
                showToast('GIF exported successfully!', 'success');
            });

            renderNextFrame();
        }

        async function exportVideo(targetWidth, exportScale) {
            const targetHeight = targetWidth * (1080/1920);
            const expCanvas = document.createElement('canvas');
            expCanvas.width = targetWidth;
            expCanvas.height = targetHeight;

            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                const stream = expCanvas.captureStream(60);
                
                let options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm;codecs=vp8' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' };
                    }
                }

                options.videoBitsPerSecond = 20000000;

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `race-chart-anim-${targetWidth}w-${Date.now()}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    if (overlay) {
                        overlay.classList.remove('translate-y-4');
                        overlay.classList.add('-translate-y-20');
                    }
                    state.isRecording = false;
                    state.progress = 1.0;
                    renderFrame(1.0, canvas, 1.0, false); 
                    if (btnPreview) btnPreview.disabled = false;
                    if (btnExport) btnExport.disabled = false;
                    if (recordingText) recordingText.innerText = 'Recording Animation...';
                    showToast('Video exported successfully!', 'success');
                };

                if (overlay) {
                    overlay.classList.remove('-translate-y-20');
                    overlay.classList.add('translate-y-4');
                }
                if (recordingText) recordingText.innerText = 'Rendering Video...';

                mediaRecorder.start();

                if (btnPreview) btnPreview.disabled = true;
                if (btnExport) btnExport.disabled = true;
                updateStateFromUI(false);
                
                const startTime = performance.now();
                const durationMs = state.duration;

                function animLoop(currentTime) {
                    if (!state.isRecording) return;
                    
                    const elapsed = Math.max(0, currentTime - startTime);
                    let p = durationMs > 0 ? elapsed / durationMs : 1.0;
                    p = Math.max(0, Math.min(1, p));
                    
                    state.progress = p;
                    
                    renderFrame(p, expCanvas, exportScale, false);
                    renderFrame(p, canvas, 1.0, false);

                    if (p < 1.0) {
                        requestAnimationFrame(animLoop);
                    } else {
                        if (recordingText) recordingText.innerText = 'Finalizing...';
                        setTimeout(() => {
                            if(mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                        }, 500);
                    }
                }
                requestAnimationFrame(animLoop);

            } catch (err) {
                console.error("Recording failed:", err);
                showToast('Recording failed. Browser might not support it.', 'error');
                if (overlay) {
                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                }
                state.isRecording = false;
                if (btnPreview) btnPreview.disabled = false;
                if (btnExport) btnExport.disabled = false;
                renderFrame(1.0, canvas, 1.0, false);
            }
        }

    </script>
</body>
