<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&family=Pacifico&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overscroll-behavior: none; }
        input[type=range] { accent-color: #10b981; } /* Emerald */
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Color Picker Styling */
        input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type=color]::-webkit-color-swatch { border: 1px solid #3f3f46; border-radius: 6px; }
        
        /* Hide number arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 h-screen flex flex-col overflow-hidden selection:bg-emerald-500/30">

    <!-- Header -->
    <header class="h-14 border-b border-zinc-800 bg-zinc-950 flex justify-between items-center px-6 shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-zinc-950">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
            </div>
            <h1 class="text-lg font-bold tracking-tight text-white">MotionStudio</h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-sm font-medium text-zinc-400">Duration: <span id="durationDisplay" class="text-zinc-100 font-mono">5.0</span>s</div>
            <button id="exportBtn" class="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 px-5 py-2 rounded-full font-bold text-sm shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Export
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- LEFT SIDEBAR: Slides & Add Elements -->
        <aside class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col shrink-0 z-10 shadow-xl">
            <!-- Left Tabs -->
            <div class="flex border-b border-zinc-800">
                <button id="tabSlides" class="flex-1 py-3 text-sm font-semibold border-b-2 border-emerald-500 text-emerald-400 transition-colors">Slides</button>
                <button id="tabAdd" class="flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-colors">Add</button>
            </div>

            <!-- Slides View -->
            <div id="viewSlides" class="flex-1 flex flex-col overflow-y-auto p-4 gap-4">
                <button onclick="addSlide()" class="w-full py-2.5 rounded-lg border border-dashed border-zinc-600 text-zinc-400 hover:border-emerald-500 hover:text-emerald-400 text-sm font-semibold transition-colors flex justify-center items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Add Slide
                </button>
                <div id="slideList" class="space-y-3">
                    <!-- Slides rendered here -->
                </div>
            </div>

            <!-- Add Elements View -->
            <div id="viewAdd" class="hidden flex-1 flex flex-col p-4 gap-3">
                <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1">Typography</h3>
                <button onclick="addElement('text')" class="w-full bg-zinc-800 hover:bg-zinc-700 p-3 rounded-xl flex items-center gap-3 transition-colors text-sm font-medium">
                    <div class="w-8 h-8 rounded bg-zinc-950 flex items-center justify-center font-serif text-lg font-bold text-emerald-400">T</div>
                    Add Text Layer
                </button>
                
                <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-wider mt-4 mb-1">Shapes</h3>
                <button onclick="addElement('rect')" class="w-full bg-zinc-800 hover:bg-zinc-700 p-3 rounded-xl flex items-center gap-3 transition-colors text-sm font-medium">
                    <div class="w-8 h-8 rounded bg-zinc-950 flex items-center justify-center">
                        <div class="w-4 h-4 border-2 border-blue-400 rounded-sm"></div>
                    </div>
                    Rectangle
                </button>
                <button onclick="addElement('circle')" class="w-full bg-zinc-800 hover:bg-zinc-700 p-3 rounded-xl flex items-center gap-3 transition-colors text-sm font-medium">
                    <div class="w-8 h-8 rounded bg-zinc-950 flex items-center justify-center">
                        <div class="w-4 h-4 border-2 border-rose-400 rounded-full"></div>
                    </div>
                    Circle
                </button>
            </div>
        </aside>

        <!-- CENTER: Canvas & Timeline -->
        <section class="flex-1 flex flex-col bg-zinc-950 relative min-w-0">
            <!-- Canvas Container -->
            <div class="flex-1 p-6 flex items-center justify-center relative overflow-hidden" id="canvasContainer">
                <div class="relative w-full max-w-4xl aspect-video bg-zinc-900 rounded-lg shadow-2xl overflow-hidden ring-1 ring-zinc-800 group" style="background-image: radial-gradient(#27272a 1px, transparent 1px); background-size: 20px 20px;">
                    <canvas id="canvas" class="absolute inset-0 w-full h-full cursor-pointer"></canvas>
                    <div id="recIndicator" class="absolute top-4 right-4 flex items-center gap-2 hidden z-10 bg-black/80 px-3 py-1 rounded-full backdrop-blur-md border border-zinc-800">
                        <div class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></div>
                        <span class="text-xs font-bold tracking-widest text-red-500">REC</span>
                    </div>
                </div>
            </div>

            <!-- Global Timeline Controls -->
            <div class="h-20 bg-zinc-900 border-t border-zinc-800 px-6 flex items-center gap-6 shrink-0 z-10">
                <button id="playPauseBtn" class="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 w-12 h-12 rounded-full flex items-center justify-center transition-transform active:scale-95 shadow-lg shadow-emerald-900/20 shrink-0">
                    <svg id="playIcon" class="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                    <svg id="pauseIcon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                </button>
                <div class="font-mono text-sm font-medium text-emerald-400 w-12 shrink-0" id="timeDisplay">0.0s</div>
                <input type="range" id="globalTimeline" min="0" max="5" step="0.01" value="0" class="flex-1 h-2 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
            </div>
        </section>

        <!-- RIGHT SIDEBAR: Layers & Properties -->
        <aside class="w-80 bg-zinc-900 border-l border-zinc-800 flex flex-col shrink-0 z-10 shadow-2xl">
            
            <div class="flex border-b border-zinc-800">
                <button id="tabLayers" class="flex-1 py-3 text-sm font-semibold border-b-2 border-emerald-500 text-emerald-400 transition-colors">Layers</button>
                <button id="tabProps" class="flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-colors">Properties</button>
            </div>

            <!-- Layers View -->
            <div id="viewLayers" class="flex-1 overflow-y-auto p-4 space-y-2">
                <!-- Layers list rendered here -->
                <div id="layerList" class="space-y-2"></div>
            </div>

            <!-- Properties View -->
            <div id="viewProps" class="hidden flex-1 overflow-y-auto p-5 space-y-6">
                <div id="noSelectionMsg" class="text-center text-zinc-500 text-sm mt-10">Select an element on the canvas to edit its properties.</div>
                
                <div id="propEditor" class="hidden space-y-6">
                    
                    <!-- Content (Text Only) -->
                    <div id="propTextContainer" class="space-y-2">
                        <label class="text-xs font-bold text-zinc-500 uppercase">Text Content</label>
                        <input type="text" id="propText" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg p-2.5 text-sm font-medium focus:border-emerald-500 outline-none transition-colors">
                    </div>

                    <!-- Layout & Type -->
                    <div class="grid grid-cols-2 gap-4">
                        <div id="propFontContainer">
                            <label class="text-xs font-bold text-zinc-500 uppercase mb-1 block">Font Family</label>
                            <select id="propFont" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg p-2 text-sm outline-none">
                                <option value="Inter">Inter</option>
                                <option value="'Space Grotesk'">Space Grotesk</option>
                                <option value="'Bebas Neue'">Bebas Neue</option>
                                <option value="Pacifico">Pacifico</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-zinc-500 uppercase mb-1 block">Size / Scale</label>
                            <input type="number" id="propSize" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg p-2 text-sm outline-none">
                        </div>
                    </div>

                    <div class="h-px bg-zinc-800"></div>

                    <!-- Appearance -->
                    <div class="space-y-4">
                        <h3 class="text-xs font-bold text-zinc-500 uppercase">Appearance</h3>
                        
                        <!-- Fill -->
                        <div class="flex items-center justify-between">
                            <span class="text-sm font-medium text-zinc-300">Fill Color</span>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-zinc-500 uppercase font-mono" id="fillHex">#FFF</span>
                                <input type="color" id="propFill" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0">
                            </div>
                        </div>

                        <!-- Stroke -->
                        <div class="flex items-center justify-between">
                            <span class="text-sm font-medium text-zinc-300">Stroke</span>
                            <div class="flex items-center gap-2">
                                <input type="number" id="propStrokeWidth" min="0" max="20" class="w-12 bg-zinc-950 border border-zinc-700 rounded p-1 text-xs text-center">
                                <input type="color" id="propStroke" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0">
                            </div>
                        </div>
                    </div>

                    <div class="h-px bg-zinc-800"></div>

                    <!-- Drop Shadow -->
                    <div class="space-y-4">
                        <h3 class="text-xs font-bold text-zinc-500 uppercase">Drop Shadow</h3>
                        
                        <div class="flex items-center justify-between">
                            <span class="text-sm font-medium text-zinc-300">Shadow Color</span>
                            <input type="color" id="propShadowColor" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0">
                        </div>

                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="text-[10px] text-zinc-500 uppercase block mb-1">Offset X</label>
                                <input type="number" id="propShadowX" class="w-full bg-zinc-950 border border-zinc-700 rounded p-1.5 text-xs text-center">
                            </div>
                            <div>
                                <label class="text-[10px] text-zinc-500 uppercase block mb-1">Offset Y</label>
                                <input type="number" id="propShadowY" class="w-full bg-zinc-950 border border-zinc-700 rounded p-1.5 text-xs text-center">
                            </div>
                            <div>
                                <label class="text-[10px] text-zinc-500 uppercase block mb-1">Blur</label>
                                <input type="number" id="propShadowBlur" min="0" class="w-full bg-zinc-950 border border-zinc-700 rounded p-1.5 text-xs text-center">
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </aside>
    </main>

    <script>
        /**
         * STATE MANAGEMENT
         */
        let slides = [];
        let activeSlideIndex = 0;
        let activeElementId = null;
        
        const SLIDE_DURATION = 5.0; // Seconds per slide
        
        let isPlaying = false;
        let globalTime = 0;
        let lastTimestamp = performance.now();
        let animationFrameId;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Mouse/Drag State
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        /**
         * INITIALIZATION
         */
        function init() {
            // Add initial slide
            slides.push({
                id: generateId(),
                bg: 'transparent',
                elements: [
                    {
                        id: generateId(), type: 'circle',
                        x: 350, y: 250, size: 220,
                        fill: '#06b6d4', stroke: '#000000', strokeWidth: 0,
                        shadowColor: '#000000', shadowBlur: 0, shadowOffsetX: 0, shadowOffsetY: 0,
                        animIn: 'scale', animLoop: 'float', animOut: 'fade',
                        start: 0, end: 5
                    },
                    {
                        id: generateId(), type: 'text',
                        text: 'BOUNCE', font: "'Space Grotesk'", size: 140,
                        x: 450, y: 250, 
                        fill: '#ffffff', stroke: '#000000', strokeWidth: 0,
                        shadowColor: '#000000', shadowBlur: 0, shadowOffsetX: 8, shadowOffsetY: 8,
                        animIn: 'slideUp', animLoop: 'none', animOut: 'fade',
                        start: 0.5, end: 4.8
                    }
                ]
            });
            
            activeElementId = slides[0].elements[1].id; // Select text initially
            
            document.fonts.ready.then(() => {
                resizeCanvas();
                updateUI();
                renderFrame(0);
            });
            
            window.addEventListener('resize', resizeCanvas);
            setupCanvasInteraction();
            setupPropertyListeners();
        }

        function generateId() { return Math.random().toString(36).substr(2, 9); }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            // Retina scaling
            canvas.width = rect.width * 2; 
            canvas.height = rect.height * 2;
            ctx.scale(2, 2);
            renderFrame(globalTime);
        }

        /**
         * CANVAS ENGINE
         */
        function renderFrame(time) {
            const width = canvas.width / 2;
            const height = canvas.height / 2;

            ctx.clearRect(0, 0, width, height);

            // Calculate which slide we are on
            const currentSlideIdx = Math.floor(time / SLIDE_DURATION) % Math.max(1, slides.length);
            const localTime = time % SLIDE_DURATION;
            const slide = slides[currentSlideIdx];

            if (!slide) return;

            // Draw Background
            if (slide.bg !== 'transparent') {
                ctx.fillStyle = slide.bg;
                ctx.fillRect(0, 0, width, height);
            }

            // Draw Elements (Painter's algorithm - lower index is back)
            slide.elements.forEach(el => {
                if (localTime < el.start || localTime > el.end) return;

                ctx.save();
                
                let alpha = 1, scale = 1, dx = 0, dy = 0, rot = 0;
                const transTime = 0.4; 

                // Animations (only if playing, to make editing easier)
                if (isPlaying) {
                    // IN
                    if (localTime < el.start + transTime) {
                        let t = (localTime - el.start) / transTime;
                        t = 1 - Math.pow(1 - t, 4); // ease out
                        if (el.animIn === 'fade') alpha = t;
                        if (el.animIn === 'slideUp') { alpha = t; dy = (1-t) * 50; }
                        if (el.animIn === 'scale') { alpha = t; scale *= t; }
                    }
                    // OUT
                    if (localTime > el.end - transTime) {
                        let t = (el.end - localTime) / transTime;
                        t = Math.max(0, t);
                        if (el.animOut === 'fade') alpha = t;
                        if (el.animOut === 'scale') { alpha = t; scale *= t; }
                    }
                    // LOOP
                    const activeTime = localTime - el.start;
                    if (el.animLoop === 'float') dy += Math.sin(activeTime * 3) * 10;
                    if (el.animLoop === 'pulse') scale *= 1 + (Math.sin(activeTime * 5) * 0.05);
                }

                // Transform
                ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                ctx.translate(el.x + dx, el.y + dy);
                ctx.rotate(rot);
                ctx.scale(scale, scale);

                // Shadows
                if (el.shadowColor !== 'transparent' && (el.shadowOffsetX !== 0 || el.shadowOffsetY !== 0 || el.shadowBlur !== 0)) {
                    ctx.shadowColor = el.shadowColor;
                    ctx.shadowBlur = el.shadowBlur;
                    ctx.shadowOffsetX = el.shadowOffsetX;
                    ctx.shadowOffsetY = el.shadowOffsetY;
                }

                // Drawing Properties
                ctx.fillStyle = el.fill;
                ctx.strokeStyle = el.stroke;
                ctx.lineWidth = el.strokeWidth || 0;

                // Draw Shape/Text
                if (el.type === 'text') {
                    ctx.font = `700 ${el.size}px ${el.font}`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(el.text, 0, 0);
                    if (el.strokeWidth > 0) ctx.strokeText(el.text, 0, 0);
                } 
                else if (el.type === 'rect') {
                    const w = el.size * 1.5; const h = el.size;
                    ctx.fillRect(-w/2, -h/2, w, h);
                    if (el.strokeWidth > 0) ctx.strokeRect(-w/2, -h/2, w, h);
                } 
                else if (el.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, el.size/2, 0, Math.PI * 2);
                    ctx.fill();
                    if (el.strokeWidth > 0) ctx.stroke();
                }

                ctx.restore(); // Restores shadow, transform, globalAlpha

                // Selection Bounding Box (Only draw if on active slide, not playing, and is selected)
                if (!isPlaying && activeSlideIndex === currentSlideIdx && activeElementId === el.id) {
                    drawBoundingBox(el);
                }
            });
        }

        function drawBoundingBox(el) {
            ctx.save();
            ctx.translate(el.x, el.y);
            
            let hw = 0, hh = 0;
            if (el.type === 'text') {
                ctx.font = `700 ${el.size}px ${el.font}`;
                hw = (ctx.measureText(el.text).width / 2) + 10;
                hh = (el.size / 2) + 10;
            } else if (el.type === 'rect') {
                hw = (el.size * 1.5 / 2) + 10;
                hh = (el.size / 2) + 10;
            } else if (el.type === 'circle') {
                hw = (el.size / 2) + 10;
                hh = (el.size / 2) + 10;
            }

            ctx.strokeStyle = '#3b82f6'; // Blue bounding box
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 6]);
            ctx.strokeRect(-hw, -hh, hw * 2, hh * 2);
            
            // Draw center dot
            ctx.fillStyle = '#ffffff';
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.arc(0, 0, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
            
            ctx.restore();
        }

        /**
         * INTERACTION (DRAGGING)
         */
        function setupCanvasInteraction() {
            canvas.addEventListener('mousedown', (e) => {
                if (isPlaying) return;
                
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / rect.width) / 2;
                const y = (e.clientY - rect.top) * (canvas.height / rect.height) / 2;

                const slide = slides[activeSlideIndex];
                let clickedEl = null;

                // Check top to bottom
                for(let i = slide.elements.length - 1; i >= 0; i--) {
                    const el = slide.elements[i];
                    let hw = 50, hh = 50;
                    
                    if (el.type === 'text') {
                        ctx.font = `700 ${el.size}px ${el.font}`;
                        hw = ctx.measureText(el.text).width / 2;
                        hh = el.size / 2;
                    } else if (el.type === 'rect') {
                        hw = el.size * 1.5 / 2; hh = el.size / 2;
                    } else if (el.type === 'circle') {
                        hw = el.size / 2; hh = el.size / 2;
                    }

                    if (Math.abs(x - el.x) <= hw && Math.abs(y - el.y) <= hh) {
                        clickedEl = el;
                        break;
                    }
                }

                if (clickedEl) {
                    activeElementId = clickedEl.id;
                    isDragging = true;
                    dragOffsetX = x - clickedEl.x;
                    dragOffsetY = y - clickedEl.y;
                    switchRightTab('Props');
                } else {
                    activeElementId = null;
                }
                
                updateRightPanel();
                renderLayerList();
                renderFrame(globalTime);
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging || !activeElementId || isPlaying) return;
                
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / rect.width) / 2;
                const y = (e.clientY - rect.top) * (canvas.height / rect.height) / 2;
                
                const el = getActiveElement();
                if(el) {
                    el.x = x - dragOffsetX;
                    el.y = y - dragOffsetY;
                    renderFrame(globalTime);
                }
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        /**
         * PLAYBACK ENGINE
         */
        function gameLoop(timestamp) {
            if (!isPlaying) { lastTimestamp = timestamp; return; }
            const dt = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;
            
            globalTime += dt;
            const maxDuration = slides.length * SLIDE_DURATION;
            
            if (globalTime >= maxDuration) globalTime = 0;
            
            // Auto switch active slide visually
            const newActiveIdx = Math.floor(globalTime / SLIDE_DURATION) % slides.length;
            if (newActiveIdx !== activeSlideIndex && !isExporting) {
                activeSlideIndex = newActiveIdx;
                activeElementId = null;
                updateUI();
            }

            document.getElementById('globalTimeline').value = globalTime;
            document.getElementById('timeDisplay').innerText = globalTime.toFixed(1) + 's';
            renderFrame(globalTime);
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('playIcon').classList.toggle('hidden', isPlaying);
            document.getElementById('pauseIcon').classList.toggle('hidden', !isPlaying);
            
            if (isPlaying) {
                lastTimestamp = performance.now();
                activeElementId = null; // hide selection boxes
                updateRightPanel();
                animationFrameId = requestAnimationFrame(gameLoop);
            } else {
                cancelAnimationFrame(animationFrameId);
                renderFrame(globalTime);
            }
        }
        document.getElementById('playPauseBtn').addEventListener('click', togglePlay);

        document.getElementById('globalTimeline').addEventListener('input', (e) => {
            globalTime = parseFloat(e.target.value);
            document.getElementById('timeDisplay').innerText = globalTime.toFixed(1) + 's';
            
            const newActiveIdx = Math.floor(globalTime / SLIDE_DURATION) % Math.max(1, slides.length);
            if (newActiveIdx !== activeSlideIndex) {
                activeSlideIndex = newActiveIdx;
                activeElementId = null;
                updateUI();
            }
            renderFrame(globalTime);
        });

        /**
         * CRUD & DATA MGMT
         */
        function getActiveElement() {
            if(!activeElementId) return null;
            return slides[activeSlideIndex].elements.find(e => e.id === activeElementId);
        }

        function addSlide() {
            slides.push({ id: generateId(), bg: '#18181b', elements: [] });
            activeSlideIndex = slides.length - 1;
            activeElementId = null;
            updateGlobalDuration();
            updateUI();
            setGlobalTime(activeSlideIndex * SLIDE_DURATION);
        }

        function deleteSlide(idx) {
            if (slides.length <= 1) return showToast("Cannot delete the last slide.");
            slides.splice(idx, 1);
            activeSlideIndex = Math.min(activeSlideIndex, slides.length - 1);
            activeElementId = null;
            updateGlobalDuration();
            updateUI();
            setGlobalTime(activeSlideIndex * SLIDE_DURATION);
        }

        function setGlobalTime(t) {
            globalTime = t;
            document.getElementById('globalTimeline').value = globalTime;
            document.getElementById('timeDisplay').innerText = globalTime.toFixed(1) + 's';
            renderFrame(globalTime);
        }

        function updateGlobalDuration() {
            const max = slides.length * SLIDE_DURATION;
            document.getElementById('durationDisplay').innerText = max.toFixed(1);
            const tl = document.getElementById('globalTimeline');
            tl.max = max;
        }

        function addElement(type) {
            const el = {
                id: generateId(), type: type,
                x: 450, y: 250, 
                fill: type==='text' ? '#ffffff' : '#3b82f6', 
                stroke: '#000000', strokeWidth: 0,
                shadowColor: 'transparent', shadowBlur: 0, shadowOffsetX: 0, shadowOffsetY: 0,
                animIn: 'scale', animLoop: 'none', animOut: 'fade',
                start: 0, end: 5
            };
            
            if(type === 'text') {
                el.text = "NEW TEXT"; el.font = "'Space Grotesk'"; el.size = 80;
            } else {
                el.size = 150;
            }

            slides[activeSlideIndex].elements.push(el);
            activeElementId = el.id;
            
            updateUI();
            switchRightTab('Props');
            renderFrame(globalTime);
        }

        function deleteElement(id) {
            slides[activeSlideIndex].elements = slides[activeSlideIndex].elements.filter(e => e.id !== id);
            if (activeElementId === id) activeElementId = null;
            updateUI();
            renderFrame(globalTime);
        }

        /**
         * UI RENDERING
         */
        function updateUI() {
            renderSlideList();
            renderLayerList();
            updateRightPanel();
        }

        function renderSlideList() {
            const list = document.getElementById('slideList');
            list.innerHTML = '';
            slides.forEach((s, idx) => {
                const isActive = idx === activeSlideIndex;
                list.innerHTML += `
                    <div class="p-3 rounded-xl border ${isActive ? 'bg-zinc-800 border-emerald-500' : 'bg-zinc-950 border-zinc-800 hover:border-zinc-700'} cursor-pointer group" onclick="selectSlide(${idx})">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold text-zinc-400">Slide ${idx + 1}</span>
                            <button onclick="event.stopPropagation(); deleteSlide(${idx})" class="text-zinc-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] text-zinc-500">Bg Color</span>
                            <input type="color" value="${s.bg === 'transparent' ? '#000000' : s.bg}" onchange="changeSlideBg(${idx}, this.value)" onclick="event.stopPropagation()" class="w-6 h-6 rounded cursor-pointer bg-transparent border-0">
                        </div>
                    </div>
                `;
            });
        }

        function selectSlide(idx) {
            activeSlideIndex = idx;
            activeElementId = null;
            setGlobalTime(idx * SLIDE_DURATION);
            updateUI();
        }
        
        function changeSlideBg(idx, color) {
            slides[idx].bg = color;
            if(idx === activeSlideIndex) renderFrame(globalTime);
        }

        function renderLayerList() {
            const list = document.getElementById('layerList');
            list.innerHTML = '';
            const els = slides[activeSlideIndex]?.elements || [];
            
            if(els.length === 0) {
                list.innerHTML = '<div class="text-center text-zinc-600 text-xs mt-10">No layers on this slide.</div>';
                return;
            }

            // Reverse loop for visual Top-Down logic matching z-index
            [...els].reverse().forEach(el => {
                const isSelected = el.id === activeElementId;
                let title = el.type.toUpperCase();
                if (el.type === 'text') title = `Text: "${el.text.substring(0,10)}"`;

                list.innerHTML += `
                    <div class="flex items-center justify-between p-3 rounded-lg border ${isSelected ? 'bg-zinc-800 border-emerald-500' : 'bg-zinc-950 border-zinc-800'} cursor-pointer" onclick="selectElement('${el.id}')">
                        <div class="text-sm font-semibold ${isSelected ? 'text-emerald-400' : 'text-zinc-300'} truncate">${title}</div>
                        <button onclick="event.stopPropagation(); deleteElement('${el.id}')" class="text-zinc-600 hover:text-red-400 transition-colors p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>
                `;
            });
        }

        function selectElement(id) {
            activeElementId = id;
            updateUI();
            switchRightTab('Props');
            renderFrame(globalTime);
        }

        /**
         * PROPERTIES PANEL SYNC
         */
        function updateRightPanel() {
            const el = getActiveElement();
            const msg = document.getElementById('noSelectionMsg');
            const editor = document.getElementById('propEditor');
            
            if (!el) {
                msg.classList.remove('hidden');
                editor.classList.add('hidden');
                return;
            }

            msg.classList.add('hidden');
            editor.classList.remove('hidden');

            // Text specific
            const txtCont = document.getElementById('propTextContainer');
            const fontCont = document.getElementById('propFontContainer');
            if (el.type === 'text') {
                txtCont.classList.remove('hidden');
                fontCont.classList.remove('hidden');
                document.getElementById('propText').value = el.text;
                document.getElementById('propFont').value = el.font;
            } else {
                txtCont.classList.add('hidden');
                fontCont.classList.add('hidden');
            }

            // Common
            document.getElementById('propSize').value = el.size;
            document.getElementById('propFill').value = el.fill;
            document.getElementById('fillHex').innerText = el.fill;
            document.getElementById('propStroke').value = el.stroke;
            document.getElementById('propStrokeWidth').value = el.strokeWidth;
            
            // Shadows
            document.getElementById('propShadowColor').value = el.shadowColor === 'transparent' ? '#000000' : el.shadowColor;
            document.getElementById('propShadowX').value = el.shadowOffsetX;
            document.getElementById('propShadowY').value = el.shadowOffsetY;
            document.getElementById('propShadowBlur').value = el.shadowBlur;
        }

        function setupPropertyListeners() {
            const bind = (id, key, parser = a=>a) => {
                document.getElementById(id).addEventListener('input', (e) => {
                    const el = getActiveElement();
                    if(el) {
                        el[key] = parser(e.target.value);
                        if(id === 'propFill') document.getElementById('fillHex').innerText = el.fill;
                        renderFrame(globalTime);
                    }
                });
            };

            bind('propText', 'text');
            bind('propFont', 'font');
            bind('propSize', 'size', parseInt);
            bind('propFill', 'fill');
            bind('propStroke', 'stroke');
            bind('propStrokeWidth', 'strokeWidth', parseInt);
            bind('propShadowColor', 'shadowColor');
            bind('propShadowX', 'shadowOffsetX', parseInt);
            bind('propShadowY', 'shadowOffsetY', parseInt);
            bind('propShadowBlur', 'shadowBlur', parseInt);
        }

        /**
         * TAB LOGIC
         */
        function switchLeftTab(tab) {
            document.getElementById('viewSlides').classList.toggle('hidden', tab !== 'Slides');
            document.getElementById('viewAdd').classList.toggle('hidden', tab !== 'Add');
            document.getElementById('tabSlides').className = `flex-1 py-3 text-sm font-semibold border-b-2 transition-colors ${tab === 'Slides' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`;
            document.getElementById('tabAdd').className = `flex-1 py-3 text-sm font-semibold border-b-2 transition-colors ${tab === 'Add' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`;
        }
        
        function switchRightTab(tab) {
            document.getElementById('viewLayers').classList.toggle('hidden', tab !== 'Layers');
            document.getElementById('viewProps').classList.toggle('hidden', tab !== 'Props');
            document.getElementById('tabLayers').className = `flex-1 py-3 text-sm font-semibold border-b-2 transition-colors ${tab === 'Layers' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`;
            document.getElementById('tabProps').className = `flex-1 py-3 text-sm font-semibold border-b-2 transition-colors ${tab === 'Props' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`;
        }

        document.getElementById('tabSlides').onclick = () => switchLeftTab('Slides');
        document.getElementById('tabAdd').onclick = () => switchLeftTab('Add');
        document.getElementById('tabLayers').onclick = () => switchRightTab('Layers');
        document.getElementById('tabProps').onclick = () => switchRightTab('Props');

        /**
         * EXPORT ENGINE
         */
        let mediaRecorder;
        let recordedChunks = [];
        let isExporting = false;

        async function exportVideo() {
            if (isExporting || (mediaRecorder && mediaRecorder.state === 'recording')) return;

            const btn = document.getElementById('exportBtn');
            const indicator = document.getElementById('recIndicator');
            isExporting = true;
            
            try {
                const stream = canvas.captureStream(30);
                let options = { mimeType: 'video/webm; codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: '' };
                }

                mediaRecorder = new MediaRecorder(stream, options);
                recordedChunks = [];

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType || 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `motion-pro-${Date.now()}.${options.mimeType.includes('webm') ? 'webm' : 'mp4'}`;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);

                    btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Export';
                    indicator.classList.add('hidden');
                    isExporting = false;
                };

                btn.innerHTML = 'Rendering...';
                indicator.classList.remove('hidden');

                // Start from beginning
                isPlaying = false;
                globalTime = 0;
                activeElementId = null; // deselect to hide bounding boxes
                updateUI();
                renderFrame(0);

                mediaRecorder.start();
                togglePlay();

                const maxDuration = slides.length * SLIDE_DURATION;
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') {
                        togglePlay();
                        mediaRecorder.stop();
                        setGlobalTime(0);
                    }
                }, maxDuration * 1000 + 300);

            } catch (err) {
                console.error("Export failed:", err);
                showToast("Export failed on this device.");
                isExporting = false;
            }
        }
        document.getElementById('exportBtn').addEventListener('click', exportVideo);

        // Toast
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-zinc-800 text-white px-6 py-3 rounded-xl shadow-2xl z-50 text-sm font-semibold border border-zinc-700 animate-bounce';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Run
        init();

    </script>
