<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Painting Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1115;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: none;
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .workspace-grid {
            background-size: 20px 20px;
            background-image: radial-gradient(circle, #334155 1px, transparent 1px);
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #draw-canvas {
            background-color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: crosshair;
            border-radius: 4px;
        }

        .tool-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border-radius: 0.5rem;
            width: 100%;
            transition: all 0.2s;
            color: #94a3b8;
        }
        .tool-btn:hover:not(:disabled) {
            background-color: #1e293b;
            color: white;
        }
        .tool-btn.active {
            background-color: #3b82f6;
            color: white;
        }
        .tool-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 40px;
            border-radius: 6px;
            padding: 0;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header -->
    <header class="h-16 border-b border-gray-800 bg-gray-950 flex items-center justify-between px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-gradient-to-br from-pink-500 to-orange-400 flex items-center justify-center">
                <i data-lucide="palette" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="font-bold text-lg tracking-tight hidden sm:block">Paint Studio</h1>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="clearCanvas()" id="btn-clear" class="flex items-center gap-2 px-3 py-1.5 rounded hover:bg-gray-800 text-sm font-medium transition-colors text-gray-400 hover:text-white border border-gray-800 hover:border-gray-700">
                <i data-lucide="trash-2" class="w-4 h-4"></i> <span class="hidden sm:inline">Clear</span>
            </button>
            
            <div class="w-px h-6 bg-gray-700 mx-1"></div>

            <button onclick="previewAnimation()" id="btn-preview" class="flex items-center gap-2 px-4 py-1.5 rounded bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium transition-colors border border-gray-700">
                <i data-lucide="play" class="w-4 h-4" id="icon-preview"></i>
                <span id="text-preview">Preview</span>
            </button>

            <button onclick="exportAnimation()" id="btn-export" class="flex items-center gap-2 px-4 py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span>Export WebM</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- Tools Sidebar -->
        <aside class="w-20 md:w-64 border-r border-gray-800 bg-gray-950 flex flex-col overflow-y-auto flex-shrink-0 z-10" id="sidebar">
            
            <!-- Tool Selection -->
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 hidden md:block">Realistic Brushes</h2>
                <div class="flex flex-col gap-1.5">
                    <button class="tool-btn active" data-tool="pen" onclick="setTool('pen')">
                        <i data-lucide="pen-line" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Solid Pen</span>
                    </button>
                    <button class="tool-btn" data-tool="calligraphy" onclick="setTool('calligraphy')">
                        <i data-lucide="pen-tool" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Calligraphy</span>
                    </button>
                    <button class="tool-btn" data-tool="pencil" onclick="setTool('pencil')">
                        <i data-lucide="pencil" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Pencil</span>
                    </button>
                    <button class="tool-btn" data-tool="charcoal" onclick="setTool('charcoal')">
                        <i data-lucide="flame" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Charcoal</span>
                    </button>
                    <button class="tool-btn" data-tool="chalk" onclick="setTool('chalk')">
                        <i data-lucide="square" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Chalk</span>
                    </button>
                    <button class="tool-btn" data-tool="oil" onclick="setTool('oil')">
                        <i data-lucide="brush" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Oil Paint</span>
                    </button>
                    <button class="tool-btn" data-tool="watercolor" onclick="setTool('watercolor')">
                        <i data-lucide="droplet" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Watercolor</span>
                    </button>
                    <button class="tool-btn" data-tool="airbrush" onclick="setTool('airbrush')">
                        <i data-lucide="wind" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Airbrush</span>
                    </button>
                    <button class="tool-btn" data-tool="marker" onclick="setTool('marker')">
                        <i data-lucide="edit-3" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Marker Blend</span>
                    </button>
                    <div class="h-px bg-gray-800 my-1"></div>
                    <button class="tool-btn" data-tool="eraser" onclick="setTool('eraser')">
                        <i data-lucide="eraser" class="w-5 h-5 flex-shrink-0"></i>
                        <span class="text-sm font-medium hidden md:block">Eraser</span>
                    </button>
                </div>
            </div>

            <!-- Properties -->
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4 hidden md:block">Properties</h2>
                
                <!-- Color Picker -->
                <div class="mb-6">
                    <label class="text-xs text-gray-400 block mb-2 hidden md:block">Color</label>
                    <div class="flex flex-col gap-3">
                        <input type="color" id="color-picker" value="#000000" onchange="setColor(this.value)" oninput="setColor(this.value)">
                        
                        <!-- Quick Colors -->
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-2">
                            <button class="w-full aspect-square rounded-md bg-black border border-gray-700" onclick="setColor('#000000')"></button>
                            <button class="w-full aspect-square rounded-md bg-white border border-gray-700" onclick="setColor('#ffffff')"></button>
                            <button class="w-full aspect-square rounded-md bg-red-600" onclick="setColor('#dc2626')"></button>
                            <button class="w-full aspect-square rounded-md bg-blue-600" onclick="setColor('#2563eb')"></button>
                            <button class="w-full aspect-square rounded-md bg-emerald-600" onclick="setColor('#059669')"></button>
                            <button class="w-full aspect-square rounded-md bg-yellow-500" onclick="setColor('#eab308')"></button>
                            <button class="w-full aspect-square rounded-md bg-purple-600" onclick="setColor('#9333ea')"></button>
                            <button class="w-full aspect-square rounded-md bg-pink-500" onclick="setColor('#ec4899')"></button>
                            <button class="w-full aspect-square rounded-md bg-orange-500" onclick="setColor('#f97316')"></button>
                            <button class="w-full aspect-square rounded-md bg-cyan-500" onclick="setColor('#06b6d4')"></button>
                        </div>
                    </div>
                </div>

                <!-- Sliders -->
                <div class="space-y-5 pb-4">
                    <!-- Size Slider -->
                    <div>
                        <div class="flex justify-between items-center mb-1 hidden md:flex">
                            <label class="text-xs text-gray-400">Size</label>
                            <span id="size-val" class="text-xs text-gray-300 font-mono">10px</span>
                        </div>
                        <div class="md:hidden flex justify-center mb-1 text-gray-500" title="Brush Size">
                            <i data-lucide="circle-dot" class="w-4 h-4"></i>
                        </div>
                        <input type="range" id="size-slider" min="2" max="150" value="10" class="w-full accent-blue-500" oninput="setSize(this.value)">
                    </div>

                    <!-- Opacity Slider -->
                    <div>
                        <div class="flex justify-between items-center mb-1 hidden md:flex">
                            <label class="text-xs text-gray-400">Opacity</label>
                            <span id="opacity-val" class="text-xs text-gray-300 font-mono">100%</span>
                        </div>
                        <div class="md:hidden flex justify-center mb-1 text-gray-500" title="Opacity">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </div>
                        <input type="range" id="opacity-slider" min="1" max="100" value="100" class="w-full accent-blue-500" oninput="setOpacity(this.value)">
                    </div>

                    <!-- Density Slider -->
                    <div>
                        <div class="flex justify-between items-center mb-1 hidden md:flex">
                            <label class="text-xs text-gray-400">Density / Flow</label>
                            <span id="density-val" class="text-xs text-gray-300 font-mono">50%</span>
                        </div>
                        <div class="md:hidden flex justify-center mb-1 text-gray-500" title="Density">
                            <i data-lucide="droplets" class="w-4 h-4"></i>
                        </div>
                        <input type="range" id="density-slider" min="1" max="100" value="50" class="w-full accent-blue-500" oninput="setDensity(this.value)">
                    </div>
                </div>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main class="flex-1 bg-gray-900 workspace-grid relative overflow-hidden">
            <div id="canvas-wrapper">
                <canvas id="draw-canvas" width="1280" height="720"></canvas>
            </div>
            
            <!-- Playback/Recording Indicator -->
            <div id="status-indicator" class="absolute top-6 left-6 flex items-center gap-2 bg-blue-500/10 border border-blue-500/50 text-blue-500 px-4 py-2 rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none backdrop-blur-sm z-50">
                <i data-lucide="play-circle" class="w-4 h-4 animate-pulse"></i>
                <span class="text-xs font-bold tracking-wide uppercase" id="status-text">Playing Preview</span>
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <script>
        lucide.createIcons();

        const canvas = document.getElementById('draw-canvas');
        const ctx = canvas.getContext('2d');
        
        const state = {
            isDrawing: false,
            tool: 'pen', 
            color: '#000000',
            size: 10,
            opacity: 100,
            density: 50,
            lastX: 0,
            lastY: 0,
            
            // History Tracking for Playback
            history: [], // Array of strokes
            currentStroke: null,
            logicalTime: 0,
            lastEventTime: 0,

            // Playback & Export Engine
            isPlaying: false,
            isExporting: false,
            playStartTime: 0,
            mediaRecorder: null,
            recordingChunks: []
        };

        // --- CORE CANVAS INIT ---
        function initCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        initCanvas();

        function clearCanvas() {
            if(state.history.length === 0) return;
            if(confirm('Are you sure you want to clear the canvas? This cannot be undone.')) {
                initCanvas();
                state.history = [];
                state.logicalTime = 0;
                showToast('Canvas cleared');
            }
        }

        function clearCanvasInternal() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // --- UI BINDINGS ---
        function setTool(toolName) {
            if(state.isPlaying) return;
            state.tool = toolName;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.tool === toolName) btn.classList.add('active');
            });
        }

        function setColor(colorHex) {
            state.color = colorHex;
            document.getElementById('color-picker').value = colorHex;
        }

        function setSize(val) {
            state.size = parseInt(val);
            document.getElementById('size-val').innerText = val + 'px';
        }

        function setOpacity(val) {
            state.opacity = parseInt(val);
            document.getElementById('opacity-val').innerText = val + '%';
        }

        function setDensity(val) {
            state.density = parseInt(val);
            document.getElementById('density-val').innerText = val + '%';
        }

        // --- BRUSH RENDER ENGINE ---
        function applyBrush(context, x, y, lastX, lastY, tool, color, size, opacityVal, densityVal) {
            let op = opacityVal / 100;
            let den = densityVal / 100;

            if (tool === 'eraser') {
                context.globalCompositeOperation = 'source-over';
                context.globalAlpha = op;
                context.strokeStyle = '#ffffff';
                context.lineWidth = size;
                context.lineCap = 'round';
                context.lineJoin = 'round';
                context.beginPath(); context.moveTo(lastX, lastY); context.lineTo(x, y); context.stroke();
                return;
            }

            context.strokeStyle = color;
            context.fillStyle = color;

            if (tool === 'pen') {
                context.globalCompositeOperation = 'source-over';
                context.globalAlpha = op;
                context.lineWidth = size;
                context.lineCap = 'round';
                context.lineJoin = 'round';
                context.beginPath(); context.moveTo(lastX, lastY); context.lineTo(x, y); context.stroke();
            } 
            else if (tool === 'calligraphy') {
                context.globalCompositeOperation = 'source-over';
                context.globalAlpha = op;
                
                // Simulate a flat nib at a 45 degree angle
                let angle = -Math.PI / 4; 
                let offsetX = Math.cos(angle) * (size / 2);
                let offsetY = Math.sin(angle) * (size / 2);

                context.beginPath();
                context.moveTo(lastX - offsetX, lastY - offsetY);
                context.lineTo(lastX + offsetX, lastY + offsetY);
                context.lineTo(x + offsetX, y + offsetY);
                context.lineTo(x - offsetX, y - offsetY);
                context.closePath();
                context.fill();
            }
            else if (tool === 'marker') {
                context.globalCompositeOperation = 'multiply';
                context.globalAlpha = 0.05 * op; 
                context.lineWidth = size;
                context.lineCap = 'round';
                context.lineJoin = 'round';
                context.beginPath(); context.moveTo(lastX, lastY); context.lineTo(x, y); context.stroke();
            }
            else if (tool === 'pencil') {
                context.globalCompositeOperation = 'source-over';
                context.globalAlpha = 0.4 * op;
                context.lineWidth = Math.max(1, size * 0.1);
                context.lineCap = 'butt';
                
                // Draw multiple scattered lines to simulate graphite grain, based on density
                let numLines = Math.max(2, Math.floor((size / 2) * den));
                for(let i=0; i<numLines; i++){
                    let offset = (Math.random() - 0.5) * size * 0.8;
                    context.beginPath(); 
                    context.moveTo(lastX + offset, lastY + offset); 
                    context.lineTo(x + offset, y + offset); 
                    context.stroke();
                }
            }
            else if (tool === 'charcoal') {
                context.globalCompositeOperation = 'source-over';
                context.globalAlpha = 0.7 * op;
                let dist = Math.hypot(x - lastX, y - lastY);
                let steps = Math.max(1, dist / 2); 
                
                for (let i = 0; i <= steps; i++) {
                    let px = lastX + (x - lastX) * (i / steps);
                    let py = lastY + (y - lastY) * (i / steps);
                    
                    let dots = Math.max(3, size * den);
                    for(let j=0; j < dots; j++) {
                        let rx = px + (Math.random() - 0.5) * size;
                        let ry = py + (Math.random() - 0.5) * size;
                        if (Math.hypot(rx - px, ry - py) < (size/2) * Math.random()) {
                            context.fillRect(rx, ry, Math.random()*2, Math.random()*2);
                        }
                    }
                }
            }
            else if (tool === 'chalk') {
                context.globalCompositeOperation = 'source-over';
                context.globalAlpha = 0.6 * op;
                let dist = Math.hypot(x - lastX, y - lastY);
                let steps = Math.max(1, dist);
                
                for(let i=0; i<=steps; i++) {
                    let px = lastX + (x - lastX) * (i / steps);
                    let py = lastY + (y - lastY) * (i / steps);
                    
                    let particles = Math.floor(10 * den * (size/10));
                    for(let j=0; j<particles; j++) {
                        let rx = px + (Math.random() - 0.5) * size;
                        let ry = py + (Math.random() - 0.5) * size;
                        context.fillRect(rx, ry, 2, 2); // Blocky texture
                    }
                }
            }
            else if (tool === 'oil') {
                context.globalCompositeOperation = 'source-over';
                context.lineWidth = Math.max(1, size * 0.15); // bristle size
                context.lineCap = 'round';
                context.lineJoin = 'round';
                
                // Calculate normal vector perpendicular to stroke direction
                let dx = x - lastX;
                let dy = y - lastY;
                let dist = Math.hypot(dx, dy);
                let nx = dist > 0 ? -dy / dist : 0; 
                let ny = dist > 0 ? dx / dist : 0;  
                
                let bristles = Math.max(3, Math.floor(15 * den * (size/20)));
                
                for(let i=0; i<bristles; i++) {
                    // Create a consistent spread of bristles across the width of the brush
                    let hash = Math.sin(i * 12.9898) * 43758.5453;
                    let frac = hash - Math.floor(hash); // 0 to 1
                    let offset = (frac - 0.5) * size;
                    
                    // Vary alpha per bristle to simulate texture
                    context.globalAlpha = (0.3 + 0.7 * frac) * op;
                    
                    context.beginPath();
                    context.moveTo(lastX + nx * offset, lastY + ny * offset);
                    context.lineTo(x + nx * offset, y + ny * offset);
                    context.stroke();
                }
            }
            else if (tool === 'airbrush') {
                context.globalCompositeOperation = 'source-over';
                context.globalAlpha = 0.05 * op;
                let dist = Math.hypot(x - lastX, y - lastY);
                let steps = Math.max(1, dist);
                
                for(let i=0; i<=steps; i++) {
                    let px = lastX + (x - lastX) * (i / steps);
                    let py = lastY + (y - lastY) * (i / steps);
                    
                    // Density heavily controls particle count here
                    let drops = Math.floor(30 * den * (size/20));
                    for(let j=0; j<drops; j++) {
                        let angle = Math.random() * Math.PI * 2;
                        let radius = Math.random() * (size/2);
                        // Focus drops towards the center
                        if(Math.random() > 0.3) radius *= Math.random();
                        
                        context.beginPath();
                        context.arc(px + Math.cos(angle)*radius, py + Math.sin(angle)*radius, Math.random()*1.5, 0, Math.PI*2);
                        context.fill();
                    }
                }
            }
            else if (tool === 'watercolor') {
                context.globalCompositeOperation = 'multiply'; 
                context.globalAlpha = 0.02 * op; 
                
                let dist = Math.hypot(x - lastX, y - lastY);
                // Reduce steps based on density to spread it out or clump it
                let steps = Math.max(1, dist / (size / 4) * den);
                
                for (let i = 0; i <= steps; i++) {
                    let px = lastX + (x - lastX) * (i / steps);
                    let py = lastY + (y - lastY) * (i / steps);
                    
                    context.beginPath();
                    let jx = px + (Math.random() - 0.5) * (size/4);
                    let jy = py + (Math.random() - 0.5) * (size/4);
                    let radius = (size/2) + Math.random()*(size/2);
                    context.arc(jx, jy, radius, 0, Math.PI*2);
                    context.fill();
                }
            }
        }

        // --- DRAWING RECORDING LOGIC ---
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            if (state.isPlaying) return;
            e.preventDefault();
            state.isDrawing = true;
            const pos = getMousePos(e);
            state.lastX = pos.x;
            state.lastY = pos.y;
            
            // Advance Timeline Time (cap pauses to 0.8 seconds to avoid boring playbacks)
            let now = performance.now();
            if (state.history.length === 0) {
                state.logicalTime = 0;
            } else {
                let diff = now - state.lastEventTime;
                if (diff > 800) diff = 800; 
                state.logicalTime += diff;
            }
            state.lastEventTime = now;

            // Start new stroke in history (including new op/den properties)
            state.currentStroke = {
                tool: state.tool,
                color: state.color,
                size: state.size,
                opacity: state.opacity,
                density: state.density,
                points: [{ x: pos.x, y: pos.y, t: state.logicalTime }]
            };

            applyBrush(ctx, pos.x, pos.y, pos.x, pos.y, state.tool, state.color, state.size, state.opacity, state.density);
        }

        function draw(e) {
            if (!state.isDrawing || state.isPlaying) return;
            e.preventDefault();
            
            const pos = getMousePos(e);
            
            // Update Timeline
            let now = performance.now();
            let diff = now - state.lastEventTime;
            state.logicalTime += diff;
            state.lastEventTime = now;

            // Record point
            state.currentStroke.points.push({ x: pos.x, y: pos.y, t: state.logicalTime });
            
            // Render locally immediately
            applyBrush(ctx, pos.x, pos.y, state.lastX, state.lastY, state.tool, state.color, state.size, state.opacity, state.density);

            state.lastX = pos.x;
            state.lastY = pos.y;
        }

        function stopDrawing() {
            if (!state.isDrawing || state.isPlaying) return;
            state.isDrawing = false;
            if (state.currentStroke && state.currentStroke.points.length > 0) {
                state.history.push(state.currentStroke);
                state.currentStroke = null;
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);


        // --- ANIMATION PLAYBACK & EXPORT ---
        let pStrokeIndex = 0;
        let pPointIndex = 0;
        
        function setUIState(playing) {
            document.querySelectorAll('.tool-btn').forEach(b => b.disabled = playing);
            document.getElementById('btn-clear').disabled = playing;
            document.getElementById('btn-preview').disabled = playing;
            document.getElementById('btn-export').disabled = playing;
            
            const indicator = document.getElementById('status-indicator');
            if(playing) {
                indicator.classList.remove('opacity-0');
                if(state.isExporting) {
                    indicator.classList.replace('bg-blue-500/10', 'bg-red-500/10');
                    indicator.classList.replace('border-blue-500/50', 'border-red-500/50');
                    indicator.classList.replace('text-blue-500', 'text-red-500');
                    document.getElementById('status-text').innerText = 'Recording Video...';
                } else {
                    indicator.classList.replace('bg-red-500/10', 'bg-blue-500/10');
                    indicator.classList.replace('border-red-500/50', 'border-blue-500/50');
                    indicator.classList.replace('text-red-500', 'text-blue-500');
                    document.getElementById('status-text').innerText = 'Playing Preview';
                }
            } else {
                indicator.classList.add('opacity-0');
            }
        }

        function previewAnimation() {
            if(state.history.length === 0) {
                showToast('Draw something first to preview!', 'error');
                return;
            }
            if(state.isPlaying) return;
            
            state.isPlaying = true;
            state.isExporting = false;
            setUIState(true);
            
            clearCanvasInternal();
            pStrokeIndex = 0;
            pPointIndex = 0;
            state.playStartTime = performance.now();
            
            requestAnimationFrame(playbackLoop);
        }

        function exportAnimation() {
            if(state.history.length === 0) {
                showToast('Draw something first to export!', 'error');
                return;
            }
            if(state.isPlaying) return;

            try {
                // Initialize Media Recorder
                const stream = canvas.captureStream(60); // 60fps for smooth brush interpolation
                state.recordingChunks = [];
                state.mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
                
                state.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) state.recordingChunks.push(e.data);
                };

                state.mediaRecorder.onstop = () => {
                    const blob = new Blob(state.recordingChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `paint-animation-${Date.now()}.webm`;
                    link.click();
                    URL.revokeObjectURL(url);
                    showToast('Video saved successfully!', 'success');
                };

                state.mediaRecorder.start();
                
                // Start playback engine
                state.isPlaying = true;
                state.isExporting = true;
                setUIState(true);
                
                clearCanvasInternal();
                pStrokeIndex = 0;
                pPointIndex = 0;
                state.playStartTime = performance.now();
                
                requestAnimationFrame(playbackLoop);
                showToast('Started export rendering...');

            } catch (err) {
                console.error(err);
                showToast('Recording failed. Browser not supported.', 'error');
                state.isPlaying = false;
                state.isExporting = false;
                setUIState(false);
            }
        }

        function playbackLoop(timestamp) {
            if (!state.isPlaying) return;
            
            let elapsed = timestamp - state.playStartTime;

            // Fast-forward drawing until we catch up to elapsed time
            while (pStrokeIndex < state.history.length) {
                let stroke = state.history[pStrokeIndex];
                
                // Provide defaults just in case of missing properties
                let op = stroke.opacity !== undefined ? stroke.opacity : 100;
                let den = stroke.density !== undefined ? stroke.density : 50;

                if (pPointIndex >= stroke.points.length) {
                    pStrokeIndex++;
                    pPointIndex = 0;
                    continue;
                }

                let pt = stroke.points[pPointIndex];
                
                if (pt.t <= elapsed) {
                    if (pPointIndex > 0) {
                        let prev = stroke.points[pPointIndex - 1];
                        applyBrush(ctx, pt.x, pt.y, prev.x, prev.y, stroke.tool, stroke.color, stroke.size, op, den);
                    } else {
                        // First point
                        applyBrush(ctx, pt.x, pt.y, pt.x, pt.y, stroke.tool, stroke.color, stroke.size, op, den);
                    }
                    pPointIndex++;
                } else {
                    // Current point is in the future, wait for next frame
                    break;
                }
            }

            // Check if finished
            if (pStrokeIndex >= state.history.length) {
                state.isPlaying = false;
                
                if(state.isExporting) {
                    setTimeout(() => { // Give it a slight pause at the end of the video
                        if(state.mediaRecorder) state.mediaRecorder.stop();
                        state.isExporting = false;
                        setUIState(false);
                    }, 1000);
                } else {
                    setUIState(false);
                }
                return;
            }

            requestAnimationFrame(playbackLoop);
        }

        // --- TOAST ALERTS ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 transform transition-all translate-y-8 opacity-0`;
            
            let icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-triangle' : 'info');
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i> <span class="text-sm font-medium">${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            requestAnimationFrame(() => toast.classList.remove('translate-y-8', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('translate-y-8', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
