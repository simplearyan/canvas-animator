<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roughboard Canvas</title>

    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Rough.js for hand-drawn shapes -->
    <script src="https://unpkg.com/roughjs@latest/bundled/rough.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Kalam Font for hand-drawn text -->
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">

    <!-- MathJax Configuration and Script for LaTeX -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'local' }, // Local font cache is required to serialize SVGs standalone
            startup: {
                ready: () => {
                    MathJax.startup.defaultReady();
                    window.mathJaxReady = true;
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fcfcfc;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Kalam', cursive;
            touch-action: none; /* Prevent scrolling on mobile */
        }

        #board {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        .tool-btn {
            @apply p-2 rounded-lg flex items-center justify-center text-gray-600 hover:bg-gray-100 transition-colors duration-200 relative;
        }

        .tool-btn.active {
            @apply bg-indigo-100 text-indigo-600;
        }

        .color-btn {
            @apply w-6 h-6 rounded-full border-2 border-transparent hover:scale-110 transition-transform cursor-pointer shadow-sm;
        }

        .color-btn.active {
            @apply border-gray-400 scale-110 shadow-md;
        }

        #input-container {
            position: absolute;
            display: none;
            z-index: 50;
        }

        #text-input {
            background: transparent;
            border: 2px dashed #9ca3af;
            outline: none;
            resize: none;
            padding: 4px;
            font-family: 'Kalam', cursive;
            font-size: 24px;
            min-width: 200px;
            min-height: 40px;
            border-radius: 4px;
            line-height: 1.2;
        }
        
        /* Specific Highlighter Colors */
        .color-black { background-color: #171717; }
        .color-blue { background-color: #0EA5E9; }
        .color-purple { background-color: #8B5CF6; }
        .color-pink { background-color: #EC4899; }
        .color-orange { background-color: #F97316; }

        /* Tooltip */
        .tool-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            font-family: sans-serif;
        }
        .tool-btn:hover::after { opacity: 1; }
    </style>
</head>
<body>

    <!-- Canvas Element -->
    <canvas id="board"></canvas>

    <!-- Toolbar -->
    <div class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-white rounded-xl shadow-lg border border-gray-200 p-2 flex flex-col md:flex-row items-center gap-4 z-10 font-sans">
        
        <!-- Tools Section -->
        <div class="flex gap-1 border-b md:border-b-0 md:border-r border-gray-200 pb-2 md:pb-0 md:pr-4">
            <button class="tool-btn active" data-tool="pencil" data-tooltip="Freedraw (P)">
                <i class="ph ph-pencil text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="line" data-tooltip="Line (L)">
                <i class="ph ph-line-segment text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="rectangle" data-tooltip="Rectangle (R)">
                <i class="ph ph-rectangle text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="circle" data-tooltip="Circle (C)">
                <i class="ph ph-circle text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="text" data-tooltip="Text (T)">
                <i class="ph ph-text-t text-2xl"></i>
            </button>
            <button class="tool-btn" data-tool="math" data-tooltip="LaTeX Equation (M)">
                <i class="ph ph-function text-2xl"></i>
            </button>
        </div>

        <!-- Colors Section (Inspired by Image) -->
        <div class="flex gap-2 border-b md:border-b-0 md:border-r border-gray-200 pb-2 md:pb-0 md:pr-4 px-2">
            <div class="color-btn color-black active" data-color="#171717" title="Black"></div>
            <div class="color-btn color-blue" data-color="#0EA5E9" title="Blue"></div>
            <div class="color-btn color-purple" data-color="#8B5CF6" title="Purple"></div>
            <div class="color-btn color-pink" data-color="#EC4899" title="Pink"></div>
            <div class="color-btn color-orange" data-color="#F97316" title="Orange"></div>
        </div>

        <!-- Action Section -->
        <div class="flex gap-1 px-2">
            <button class="tool-btn" id="undo-btn" data-tooltip="Undo (Ctrl+Z)">
                <i class="ph ph-arrow-u-up-left text-2xl"></i>
            </button>
            <button class="tool-btn text-red-500 hover:bg-red-50 hover:text-red-600" id="clear-btn" data-tooltip="Clear Board">
                <i class="ph ph-trash text-2xl"></i>
            </button>
        </div>
    </div>

    <!-- Hidden Input Container for Text and Math -->
    <div id="input-container">
        <textarea id="text-input" placeholder="Type here..."></textarea>
        <div id="math-hint" class="absolute -bottom-6 left-0 text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded shadow-sm whitespace-nowrap hidden font-sans font-medium">
            Enter LaTeX (e.g., E = mc^2). Press Enter to finish.
        </div>
    </div>

    <script>
        // --- Core Variables ---
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const inputContainer = document.getElementById('input-container');
        const textInput = document.getElementById('text-input');
        const mathHint = document.getElementById('math-hint');
        
        let rc; // RoughJS instance
        let elements = [];
        let isDrawing = false;
        let currentTool = 'pencil';
        let currentColor = '#171717';
        let currentElement = null;

        // --- Setup & Resize ---
        function initCanvas() {
            // Support high DPI displays
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = `${window.innerWidth}px`;
            canvas.style.height = `${window.innerHeight}px`;
            ctx.scale(dpr, dpr);
            
            rc = rough.canvas(canvas);
            redraw();
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();

        // --- UI Interactions ---
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.tool-btn.active')?.classList.remove('active');
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                
                // Adjust cursor based on tool
                canvas.style.cursor = ['text', 'math'].includes(currentTool) ? 'text' : 'crosshair';
                hideInput();
            });
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.color-btn.active')?.classList.remove('active');
                btn.classList.add('active');
                currentColor = btn.dataset.color;
                textInput.style.color = currentColor;
            });
        });

        document.getElementById('undo-btn').addEventListener('click', () => {
            elements.pop();
            redraw();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            elements = [];
            redraw();
        });

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            // Don't trigger shortcuts if user is typing
            if (document.activeElement === textInput) return;

            if (e.key.toLowerCase() === 'p') clickTool('pencil');
            if (e.key.toLowerCase() === 'l') clickTool('line');
            if (e.key.toLowerCase() === 'r') clickTool('rectangle');
            if (e.key.toLowerCase() === 'c') clickTool('circle');
            if (e.key.toLowerCase() === 't') clickTool('text');
            if (e.key.toLowerCase() === 'm') clickTool('math');
            if (e.ctrlKey && e.key === 'z') {
                elements.pop();
                redraw();
            }
        });

        function clickTool(toolName) {
            const btn = document.querySelector(`.tool-btn[data-tool="${toolName}"]`);
            if (btn) btn.click();
        }

        // --- LaTeX Processing ---
        async function latexToImage(tex, color) {
            if (!window.mathJaxReady) {
                alert("MathJax is still loading, please wait a moment.");
                return null;
            }

            try {
                const node = MathJax.tex2svg(tex, {display: true});
                const svg = node.querySelector('svg');
                if (!svg) return null;

                // Apply current color to SVG
                svg.style.color = color;
                svg.setAttribute('color', color);
                
                // Scale up the SVG from 'ex' units to pixels for canvas rendering
                const wStr = svg.getAttribute('width');
                const hStr = svg.getAttribute('height');
                if (wStr && wStr.includes('ex')) {
                    svg.setAttribute('width', (parseFloat(wStr) * 16) + 'px');
                }
                if (hStr && hStr.includes('ex')) {
                    svg.setAttribute('height', (parseFloat(hStr) * 16) + 'px');
                }

                // Serialize SVG
                const svgData = new XMLSerializer().serializeToString(svg);
                const svg64 = btoa(unescape(encodeURIComponent(svgData)));
                const image64 = 'data:image/svg+xml;base64,' + svg64;

                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = image64;
                });
            } catch (err) {
                console.error("LaTeX Rendering Error:", err);
                return null;
            }
        }

        // --- Text/Math Input Handling ---
        let inputPosition = { x: 0, y: 0 };

        function showInput(x, y) {
            inputPosition = { x, y };
            inputContainer.style.display = 'block';
            inputContainer.style.left = `${x}px`;
            inputContainer.style.top = `${y}px`;
            
            textInput.value = '';
            textInput.style.color = currentColor;
            
            if (currentTool === 'math') {
                mathHint.style.display = 'block';
                textInput.placeholder = "E = mc^2";
                textInput.style.fontFamily = 'monospace';
                textInput.style.fontSize = '20px';
            } else {
                mathHint.style.display = 'none';
                textInput.placeholder = "Type here...";
                textInput.style.fontFamily = "'Kalam', cursive";
                textInput.style.fontSize = '28px';
            }
            
            // Allow DOM to update before focusing
            setTimeout(() => {
                textInput.focus();
            }, 50);
        }

        function hideInput() {
            inputContainer.style.display = 'none';
            textInput.value = '';
        }

        async function finalizeInput() {
            if (inputContainer.style.display === 'none') return;
            const text = textInput.value.trim();
            
            if (text) {
                if (currentTool === 'text') {
                    elements.push({
                        type: 'text',
                        text: text,
                        x: inputPosition.x,
                        y: inputPosition.y,
                        color: currentColor
                    });
                    redraw();
                } else if (currentTool === 'math') {
                    // Show generating state
                    textInput.value = "Generating...";
                    const img = await latexToImage(text, currentColor);
                    if (img) {
                        elements.push({
                            type: 'math',
                            img: img,
                            x: inputPosition.x,
                            y: inputPosition.y - (img.height / 2), // Adjust vertical alignment
                            color: currentColor
                        });
                        redraw();
                    }
                }
            }
            hideInput();
        }

        textInput.addEventListener('keydown', (e) => {
            // Finish input on enter (allow Shift+Enter for newlines in text mode)
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                finalizeInput();
            }
            // Cancel on escape
            if (e.key === 'Escape') hideInput();
        });

        textInput.addEventListener('blur', () => {
             // Delay to prevent race condition if pressing tool button
            setTimeout(finalizeInput, 100);
        });

        // --- Mouse & Touch Event Handling ---
        function getCoordinates(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function handlePointerDown(e) {
            if (e.target !== canvas) return;
            
            const { x, y } = getCoordinates(e);

            if (currentTool === 'text' || currentTool === 'math') {
                // If input is already open and clicked elsewhere, finalizeInput happens via blur event
                if (inputContainer.style.display === 'none') {
                    showInput(x, y);
                }
                return;
            }

            isDrawing = true;
            
            if (currentTool === 'pencil') {
                currentElement = { type: 'pencil', points: [[x, y]], color: currentColor };
            } else if (['line', 'rectangle', 'circle'].includes(currentTool)) {
                currentElement = { type: currentTool, x1: x, y1: y, x2: x, y2: y, color: currentColor };
            }
            
            if (currentElement) {
                elements.push(currentElement);
            }
        }

        function handlePointerMove(e) {
            if (!isDrawing || !currentElement) return;
            
            const { x, y } = getCoordinates(e);

            if (currentTool === 'pencil') {
                currentElement.points.push([x, y]);
            } else if (['line', 'rectangle', 'circle'].includes(currentTool)) {
                currentElement.x2 = x;
                currentElement.y2 = y;
            }
            
            redraw();
        }

        function handlePointerUp() {
            isDrawing = false;
            currentElement = null;
        }

        // Attach standard events
        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        // Attach touch events
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handlePointerMove(e); }, { passive: false });
        window.addEventListener('touchend', handlePointerUp);

        // --- Render Engine ---
        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            elements.forEach(el => {
                const options = { 
                    stroke: el.color, 
                    strokeWidth: 2.5, 
                    roughness: 1.2,
                    bowing: 1
                };

                if (el.type === 'pencil' && el.points.length > 1) {
                    rc.curve(el.points, options);
                } else if (el.type === 'line') {
                    rc.line(el.x1, el.y1, el.x2, el.y2, options);
                } else if (el.type === 'rectangle') {
                    const w = el.x2 - el.x1;
                    const h = el.y2 - el.y1;
                    rc.rectangle(el.x1, el.y1, w, h, options);
                } else if (el.type === 'circle') {
                    // Radius based on dragged distance from center
                    const dx = el.x2 - el.x1;
                    const dy = el.y2 - el.y1;
                    const r = Math.sqrt(dx*dx + dy*dy);
                    rc.circle(el.x1, el.y1, r * 2, options); // Roughjs takes diameter
                } else if (el.type === 'text') {
                    ctx.font = '28px Kalam, cursive';
                    ctx.fillStyle = el.color;
                    ctx.textBaseline = 'top';
                    const lines = el.text.split('\n');
                    lines.forEach((line, i) => {
                        ctx.fillText(line, el.x, el.y + (i * 32));
                    });
                } else if (el.type === 'math' && el.img) {
                    ctx.drawImage(el.img, el.x, el.y);
                }
            });
        }
    </script>
</body>
</html>
