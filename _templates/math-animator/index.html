<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Animator (Blueprint Node)</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overscroll-behavior-y: none; }
        #canvas-container {
            background-color: #f1f5f9;
            background-image: 
                radial-gradient(#cbd5e1 1px, transparent 1px),
                radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex flex-col overflow-hidden font-sans">
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-1.5 rounded-lg shadow-sm">
                <i class="ph-bold ph-function text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-800 mt-0.5">Math Animator UI</h1>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-lg z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            Processing Media...
        </div>

        <aside class="w-full md:w-[320px] bg-white border-b md:border-b-0 md:border-r border-gray-200 p-5 flex flex-col gap-6 overflow-y-auto z-10 flex-shrink-0">
            <div class="flex flex-col gap-4">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500">Export Settings</h2>
                <div>
                    <label class="block text-xs font-medium mb-1 text-gray-700">Format</label>
                    <select id="export-format" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-sm outline-none cursor-pointer">
                        <option value="mp4">MP4 Video (.mp4)</option>
                        <option value="webm">WebM Video (.webm)</option>
                        <option value="mov">QuickTime (.mov)</option>
                        <option value="png-sequence">PNG Sequence (.zip)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1 text-gray-700">Framerate</label>
                    <select id="export-fps" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-sm outline-none cursor-pointer">
                        <option value="12">12 FPS (Stuttered)</option>
                        <option value="24">24 FPS (Cinematic)</option>
                        <option value="30">30 FPS (Standard)</option>
                        <option value="60" selected>60 FPS (Smooth)</option>
                    </select>
                </div>
            </div>

            <div class="flex flex-col gap-3 mt-auto pt-4 border-t border-gray-100">
                <button id="btn-animate" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-gray-100 font-bold rounded-lg transition hover:bg-gray-200">Preview</button>
                <button id="btn-record" class="w-full py-3 bg-red-500 text-white font-bold rounded-lg hover:bg-red-600 transition">Record stream()</button>
                <button id="btn-render" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition">Render WebCodec</button>
            </div>
        </aside>

        <section id="canvas-container" class="flex-1 relative overflow-hidden flex items-center justify-center p-4">
            <canvas id="main-canvas" class="w-full max-w-[1280px] aspect-video shadow-2xl rounded-lg bg-white border border-gray-200"></canvas>
        </section>
    </main>

    <script type="module">
        import { Exporter } from '../core/exporter.js';

        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1920;
        canvas.height = 1080;

        const durationMs = 5000;

        async function drawFrame(progress) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Render a sine wave
            ctx.beginPath();
            ctx.moveTo(100, 540);
            
            const maxPoints = Math.floor(progress * 1700);
            for(let x = 0; x < maxPoints; x += 10) {
                const y = Math.sin((x + 100) * 0.01) * 200;
                ctx.lineTo(x + 100, 540 - y);
            }
            ctx.strokeStyle = '#4f46e5';
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            // Text
            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 70px "Inter", sans-serif';
            ctx.fillText('f(x) = sin(x)', 100, 200);
        }

        const exporter = new Exporter(canvas, drawFrame);
        drawFrame(1.0);

        const setUI = (state) => {
            ['btn-animate', 'btn-record', 'btn-render'].forEach(id => document.getElementById(id).disabled = state);
            const overlay = document.getElementById('recording-overlay');
            if(state) {
                overlay.classList.replace('-translate-y-20', 'translate-y-4');
            } else {
                overlay.classList.replace('translate-y-4', '-translate-y-20');
            }
        };

        document.getElementById('btn-animate').onclick = () => {
            setUI(true);
            const start = performance.now();
            const anim = (time) => {
                const p = Math.min(1.0, (time - start) / durationMs);
                drawFrame(p);
                if(p < 1) requestAnimationFrame(anim);
                else setUI(false);
            };
            requestAnimationFrame(anim);
        };

        document.getElementById('btn-record').onclick = async () => {
            setUI(true);
            await exporter.recordRealtime(document.getElementById('export-format').value, parseInt(document.getElementById('export-fps').value, 10), durationMs);
            setUI(false);
        };

        document.getElementById('btn-render').onclick = async () => {
            const overlay = document.getElementById('recording-overlay');
            setUI(true);
            await exporter.renderOffline(document.getElementById('export-format').value, parseInt(document.getElementById('export-fps').value, 10), durationMs, (progress) => {
                overlay.innerHTML = `<div class="w-3 h-3 bg-white rounded-full animate-pulse"></div> Rendering: ${progress.current} / ${progress.total}`;
            });
            setUI(false);
            overlay.innerHTML = `<div class="w-3 h-3 bg-white rounded-full animate-pulse"></div> Processing Media...`;
        };
    </script>
</body>
</html>
