<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoughFace LipSync Animator</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        hand: ['Caveat', 'cursive'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            500: '#3b82f6', // Blue
                            600: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Rough.js -->
    <script src="https://unpkg.com/roughjs@4.5.2/bundled/rough.js"></script>

    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #475569;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Canvas paper pattern */
        #canvas-wrapper {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(#e2e8f0 1px, transparent 1px),
                linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .dark #canvas-wrapper {
            background-color: #0f172a;
            background-image: 
                linear-gradient(#1e293b 1px, transparent 1px),
                linear-gradient(90deg, #1e293b 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 sm:px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-2">
            <div class="bg-brand-500 text-white p-1.5 rounded-lg shadow-sm">
                <i class="ph-bold ph-pencil-simple text-2xl"></i>
            </div>
            <h1 class="text-2xl font-hand font-bold tracking-tight text-gray-800 dark:text-gray-100 mt-1">RoughFace LipSync</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2.5 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                <i class="ph-fill ph-moon text-xl dark:hidden"></i>
                <i class="ph-fill ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>
    </header>

    <!-- MAIN APP AREA -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Recording Overlay -->
        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-500 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-lg z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            Recording Animation...
        </div>

        <!-- TOOLBAR / SIDEBAR -->
        <aside class="w-full md:w-[420px] bg-white dark:bg-gray-800 border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-700 p-4 md:p-5 flex flex-col gap-5 overflow-y-auto z-10 flex-shrink-0 h-[50vh] md:h-full">
            
            <!-- Script Editor -->
            <div class="flex flex-col gap-2 flex-shrink-0">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Dialogue Script</h2>
                    <button id="load-sample" class="text-xs font-medium text-brand-500 hover:text-brand-600 transition">Load Sample</button>
                </div>
                <textarea id="script-input" class="w-full h-24 p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-sm font-mono focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none resize-none" spellcheck="false">Hey! I am a rough sketch. Watch my mouth animate without a tongue!</textarea>
                
                <!-- Spoken Word Preview -->
                <div class="mt-1 bg-gray-100 dark:bg-gray-700 rounded p-2 flex items-center gap-2 overflow-hidden">
                    <i class="ph-fill ph-speaker-high text-gray-400"></i>
                    <span id="current-word" class="text-sm font-mono text-gray-800 dark:text-gray-200 truncate">Ready to speak...</span>
                </div>
            </div>

            <!-- Appearance Settings -->
            <div class="flex flex-col gap-4 flex-shrink-0">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Sketch Appearance</h2>
                
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300 truncate">Canvas BG</label>
                        <div class="relative w-full h-8 rounded overflow-hidden border border-gray-300 dark:border-gray-600">
                            <input type="color" id="bg-color" value="#fef08a" class="absolute -top-2 -left-2 w-20 h-20 cursor-pointer">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300 truncate">Face Fill</label>
                        <div class="relative w-full h-8 rounded overflow-hidden border border-gray-300 dark:border-gray-600">
                            <input type="color" id="face-color" value="#ffffff" class="absolute -top-2 -left-2 w-20 h-20 cursor-pointer">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300 truncate">Ink Stroke</label>
                        <div class="relative w-full h-8 rounded overflow-hidden border border-gray-300 dark:border-gray-600">
                            <input type="color" id="ink-color" value="#0f172a" class="absolute -top-2 -left-2 w-20 h-20 cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-2">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-[11px] font-medium text-gray-700 dark:text-gray-300">Roughness</label>
                            <span id="rough-val" class="text-[10px] text-gray-500 font-mono">2.0</span>
                        </div>
                        <input type="range" id="roughness-slider" min="0" max="5" step="0.5" value="2.0" class="w-full mt-2">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-[11px] font-medium text-gray-700 dark:text-gray-300">Speech Speed</label>
                            <span id="speed-val" class="text-[10px] text-gray-500 font-mono">100ms</span>
                        </div>
                        <input type="range" id="speech-speed" min="40" max="250" step="10" value="100" class="w-full mt-2">
                    </div>
                </div>
                
                <div class="flex items-center justify-between mt-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="audio-preview" checked class="w-4 h-4 text-brand-500 rounded border-gray-300 focus:ring-brand-500">
                        <span class="text-[11px] font-medium text-gray-700 dark:text-gray-300">Audio Preview (TTS)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="boil-anim" checked class="w-4 h-4 text-brand-500 rounded border-gray-300 focus:ring-brand-500">
                        <span class="text-[11px] font-medium text-gray-700 dark:text-gray-300" title="Constantly redrawing rough lines">"Boiling" Lines</span>
                    </label>
                </div>
            </div>

            <!-- Viseme Reference Guide -->
            <div class="flex flex-col gap-2 flex-1 mt-2">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Tongueless Visemes</h2>
                <div class="grid grid-cols-4 gap-2 text-center text-[10px] font-mono text-gray-600 dark:text-gray-400 overflow-y-auto">
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="REST"><b class="block text-gray-900 dark:text-white pointer-events-none">REST</b>Neutral</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="A"><b class="block text-gray-900 dark:text-white pointer-events-none">A_I</b>Wide</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="E"><b class="block text-gray-900 dark:text-white pointer-events-none">E_Y</b>Grin</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="O"><b class="block text-gray-900 dark:text-white pointer-events-none">O</b>Round</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="U"><b class="block text-gray-900 dark:text-white pointer-events-none">U_W</b>Pucker</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="M"><b class="block text-gray-900 dark:text-white pointer-events-none">M_B_P</b>Closed</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="F"><b class="block text-gray-900 dark:text-white pointer-events-none">F_V</b>Bite</button>
                    <button class="viseme-test-btn bg-gray-100 dark:bg-gray-700 rounded py-2 hover:bg-brand-100 dark:hover:bg-brand-900 transition" data-v="L"><b class="block text-gray-900 dark:text-white pointer-events-none">L_N</b>Open</button>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mt-auto pt-4 pb-6 md:pb-0">
                <button id="btn-animate" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-gray-200 text-gray-900 dark:bg-gray-700 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg font-bold transition disabled:opacity-50">
                    <i class="ph-fill ph-play-circle text-xl"></i> Play Lip Sync
                </button>
                <button id="btn-record" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-brand-500 hover:bg-brand-600 text-white rounded-lg font-bold transition shadow-md disabled:opacity-50 group">
                    <i class="ph-fill ph-video-camera text-xl text-blue-200 group-hover:text-white transition"></i> Record & Export Video
                </button>
            </div>
        </aside>

        <!-- CANVAS AREA -->
        <section id="canvas-wrapper" class="flex-1 relative overflow-hidden flex items-center justify-center p-4 sm:p-8">
            <canvas id="export-canvas" class="w-full max-w-[700px] aspect-square shadow-2xl rounded-2xl bg-white"></canvas>
        </section>

    </main>

    <script>
        // --- App State ---
        const state = {
            currentViseme: 'REST',
            colors: {
                bg: '#fef08a',
                face: '#ffffff',
                ink: '#0f172a'
            },
            roughness: 2.0,
            speedMs: 100, // ms per character
            audioPreview: true,
            boilLines: true,
            isAnimatingLips: false,
            isRecording: false,
            timeline: []
        };

        // --- Custom Phoneme Dictionary ---
        const phonemeMap = {
            'a': 'A', 'i': 'A',
            'e': 'E', 'y': 'E',
            'o': 'O',
            'u': 'U', 'w': 'U', 'q': 'U',
            'b': 'M', 'm': 'M', 'p': 'M',
            'f': 'F', 'v': 'F',
            'l': 'L', 'n': 'L',
            'c': 'E', 'd': 'E', 'g': 'E', 'k': 'E', 's': 'E', 't': 'E', 'x': 'E', 'z': 'E', 'h': 'E', 'j': 'E',
            ' ': 'REST', '.': 'REST', ',': 'REST', '!': 'REST', '?': 'REST'
        };

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let rc; // RoughJS instance
        
        // High-res square canvas
        canvas.width = 1000;
        canvas.height = 1000;

        // DOM Elements
        const scriptInput = document.getElementById('script-input');
        const speedSlider = document.getElementById('speech-speed');
        const roughnessSlider = document.getElementById('roughness-slider');
        const audioPreviewCheck = document.getElementById('audio-preview');
        const boilCheck = document.getElementById('boil-anim');
        
        const colorBg = document.getElementById('bg-color');
        const colorFace = document.getElementById('face-color');
        const colorInk = document.getElementById('ink-color');
        const currentWordDisplay = document.getElementById('current-word');
        const canvasWrapper = document.getElementById('canvas-wrapper');

        // --- Initialize RoughJS ---
        function initCanvas() {
            rc = rough.canvas(canvas);
        }
        initCanvas();

        // --- Text Parser Engine ---
        function generateTimeline(text) {
            const timeline = [];
            let currentTime = 0;
            const chars = text.toLowerCase().split('');

            for (let i = 0; i < chars.length; i++) {
                const char = chars[i];
                let viseme = phonemeMap[char] || 'REST';
                
                let duration = state.speedMs;
                if (char === ' ') duration = state.speedMs * 1.5;
                if (['.', ',', '!', '?'].includes(char)) duration = state.speedMs * 4;

                timeline.push({
                    char: char,
                    viseme: viseme,
                    duration: duration,
                    startTime: currentTime
                });

                currentTime += duration;
            }

            timeline.push({ char: '', viseme: 'REST', duration: 500, startTime: currentTime });
            return { timeline, totalDuration: currentTime + 500 };
        }

        // --- Rough.js Drawing Engine ---
        function drawBackground() {
            ctx.fillStyle = state.colors.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawCharacter(viseme) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2 - 20; // Shifted up slightly
            
            const rOpts = {
                stroke: state.colors.ink,
                strokeWidth: 6,
                roughness: state.roughness,
                bowing: 1,
            };

            const fillOpts = {
                ...rOpts,
                fill: state.colors.face,
                fillStyle: 'solid' // We want the face to be opaque so it hides the background
            };

            const darkFillOpts = {
                ...rOpts,
                fill: state.colors.ink,
                fillStyle: 'solid'
            };

            // 1. Draw Face (Ellipse)
            rc.ellipse(cx, cy, 600, 700, fillOpts);

            // 2. Draw Eyes (Simple dots)
            rc.circle(cx - 120, cy - 80, 40, darkFillOpts);
            rc.circle(cx + 120, cy - 80, 40, darkFillOpts);

            // 3. Draw Mouth (Tongueless)
            const mx = cx;
            const my = cy + 120; // Center of mouth

            switch (viseme) {
                case 'REST':
                    rc.curve([[mx - 80, my], [mx, my + 10], [mx + 80, my]], rOpts);
                    break;
                
                case 'M': // Firmly closed
                    rOpts.strokeWidth = 8;
                    rc.curve([[mx - 100, my], [mx, my], [mx + 100, my]], rOpts);
                    break;

                case 'A': // Wide Open
                    rc.ellipse(mx, my + 40, 200, 220, darkFillOpts);
                    break;

                case 'E': // Grin (wide, slightly open)
                    rc.ellipse(mx, my + 20, 260, 60, darkFillOpts);
                    break;

                case 'O': // Round
                    rc.ellipse(mx, my + 40, 120, 160, darkFillOpts);
                    break;

                case 'U': // Tight Pucker
                    rc.circle(mx, my + 30, 70, darkFillOpts);
                    // Wrinkles
                    rc.curve([[mx-60, my+30], [mx-80, my+25]], rOpts);
                    rc.curve([[mx+60, my+30], [mx+80, my+25]], rOpts);
                    break;

                case 'F': // Bite (Lower lip tucked, represented by upper curve over shape)
                    rc.ellipse(mx, my + 20, 160, 80, darkFillOpts);
                    break;

                case 'L': // Open wide (no tongue drawn)
                    rc.ellipse(mx, my + 40, 180, 120, darkFillOpts);
                    break;
            }
        }

        // --- Render Loop (with Frame Rate Limiter for "Boiling") ---
        let lastDrawTime = 0;
        const TARGET_FPS = 12; // 12 FPS gives a great classic animation "boil" look

        function renderFrame(forceDraw = false) {
            const currentTime = performance.now();
            
            // Only redraw if we are boiling AND enough time has passed, OR if forced (viseme changed)
            if (forceDraw || (state.boilLines && (currentTime - lastDrawTime > 1000 / TARGET_FPS))) {
                drawBackground();
                drawCharacter(state.currentViseme);
                lastDrawTime = currentTime;
            }

            // Keep the loop alive if we are idling and boiling is on
            if (!state.isAnimatingLips && state.boilLines) {
                requestAnimationFrame(() => renderFrame(false));
            }
        }

        // --- UI Interactions ---
        function updateStyles() {
            state.colors.bg = colorBg.value;
            state.colors.face = colorFace.value;
            state.colors.ink = colorInk.value;
            
            // Update wrapper background preview
            canvasWrapper.style.backgroundColor = state.colors.bg;
            
            renderFrame(true); // Force redraw
        }

        const inputs = [colorBg, colorFace, colorInk];
        inputs.forEach(el => el.addEventListener('input', updateStyles));

        speedSlider.addEventListener('input', (e) => {
            state.speedMs = parseInt(e.target.value);
            document.getElementById('speed-val').textContent = state.speedMs + 'ms';
        });

        roughnessSlider.addEventListener('input', (e) => {
            state.roughness = parseFloat(e.target.value);
            document.getElementById('rough-val').textContent = state.roughness.toFixed(1);
            renderFrame(true);
        });

        audioPreviewCheck.addEventListener('change', (e) => { state.audioPreview = e.target.checked; });
        boilCheck.addEventListener('change', (e) => { 
            state.boilLines = e.target.checked; 
            if (state.boilLines) renderFrame(false); // restart loop
        });

        document.querySelectorAll('.viseme-test-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (state.isAnimatingLips) return;
                state.currentViseme = e.target.getAttribute('data-v');
                currentWordDisplay.textContent = `Testing: ${state.currentViseme}`;
                renderFrame(true);
            });
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        document.getElementById('load-sample').addEventListener('click', () => {
            scriptInput.value = "Hey there! I'm a sketchy guy. Watch my mouth move!";
        });

        // Initialize & start continuous loop
        updateStyles();
        requestAnimationFrame(() => renderFrame(true));

        // --- Audio & Recording Engine ---
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const overlay = document.getElementById('recording-overlay');

        async function runLipSync(recordCallback = null) {
            if (state.isAnimatingLips) return;
            state.isAnimatingLips = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            const text = scriptInput.value.trim();
            if (!text) {
                state.isAnimatingLips = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                return;
            }

            const { timeline, totalDuration } = generateTimeline(text);
            
            if (state.audioPreview && !recordCallback) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                
                const estimatedNormalDuration = text.length * 75;
                const calculatedRate = estimatedNormalDuration / totalDuration;
                
                utterance.rate = Math.max(0.1, Math.min(10, calculatedRate)); 
                window.speechSynthesis.speak(utterance);
            }
            
            if (recordCallback) await recordCallback();

            const startTime = performance.now();

            return new Promise((resolve) => {
                function loop(currentTime) {
                    const elapsed = currentTime - startTime;

                    let activeFrame = timeline[timeline.length - 1]; 
                    for (let i = 0; i < timeline.length; i++) {
                        if (elapsed >= timeline[i].startTime && elapsed < timeline[i].startTime + timeline[i].duration) {
                            activeFrame = timeline[i];
                            break;
                        }
                    }

                    if (state.currentViseme !== activeFrame.viseme) {
                        state.currentViseme = activeFrame.viseme;
                        renderFrame(true); // Force redraw on viseme change to ensure immediate sync
                        
                        if (activeFrame.char) {
                            currentWordDisplay.innerHTML = `<span class="text-brand-500 font-bold text-lg mr-2">${activeFrame.char.toUpperCase()}</span> -> [${activeFrame.viseme}]`;
                        } else {
                            currentWordDisplay.textContent = "Resting...";
                        }
                    } else {
                        // Standard loop handles the boiling if no viseme change
                        renderFrame(false); 
                    }

                    if (elapsed < totalDuration) {
                        requestAnimationFrame(loop);
                    } else {
                        state.currentViseme = 'REST';
                        currentWordDisplay.textContent = "Finished.";
                        state.isAnimatingLips = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        renderFrame(true);
                        resolve();
                    }
                }
                requestAnimationFrame(loop);
            });
        }

        btnAnimate.addEventListener('click', () => runLipSync());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimatingLips || state.isRecording) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                // Ensure smooth 60fps capture, even if internal drawing is 12fps
                const stream = canvas.captureStream(60);
                
                let options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm;codecs=vp8' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' };
                    }
                }

                options.videoBitsPerSecond = 5000000;

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `roughface-lipsync.webm`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                };

                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');

                state.currentViseme = 'REST';
                renderFrame(true);
                
                await new Promise(r => setTimeout(r, 500)); 
                mediaRecorder.start();
                
                await runLipSync();

                setTimeout(() => {
                    mediaRecorder.stop();
                }, 1000);

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                overlay.classList.remove('translate-y-4');
                overlay.classList.add('-translate-y-20');
                state.isAnimatingLips = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
            }
        });

    </script>
</body>
</html>
