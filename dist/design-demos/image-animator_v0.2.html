<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinematic Image Animator - Slideshow Edition</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            500: '#eab308', // Yellow/Gold
                            600: '#ca8a04',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #eab308;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #475569;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Canvas background pattern */
        #canvas-wrapper {
            background-color: #0f172a;
            background-image: 
                radial-gradient(#1e293b 1px, transparent 1px),
                radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 sm:px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-2">
            <div class="bg-brand-500 text-white p-1.5 rounded-lg shadow-sm">
                <i class="ph-bold ph-projector-screen-chart text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-800 dark:text-gray-100 mt-0.5">Cinematic Animator</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2.5 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                <i class="ph-fill ph-moon text-xl dark:hidden"></i>
                <i class="ph-fill ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>
    </header>

    <!-- MAIN APP AREA -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Recording Overlay -->
        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-500 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-lg z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            Recording Animation...
        </div>

        <!-- TOOLBAR / SIDEBAR -->
        <aside class="w-full md:w-[420px] bg-white dark:bg-gray-800 border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-700 p-4 md:p-5 flex flex-col gap-6 overflow-y-auto z-10 flex-shrink-0 h-[50vh] md:h-full">
            
            <!-- Quick Templates -->
            <div class="flex flex-col gap-3 flex-shrink-0">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Quick Templates</h2>
                <div class="grid grid-cols-3 gap-2">
                    <button class="template-btn py-2 bg-gray-100 dark:bg-gray-700 hover:bg-brand-50 hover:text-brand-600 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition flex flex-col items-center justify-center gap-1" data-template="vintage">
                        <i class="ph-fill ph-camera-rotate text-lg"></i> Vintage
                    </button>
                    <button class="template-btn py-2 bg-gray-100 dark:bg-gray-700 hover:bg-brand-50 hover:text-brand-600 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition flex flex-col items-center justify-center gap-1" data-template="modern">
                        <i class="ph-fill ph-cpu text-lg"></i> Modern
                    </button>
                    <button class="template-btn py-2 bg-gray-100 dark:bg-gray-700 hover:bg-brand-50 hover:text-brand-600 dark:hover:bg-gray-600 rounded text-[11px] font-bold transition flex flex-col items-center justify-center gap-1" data-template="history">
                        <i class="ph-fill ph-bank text-lg"></i> History
                    </button>
                </div>
            </div>

            <!-- Image Source Section -->
            <div class="flex flex-col gap-3 flex-shrink-0">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Add Images</h2>
                
                <!-- URL Input -->
                <div class="flex items-center gap-2">
                    <input type="text" id="image-url" placeholder="Paste Image URL (comma separated)" class="flex-1 p-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-xs outline-none focus:ring-2 focus:ring-brand-500 transition">
                    <button id="btn-load-url" class="px-3 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg text-xs font-bold transition">Add</button>
                </div>
                
                <div class="flex items-center justify-center gap-4 text-[10px] text-gray-400 font-bold">
                    <span class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></span>
                    OR
                    <span class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></span>
                </div>

                <!-- File Upload -->
                <div class="relative group">
                    <input type="file" id="image-upload" accept="image/*" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    <div class="flex flex-col items-center justify-center py-4 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-900 group-hover:bg-gray-100 dark:group-hover:bg-gray-800 transition">
                        <i class="ph ph-upload-simple text-2xl text-gray-400 mb-1"></i>
                        <p class="text-xs font-medium text-gray-600 dark:text-gray-300">Click or Drag Multiple Images</p>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div id="loading-indicator" class="hidden items-center justify-center gap-2 text-brand-500 font-medium text-xs mt-1">
                    <i class="ph-bold ph-spinner-gap animate-spin text-sm"></i> Loading into memory...
                </div>
            </div>

            <!-- Image Queue -->
            <div class="flex flex-col gap-2 flex-shrink-0">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Timeline Queue</h2>
                    <button id="btn-clear-queue" class="text-[10px] font-bold text-red-500 hover:underline">Clear All</button>
                </div>
                <div id="image-queue" class="flex gap-2 overflow-x-auto pb-2 h-20 items-center">
                    <!-- Thumbnails injected here -->
                    <span class="text-xs text-gray-500 italic px-2">Queue is empty.</span>
                </div>
            </div>

            <!-- Animation Controls -->
            <div class="flex flex-col gap-4 flex-shrink-0 mt-2">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Cinematic Motion</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-[11px] font-medium text-gray-700 dark:text-gray-300">Time per Image</label>
                            <span id="duration-val" class="text-[10px] text-gray-500 font-mono">4.0s</span>
                        </div>
                        <input type="range" id="slide-duration" min="2" max="10" step="0.5" value="4.0" class="w-full mt-1">
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium mb-1 text-gray-700 dark:text-gray-300">Slide Transition</label>
                        <select id="anim-transition" class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-xs font-semibold outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="vox">Vox Slide-Up Blur</option>
                            <option value="fade">Smooth Crossfade</option>
                            <option value="none">Hard Cut</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Post-Processing -->
            <div class="flex flex-col gap-3 flex-shrink-0 mt-2">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Editorial Polish</h2>
                <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 cursor-pointer hover:border-brand-500 transition">
                    <input type="checkbox" id="toggle-vignette" checked class="w-4 h-4 text-brand-500 rounded border-gray-300 focus:ring-brand-500">
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200">Add Vignette <span class="text-[10px] text-gray-400 font-normal block">Darkens edges to draw focus</span></span>
                </label>
                <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 cursor-pointer hover:border-brand-500 transition">
                    <input type="checkbox" id="toggle-bars" class="w-4 h-4 text-brand-500 rounded border-gray-300 focus:ring-brand-500">
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200">Cinematic Bars <span class="text-[10px] text-gray-400 font-normal block">Adds 2.35:1 letterboxing</span></span>
                </label>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mt-auto pt-4 pb-6 md:pb-0">
                <button id="btn-animate" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-gray-200 text-gray-900 dark:bg-gray-700 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg font-bold transition disabled:opacity-50">
                    <i class="ph-fill ph-play-circle text-xl"></i> Preview Slideshow
                </button>
                <button id="btn-record" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-brand-500 hover:bg-brand-600 text-white rounded-lg font-bold transition shadow-md disabled:opacity-50 group">
                    <i class="ph-fill ph-video-camera text-xl text-yellow-100 group-hover:text-white transition"></i> Record & Export Video
                </button>
            </div>
        </aside>

        <!-- CANVAS AREA -->
        <section id="canvas-wrapper" class="flex-1 relative overflow-hidden flex items-center justify-center p-4 sm:p-8">
            <!-- 16:9 Canvas. Rendered at 1920x1080 for HD exports -->
            <canvas id="export-canvas" class="w-full max-w-[1200px] aspect-video shadow-2xl rounded-lg bg-black"></canvas>
            
            <div id="no-image-prompt" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 pointer-events-none transition-opacity">
                <i class="ph ph-images text-6xl mb-3 opacity-50"></i>
                <p class="font-medium text-lg">Load templates or add images to begin.</p>
            </div>
        </section>

    </main>

    <script>
        // --- App State ---
        const state = {
            images: [], // Array of { img: HTMLImageElement, motion: string, url: string }
            slideDuration: 4000, // ms per slide
            transitionType: 'vox', // 'vox', 'fade', 'none'
            transitionDuration: 800, // ms for the overlap transition
            showVignette: true,
            showBars: false,
            isAnimating: false,
            isRecording: false
        };

        const motionStyles = ['zoom-in', 'zoom-out', 'pan-right', 'pan-left', 'pan-down', 'pan-up'];

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // 1080p Resolution for high quality exports
        canvas.width = 1920;
        canvas.height = 1080;

        // DOM Elements
        const urlInput = document.getElementById('image-url');
        const btnLoadUrl = document.getElementById('btn-load-url');
        const fileUpload = document.getElementById('image-upload');
        const loadingIndicator = document.getElementById('loading-indicator');
        const noImagePrompt = document.getElementById('no-image-prompt');
        const imageQueueUI = document.getElementById('image-queue');
        const btnClearQueue = document.getElementById('btn-clear-queue');
        
        const durationSlider = document.getElementById('slide-duration');
        const transitionSelect = document.getElementById('anim-transition');
        const vignetteCheck = document.getElementById('toggle-vignette');
        const barsCheck = document.getElementById('toggle-bars');
        
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const recordingOverlay = document.getElementById('recording-overlay');

        // --- Templates ---
        const templates = {
            vintage: [
                'https://images.unsplash.com/photo-1501625078519-798c818816f4?auto=format&fit=crop&w=1280&q=80',
                'https://images.unsplash.com/photo-1498661694102-0a3793edbe74?auto=format&fit=crop&w=1280&q=80',
                'https://images.unsplash.com/photo-1510172951991-856a654063f9?auto=format&fit=crop&w=1280&q=80'
            ],
            modern: [
                'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1280&q=80',
                'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1280&q=80',
                'https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=1280&q=80'
            ],
            history: [
                'https://images.unsplash.com/photo-1461360228754-6e81c478b882?auto=format&fit=crop&w=1280&q=80',
                'https://images.unsplash.com/photo-1524584284699-2321dc1dbd15?auto=format&fit=crop&w=1280&q=80',
                'https://images.unsplash.com/photo-1552820728-8b83bb6b773f?auto=format&fit=crop&w=1280&q=80'
            ]
        };

        // --- Image Pre-loading Engine ---
        async function loadSingleImage(source) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error("Failed to load image"));
                img.src = source;
            });
        }

        async function processSources(sources) {
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');
            
            for (const src of sources) {
                try {
                    const img = await loadSingleImage(src);
                    // Assign a random cinematic motion
                    const randomMotion = motionStyles[Math.floor(Math.random() * motionStyles.length)];
                    state.images.push({ img, motion: randomMotion, url: src });
                } catch(e) {
                    console.warn(e);
                }
            }

            loadingIndicator.classList.add('hidden');
            loadingIndicator.classList.remove('flex');
            updateQueueUI();
            
            if (state.images.length > 0) {
                noImagePrompt.style.opacity = '0';
                renderFrame(0); // Render preview of first frame
            } else {
                noImagePrompt.style.opacity = '1';
            }
        }

        function updateQueueUI() {
            if (state.images.length === 0) {
                imageQueueUI.innerHTML = '<span class="text-xs text-gray-500 italic px-2">Queue is empty.</span>';
                return;
            }

            imageQueueUI.innerHTML = state.images.map((item, index) => `
                <div class="relative w-16 h-12 flex-shrink-0 rounded overflow-hidden border border-gray-300 dark:border-gray-600 group">
                    <img src="${item.img.src}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/60 hidden group-hover:flex items-center justify-center">
                        <button onclick="removeImage(${index})" class="text-white hover:text-red-400"><i class="ph-bold ph-x text-lg"></i></button>
                    </div>
                </div>
            `).join('');
        }

        window.removeImage = (index) => {
            state.images.splice(index, 1);
            updateQueueUI();
            if (state.images.length === 0) {
                noImagePrompt.style.opacity = '1';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                renderFrame(0);
            }
        };

        btnClearQueue.addEventListener('click', () => {
            state.images = [];
            updateQueueUI();
            noImagePrompt.style.opacity = '1';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // --- Event Listeners for Uploads ---
        fileUpload.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            const sources = [];
            
            for (const file of files) {
                const url = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
                sources.push(url);
            }
            await processSources(sources);
            fileUpload.value = ''; // reset
        });

        btnLoadUrl.addEventListener('click', async () => {
            const val = urlInput.value.trim();
            if (val) {
                const urls = val.split(',').map(s => s.trim()).filter(s => s);
                await processSources(urls);
                urlInput.value = '';
            }
        });

        urlInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                btnLoadUrl.click();
            }
        });

        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const key = btn.getAttribute('data-template');
                if (templates[key]) {
                    await processSources(templates[key]);
                }
            });
        });

        // --- Cinematic Math Engine ---
        function getCameraRect(img, progress, motionStyle) {
            const targetRatio = canvas.width / canvas.height;
            const imgW = img.width;
            const imgH = img.height;

            let baseW = imgW;
            let baseH = imgH;
            
            if (imgW / imgH > targetRatio) {
                baseW = imgH * targetRatio;
            } else {
                baseH = imgW / targetRatio;
            }

            const cx = imgW / 2;
            const cy = imgH / 2;

            let s1, s2;
            const zoomFactor = 0.75; 
            const zw = baseW * zoomFactor;
            const zh = baseH * zoomFactor;

            switch(motionStyle) {
                case 'zoom-in':
                    s1 = { w: baseW, h: baseH, x: cx - baseW/2, y: cy - baseH/2 };
                    s2 = { w: zw, h: zh, x: cx - zw/2, y: cy - zh/2 };
                    break;
                case 'zoom-out':
                    s1 = { w: zw, h: zh, x: cx - zw/2, y: cy - zh/2 };
                    s2 = { w: baseW, h: baseH, x: cx - baseW/2, y: cy - baseH/2 };
                    break;
                case 'pan-right':
                    s1 = { w: zw, h: zh, x: 0, y: cy - zh/2 };
                    s2 = { w: zw, h: zh, x: imgW - zw, y: cy - zh/2 };
                    break;
                case 'pan-left':
                    s1 = { w: zw, h: zh, x: imgW - zw, y: cy - zh/2 };
                    s2 = { w: zw, h: zh, x: 0, y: cy - zh/2 };
                    break;
                case 'pan-down':
                    s1 = { w: zw, h: zh, x: cx - zw/2, y: 0 };
                    s2 = { w: zw, h: zh, x: cx - zw/2, y: imgH - zh };
                    break;
                case 'pan-up':
                    s1 = { w: zw, h: zh, x: cx - zw/2, y: imgH - zh };
                    s2 = { w: zw, h: zh, x: cx - zw/2, y: 0 };
                    break;
                default:
                    s1 = { w: baseW, h: baseH, x: cx - baseW/2, y: cy - baseH/2 };
                    s2 = { w: zw, h: zh, x: cx - zw/2, y: cy - zh/2 };
            }

            // Sine easing for Ken Burns
            const ep = -(Math.cos(Math.PI * progress) - 1) / 2;
            
            return {
                x: s1.x + (s2.x - s1.x) * ep,
                y: s1.y + (s2.y - s1.y) * ep,
                w: s1.w + (s2.w - s1.w) * ep,
                h: s1.h + (s2.h - s1.h) * ep
            };
        }

        // Draw a single image layer with given transformations
        function drawImageLayer(imageObj, progress, opacity, yOffset, blurAmount) {
            if (!imageObj || !imageObj.img) return; // Prevent crashes if image is missing

            ctx.save();
            ctx.globalAlpha = opacity;
            
            // Note: ctx.filter can be performance heavy, but fine for video export rendering
            if (blurAmount > 0.1) {
                ctx.filter = `blur(${blurAmount}px)`;
            }

            ctx.translate(0, yOffset);

            const rect = getCameraRect(imageObj.img, progress, imageObj.motion);
            ctx.drawImage(
                imageObj.img,
                rect.x, rect.y, rect.w, rect.h,
                0, 0, canvas.width, canvas.height
            );

            ctx.restore();
        }

        // --- Core Rendering Function ---
        // Elapsed represents total elapsed time in MS
        function renderFrame(elapsed) {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state.images.length === 0) return;

            const sd = state.slideDuration;
            const td = state.transitionDuration;
            
            // Safe current index calculation to prevent out-of-bounds array access
            let currentIndex = Math.floor(elapsed / sd);
            currentIndex = Math.max(0, Math.min(state.images.length - 1, currentIndex));

            const slideElapsed = Math.max(0, elapsed % sd);
            // The Ken Burns effect maps the slide's entire duration
            const slideProgress = Math.min(1.0, slideElapsed / sd);

            // Determine if we are in a transition window
            // A transition happens at the beginning of a slide, EXCEPT the very first slide (index 0) starts clean or fades from black
            const isTransitioning = slideElapsed < td;

            // DRAW PREVIOUS SLIDE (if transitioning and there is a previous slide)
            if (isTransitioning && currentIndex > 0) {
                const prevIndex = currentIndex - 1;
                if (state.images[prevIndex]) {
                    // The previous slide technically overshoots its time slightly during the overlap
                    const prevOvershootProgress = Math.min(1.0, (sd + slideElapsed) / sd);
                    drawImageLayer(state.images[prevIndex], prevOvershootProgress, 1.0, 0, 0);
                }
            }

            // DRAW CURRENT SLIDE
            let opacity = 1.0;
            let yOffset = 0;
            let blur = 0;

            if (isTransitioning) {
                const tProgress = slideElapsed / td; // 0 to 1 over transition window
                
                if (state.transitionType === 'vox') {
                    // Vox Style: Slide up from bottom, blur in, fade in
                    const ease = 1 - Math.pow(1 - tProgress, 3); // easeOutCubic
                    
                    if (currentIndex > 0) {
                        yOffset = (canvas.height * 0.15) * (1 - ease); // start 15% down
                        blur = 30 * (1 - ease);
                        opacity = ease;
                    } else {
                        // First slide just fades in
                        opacity = ease;
                    }
                } 
                else if (state.transitionType === 'fade') {
                    opacity = tProgress;
                }
                // 'none' ignores this and stays at opacity 1.0
            }

            if (state.images[currentIndex]) {
                drawImageLayer(state.images[currentIndex], slideProgress, opacity, yOffset, blur);
            }

            // POST PROCESSING (Applies over everything)
            if (state.showVignette) {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const gradient = ctx.createRadialGradient(cx, cy, canvas.height * 0.4, cx, cy, canvas.width * 0.7);
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.7)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (state.showBars) {
                const barHeight = (canvas.height - (canvas.width / 2.35)) / 2;
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, barHeight); 
                ctx.fillRect(0, canvas.height - barHeight, canvas.width, barHeight); 
            }
        }

        // --- UI Interactions & State Sync ---
        function updateState() {
            state.transitionType = transitionSelect.value;
            state.showVignette = vignetteCheck.checked;
            state.showBars = barsCheck.checked;
            renderFrame(0);
        }

        transitionSelect.addEventListener('change', updateState);
        vignetteCheck.addEventListener('change', updateState);
        barsCheck.addEventListener('change', updateState);

        durationSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.slideDuration = val * 1000;
            document.getElementById('duration-val').textContent = val.toFixed(1) + 's';
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // --- Animation & Recording Engine ---
        async function runAnimation(recordCallback = null) {
            if (state.isAnimating || state.images.length === 0) return;
            state.isAnimating = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            updateState();
            
            if (recordCallback) await recordCallback();

            const startTime = performance.now();
            const totalAnimationTime = state.images.length * state.slideDuration;

            return new Promise((resolve) => {
                function loop(currentTime) {
                    const elapsed = Math.max(0, currentTime - startTime); // Prevent negative elapsed time
                    
                    renderFrame(elapsed);

                    if (elapsed < totalAnimationTime) {
                        requestAnimationFrame(loop);
                    } else {
                        state.isAnimating = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        resolve();
                    }
                }
                requestAnimationFrame(loop);
            });
        }

        btnAnimate.addEventListener('click', () => runAnimation());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimating || state.isRecording || state.images.length === 0) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                // High quality stream capture at 60fps
                const stream = canvas.captureStream(60);
                
                let options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm;codecs=vp8' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' };
                    }
                }

                options.videoBitsPerSecond = 10000000; 

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `cinematic-slideshow.webm`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    recordingOverlay.classList.remove('translate-y-4');
                    recordingOverlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                };

                recordingOverlay.classList.remove('-translate-y-20');
                recordingOverlay.classList.add('translate-y-4');

                renderFrame(0);
                
                await new Promise(r => setTimeout(r, 500)); 
                mediaRecorder.start();
                
                await runAnimation();

                setTimeout(() => {
                    mediaRecorder.stop();
                }, 1000);

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                recordingOverlay.classList.remove('translate-y-4');
                recordingOverlay.classList.add('-translate-y-20');
                state.isAnimating = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                renderFrame(0);
            }
        });

    </script>
</body>
