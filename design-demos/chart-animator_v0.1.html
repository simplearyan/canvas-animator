<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chart Animator - Smooth Line Chart Races</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            500: '#0ea5e9', // Cyan
                            600: '#0891b2',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        
        /* Custom ranges for toolbar */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #0ea5e9;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #475569;
        }

        /* Custom scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Canvas container background */
        #canvas-container {
            touch-action: none;
            background-color: #e2e8f0;
            background-image: 
                radial-gradient(#cbd5e1 1px, transparent 1px),
                radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        .dark #canvas-container {
            background-color: #020617;
            background-image: 
                radial-gradient(#0f172a 1px, transparent 1px),
                radial-gradient(#0f172a 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 sm:px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-2">
            <div class="bg-brand-500 text-white p-1.5 rounded-lg shadow-sm">
                <i class="ph-bold ph-chart-line-up text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-800 dark:text-gray-100 mt-0.5">Chart Animator</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2.5 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition" title="Toggle UI Theme">
                <i class="ph-fill ph-moon text-xl dark:hidden"></i>
                <i class="ph-fill ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>
    </header>

    <!-- MAIN APP AREA -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Recording Overlay -->
        <div id="recording-overlay" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-500 text-white px-5 py-2.5 rounded-full font-medium text-sm flex items-center gap-2 shadow-lg z-50 transition-transform duration-300 transform -translate-y-20">
            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            Recording Animation...
        </div>

        <!-- TOOLBAR / SIDEBAR -->
        <aside class="w-full md:w-[440px] bg-white dark:bg-gray-800 border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-700 p-4 md:p-5 flex flex-col gap-5 overflow-y-auto z-10 flex-shrink-0 h-[50vh] md:h-full">
            
            <!-- Data Editor -->
            <div class="flex flex-col gap-2 flex-1 min-h-[220px]">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Chart Data (CSV)</h2>
                    <button id="load-sample" class="text-xs font-medium text-brand-500 hover:text-brand-600 transition">Load Sample</button>
                </div>
                <p class="text-[11px] text-gray-500">First column is X-axis (time). Top row is labels.</p>
                <textarea id="data-input" class="w-full flex-1 p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-[12px] font-mono focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none resize-none whitespace-pre" spellcheck="false">
Year,TechCorp,GlobalNet,CloudSync,BioGen
2015,100,250,50,80
2016,150,260,90,110
2017,250,270,180,130
2018,400,280,300,160
2019,650,290,480,200
2020,950,280,750,250
2021,1400,290,1100,320
2022,1900,310,1600,450
2023,2600,330,2200,600
2024,3500,340,2900,850</textarea>
            </div>

            <!-- Appearance Settings -->
            <div class="flex flex-col gap-4 flex-shrink-0">
                <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400">Appearance & Animation</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Background Style</label>
                        <select id="bg-style" class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="dark">Deep Space (Dark)</option>
                            <option value="light">Clean Paper (Light)</option>
                            <option value="navy">Midnight Blue</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Value Format</label>
                        <select id="value-format" class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="number">Plain Number</option>
                            <option value="currency">$ Currency</option>
                            <option value="percent">% Percentage</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Duration</label>
                            <span id="duration-val" class="text-xs text-gray-500 font-mono">5.0s</span>
                        </div>
                        <input type="range" id="anim-duration" min="2" max="15" step="0.5" value="5.0" class="w-full mt-2">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Line Glow</label>
                            <span id="glow-val" class="text-xs text-gray-500 font-mono">High</span>
                        </div>
                        <input type="range" id="line-glow" min="0" max="30" step="5" value="15" class="w-full mt-2">
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="show-grid" checked class="w-4 h-4 text-brand-500 rounded border-gray-300 focus:ring-brand-500">
                    <label for="show-grid" class="text-sm font-medium text-gray-700 dark:text-gray-300">Show Grid Lines</label>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mt-auto pt-2 pb-6 md:pb-0">
                <button id="btn-animate" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-gray-200 text-gray-900 dark:bg-gray-700 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg font-bold transition disabled:opacity-50">
                    <i class="ph-fill ph-play-circle text-xl"></i> Preview Animation
                </button>
                <button id="btn-record" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-brand-500 hover:bg-brand-600 text-white rounded-lg font-bold transition shadow-md disabled:opacity-50 group">
                    <i class="ph-fill ph-video-camera text-xl text-cyan-200 group-hover:text-white transition"></i> Record & Export Video
                </button>
            </div>
        </aside>

        <!-- CANVAS AREA -->
        <section id="canvas-container" class="flex-1 relative overflow-hidden flex items-center justify-center p-4 sm:p-8">
            <!-- 16:9 1080p Canvas -->
            <canvas id="export-canvas" class="w-full max-w-[1200px] aspect-video shadow-2xl rounded-lg bg-black"></canvas>
        </section>

    </main>

    <script>
        // --- App State & Data ---
        const state = {
            data: [], // Array of rows: { xLabel: "2015", series: [100, 250, 50] }
            seriesNames: [],
            maxVal: 0,
            progress: 1.0,
            isAnimating: false,
            isRecording: false,
            duration: 5000,
            glow: 15,
            format: 'number',
            bgStyle: 'dark',
            showGrid: true
        };

        // Vibrant distinct colors for the chart lines
        const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#a855f7', '#ec4899', '#06b6d4', '#eab308'];

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // Fixed 1080p resolution for crisp rendering and exports
        canvas.width = 1920;
        canvas.height = 1080;

        const dataInput = document.getElementById('data-input');
        const durationSlider = document.getElementById('anim-duration');
        const glowSlider = document.getElementById('line-glow');
        const bgStyleSelect = document.getElementById('bg-style');
        const formatSelect = document.getElementById('value-format');
        const showGridCheck = document.getElementById('show-grid');

        // --- Data Parsing ---
        function parseCSV() {
            const raw = dataInput.value.trim();
            if (!raw) return;

            const lines = raw.split('\n').map(l => l.split(',').map(c => c.trim()));
            if (lines.length < 2) return;

            state.seriesNames = lines[0].slice(1);
            state.data = [];
            state.maxVal = 0;

            for (let i = 1; i < lines.length; i++) {
                const row = lines[i];
                if (row.length < 2) continue;
                
                const xLabel = row[0];
                const seriesData = [];
                
                for (let j = 1; j < row.length; j++) {
                    const val = parseFloat(row[j]) || 0;
                    seriesData.push(val);
                    if (val > state.maxVal) state.maxVal = val;
                }
                
                state.data.push({ xLabel, series: seriesData });
            }

            // Round maxVal up to a nice number for the Y-axis
            if (state.maxVal > 0) {
                const magnitude = Math.pow(10, Math.floor(Math.log10(state.maxVal)));
                state.maxVal = Math.ceil(state.maxVal / magnitude) * magnitude;
            } else {
                state.maxVal = 100;
            }
        }

        function formatValue(val) {
            const rounded = Math.round(val);
            if (state.format === 'currency') return '$' + rounded.toLocaleString();
            if (state.format === 'percent') return rounded.toLocaleString() + '%';
            return rounded.toLocaleString();
        }

        // --- Canvas Rendering Engine ---
        function renderFrame(progress) {
            // Theme configuration
            const isDark = state.bgStyle === 'dark' || state.bgStyle === 'navy';
            const bgColor = state.bgStyle === 'dark' ? '#0f172a' : (state.bgStyle === 'navy' ? '#0a192f' : '#f8fafc');
            const textColor = isDark ? '#f8fafc' : '#0f172a';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            const hugeTextColor = isDark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.03)';

            // 1. Clear & Draw Background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state.data.length === 0) return;

            // Layout definitions
            const padding = { top: 120, right: 350, bottom: 100, left: 150 };
            const graphWidth = canvas.width - padding.left - padding.right;
            const graphHeight = canvas.height - padding.top - padding.bottom;

            // Utilities to map data to canvas coordinates
            const numPoints = state.data.length;
            const getX = (index) => padding.left + (index / (numPoints - 1)) * graphWidth;
            const getY = (value) => padding.top + graphHeight - (value / state.maxVal) * graphHeight;

            // 2. Draw Grid & Axes
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.font = '500 24px Inter';
            ctx.fillStyle = textColor;

            // Y-Axis Grid Lines & Labels
            const ySteps = 5;
            for (let i = 0; i <= ySteps; i++) {
                const val = (state.maxVal / ySteps) * i;
                const y = getY(val);

                if (state.showGrid) {
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(padding.left + graphWidth, y);
                    ctx.strokeStyle = gridColor;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Y-axis label
                ctx.fillText(formatValue(val), padding.left - 20, y);
            }

            // X-Axis Base Line
            ctx.beginPath();
            ctx.moveTo(padding.left, padding.top + graphHeight);
            ctx.lineTo(padding.left + graphWidth, padding.top + graphHeight);
            ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 3. Current Progress Calculations
            // Ensure clamped progress prevents any out-of-bounds indexing bugs
            const clampedProgress = Math.max(0, Math.min(1, progress));
            const virtualIndex = clampedProgress * (numPoints - 1);
            const currentIndex = Math.max(0, Math.min(numPoints - 1, Math.floor(virtualIndex)));
            const fraction = Math.max(0, Math.min(1, virtualIndex - currentIndex));

            // 4. Huge Background Label (Current X-Axis Value)
            let currentXLabel = state.data[currentIndex].xLabel;
            if (fraction > 0.5 && currentIndex < numPoints - 1) {
                currentXLabel = state.data[currentIndex + 1].xLabel;
            }
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '800 400px Inter';
            ctx.fillStyle = hugeTextColor;
            ctx.fillText(currentXLabel, padding.left + graphWidth/2, padding.top + graphHeight/2);

            // 5. Draw the Chart Lines!
            // We draw lines from index 0 up to virtualIndex
            
            // To prevent glowing bleed-over and keep it clean, we iterate series
            for (let s = 0; s < state.seriesNames.length; s++) {
                const color = colors[s % colors.length];
                
                ctx.beginPath();
                ctx.moveTo(getX(0), getY(state.data[0].series[s]));

                // Draw completed segments
                for (let i = 1; i <= currentIndex; i++) {
                    ctx.lineTo(getX(i), getY(state.data[i].series[s]));
                }

                // Draw partial leading segment if animating between points
                let leadX = getX(currentIndex);
                let leadY = getY(state.data[currentIndex].series[s]);
                let currentVal = state.data[currentIndex].series[s];

                if (currentIndex < numPoints - 1 && fraction > 0) {
                    const nextVal = state.data[currentIndex + 1].series[s];
                    currentVal = currentVal + (nextVal - currentVal) * fraction;
                    
                    leadX = getX(currentIndex + fraction);
                    leadY = getY(currentVal);
                    ctx.lineTo(leadX, leadY);
                }

                // Stroke the line with Glow
                ctx.strokeStyle = color;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (state.glow > 0) {
                    ctx.shadowBlur = state.glow;
                    ctx.shadowColor = color;
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.stroke();

                // 6. Draw Leading Marker (Dot)
                ctx.shadowBlur = 0; // Turn off glow for inner dot
                ctx.beginPath();
                ctx.arc(leadX, leadY, 12, 0, Math.PI * 2);
                ctx.fillStyle = bgColor; // fill with background
                ctx.fill();
                ctx.lineWidth = 5;
                ctx.stroke();

                // 7. Draw Floating Label at the Leading Edge
                const labelX = leadX + 25;
                const labelY = leadY;
                
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                
                // Series Name
                ctx.font = '700 28px Inter';
                ctx.fillStyle = textColor;
                ctx.fillText(state.seriesNames[s], labelX, labelY - 18);
                
                // Value
                ctx.font = '500 26px JetBrains Mono';
                ctx.fillStyle = color;
                ctx.fillText(formatValue(currentVal), labelX, labelY + 18);
            }

            // 8. Draw X-Axis Ticks & Labels (only the ones we've passed)
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.font = '500 20px Inter';
            ctx.fillStyle = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 0;

            // To avoid crowding, maybe draw every Nth label, or all if < 20
            const step = numPoints > 20 ? Math.ceil(numPoints / 15) : 1;
            for (let i = 0; i <= currentIndex; i += step) {
                const x = getX(i);
                const y = padding.top + graphHeight + 15;
                ctx.fillText(state.data[i].xLabel, x, y);
            }
            // Always draw the very last one we are currently at if not included by step
            if (currentIndex % step !== 0) {
                ctx.fillText(state.data[currentIndex].xLabel, getX(currentIndex), padding.top + graphHeight + 15);
            }
        }

        // --- Interaction & Update Loops ---
        function updateAndRender() {
            parseCSV();
            renderFrame(1.0);
        }

        // Listeners
        dataInput.addEventListener('input', updateAndRender);
        bgStyleSelect.addEventListener('change', (e) => { state.bgStyle = e.target.value; renderFrame(state.progress); });
        formatSelect.addEventListener('change', (e) => { state.format = e.target.value; renderFrame(state.progress); });
        showGridCheck.addEventListener('change', (e) => { state.showGrid = e.target.checked; renderFrame(state.progress); });
        
        durationSlider.addEventListener('input', (e) => { 
            state.duration = parseFloat(e.target.value) * 1000;
            document.getElementById('duration-val').textContent = e.target.value + 's';
        });
        
        glowSlider.addEventListener('input', (e) => { 
            state.glow = parseInt(e.target.value);
            const valLabel = state.glow === 0 ? 'None' : (state.glow > 20 ? 'High' : 'Med');
            document.getElementById('glow-val').textContent = valLabel;
            renderFrame(state.progress);
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        document.getElementById('load-sample').addEventListener('click', () => {
            dataInput.value = `Year,Smartphones,Tablets,Laptops,Wearables
2012,200,50,150,10
2014,350,120,160,30
2016,550,160,170,80
2018,800,180,180,180
2020,1100,220,240,350
2022,1300,200,280,550
2024,1500,190,320,850`;
            updateAndRender();
        });

        // Initialize
        updateAndRender();

        // --- Animation & Recording Logic ---
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const overlay = document.getElementById('recording-overlay');

        async function runAnimation(recordCallback = null) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            parseCSV(); // Ensure fresh data
            
            if (recordCallback) await recordCallback();

            const startTime = performance.now();
            const durationMs = state.duration;

            return new Promise((resolve) => {
                function animLoop(currentTime) {
                    // Safe guard elapsed time from being negative due to rAF vs performance.now() mismatches
                    const elapsed = Math.max(0, currentTime - startTime);
                    let p = durationMs > 0 ? elapsed / durationMs : 1.0;
                    
                    // Strict clamp progress to 0 -> 1 bounds
                    p = Math.max(0, Math.min(1, p));
                    
                    // Simple easing function (easeOutQuad) for smooth slow-down at the end
                    const easeOut = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
                    // Actually for charts, linear is often better so data flows accurately with time.
                    // We will use linear time to keep X-axis traversal speed constant.
                    state.progress = p;
                    renderFrame(p);

                    if (p < 1.0) {
                        requestAnimationFrame(animLoop);
                    } else {
                        state.isAnimating = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        resolve();
                    }
                }
                requestAnimationFrame(animLoop);
            });
        }

        btnAnimate.addEventListener('click', () => runAnimation());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimating || state.isRecording) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                // High quality stream capture
                const stream = canvas.captureStream(60);
                
                let options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm;codecs=vp8' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' };
                    }
                }

                // High bitrate for crisp charts
                options.videoBitsPerSecond = 8000000; // 8 Mbps

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `animated-chart.webm`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                    state.progress = 1.0;
                    renderFrame(1.0); // Reset UI
                };

                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');

                // Record: Hold first frame 0.5s, animate, hold last frame 2s
                state.progress = 0;
                renderFrame(0);
                
                await new Promise(r => setTimeout(r, 500)); // Pre-roll
                mediaRecorder.start();
                
                await runAnimation();

                // Post-animation hold
                setTimeout(() => {
                    mediaRecorder.stop();
                }, 2000);

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                overlay.classList.remove('translate-y-4');
                overlay.classList.add('-translate-y-20');
                state.isAnimating = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                renderFrame(1.0);
            }
        });

    </script>
</body>
</html>
