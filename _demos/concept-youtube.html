        .video-container {
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: border-radius 0.3s;
        }
        
        .duration-badge {

            bottom: 4px;

        /* Grid Layout matching YouTube */

            grid-template-columns: 1fr;
            gap: 40px 16px;

    <script>
        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
        });

        // Gallery Logic
        let allItems = [];
        let gallerySettings = { playMode: 'hover' };

        async function loadGallery() {
            try {
                const response = await fetch('gallery-data.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = JSON.parse(await response.text());
                allItems = data.items || [];
                gallerySettings = data.settings || { playMode: 'hover' };
                renderGallery(allItems);
            } catch (e) {
                document.getElementById('gallery').innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i class="ph ph-warning-circle text-4xl text-yt-textSecondaryLight dark:text-yt-textSecondaryDark mb-2"></i>
                        <h2 class="text-lg font-medium mb-1">No videos found</h2>
                        <p class="text-sm text-yt-textSecondaryLight dark:text-yt-textSecondaryDark">Run node automate.js to generate gallery previews.</p>
                    </div>`;
            }
        }

        function renderGallery(items) {
            const container = document.getElementById('gallery');
            container.innerHTML = '';
            
            if (!items.length) {
                container.innerHTML = '<div class="col-span-full py-20 text-center text-sm text-yt-textSecondaryLight dark:text-yt-textSecondaryDark">No matching results found.</div>';
                return;
            }
            
            items.forEach(item => {
                const card = document.createElement('a');
                card.href = item.file;
                card.className = 'preset-card flex flex-col gap-3 group';
                card.target = '_blank';
                
                const isLoop = gallerySettings.playMode === 'loop';
                // Fake a duration
                const duration = "0:12"; 
                // Fake views and time
                const views = Math.floor(Math.random() * 900 + 100) + "K views";
                const time = Math.floor(Math.random() * 11 + 1) + " months ago";
                
                card.innerHTML = `
                    <div class="video-container">
                        <video src="${item.preview}" muted loop playsinline ${isLoop ? 'autoplay' : ''}
                            ${!isLoop ? 'onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"' : ''}></video>
                        <div class="duration-badge">${duration}</div>
                    </div>
                    <div class="flex gap-3 pr-6">
                        <div class="w-9 h-9 rounded-full bg-purple-600 flex items-center justify-center text-white font-medium text-sm flex-shrink-0 mt-0.5">AS</div>
                        <div class="flex flex-col">
                            <h3 class="text-sm font-medium line-clamp-2 leading-tight mb-1 group-hover:text-yt-blue">${item.title}</h3>
                            <span class="text-[12px] text-yt-textSecondaryLight dark:text-yt-textSecondaryDark hover:text-black dark:hover:text-white transition">Animator Studio</span>
                            <div class="text-[12px] text-yt-textSecondaryLight dark:text-yt-textSecondaryDark flex items-center">
                                <span>${item.width}x${item.height}</span>
                                <span class="mx-1">•</span>
                                <span>Free Template</span>
                            </div>
                        </div>
                        <button class="absolute right-0 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 p-1.5 hover:bg-yt-hoverLight dark:hover:bg-yt-hoverDark rounded-full transition">
                            <i class="ph-bold ph-dots-three-vertical text-xl"></i>
                        </button>
                    </div>
                `;
                
                // Add relative positioning to the text container for the dots menu
                card.querySelector('.flex.gap-3').classList.add('relative');
                
                container.appendChild(card);
            });
        }

        document.getElementById('search').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            renderGallery(allItems.filter(i => i.title.toLowerCase().includes(q) || i.file.toLowerCase().includes(q)));
        });

        loadGallery();
    </script>
