2000,72,65,50,5

        // --- App State & Data ---
        const state = {
            parsedData: [], // Array structure depends on type
            seriesNames: [],
            maxVal: 0,
            progress: 1.0,
            isAnimating: false,
            isRecording: false,
            
            title: '',
            subtitle: '',
            source: '',
            
            showTitle: true,
            showSubtitle: true,
            showSource: true,
            showGrid: true,
            
            fontFamily: 'Inter',
            titleColor: '#ffffff',
            textColor: '#94a3b8',
            bgColor: '#020617',
            colorPalette: 'vibrant',
            
            type: 'globe-spikes',
            duration: 6000
        };

        // Color Palettes
        const palettes = {
            vibrant: ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#a855f7', '#ec4899', '#06b6d4', '#eab308'],
            pastel: ['#fca5a5', '#93c5fd', '#6ee7b7', '#fcd34d', '#d8b4fe', '#f9a8d4', '#67e8f9', '#fde047'],
            neon: ['#ff00ff', '#00ffff', '#00ff00', '#ffff00', '#ff0000', '#0000ff'],
            ocean: ['#0369a1', '#0ea5e9', '#38bdf8', '#7dd3fc', '#0284c7'],
            magma: ['#fde047', '#f97316', '#ef4444', '#be123c', '#4c0519']
        };

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        canvas.width = 1920;
        canvas.height = 1080;

        // DOM Elements
        const uiTitle = document.getElementById('chart-title');
        const uiSubtitle = document.getElementById('chart-subtitle');
        const uiSource = document.getElementById('chart-source');
        
        const uiShowTitle = document.getElementById('show-title');
        const uiShowSubtitle = document.getElementById('show-subtitle');
        const uiShowSource = document.getElementById('show-source');
        
        const uiTitleColor = document.getElementById('title-color');
        const uiTextColor = document.getElementById('text-color');
        const uiBgColor = document.getElementById('bg-color');

        const dataInput = document.getElementById('data-input');
        const dataHint = document.getElementById('data-hint');
        const fontSelect = document.getElementById('font-family');
        const paletteSelect = document.getElementById('color-palette');
        const typeSelect = document.getElementById('chart-type');
        
        const durationSlider = document.getElementById('anim-duration');
        const showGridCheck = document.getElementById('show-grid');
        const canvasContainer = document.getElementById('canvas-container');

        // --- Utility Functions ---
        function isDarkColor(hexColor) {
            const hex = hexColor.replace('#', '');
            if(hex.length === 6) {
                const r = parseInt(hex.substr(0, 2), 16);
                const g = parseInt(hex.substr(2, 2), 16);
                const b = parseInt(hex.substr(4, 2), 16);
                return (r * 0.299 + g * 0.587 + b * 0.114) < 128;
            }
            return false;
        }

        function updateCanvasBackgroundCSS() {
            canvasContainer.style.backgroundColor = state.bgColor;
            const isDarkBg = isDarkColor(state.bgColor);
            const gridColor = isDarkBg ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
            
            canvasContainer.style.backgroundImage = `
                radial-gradient(${gridColor} 1px, transparent 1px),
                radial-gradient(${gridColor} 1px, transparent 1px)
            `;
        }

        function easeOutQuint(x) {
            return 1 - Math.pow(1 - x, 5);
        }

        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        // --- 3D Globe Math ---
        // Convert Lat/Lng to 3D Cartesian coordinates on a sphere
        function latLngTo3D(lat, lng, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            return {x, y, z};
        }

        // Rotate point around X and Y axes
        function rotate3D(point, angleX, angleY) {
            // Rotate Y
            const cosY = Math.cos(angleY), sinY = Math.sin(angleY);
            const x1 = point.x * cosY - point.z * sinY;
            const z1 = point.x * sinY + point.z * cosY;
            
            // Rotate X
            const cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            const y2 = point.y * cosX - z1 * sinX;
            const z2 = point.y * sinX + z1 * cosX;
            
            return { x: x1, y: y2, z: z2 };
        }

        // 3D Point to 2D Canvas Projection
        function project3D(point, cx, cy, fov = 800) {
            // Simple orthographic-ish projection for cleaner UI look
            return {
                x: cx + point.x,
                y: cy + point.y,
                z: point.z,
                scale: (fov + point.z) / fov // optional scaling for depth
            };
        }

        // --- Data Parsing ---
        function parseCSV() {
            const raw = dataInput.value.trim();
            if (!raw) return;

            const lines = raw.split('\n').map(l => l.split(',').map(c => c.trim()));
            if (lines.length < 2) return;

            state.parsedData = [];
            state.maxVal = 0;

            if (state.type === 'stacked-area') {
                state.seriesNames = lines[0].slice(1);
                
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i];
                    if (row.length < 2) continue;
                    
                    const xLabel = row[0];
                    const seriesData = [];
                    let rowTotal = 0;
                    
                    for (let j = 1; j < row.length; j++) {
                        const val = parseFloat(row[j]) || 0;
                        seriesData.push(val);
                        rowTotal += val;
                    }
                    state.parsedData.push({ xLabel, series: seriesData });
                    if (rowTotal > state.maxVal) state.maxVal = rowTotal;
                }
            } 
            else if (state.type === 'globe-spikes') {
                for (let i = 1; i < lines.length; i++) {
                    const r = lines[i];
                    if (r.length < 4) continue;
                    const val = parseFloat(r[3]) || 0;
                    state.parsedData.push({
                        label: r[0], lat: parseFloat(r[1]), lng: parseFloat(r[2]),
                        value: val, color: r[4] || null
                    });
                    if (val > state.maxVal) state.maxVal = val;
                }
            }
            else if (state.type === 'globe-arcs') {
                for (let i = 1; i < lines.length; i++) {
                    const r = lines[i];
                    if (r.length < 6) continue;
                    const val = parseFloat(r[5]) || 0;
                    state.parsedData.push({
                        label: r[0], 
                        startLat: parseFloat(r[1]), startLng: parseFloat(r[2]),
                        endLat: parseFloat(r[3]), endLng: parseFloat(r[4]),
                        value: val, color: r[6] || null
                    });
                    if (val > state.maxVal) state.maxVal = val;
                }
            }

            // Adjust axes padding based on maxVal
            if (state.maxVal > 0) {
                const magnitude = Math.pow(10, Math.floor(Math.log10(Math.max(0.1, state.maxVal))));
                state.maxVal = Math.ceil(state.maxVal / magnitude) * magnitude;
            }
        }

        function updateStateFromUI() {
            state.title = uiTitle.value;
            state.subtitle = uiSubtitle.value;
            state.source = uiSource.value;
            
            state.showTitle = uiShowTitle.checked;
            state.showSubtitle = uiShowSubtitle.checked;
            state.showSource = uiShowSource.checked;
            state.showGrid = showGridCheck.checked;
            
            state.titleColor = uiTitleColor.value;
            state.textColor = uiTextColor.value;
            state.bgColor = uiBgColor.value;
            
            state.fontFamily = fontSelect.value;
            state.colorPalette = paletteSelect.value;
            state.type = typeSelect.value;
            
            if (state.type === 'stacked-area') dataHint.textContent = "Format: Year,Series1,Series2,Series3...";
            else if (state.type === 'globe-spikes') dataHint.textContent = "Format: Label,Lat,Lng,Value,Color";
            else if (state.type === 'globe-arcs') dataHint.textContent = "Format: Label,StartLat,StartLng,EndLat,EndLng,Value,Color";
            
            parseCSV();
        }

        // --- Canvas Rendering Engines ---

        function drawTextLayout() {
            const fontBase = state.fontFamily;
            ctx.textAlign = 'left';
            let currentY = 70;
            
            if (state.showTitle) {
                ctx.textBaseline = 'top';
                ctx.font = `800 64px "${fontBase}"`;
                ctx.fillStyle = state.titleColor;
                ctx.fillText(state.title, 80, currentY);
                currentY += 80;
            } else {
                currentY = 70;
            }

            if (state.showSubtitle) {
                ctx.textBaseline = 'top';
                ctx.font = `400 38px "${fontBase}"`;
                ctx.fillStyle = state.textColor;
                ctx.fillText(state.subtitle, 80, currentY);
            }

            if (state.showSource) {
                ctx.textBaseline = 'bottom';
                ctx.font = `600 20px "${fontBase}"`;
                ctx.fillStyle = state.textColor;
                ctx.fillText(state.source, 80, canvas.height - 40);
            }
        }

        // 1. Stacked Area Engine
        function drawStackedArea(progress) {
            const isDarkBg = isDarkColor(state.bgColor);
            const gridColor = isDarkBg ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
            const activePalette = palettes[state.colorPalette];
            const fontBase = state.fontFamily;

            const padding = { top: 220, right: 100, bottom: 120, left: 120 };
            const w = canvas.width - padding.left - padding.right;
            const h = canvas.height - padding.top - padding.bottom;
            
            const numPoints = state.parsedData.length;
            if (numPoints === 0) return;

            const getX = (index) => padding.left + (index / Math.max(1, numPoints - 1)) * w;
            const getY = (value) => padding.top + h - (value / state.maxVal) * h;

            // Draw Grid & Y-Axis
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.font = `600 20px "${fontBase}"`;
            ctx.fillStyle = state.textColor;

            const ySteps = 4;
            for (let i = 0; i <= ySteps; i++) {
                const val = (state.maxVal / ySteps) * i;
                const y = getY(val);

                if (state.showGrid) {
                    ctx.beginPath();
                    ctx.setLineDash([8, 8]);
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(padding.left + w, y);
                    ctx.strokeStyle = gridColor;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                ctx.fillText(Math.round(val).toLocaleString(), padding.left - 20, y);
            }

            // Draw Base Line
            ctx.beginPath();
            ctx.moveTo(padding.left, padding.top + h);
            ctx.lineTo(padding.left + w, padding.top + h);
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 3;
            ctx.stroke();

            // Calculate Stacked Points
            const stackedPoints = []; // [seriesIndex][pointIndex] = {x, y0, y1}
            for (let s = 0; s < state.seriesNames.length; s++) {
                stackedPoints[s] = [];
                for (let i = 0; i < numPoints; i++) {
                    const x = getX(i);
                    // Sum previous series values
                    let val0 = 0;
                    for (let prev = 0; prev < s; prev++) val0 += state.parsedData[i].series[prev];
                    const val1 = val0 + state.parsedData[i].series[s];
                    
                    stackedPoints[s].push({
                        x: x,
                        y0: getY(val0),
                        y1: getY(val1)
                    });
                }
            }

            // Animation Clipping (Horizontal Reveal)
            const easeP = easeOutQuint(progress);
            const currentClipX = padding.left + (w * easeP);
            
            ctx.save();
            ctx.beginPath();
            ctx.rect(padding.left - 10, padding.top - 50, currentClipX - padding.left + 20, h + 100);
            ctx.clip();

            // Draw Stacked Areas (from top to bottom or bottom to top)
            for (let s = state.seriesNames.length - 1; s >= 0; s--) {
                const pts = stackedPoints[s];
                const color = activePalette[s % activePalette.length];
                
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y0);
                
                // Top edge
                for (let i = 0; i < numPoints; i++) ctx.lineTo(pts[i].x, pts[i].y1);
                
                // Right edge down
                ctx.lineTo(pts[numPoints-1].x, pts[numPoints-1].y0);
                
                // Bottom edge back
                for (let i = numPoints - 1; i >= 0; i--) ctx.lineTo(pts[i].x, pts[i].y0);
                
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.8;
                ctx.fill();
                
                // Top line stroke for crispness
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y1);
                for (let i = 1; i < numPoints; i++) ctx.lineTo(pts[i].x, pts[i].y1);
                ctx.strokeStyle = color;
                ctx.globalAlpha = 1.0;
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            ctx.restore(); // remove clip

            // X-Axis Labels
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let i = 0; i < numPoints; i++) {
                // Fade in labels based on clip position
                const lx = getX(i);
                if (lx <= currentClipX + 50) {
                    ctx.globalAlpha = Math.min(1, Math.max(0, (currentClipX - lx + 50) / 50));
                    ctx.fillText(state.parsedData[i].xLabel, lx, padding.top + h + 15);
                }
            }
            ctx.globalAlpha = 1.0;

            // Draw Legend
            drawAreaLegend(activePalette, fontBase);
        }

        function drawAreaLegend(palette, fontBase) {
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.font = `700 24px "${fontBase}"`;
            
            const legendY = 200;
            let currentX = 120;
            const itemPadding = 40;
            const boxSize = 20;

            state.seriesNames.forEach((name, idx) => {
                const color = palette[idx % palette.length];
                
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.roundRect(currentX, legendY - boxSize/2, boxSize, boxSize, 4);
                ctx.fill();

                ctx.fillStyle = state.textColor;
                ctx.fillText(name, currentX + boxSize + 10, legendY + 2);

                currentX += boxSize + 10 + ctx.measureText(name).width + itemPadding;
            });
        }

        // 2. 3D Globe Engine
        function drawGlobeBase(cx, cy, radius, rotX, rotY, gridColor) {
            ctx.lineWidth = 1;
            
            // Draw Latitudes
            for (let lat = -75; lat <= 75; lat += 15) {
                ctx.beginPath();
                for (let lng = -180; lng <= 180; lng += 5) {
                    const pt3d = latLngTo3D(lat, lng, radius);
                    const rotPt = rotate3D(pt3d, rotX, rotY);
                    
                    // Faint back lines, solid front lines
                    if (rotPt.z > 0) ctx.strokeStyle = gridColor;
                    else ctx.strokeStyle = gridColor.replace(/[\d.]+\)$/g, '0.1)'); // reduce alpha
                    
                    const p2d = project3D(rotPt, cx, cy);
                    if (lng === -180) ctx.moveTo(p2d.x, p2d.y);
                    else ctx.lineTo(p2d.x, p2d.y);
                }
                ctx.stroke();
            }

            // Draw Longitudes
            for (let lng = -180; lng < 180; lng += 15) {
                ctx.beginPath();
                for (let lat = -90; lat <= 90; lat += 5) {
                    const pt3d = latLngTo3D(lat, lng, radius);
                    const rotPt = rotate3D(pt3d, rotX, rotY);
                    
                    if (rotPt.z > 0) ctx.strokeStyle = gridColor;
                    else ctx.strokeStyle = gridColor.replace(/[\d.]+\)$/g, '0.1)');
                    
                    const p2d = project3D(rotPt, cx, cy);
                    if (lat === -90) ctx.moveTo(p2d.x, p2d.y);
                    else ctx.lineTo(p2d.x, p2d.y);
                }
                ctx.stroke();
            }
        }

        function drawGlobe(progress) {
            const isDarkBg = isDarkColor(state.bgColor);
            const gridColor = isDarkBg ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.25)';
            const activePalette = palettes[state.colorPalette];
            const fontBase = state.fontFamily;

            const cx = canvas.width / 2;
            const cy = canvas.height / 2 + 50;
            const radius = canvas.height * 0.35;

            // Continual rotation combined with intro animation spin
            const easeP = easeOutQuint(progress);
            const rotY = (progress * Math.PI * 2) - (Math.PI / 2); // Rotate 360 over the animation
            const rotX = Math.PI / 8; // Tilted down slightly

            if (state.showGrid) {
                drawGlobeBase(cx, cy, radius, rotX, rotY, gridColor);
            }

            // Draw Data Elements
            const items = state.parsedData;
            
            // We need to Z-sort the data items so front items draw over back items
            const processedItems = items.map((item, idx) => {
                if (state.type === 'globe-spikes') {
                    const base3d = latLngTo3D(item.lat, item.lng, radius);
                    return { item, idx, base: rotate3D(base3d, rotX, rotY) };
                } else {
                    const start3d = latLngTo3D(item.startLat, item.startLng, radius);
                    const end3d = latLngTo3D(item.endLat, item.endLng, radius);
                    const startRot = rotate3D(start3d, rotX, rotY);
                    const endRot = rotate3D(end3d, rotX, rotY);
                    // Midpoint for sorting
                    const midZ = (startRot.z + endRot.z) / 2;
                    return { item, idx, start: startRot, end: endRot, zSort: midZ };
                }
            });

            // Sort back to front (Z axis pointing towards viewer means larger Z is front)
            processedItems.sort((a, b) => {
                if (state.type === 'globe-spikes') return a.base.z - b.base.z;
                return a.zSort - b.zSort;
            });

            processedItems.forEach(pItem => {
                const { item, idx } = pItem;
                const color = item.color || activePalette[idx % activePalette.length];
                
                if (state.type === 'globe-spikes') {
                    // Only draw if it's on the front half (or slightly over the horizon)
                    if (pItem.base.z < -radius*0.5) return; 
                    
                    const maxSpikeLen = (item.value / state.maxVal) * (radius * 0.8);
                    const currentSpikeLen = maxSpikeLen * easeP;
                    
                    // Tip of spike extending outward from sphere center
                    const tip3d = latLngTo3D(item.lat, item.lng, radius + currentSpikeLen);
                    const tipRot = rotate3D(tip3d, rotX, rotY);
                    
                    const base2d = project3D(pItem.base, cx, cy);
                    const tip2d = project3D(tipRot, cx, cy);

                    // Draw Spike
                    ctx.beginPath();
                    ctx.moveTo(base2d.x, base2d.y);
                    ctx.lineTo(tip2d.x, tip2d.y);
                    
                    // Fade out as it goes around back
                    const alpha = Math.max(0, Math.min(1, (pItem.base.z + radius*0.2) / (radius*0.5)));
                    
                    ctx.strokeStyle = color;
                    ctx.globalAlpha = alpha;
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'round';
                    
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    // Draw Dot at Tip
                    ctx.beginPath();
                    ctx.arc(tip2d.x, tip2d.y, 6, 0, Math.PI*2);
                    ctx.fillStyle = state.bgColor;
                    ctx.fill();
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    // Label (Only if on front)
                    if (pItem.base.z > 0 && easeP > 0.5) {
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.font = `600 20px "${fontBase}"`;
                        ctx.fillStyle = state.textColor;
                        ctx.globalAlpha = alpha * ((easeP - 0.5) * 2);
                        ctx.fillText(item.label, tip2d.x, tip2d.y - 12);
                    }
                    ctx.globalAlpha = 1.0;
                }
                
                else if (state.type === 'globe-arcs') {
                    // Draw Arcs
                    if (pItem.zSort < -radius*0.5) return;

                    const start2d = project3D(pItem.start, cx, cy);
                    const end2d = project3D(pItem.end, cx, cy);

                    // Arc height based on distance
                    const dist = Math.sqrt(Math.pow(end2d.x - start2d.x, 2) + Math.pow(end2d.y - start2d.y, 2));
                    const arcHeight = dist * 0.3;

                    // Midpoint pulled up/out
                    const midX = (start2d.x + end2d.x) / 2;
                    const midY = (start2d.y + end2d.y) / 2 - arcHeight;

                    // Progressively draw line using quadratic bezier math
                    ctx.beginPath();
                    ctx.moveTo(start2d.x, start2d.y);
                    
                    const segments = 50;
                    const drawLimit = Math.max(1, Math.floor(segments * easeP));
                    let lx = start2d.x, ly = start2d.y;

                    for (let i = 1; i <= drawLimit; i++) {
                        const t = i / segments;
                        const bx = Math.pow(1-t, 2)*start2d.x + 2*(1-t)*t*midX + Math.pow(t, 2)*end2d.x;
                        const by = Math.pow(1-t, 2)*start2d.y + 2*(1-t)*t*midY + Math.pow(t, 2)*end2d.y;
                        ctx.lineTo(bx, by);
                        lx = bx; ly = by;
                    }

                    const alpha = Math.max(0, Math.min(1, (pItem.zSort + radius*0.2) / (radius*0.5)));
                    
                    ctx.strokeStyle = color;
                    ctx.globalAlpha = alpha;
                    
                    // Thicker lines for larger values
                    const lineW = 2 + (item.value / state.maxVal) * 8;
                    ctx.lineWidth = lineW;
                    ctx.lineCap = 'round';
                    
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = color;
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    // Lead Dot
                    if (easeP < 1.0) {
                        ctx.beginPath();
                        ctx.arc(lx, ly, lineW * 1.5, 0, Math.PI*2);
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                    }

                    ctx.globalAlpha = 1.0;
                }
            });
        }

        // --- Core Rendering Loop ---
        function renderFrame(progress) {
            // Clear & Background
            ctx.fillStyle = state.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawTextLayout();

            if (state.parsedData.length === 0) return;

            if (state.type === 'stacked-area') {
                drawStackedArea(progress);
            } else {
                drawGlobe(progress);
            }
        }

        // --- Interaction & Event Listeners ---
        function updateAndRender() {
            updateStateFromUI();
            updateCanvasBackgroundCSS();
            renderFrame(1.0); 
        }

        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const template = btn.getAttribute('data-template');
                if (templates[template]) {
                    uiTitle.value = templates[template].title;
                    uiSubtitle.value = templates[template].subtitle;
                    uiSource.value = templates[template].source;
                    typeSelect.value = templates[template].type;
                    dataInput.value = templates[template].csv;
                    
                    uiBgColor.value = templates[template].bgColor;
                    uiTitleColor.value = '#ffffff';
                    
                    if (templates[template].bgColor === '#f8fafc') {
                        uiTitleColor.value = '#0f172a';
                    }
                    
                    updateAndRender();
                }
            });
        });

        // Listeners for all dynamic inputs
        const inputs = [uiTitle, uiSubtitle, uiSource, dataInput, uiBgColor, uiTitleColor, uiTextColor];
        inputs.forEach(el => el.addEventListener('input', updateAndRender));
        
        [uiShowTitle, uiShowSubtitle, uiShowSource, showGridCheck].forEach(el => el.addEventListener('change', updateAndRender));
        
        [typeSelect, fontSelect, paletteSelect].forEach(el => el.addEventListener('change', updateAndRender));
        
        durationSlider.addEventListener('input', (e) => { 
            state.duration = parseFloat(e.target.value) * 1000;
            document.getElementById('duration-val').textContent = e.target.value + 's';
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // Initialize
        setTimeout(() => {
            document.querySelector('[data-template="globe-spikes"]').click();
        }, 100);

        // --- Animation & Recording Logic ---
        const btnAnimate = document.getElementById('btn-animate');
        const btnRecord = document.getElementById('btn-record');
        const overlay = document.getElementById('recording-overlay');

        async function runAnimation(recordCallback = null) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            btnAnimate.disabled = true;
            btnRecord.disabled = true;

            updateStateFromUI(); 
            
            if (recordCallback) await recordCallback();

            const startTime = performance.now();
            const durationMs = state.duration;

            return new Promise((resolve) => {
                function animLoop(currentTime) {
                    const elapsed = Math.max(0, currentTime - startTime);
                    let p = durationMs > 0 ? elapsed / durationMs : 1.0;
                    p = Math.max(0, Math.min(1, p));
                    
                    state.progress = p;
                    renderFrame(p);

                    if (p < 1.0) {
                        requestAnimationFrame(animLoop);
                    } else {
                        state.isAnimating = false;
                        btnAnimate.disabled = false;
                        btnRecord.disabled = false;
                        resolve();
                    }
                }
                requestAnimationFrame(animLoop);
            });
        }

        btnAnimate.addEventListener('click', () => runAnimation());

        btnRecord.addEventListener('click', async () => {
            if (state.isAnimating || state.isRecording) return;
            
            let mediaRecorder;
            let recordedChunks = [];
            state.isRecording = true;
            
            try {
                const stream = canvas.captureStream(60);
                
                const format = document.getElementById('export-format').value;
                let options = { mimeType: `video/${format};codecs=vp9` };
                
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: `video/${format}` };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm' };
                    }
                }

                // 10 Mbps for high quality 3D rendering
                options.videoBitsPerSecond = 10000000; 

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType.split(';')[0] });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    const ext = options.mimeType.includes('mp4') ? 'mp4' : 'webm';
                    a.download = `geodata-animation.${ext}`;
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    overlay.classList.remove('translate-y-4');
                    overlay.classList.add('-translate-y-20');
                    state.isRecording = false;
                    state.progress = 1.0;
                    renderFrame(1.0); 
                };

                overlay.classList.remove('-translate-y-20');
                overlay.classList.add('translate-y-4');

                state.progress = 0;
                renderFrame(0);
                
                // Keep pumping frames to guarantee MediaRecorder catches the start
                let idleInterval = setInterval(() => renderFrame(0), 33);
                
                mediaRecorder.start();
                await new Promise(r => setTimeout(r, 500)); 
                clearInterval(idleInterval);
                
                await runAnimation();

                // Post-roll
                let endInterval = setInterval(() => renderFrame(1.0), 33);
                setTimeout(() => {
                    clearInterval(endInterval);
                    mediaRecorder.stop();
                }, 2000);

            } catch (err) {
                console.error("Recording failed:", err);
                alert("Recording failed. Your browser might not support canvas recording.");
                overlay.classList.remove('translate-y-4');
                overlay.classList.add('-translate-y-20');
                state.isAnimating = false;
                state.isRecording = false;
                btnAnimate.disabled = false;
                btnRecord.disabled = false;
                renderFrame(1.0);
            }
        });

    </script>
</body>
</html>
